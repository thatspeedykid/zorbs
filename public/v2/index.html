<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZORBS v2 — engine test</title>
<style>
  html,body { margin:0; height:100%; background:#02050d; overflow:hidden; font-family:'Courier New',monospace; }
  #c { display:block; width:100vw; height:100vh; }
  #hud { position:fixed; top:10px; left:12px; color:#7fe9ff; font-size:12px; letter-spacing:1px; text-shadow:0 0 8px rgba(0,180,255,.5); z-index:10; }
  #status { position:fixed; bottom:8px; left:8px; font-size:10px; font-family:monospace; padding:3px 8px; border-radius:4px; z-index:20; }
  #arm { position:fixed; inset:0; display:flex; align-items:center; justify-content:center; background:rgba(2,5,13,.85); z-index:50; cursor:pointer; }
  #arm .box { color:#7fe9ff; border:1px solid rgba(0,200,255,.4); padding:18px 30px; border-radius:8px; letter-spacing:2px; font-size:14px; }
  #leader { position:fixed; top:10px; right:12px; color:#fff; font-size:13px; text-align:right; z-index:10; text-shadow:0 0 8px rgba(255,255,255,.4); }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="hud">ZORBS v2 — engine test</div>
<div id="leader"></div>
<div id="status">booting…</div>
<div id="arm"><div class="box">▶ CLICK TO START</div></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<!-- post-processing for the AAA glow pass (these attach to the THREE global) -->
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/CopyShader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/LuminosityHighPassShader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/EffectComposer.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/RenderPass.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/ShaderPass.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/UnrealBloomPass.js"></script>
<script src="/v2/forks.js?v=3d"></script>
<script src="/v2/track.js?v=3d"></script>
<script src="/v2/physics.js?v=3d"></script>
<script src="/v2/cosmetics.js?v=3d"></script>
<script>
// ---------------------------------------------------------------------------
// ZORBS v2 game page. Clean loop: build track -> spawn balls -> drive+collide.
// Host runs physics; this test page is always host. Multiplayer wiring comes next.
// ---------------------------------------------------------------------------
const BALL_R = 0.5;
const statusEl = document.getElementById('status');
// BUILD STAMP: shown in the HUD + console so there is never any question about which
// version the browser is actually running. If the stamp doesn't match the latest
// commit, the problem is deployment/caching — not the code.
const BUILD = '3d';
console.log('[ZORBS] build', BUILD);
const leaderEl = document.getElementById('leader');
function setStatus(txt, ok) {
  statusEl.textContent = txt;
  statusEl.style.background = ok ? 'rgba(0,255,136,.15)' : 'rgba(255,90,90,.15)';
  statusEl.style.color = ok ? '#00ff88' : '#ff7676';
  statusEl.style.border = '1px solid ' + (ok ? 'rgba(0,255,136,.4)' : 'rgba(255,90,90,.4)');
}

// ---- renderer / scene ----
const canvas = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({ canvas, antialias:true });
renderer.setPixelRatio(Math.min(2, devicePixelRatio));
renderer.setSize(innerWidth, innerHeight);
// FILMIC LOOK: ACES tone mapping + sRGB output. This is the single biggest "game
// engine" upgrade — highlights roll off like a camera instead of clipping to white.
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.15;
renderer.outputEncoding = THREE.sRGBEncoding;
const scene = new THREE.Scene();
// fog softened: density 0.006 with a near-BLACK color was fading everything beyond
// ~100 units to black — a major contributor to the 'black track'. Deep blue + gentle.
scene.fog = new THREE.FogExp2(0x0a2040, 0.0018);
const camera = new THREE.PerspectiveCamera(60, innerWidth/innerHeight, 0.1, 2000);

// BLOOM: everything bright (rails, rings, arches, energy bands) gets a real glow halo.
// Guarded so the page still runs plain if a CDN script fails to load.
let composer = null;
if (THREE.EffectComposer && THREE.UnrealBloomPass) {
  composer = new THREE.EffectComposer(renderer);
  composer.addPass(new THREE.RenderPass(scene, camera));
  const bloom = new THREE.UnrealBloomPass(
    new THREE.Vector2(innerWidth, innerHeight),
    0.55,   // strength (was 0.9 — was washing the balls to white)
    0.4,    // radius
    0.85    // threshold — only the genuinely brightest pixels (rings/rails) bloom
  );
  composer.addPass(bloom);
}

addEventListener('resize', () => {
  renderer.setSize(innerWidth, innerHeight);
  if (composer) composer.setSize(innerWidth, innerHeight);
  camera.aspect = innerWidth/innerHeight; camera.updateProjectionMatrix();
});

// lights (slightly hotter than before — ACES tone mapping eats some brightness)
scene.add(new THREE.AmbientLight(0x445577, 0.75));
const key = new THREE.DirectionalLight(0xaaccff, 1.6); key.position.set(20, 60, 10); scene.add(key);
const rim = new THREE.DirectionalLight(0xff66cc, 0.6); rim.position.set(-30, 20, -20); scene.add(rim);
const fill = new THREE.DirectionalLight(0x00e5ff, 0.5); fill.position.set(0, 10, -40); scene.add(fill);
// HEMISPHERE LIGHT: sky color from above, deep-blue bounce from below. This is what
// stops the balls going pure black when their lit side faces away from the camera —
// every surface now gets some colored ambient, so the metal reads as metal, not a
// silhouette. Big readability win for a dark scene.
scene.add(new THREE.HemisphereLight(0x9fc8ff, 0x16203a, 0.7));

// STARFIELD: a sphere of additive points behind everything — instant depth + scale.
(function stars(){
  const COUNT = 1400;
  const pos = new Float32Array(COUNT * 3);
  for (let i = 0; i < COUNT; i++) {
    // random direction, pushed out near the sky dome
    const u = Math.random()*2-1, th = Math.random()*Math.PI*2;
    const r = 650 + Math.random()*200;
    const s = Math.sqrt(1-u*u);
    pos[i*3]   = s*Math.cos(th)*r;
    pos[i*3+1] = Math.abs(u)*r*0.9 + 20;      // keep stars above the horizon
    pos[i*3+2] = s*Math.sin(th)*r;
  }
  const g = new THREE.BufferGeometry();
  g.setAttribute('position', new THREE.BufferAttribute(pos, 3));
  const m = new THREE.PointsMaterial({ color:0x99ccff, size:2.2, sizeAttenuation:false,
    transparent:true, opacity:0.85, blending:THREE.AdditiveBlending, depthWrite:false, fog:false });
  const pts = new THREE.Points(g, m); pts.renderOrder = -999; scene.add(pts);
})();
// Environment map: render the gradient sky to a cube so metal balls reflect it (sci-fi sheen)
let _envMap = null;
function buildEnvMap() {
  if (!THREE.PMREMGenerator) return;
  const pmrem = new THREE.PMREMGenerator(renderer);
  if (pmrem.compileEquirectangularShader) pmrem.compileEquirectangularShader();
  // simple gradient scene captured as env
  const envScene = new THREE.Scene();
  const g = new THREE.SphereGeometry(50, 16, 12);
  // brighter gradient: metal reflects this, so a DARK env = black metal (the bug).
  // Warm top, cool horizon, with enough luminance to give chrome real highlights.
  const m = new THREE.ShaderMaterial({ side:THREE.BackSide,
    vertexShader:'varying vec3 p; void main(){ p=position; gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0); }',
    fragmentShader:'varying vec3 p; void main(){ float h=normalize(p).y*0.5+0.5; vec3 lo=vec3(0.12,0.20,0.42); vec3 hi=vec3(0.85,0.78,0.95); gl_FragColor=vec4(mix(lo,hi,h),1.0); }' });
  envScene.add(new THREE.Mesh(g, m));
  _envMap = pmrem.fromScene(envScene).texture;
  // do NOT set scene.environment (it over-lights the whole track). Ball-only below.
}

// gradient sky dome (always behind everything)
(function sky(){
  const g = new THREE.SphereGeometry(900, 24, 16);
  const m = new THREE.ShaderMaterial({
    side: THREE.BackSide, depthWrite:false, depthTest:false, fog:false,
    uniforms:{}, vertexShader:`varying vec3 p; void main(){ p=position; gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0); }`,
    fragmentShader:`varying vec3 p; void main(){ float h=normalize(p).y*0.5+0.5; vec3 top=vec3(0.02,0.05,0.13); vec3 bot=vec3(0.0,0.10,0.18); gl_FragColor=vec4(mix(bot,top,h),1.0); }`
  });
  const mesh = new THREE.Mesh(g, m); mesh.renderOrder = -1000; scene.add(mesh);
})();

// ---- build the course ----
let track = null, trackMeshes = [];
// FUTURISTIC GRID FLOOR: a dark glossy panel with glowing cyan grid lines (Tron look
// from the reference shots). The grid is a procedural canvas texture used as BOTH the
// emissive map (lines glow + bloom) and a subtle base map. Brightened from before so
// the floor NEVER renders near-black: lighter base, real emissive floor, moderate metal.
let _gridCanvas = null;
function gridTexture() {
  const c = document.createElement('canvas'); c.width = c.height = 128; const x = c.getContext('2d');
  _gridCanvas = c;
  // PANEL BACKGROUND must be clearly visible — a near-black panel (my earlier bug) made
  // the whole floor read black, since this drives both the base color and the emissive.
  const g = x.createLinearGradient(0,0,0,128);
  g.addColorStop(0,'#2b4a8f'); g.addColorStop(1,'#1c3263');   // visible medium blue panel
  x.fillStyle = g; x.fillRect(0,0,128,128);
  // bright cyan grid lines (these bloom into glowing seams)
  x.shadowColor = '#5cf0ff'; x.shadowBlur = 7;
  x.strokeStyle = '#7df6ff'; x.lineWidth = 4; x.strokeRect(3,3,122,122);
  x.lineWidth = 2; x.strokeStyle = 'rgba(120,230,255,0.7)';
  for (let i=32;i<128;i+=32){ x.beginPath(); x.moveTo(i,0); x.lineTo(i,128); x.moveTo(0,i); x.lineTo(128,i); x.stroke(); }
  const t = new THREE.CanvasTexture(c);
  t.wrapS = t.wrapT = THREE.RepeatWrapping; t.repeat.set(3, 1);
  return t;
}
const _gridTex = gridTexture(), _gridEmis = gridTexture();
// FLOOR IS NOW UNLIT (MeshBasicMaterial). Evidence from build 3c screenshot: every
// UNLIT material (rails, rings, trails) renders correctly while every LIT material
// (floor, walls, ball cores) renders near-black. Unlit = texture color straight to
// screen — immune to lights, env maps, and ACES shadow-crushing. If THIS still shows
// black, the texture/UVs are broken and the on-screen diagnostic will prove it.
const FLOOR_MAT = new THREE.MeshBasicMaterial({ map:_gridTex, side:THREE.DoubleSide });
const WALL_MAT  = new THREE.MeshStandardMaterial({ color:0x12244e, metalness:0.2, roughness:0.5, transparent:true, opacity:0.55, side:THREE.DoubleSide, emissive:0x1099ee, emissiveIntensity:0.8 });
const ROOF_MAT  = new THREE.MeshStandardMaterial({ color:0x0a1a3a, metalness:0.6, roughness:0.3, transparent:true, opacity:0.28, side:THREE.DoubleSide, emissive:0x0066aa, emissiveIntensity:0.25, depthWrite:false });

function meshFrom(buffers, mat, weld) {
  let g = new THREE.BufferGeometry();
  g.setAttribute('position', new THREE.BufferAttribute(buffers.positions, 3));
  if (buffers.uvs) g.setAttribute('uv', new THREE.BufferAttribute(buffers.uvs, 2));
  g.setIndex(new THREE.BufferAttribute(buffers.indices, 1));
  if (weld) g = weldVertices(g);   // merge shared verts so shading is smooth, not faceted
  g.computeVertexNormals();
  const m = new THREE.Mesh(g, mat); scene.add(m); trackMeshes.push(m); return m;
}

// Weld vertices that share a position so computeVertexNormals averages across faces
// = smooth shading (no visible facet edges on the ramp).
function weldVertices(geo) {
  const pos = geo.attributes.position.array;
  const uv = geo.attributes.uv ? geo.attributes.uv.array : null;
  const oldIdx = geo.index.array;
  const map = new Map(); const newPos = []; const newUV = []; const remap = new Int32Array(pos.length/3);
  const key = (x,y,z) => Math.round(x*100)+'_'+Math.round(y*100)+'_'+Math.round(z*100);
  for (let i=0;i<pos.length/3;i++){
    const x=pos[i*3],y=pos[i*3+1],z=pos[i*3+2]; const k=key(x,y,z);
    if (map.has(k)) { remap[i]=map.get(k); }
    else { const ni=newPos.length/3; map.set(k,ni); newPos.push(x,y,z);
      if (uv) newUV.push(uv[i*2], uv[i*2+1]); remap[i]=ni; }
  }
  const newIdx = new Uint32Array(oldIdx.length);
  for (let i=0;i<oldIdx.length;i++) newIdx[i]=remap[oldIdx[i]];
  const ng = new THREE.BufferGeometry();
  ng.setAttribute('position', new THREE.Float32BufferAttribute(newPos,3));
  if (uv) ng.setAttribute('uv', new THREE.Float32BufferAttribute(newUV,2));
  ng.setIndex(new THREE.BufferAttribute(newIdx,1));
  return ng;
}

function buildCourse(seed) {
  trackMeshes.forEach(m => scene.remove(m)); trackMeshes = [];
  // wire the (now-built) env map into the glossy floor/wall so they reflect the sky+rails
  if (_envMap) { WALL_MAT.envMap = _envMap; ROOF_MAT.envMap = _envMap;
    WALL_MAT.needsUpdate = ROOF_MAT.needsUpdate = true; }
  track = ZTRACK.generate(seed, 1100, _fieldSize || 20);
  const floorMesh = meshFrom(track.mesh.floor, FLOOR_MAT, true);   // weld = smooth-shaded ramp
  showDiag(floorMesh);
  meshFrom(track.mesh.walls, WALL_MAT);
  if (track.mesh.roof && track.mesh.roof.indices.length) meshFrom(track.mesh.roof, ROOF_MAT);
  // draw each fork branch ribbon
  if (track.branchMeshes) {
    for (const bm of track.branchMeshes) {
      meshFrom(bm.mesh.floor, FLOOR_MAT, true);
      meshFrom(bm.mesh.walls, WALL_MAT);
      if (bm.mesh.roof && bm.mesh.roof.indices.length) meshFrom(bm.mesh.roof, ROOF_MAT);
    }
  }
  // GLOWING TUBE RAILS along both track edges. The old rails were 1-pixel lines —
  // tubes have real thickness, catch the bloom pass, and read as the Tron light-edge
  // from any distance. Sampled every 4th node to keep the geometry cheap.
  function buildRail(side, color) {
    const pts = [];
    for (let i = 0; i < track.nodes.length; i += 4) {
      const n = track.nodes[i];
      pts.push(new THREE.Vector3(
        n.pos.x + n.right.x * n.halfW * side,
        n.pos.y + 0.12,
        n.pos.z + n.right.z * n.halfW * side
      ));
    }
    const curve = new THREE.CatmullRomCurve3(pts);
    const geo = new THREE.TubeGeometry(curve, pts.length * 2, 0.11, 6, false);
    const mat = new THREE.MeshBasicMaterial({ color });   // unlit = full brightness = blooms
    const mesh = new THREE.Mesh(geo, mat);
    scene.add(mesh); trackMeshes.push(mesh);
  }
  buildRail(-1, 0x00e5ff);   // left: cyan
  buildRail( 1, 0xff8800);   // right: orange

  // NEON ARCH GATES spanning the track every ~70 nodes
  for (let i = track.platform.endIdx + 40; i < track.nodes.length - 10; i += 70) {
    const n = track.nodes[i];
    const archR = n.halfW * 1.3;
    const arch = new THREE.Mesh(
      new THREE.TorusGeometry(archR, 0.25, 10, 32, Math.PI),  // half torus = arch
      new THREE.MeshStandardMaterial({ color:0x0a2a4a, metalness:0.8, roughness:0.3,
        emissive:0x00e5ff, emissiveIntensity:2.2 })   // hot enough to bloom
    );
    arch.position.set(n.pos.x, n.pos.y, n.pos.z);
    // The half-torus arcs over the top half of its local XY plane. We want that plane to
    // face along the track direction so the arch spans left-right and rises overhead.
    // Build a basis: across = n.right (arch width), up = world up, forward = n.dir.
    const m4 = new THREE.Matrix4();
    const across = new THREE.Vector3(n.right.x, 0, n.right.z).normalize();
    const up = new THREE.Vector3(0,1,0);
    const fwd = new THREE.Vector3().crossVectors(across, up).normalize();
    m4.makeBasis(across, up, fwd);
    arch.quaternion.setFromRotationMatrix(m4);
    scene.add(arch); trackMeshes.push(arch);
  }
}

// ---- balls: SCI-FI metallic orb + glowing laser saturn ring ----
const SPHERE_GEO = new THREE.SphereGeometry(BALL_R, 40, 28);          // smooth metallic core
const RING_GEO   = new THREE.TorusGeometry(BALL_R*1.55, 0.06, 16, 64); // thin bright laser ring
const RING_GLOW_GEO = new THREE.TorusGeometry(BALL_R*1.55, 0.16, 16, 64); // fat soft glow
const BAND_GEO   = new THREE.TorusGeometry(BALL_R*1.02, 0.10, 12, 48); // equatorial energy band
// shared environment so metal actually reflects something (cheap cubemap-less reflection)
const _envColor = new THREE.Color(0x223355);
const zorbs = new Map(); // id -> { mesh, ring, color, spawnT, spawnAnim, eliminated }

const PALETTE = [0xff3366,0x33ddff,0xffcc00,0x66ff88,0xcc66ff,0xff8844,0x44ffdd,0xff66aa];
let colorIdx = 0;

function makeZorb(id, prefs, isSub) {
  const cos = ZCOSMETICS.resolveForPlayer(prefs, isSub, []);
  const color = (cos.skin.color != null) ? cos.skin.color : PALETTE[(colorIdx++) % PALETTE.length];
  const accent = new THREE.Color(color);
  const baseCol = new THREE.Color(color);

  // ---- skin material builder (procedural textures, no external assets) ----
  const core = new THREE.Mesh(SPHERE_GEO, buildCoreMaterial(cos.skin, baseCol, accent));
  scene.add(core);

  // DARK OUTLINE: a slightly larger back-face black shell behind the ball gives a thin
  // dark rim so pale colors (yellow/cyan) pop against the light floor. Cheap, huge
  // readability win — classic toon/outline trick.
  const outline = new THREE.Mesh(SPHERE_GEO, new THREE.MeshBasicMaterial({
    color: 0x0a1428, side: THREE.BackSide
  }));
  outline.scale.setScalar(1.035); core.add(outline);

  // MOTION TRAIL: a short fading streak of the ball's recent positions, in its color,
  // additive so it blooms into a speed-light. Faster ball = longer visible streak.
  const TRAIL_LEN = 14;
  // prefilled at first physics sync (see loop) — a zero-filled buffer drew giant lines
  // from each ball to the world origin (the huge red streak across the screen).
  const trailPos = new Float32Array(TRAIL_LEN * 3);
  trailPos._unset = true;
  const trailGeo = new THREE.BufferGeometry();
  trailGeo.setAttribute('position', new THREE.BufferAttribute(trailPos, 3));
  const trail = new THREE.Line(trailGeo, new THREE.LineBasicMaterial({
    color: accent, transparent: true, opacity: 0.5, blending: THREE.AdditiveBlending, depthWrite: false
  }));
  trail.frustumCulled = false; scene.add(trail);

  // EQUATORIAL ENERGY BAND hugging the orb (toned down so it accents, not blinds)
  const band = new THREE.Mesh(BAND_GEO, new THREE.MeshBasicMaterial({
    color: accent, transparent:true, opacity:0.55, blending:THREE.AdditiveBlending, depthWrite:false
  }));
  band.rotation.x = Math.PI/2; core.add(band);

  // LASER SATURN RING: bright thin ring + a soft glow. Both dialed back hard — the
  // bloom pass now supplies the glow, so the source pixels don't need to be pure white.
  let ring = null, ringGlow = null;
  if (cos.ring.enabled) {
    const rc = (cos.ring.color != null) ? new THREE.Color(cos.ring.color) : accent;
    ring = new THREE.Mesh(RING_GEO, new THREE.MeshBasicMaterial({
      color: rc, transparent:true, opacity:0.55, blending:THREE.AdditiveBlending, depthWrite:false
    }));
    ring.rotation.x = Math.PI/2; ring.renderOrder = 6; scene.add(ring);
    ringGlow = new THREE.Mesh(RING_GLOW_GEO, new THREE.MeshBasicMaterial({
      color: rc, transparent:true, opacity:0.1, blending:THREE.AdditiveBlending, depthWrite:false
    }));
    ringGlow.rotation.x = Math.PI/2; ringGlow.renderOrder = 5; scene.add(ringGlow);
  }

  // soft fresnel rim glow — much fainter (was 0.28, the main culprit in the white blob)
  const glow = new THREE.Mesh(SPHERE_GEO, new THREE.MeshBasicMaterial({
    color: accent, transparent:true, opacity:0.12, side:THREE.BackSide,
    blending:THREE.AdditiveBlending, depthWrite:false
  }));
  glow.scale.setScalar(1.18); core.add(glow);

  zorbs.set(id, {
    mesh: core, ring, ringGlow, band, color, trail, trailPos, trailLen: TRAIL_LEN,
    spawnT: 0, spawnAnim: cos.spawn, ringSpin: cos.ring.spin || 2.0,
    ringBob: Math.random()*Math.PI*2, eliminated:false, fallT:0,
    rollQ: new THREE.Quaternion(),
  });
}

// Build the core material for a skin style. Procedural canvas textures so there are no
// external asset downloads — works offline, deterministic, cheap.
const _texCache = {};
function galaxyTexture() {
  if (_texCache.galaxy) return _texCache.galaxy;
  const c = document.createElement('canvas'); c.width = c.height = 256; const x = c.getContext('2d');
  const g = x.createLinearGradient(0,0,256,256);
  g.addColorStop(0,'#1a0b3a'); g.addColorStop(0.5,'#3a1b6a'); g.addColorStop(1,'#0a0520');
  x.fillStyle = g; x.fillRect(0,0,256,256);
  for (let i=0;i<60;i++){ x.globalAlpha=0.1+Math.random()*0.3; x.fillStyle=['#ff66cc','#66ccff','#ffffff'][i%3];
    x.beginPath(); x.arc(Math.random()*256,Math.random()*256,8+Math.random()*30,0,7); x.fill(); }
  x.globalAlpha=1; for (let i=0;i<140;i++){ x.fillStyle='#ffffff';
    x.fillRect(Math.random()*256,Math.random()*256,Math.random()<0.2?2:1,1); }
  const t = new THREE.CanvasTexture(c); _texCache.galaxy = t; return t;
}
function lavaTexture() {
  if (_texCache.lava) return _texCache.lava;
  const c = document.createElement('canvas'); c.width = c.height = 256; const x = c.getContext('2d');
  x.fillStyle='#1a0500'; x.fillRect(0,0,256,256);
  for (let i=0;i<28;i++){ const gx=Math.random()*256, gy=Math.random()*256;
    const g=x.createRadialGradient(gx,gy,0,gx,gy,30+Math.random()*40);
    g.addColorStop(0,'#fff2a0'); g.addColorStop(0.4,'#ff7a18'); g.addColorStop(1,'rgba(60,5,0,0)');
    x.fillStyle=g; x.fillRect(0,0,256,256); }
  const t = new THREE.CanvasTexture(c); _texCache.lava = t; return t;
}
function buildCoreMaterial(skin, baseCol, accent) {
  const style = skin.style || 'metal';
  if (style === 'galaxy') {
    return new THREE.MeshStandardMaterial({ map: galaxyTexture(), color: 0xffffff,
      metalness: 0.3, roughness: 0.4, emissive: 0x6633cc, emissiveIntensity: 0.5,
      emissiveMap: galaxyTexture(), envMap: _envMap || null, envMapIntensity: 0.8 });
  }
  if (style === 'lava') {
    return new THREE.MeshStandardMaterial({ map: lavaTexture(), color: 0xffffff,
      metalness: 0.2, roughness: 0.6, emissive: 0xff5500, emissiveIntensity: 0.9,
      emissiveMap: lavaTexture() });
  }
  if (style === 'glass' && THREE.MeshPhysicalMaterial) {
    return new THREE.MeshPhysicalMaterial({ color: baseCol, metalness: 0.0, roughness: 0.04,
      transmission: 0.92, thickness: 0.6, ior: 1.4, transparent: true,
      emissive: accent, emissiveIntensity: 0.12,
      clearcoat: 1.0, clearcoatRoughness: 0.05, envMap: _envMap || null, envMapIntensity: 1.0 });
  }
  // default: metallic sci-fi orb (clearcoat sheen if available). Emissive floored so it
  // never renders as a black silhouette regardless of light angle.
  const params = {
    color: baseCol,
    metalness: skin.metalness != null ? skin.metalness : 0.55,
    roughness: skin.roughness != null ? skin.roughness : 0.3,
    emissive: accent,
    emissiveIntensity: Math.max(0.32, skin.emissive != null ? skin.emissive : 0),
    envMap: _envMap || null, envMapIntensity: 1.0,
  };
  if (THREE.MeshPhysicalMaterial) { params.clearcoat = 0.6; params.clearcoatRoughness = 0.15;
    return new THREE.MeshPhysicalMaterial(params); }
  return new THREE.MeshStandardMaterial(params);
}

// ---- TEMP DIAGNOSTIC (build 3d): on-screen ground truth for the black-floor hunt.
// Shows the actual grid texture canvas (if you can see the grid image bottom-right,
// the texture is fine), the floor mesh's runtime state, and any JS errors. Will be
// removed once the floor is confirmed working.
const _errLog = [];
window.addEventListener('error', e => { _errLog.push(e.message); const el = document.getElementById('diagerr'); if (el) el.textContent = _errLog.slice(-3).join('\n'); });
function showDiag(floorMesh) {
  let d = document.getElementById('zdiag');
  if (!d) { d = document.createElement('div'); d.id = 'zdiag';
    d.style.cssText = 'position:fixed;bottom:8px;right:8px;z-index:99;background:rgba(0,0,0,.75);color:#9fefff;font:11px monospace;padding:8px;border:1px solid #2af;border-radius:6px;max-width:220px;';
    document.body.appendChild(d); }
  d.innerHTML = '';
  if (_gridCanvas) { const img = new Image(); img.src = _gridCanvas.toDataURL(); img.style.cssText = 'width:96px;height:96px;display:block;margin-bottom:4px;'; d.appendChild(img); }
  const pre = document.createElement('pre'); pre.style.margin = '0';
  pre.textContent = [
    'diag build ' + BUILD,
    'floor: ' + floorMesh.material.type,
    'map: ' + (floorMesh.material.map ? 'yes' : 'NO'),
    'uv attr: ' + (floorMesh.geometry.attributes.uv ? 'yes' : 'NO'),
    'verts: ' + floorMesh.geometry.attributes.position.count,
    'fog: ' + (scene.fog ? scene.fog.density : 'none'),
  ].join('\n');
  d.appendChild(pre);
  const err = document.createElement('pre'); err.id = 'diagerr'; err.style.cssText = 'margin:4px 0 0;color:#ff8080;white-space:pre-wrap;';
  err.textContent = _errLog.slice(-3).join('\n');
  d.appendChild(err);
}

// ---- game state ----
let phase = 'idle';   // idle | spawning | racing | done
let _fieldSize = 20;
let spawnQueue = [], spawnTimer = 0;
let winner = null;

function startRace(seed, names) {
  _fieldSize = names.length;
  buildCourse(seed);
  ZPHYSICS.clearBalls();
  zorbs.forEach(z => { scene.remove(z.mesh); if(z.ring) scene.remove(z.ring); if(z.ringGlow) scene.remove(z.ringGlow); if(z.trail) scene.remove(z.trail); });
  zorbs.clear(); colorIdx = 0; winner = null;
  // queue spawns at the start of the track, staggered for a nice entrance
  spawnQueue = names.map((nm, i) => ({ id: nm.id, prefs: nm.prefs, isSub: nm.isSub, delay: i*0.12 }));
  spawnTimer = 0; _spawnIndex = 0;
  phase = 'spawning';
  leaderEl.textContent = '';
}

let _spawnIndex = 0;
function spawnOne(item) {
  makeZorb(item.id, item.prefs, item.isSub);
  // Place in a grid on the platform: rows across the width, columns down its length,
  // starting near the BACK so nobody spawns past the front edge.
  const plat = track.platform;
  const perRow = 6;
  const row = Math.floor(_spawnIndex / perRow);
  const col = _spawnIndex % perRow;
  _spawnIndex++;
  // node near the back third of the platform for this row
  const backNodeIdx = Math.max(1, Math.min(plat.endIdx - 2, 2 + row * 2));
  const n = track.nodes[backNodeIdx];
  // spread columns across the width
  const lateral = ((col + 0.5) / perRow - 0.5) * n.halfW * 1.7;
  const sx = n.pos.x + n.right.x * lateral;
  const sz = n.pos.z + n.right.z * lateral;
  ZPHYSICS.addBall(item.id, { x: sx, y: n.pos.y + BALL_R*1.5, z: sz }); // sit ON the surface
}

// ---- main loop ----
let last = performance.now();
const FRAME_CAP = 1000 / 60;        // target 60fps
let frameAcc = 0, prevRaf = performance.now();
function loop(now) {
  requestAnimationFrame(loop);      // always re-queue
  // frame limiter: only run the sim+render when ~1/60s has elapsed
  const elapsed = now - prevRaf; prevRaf = now;
  frameAcc += elapsed;
  if (frameAcc < FRAME_CAP) return; // skip this RAF tick (high-refresh monitors)
  frameAcc = Math.min(frameAcc - FRAME_CAP, FRAME_CAP); // keep remainder, avoid drift
  const dt = Math.min(0.05, (now - last)/1000); last = now;

  if (phase === 'spawning') {
    spawnTimer += dt;
    while (spawnQueue.length && spawnTimer >= spawnQueue[0].delay) {
      spawnOne(spawnQueue.shift());
    }
    if (!spawnQueue.length) phase = 'racing';
  }

  if (phase === 'racing' && ZPHYSICS.isReady()) {
    ZPHYSICS.step(dt);
    // eliminate fallers
    const fallen = ZPHYSICS.checkFalls(12);
    for (const id of fallen) {
      const z = zorbs.get(id); if (z) z.eliminated = true;
    }
    // winner check: leader reached the final stretch
    const lead = ZPHYSICS.leader();
    if (lead != null) {
      const snap = ZPHYSICS.snapshot()[lead];
      if (snap && snap.hint >= track.nodes.length - 3 && !winner) {
        winner = lead; phase = 'done';
        leaderEl.innerHTML = '🏆 ' + lead;
      } else if (snap) {
        leaderEl.textContent = '1st: ' + lead;
      }
    }
  }

  // sync render meshes to physics + run spawn animations
  const snap = ZPHYSICS.isReady() ? ZPHYSICS.snapshot() : {};
  for (const [id, z] of zorbs) {
    const s = snap[id];
    if (s) {
      z.mesh.position.set(s.x, s.y, s.z);
    }
    // spawn animation
    if (z.spawnT < 1) {
      z.spawnT = Math.min(1, z.spawnT + dt*1.8);
      const a = z.spawnAnim.fn(z.spawnT);
      z.mesh.scale.setScalar(a.scale != null ? a.scale : 1);
      z.mesh.position.y += (a.yOffset || 0);
      z.mesh.material.opacity = a.opacity != null ? a.opacity : 1;
      z.mesh.material.transparent = a.opacity != null && a.opacity < 1;
    } else {
      z.mesh.scale.setScalar(1);
    }
    // ROLL AT TRAVEL SPEED: spin = distance/radius about the axis perpendicular to
    // motion, so a fast ball visibly spins fast and a slow one barely turns. (The old
    // code spun every ball at a constant rate, which read as slow-motion sliding.)
    if (s) {
      const sp = Math.hypot(s.vx || 0, s.vz || 0);
      if (sp > 0.05) {
        const dirx = s.vx / sp, dirz = s.vz / sp;
        // roll axis = worldUp × travelDir  (horizontal, perpendicular to motion)
        const ax = -dirz, az = dirx;             // (0,1,0)×(dirx,0,dirz)
        const angle = (sp * dt) / BALL_R;        // arc length / radius
        z.rollQ.setFromAxisAngle(new THREE.Vector3(ax, 0, az).normalize(), angle);
        z.mesh.quaternion.premultiply(z.rollQ);
      }
      // MOTION TRAIL: shift positions back one slot, write current at the head.
      const tp = z.trailPos, n = z.trailLen;
      if (tp._unset) { for (let k=0;k<n;k++){ tp[k*3]=s.x; tp[k*3+1]=s.y; tp[k*3+2]=s.z; } tp._unset = false; }
      for (let k = n - 1; k > 0; k--) {
        tp[k*3] = tp[(k-1)*3]; tp[k*3+1] = tp[(k-1)*3+1]; tp[k*3+2] = tp[(k-1)*3+2];
      }
      tp[0] = s.x; tp[1] = s.y; tp[2] = s.z;
      z.trail.geometry.attributes.position.needsUpdate = true;
      z.trail.visible = !z.eliminated && sp > 2;   // only show a streak when actually moving
    }
    // ring follows, stays flat, spins on its own vertical axis
    if (z.ring) {
      z.ringBob += dt * z.ringSpin;
      z.ring.position.copy(z.mesh.position);
      z.ring.rotation.x = Math.PI/2; z.ring.rotation.z = z.ringBob;
      z.ring.visible = !z.eliminated;
      if (z.ringGlow) {
        z.ringGlow.position.copy(z.mesh.position);
        z.ringGlow.rotation.x = Math.PI/2; z.ringGlow.rotation.z = z.ringBob;
        z.ringGlow.visible = !z.eliminated;
      }
    }
    // elimination: drop and fade
    if (z.eliminated) {
      z.fallT += dt;
      z.mesh.position.y -= z.fallT * 6 * dt;
      z.mesh.material.transparent = true;
      z.mesh.material.opacity = Math.max(0, 1 - z.fallT*0.7);
      if (z.fallT > 1.6) { scene.remove(z.mesh); if(z.ring) scene.remove(z.ring); if(z.ringGlow) scene.remove(z.ringGlow); if(z.trail) scene.remove(z.trail); zorbs.delete(id); }
    }
  }

  updateCamera(dt);
  if (composer) composer.render(); else renderer.render(scene, camera);
}

// ---- camera: follow the leader smoothly from behind & above ----
const camTarget = new THREE.Vector3();
const camPos = new THREE.Vector3();
const lookAt = new THREE.Vector3();
let camLeadIdx = 0;
function updateCamera(dt) {
  if (!track) return;
  // Follow the leader's PROGRESS (a centerline node index), not the ball's jittery
  // position. The node is smooth, so the camera is smooth.
  const lead = ZPHYSICS.isReady() ? ZPHYSICS.leader() : null;
  let idx = camLeadIdx;
  if (lead != null) {
    const snap = ZPHYSICS.snapshot()[lead];
    if (snap) idx = snap.progress != null ? snap.progress : snap.hint;
  }
  // ease the camera's node index forward (never snaps backward hard)
  camLeadIdx += (idx - camLeadIdx) * 0.05;
  const ci = Math.max(0, Math.min(track.nodes.length - 1, Math.round(camLeadIdx)));
  const node = track.nodes[ci];
  const ahead = track.nodes[Math.min(track.nodes.length - 1, ci + 10)];

  // desired camera: behind & ABOVE the leader node, along the track direction.
  // Higher and further back than before (was -14 / +9) — the low angle was skimming
  // the floor and hiding the pack. This reads as a proper marble-race chase cam.
  const dir = node.dir;
  const desired = new THREE.Vector3(
    node.pos.x - dir.x * 20,
    node.pos.y + 16,
    node.pos.z - dir.z * 20
  );
  camPos.lerp(desired, 0.05);          // smooth position
  camera.position.copy(camPos);
  // look at a point ahead down the track (stable target)
  lookAt.lerp(new THREE.Vector3(ahead.pos.x, ahead.pos.y - 1, ahead.pos.z), 0.08);
  camera.lookAt(lookAt);
}

// ---- boot ----
async function boot() {
  setStatus('loading physics…', false);
  const ok = await ZPHYSICS.init(BALL_R);
  if (!ok) { setStatus('LEGACY (physics failed: ' + ZPHYSICS.getError() + ')', false); return; }
  setStatus('⬡ READY · build ' + BUILD, true);
  try { buildEnvMap(); } catch(e){ console.warn('env map skipped', e); }
  // build a course immediately so there's something on screen
  buildCourse(Math.floor(Math.random()*999999));
  // give the physics the track collider
  ZPHYSICS.setTrack(track.collider, track.nodes, { forks: track.forks, branchColliders: track.branchColliders });
  // demo: spawn a field of test balls and race
  const names = [];
  const demo = ['NightCrawl','PixelBolt','VoidStar','GhostRide','TurboDrift','CyberDash','NeonByte','PlasmaKing','OrbMaster','MarsScum','GlitchQ','HyperV'];
  for (let i=0;i<demo.length;i++) names.push({ id: demo[i], prefs:{}, isSub: i%3===0 });
  startRace(track.seed, names);
}

// audio-gesture gate (this is what was spamming the console before: we now ONLY
// start anything audio-ish AFTER a real click, exactly once)
document.getElementById('arm').addEventListener('click', () => {
  document.getElementById('arm').remove();
  boot();
}, { once:true });

requestAnimationFrame(loop);
</script>
