// IS_HOST is set when we win host election - never changes after that
window.IS_HOST = false;
window.IS_VIEWER = false; // set true once we confirm we're a viewer

fetch('/api/config').then(r=>r.json()).then(cfg=>{
  if(!cfg.ablyKey){ window.IS_HOST=true; return; } // no Ably = single player = host
  ZORBS_SESSION.setChannel(_isStreamer||_isObs ? ('zorbs:ch:'+(_urlParams.get('streamer')||'x').toLowerCase()) : 'zorbs:global-v1');
  ZORBS_SESSION.init(cfg.ablyKey, {
    onJoin: (name, isSub, color) => {
      // Another player joined - add their ball if we don't have it
      if(!zorbs.find(z=>z.name===name)){
        handleCmd(name, '!play', isSub);
      }
    },
    onState: (state) => {
      // Host state is authoritative: if our track seed differs, rebuild to match
      if(state._seed && state._seed !== window._currentSeed){
        console.log('[ZORBS] Syncing track to host seed', state._seed);
        window._currentSeed = state._seed;
        buildCourseSeeded(null, state._seed);
      }
      // We're a viewer - sync from host state
      if(state.phase && state.phase !== phase){
        phase = state.phase;
        const stxt = document.getElementById('stxt');
        if(stxt) stxt.textContent = phase.toUpperCase();
      }
      if(!state.balls) return;
      // Sync ball positions
      state.balls.forEach(bd => {
        let z = zorbs.find(z=>z.name===bd.n);
        if(!z){
          // Create missing ball from host state - works in any phase
          z = createZorb(bd.n, bd.s===1, bd.c || ZCOLORS[zorbs.length%ZCOLORS.length]);
          zorbs.push(z);
          document.getElementById('cnt').textContent = zorbs.length+' racers';
        }
        if(!z) return;
        // Smooth interpolation toward host state
        z.pos.x += (bd.x - z.pos.x) * 0.4;
        z.pos.y += (bd.y - z.pos.y) * 0.4;
        z.pos.z += (bd.z - z.pos.z) * 0.4;
        z.nodeIdx = bd.ni || 0;
        z.finished = bd.f === 1;
        z.disqualified = bd.d === 1;
        z.rank = bd.r || 0;
        z.knockFlash = bd.kf || 0;
        z.mesh.visible = !z.disqualified;
      });
      // Remove balls no longer in host state - but NEVER our own ball
      const alive = new Set(state.balls.map(b=>b.n));
      for(let i=zorbs.length-1;i>=0;i--){
        const zb = zorbs[i];
        if(alive.has(zb.name)) continue;
        if(zb.name === window._myName){
          // Host doesn't know us (it probably refreshed) - reintroduce ourselves
          if(!window._rejoinCd || Date.now()-window._rejoinCd > 3000){
            window._rejoinCd = Date.now();
            ZORBS_SESSION.publishJoin(zb.name, window._myIsSub||false, zb.color);
          }
          continue; // keep our ball
        }
        removeZorb(zb); zorbs.splice(i,1);
      }
      document.getElementById('cnt').textContent = zorbs.length+' racers';
    },
    onBecomeHost: () => {
      window.IS_HOST = true;
      window.IS_VIEWER = false;
      console.log('[ZORBS] I AM HOST');
      const logo = document.getElementById('logo');
      if(logo) logo.title = '★ Race Host';
    },
    onConfirmViewer: () => {
      window.IS_VIEWER = true;
      window.IS_HOST = false;
    }
  });
}).catch(()=>{});

// Auto-rejoin with saved nickname (skip the join panel)
const _savedNick = localStorage.getItem('zorbs_nick');
const _savedSub  = localStorage.getItem('zorbs_issub') === '1';
if(_savedNick){
  window._myName   = _savedNick;
  window._myIsSub  = _savedSub;
  // Don't show join panel - auto join after session connects
  document.getElementById('join-panel').style.display = 'none';
  // Wait for Ably to connect then join
  // Wait for Ably to connect (3s) then rejoin
  setTimeout(()=>{
    if(!zorbs.find(z=>z.name===_savedNick)){
      handleCmd(_savedNick,'!play',_savedSub);
    }
    // Always broadcast join so all tabs know we're here
    // even if we already exist locally (viewer may have missed it)
    setTimeout(()=>{
      if(typeof ZORBS_SESSION!=='undefined'){
        const myZorb=zorbs.find(z=>z.name===_savedNick);
        ZORBS_SESSION.publishJoin(_savedNick,_savedSub,myZorb?myZorb.color:null);
      }
    }, 1500); // extra delay to ensure Ably is connected
  }, 3000);
}

// SELF-HEALING SYNC: re-broadcast our join every 5s so any tab
// (especially a freshly-refreshed host) always learns about our ball
setInterval(()=>{
  if(window._myName && typeof ZORBS_SESSION !== 'undefined' && ZORBS_SESSION.isConnected()){
    const myZorb = zorbs.find(z=>z.name===window._myName);
    ZORBS_SESSION.publishJoin(window._myName, window._myIsSub||false, myZorb?myZorb.color:null);
  }
}, 5000);

// Start with a 30s on-screen countdown; auto-resets a finished race first
window.startWithCountdown = function(dur){
  if(typeof ZORBS_SESSION!=='undefined' && !window.IS_HOST) return;
  if(phase==='racing'){
    const allDone = zorbs.length>0 && zorbs.every(z=>z.finished||z.disqualified);
    if(!allDone) return; // race genuinely in progress
    resetRace();
  }
  if(window._startCd) clearInterval(window._startCd);
  window._autoStartAt = null; // cancel any auto-loop countdown
  const endAt = Date.now()+30000;
  const tick = () => {
    const secs = Math.max(0, Math.ceil((endAt-Date.now())/1000));
    if(window.showCountdown) showCountdown(secs);
    if(typeof ZORBS_SESSION!=='undefined') ZORBS_SESSION.publishEvent('count',secs,0);
    if(secs<=0){
      clearInterval(window._startCd); window._startCd=null;
      if(window.showCountdown) showCountdown(null);
      document.getElementById('dur').value = dur||'';
      streamerStart();
    }
  };
  tick(); window._startCd=setInterval(tick,1000);
};

// ── BOT POOL: fill lobby to 20 with bots; real players replace them ──
const BOT_TARGET = 20;
window._botsOn = (JSON.parse(localStorage.getItem('zorbs_settings')||'{}').bots) === true;
function isBotName(n){ return MOCK_NAMES.includes(n); }
setInterval(()=>{
  if(!window.IS_HOST || phase!=='lobby') return;
  const botsOn = window._botsOn === true;
  const bots = zorbs.filter(z=>z.isBot);
  const real = zorbs.length - bots.length;
  const want = botsOn ? Math.max(0, BOT_TARGET - real) : 0;
  if(bots.length > want){
    // Real players arrived (or bots disabled): retire extras
    for(let i=0;i<bots.length-want;i++){
      const b = bots[i];
      removeZorb(b); zorbs.splice(zorbs.indexOf(b),1);
      if(typeof ZORBS_SESSION!=='undefined') ZORBS_SESSION.publishEvent('leave', b.name, 0);
    }
    document.getElementById('cnt').textContent = zorbs.length+' racers';
  } else if(bots.length < want){
    // Top up one per tick (feels like people trickling in)
    const free = MOCK_NAMES.filter(n=>!zorbs.find(z=>z.name===n));
    if(free.length){
      const name = free[Math.floor(Math.random()*free.length)];
      handleCmd(name, '!play', Math.random()<0.3);
      const nb = zorbs.find(z=>z.name===name);
      if(nb){
        nb.isBot = true;
        if(typeof ZORBS_SESSION!=='undefined') ZORBS_SESSION.publishJoin(name, nb.isSub, nb.color);
      }
    }
  }
}, 1200);

// Remote control from dashboard (streamer lobbies)
window.handleRemoteCtl = (cmd, val) => {
  if(cmd==='bots'){
    window._botsOn = !!val;
    const s=JSON.parse(localStorage.getItem('zorbs_settings')||'{}'); s.bots=!!val;
    localStorage.setItem('zorbs_settings',JSON.stringify(s));
    const b=document.getElementById('btn-bots');
    if(b){ b.textContent='BOTS: '+(val?'ON':'OFF'); b.style.color=val?'#00ff88':'rgba(255,255,255,0.5)'; }
  }
  if(cmd==='auto'){
    localStorage.setItem('zorbs_streamer_auto', val?'1':'0');
  }
  if(cmd==='start' && window.IS_HOST){ window.startWithCountdown(val); }
  if(cmd==='cam') setCam(val);
  if(cmd==='reset' && window.IS_HOST) resetRace();
};

// Handle Kick OAuth return
const _kickJoin = new URLSearchParams(window.location.search).get('kick_join');
if(_kickJoin){
  const _kickName = decodeURIComponent(_kickJoin);
  window.history.replaceState({}, '', '/');
  // Auto-join after short delay so scene is ready
  setTimeout(()=>{
    document.getElementById('join-panel').style.display='none';
    _doJoin(_kickName, true);
  }, 500);
}

async function joinWithKick(){
  // Kick OAuth 2.1 with PKCE
  const state = 'game_' + Math.random().toString(36).slice(2);
  const verifier = Array.from(crypto.getRandomValues(new Uint8Array(32)))
    .map(b=>b.toString(16).padStart(2,'0')).join('');
  const digest = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(verifier));
  const challenge = btoa(String.fromCharCode(...new Uint8Array(digest)))
    .replace(/[+]/g,'-').replace(/[/]/g,'_').replace(/=/g,'');
  sessionStorage.setItem('kick_state', state);
  sessionStorage.setItem('kick_verifier', verifier);
  const params = new URLSearchParams({
    client_id: '01KTMSSQ3PNEAA8EYYX1T6T4CK',
    redirect_uri: 'https://www.playzorbs.xyz/auth/kick/game-callback',
    response_type: 'code',
    scope: 'user:read',
    state,
    code_challenge: challenge,
    code_challenge_method: 'S256',
  });
  window.location.href = 'https://id.kick.com/oauth/authorize?' + params;
}

function joinWithNick(){
  const name = document.getElementById('join-name').value.trim();
  if(!name){
    document.getElementById('join-name').focus();
    document.getElementById('join-name').style.borderColor='#ff4060';
    document.getElementById('join-name').style.boxShadow='0 0 8px rgba(255,0,60,0.4)';
    setTimeout(()=>{
      document.getElementById('join-name').style.borderColor='rgba(255,255,255,0.15)';
      document.getElementById('join-name').style.boxShadow='none';
    },1500);
    return;
  }
  _doJoin(name, false);
}

function _doJoin(name, isKick){
  // Make sure course is ready (use seeded build)
  if(!pathNodes || pathNodes.length === 0) initCourse(window._currentSeed || _hourlySeed);
  // Check not already joined
  if(zorbs.find(z=>z.name===name)){
    showBanner('Already joined as '+name, 1200);
    document.getElementById('join-panel').style.display='none';
    return;
  }
  document.getElementById('join-panel').style.display='none';
  // If we previously joined under a different name, remove that ball everywhere
  if(window._myName && window._myName !== name){
    const old = zorbs.find(z=>z.name===window._myName);
    if(old){ removeZorb(old); zorbs.splice(zorbs.indexOf(old),1); }
    if(typeof ZORBS_SESSION!=='undefined') ZORBS_SESSION.publishEvent('leave', window._myName, 0);
  }
  // Save so they don't have to re-enter
  localStorage.setItem('zorbs_nick', name);
  localStorage.setItem('zorbs_issub', isKick?'1':'0');
  handleCmd(name, '!play', isKick);
  // Broadcast to all connected tabs via Ably
  if(typeof ZORBS_SESSION !== 'undefined'){
    const myZorb = zorbs.find(z=>z.name===name);
    ZORBS_SESSION.publishJoin(name, isKick, myZorb ? myZorb.color : null);
  }
  showBanner('Welcome'+(isKick?' [KICK]':'')+': '+name, 2000);
  // Store name for boost command
  window._myName = name;
  window._myIsSub = isKick;
  // Show boost hint
  setTimeout(()=>showKO('Type !boost in chat or press SPACE to boost!', 0x00ff88), 2500);
}

// Enter key on nickname input
const _jn=document.getElementById('join-name'); if(_jn) _jn.addEventListener('keydown', e=>{ if(e.key==='Enter') joinWithNick(); });

function updateBlades(dt){
  blades.forEach(b=>{
    b.phase+=b.speed*dt;
    b.mesh.rotation.y=b.phase;
    if(b.ring) b.ring.rotation.y=b.phase;
    zorbs.forEach(z=>{
      if(z.finished) return;
      const dx=z.pos.x-b.pos.x, dz=z.pos.z-b.pos.z;
      if(Math.sqrt(dx*dx+dz*dz)<TW_HALF*0.85 && Math.abs(z.pos.y-b.pos.y)<0.8){
        const spinVel=b.speed>0?1:-1;
        z.vel.x+=b.right.x*spinVel*10; z.vel.z+=b.right.z*spinVel*10;
        z.vel.y+=1.5; z.knockFlash=0.3;
        showKO('🌀 SPUN: '+z.name,0x4488ff);
      }
    });
  });
}
function updateWindZones(){
  windZones.forEach(w=>{
    zorbs.forEach(z=>{
      if(z.finished) return;
      const toS=new THREE.Vector3().subVectors(z.pos,w.start);
      const along=toS.dot(w.dir);
      if(along>0&&along<w.start.distanceTo(w.end)){
        z.vel.x+=w.right.x*w.windDir*w.force*0.016;
        z.vel.z+=w.right.z*w.windDir*w.force*0.016;
      }
    });
  });
}
function updateTrapDoors(dt){
  trapDoors.forEach(t=>{
    t.timer-=dt;
    // WARNING PHASE: 1.2s before dropping, blink red + pulse the light
    const aboutToDrop = !t.open && t.timer < 1.2;
    if(t.warn){
      if(aboutToDrop){
        const blink = Math.sin(performance.now()*0.02) > 0;
        t.warn.material.color.setHex(blink ? 0xff0000 : 0x550000);
        if(t.light) t.light.intensity = blink ? 3.2 : 0.6;
      } else if(!t.open){
        t.warn.material.color.setHex(0xff8800);
        if(t.light) t.light.intensity = 0;
      }
    }
    if(t.timer<=0){
      t.open=!t.open;
      t.timer=t.open?(1.2+Math.random()*1.5):(2+Math.random()*3);
      if(t.mesh) t.mesh.visible=!t.open;
      if(t.warn) t.warn.material.color.setHex(t.open?0xff0000:0xff8800);
      if(t.light) t.light.intensity = t.open ? 2.2 : 0;
    }
    if(t.open){
      zorbs.forEach(z=>{
        if(z.finished) return;
        const dx=z.pos.x-t.pos.x, dz=z.pos.z-t.pos.z;
        if(Math.sqrt(dx*dx+dz*dz)<TW_HALF*0.85&&Math.abs(z.pos.y-t.floorY)<0.8){
          z.vel.y-=8; z.knockFlash=0.4;
          showKO('FELL: '+z.name,0xff8800);
        }
      });
    }
  });
}
let lastT=0;
function loop(ts){
  requestAnimationFrame(loop);
  const dt=Math.min((ts-lastT)/1000,0.05); lastT=ts; frame++;
  if(frame===8 && window.ZLoad) ZLoad.finish();

  if(phase==='racing'){
    updateTimer();
    // Animate spike pillars: sink/strike
    gateObjs.forEach(g=>{
      g.phase += g.speed*dt;
      const t = Math.sin(g.phase);
      if(g.mesh) g.mesh.position.y = g.baseY + (t>0 ? t*0.3 : t*2.4); // up a bit, sink deep
    });
    // Only HOST runs physics - viewers get state via Ably
    if(window.IS_HOST){
      updateHammers(dt);
      updateBlades(dt);
      updateWindZones();
      updateTrapDoors(dt);
      const SUB = zorbs.length > 200 ? 1 : zorbs.length > 50 ? 2 : 3;
      for(let s=0;s<SUB;s++){zorbs.forEach(z=>stepPhysics(z,dt/SUB));ballCollide();}
    }

    // (random gusts removed)
  }

  zorbs.forEach(z=>updateVisuals(z,frame));
  updateCamera(dt);

  // Pulsing lights
  pCyan.intensity=1.5+Math.sin(frame*0.033)*0.5;
  pCyan.position.set(Math.sin(frame*0.011)*50, 14, FINISH_POS.z*0.5);
  pMagenta.intensity=1.0+Math.sin(frame*0.027+1)*0.4;
  pMagenta.position.set(Math.cos(frame*0.013)*40, 10, FINISH_POS.z*0.3);

  // Speed lines overlay (when any zorb is boosting)
  if(phase==='racing'){
    const maxBoost = zorbs.reduce((m,z)=>Math.max(m,z.boost),0);
    globalBoostFlash = Math.max(0, globalBoostFlash - dt*1.5);
    const intensity = Math.max(globalBoostFlash, maxBoost*0.5);
    drawSpeedLines(intensity);
    document.getElementById('speedline').style.opacity = intensity>0.05?'1':'0';
  } else {
    globalBoostFlash=0;
    document.getElementById('speedline').style.opacity='0';
  }

  if(frame%(zorbs.length>100?60:18)===0){updateLB();drawMinimap();}
  if(composer){composer.render();}else{renderer.render(scene,camera);}
}
requestAnimationFrame(t=>{lastT=t;loop(t);});
</script>
