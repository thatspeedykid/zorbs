<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ZORBS on Stream</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;background:#000;overflow:hidden;}
#app{width:100%;height:100vh;position:relative;}
#c{display:block;width:100%;height:100%;}
#ui{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;font-family:'Courier New',monospace;}
#topbar{position:absolute;top:0;left:0;right:0;display:flex;align-items:center;justify-content:space-between;padding:10px 16px;background:linear-gradient(180deg,rgba(0,0,0,0.9)0%,transparent);}
#logo{font-size:18px;font-weight:900;letter-spacing:4px;color:#00f0ff;text-shadow:0 0 18px #00f0ff;}
#logo span{color:#ff00cc;}
#cams{display:flex;gap:5px;pointer-events:auto;}
.cb{background:rgba(0,240,255,0.07);border:1px solid rgba(0,240,255,0.28);color:#00f0ff;padding:4px 10px;border-radius:4px;font-size:10px;cursor:pointer;letter-spacing:2px;font-family:'Courier New',monospace;}
.cb.active{background:rgba(0,240,255,0.22);border-color:#00f0ff;}
#info{position:absolute;top:50px;left:12px;display:flex;flex-direction:column;gap:5px;}
.pill{background:rgba(0,0,0,0.75);border:1px solid rgba(255,255,255,0.09);border-radius:20px;padding:4px 12px;font-size:10px;color:#fff;display:flex;align-items:center;gap:6px;letter-spacing:1px;}
.dot{width:5px;height:5px;border-radius:50%;}.dg{background:#00ff88;box-shadow:0 0 6px #00ff88;animation:blink 1.5s infinite;}.dp{background:#ff00cc;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:.3;}}
#lb{position:absolute;top:50px;right:12px;background:rgba(0,0,0,0.8);border:1px solid rgba(0,240,255,0.14);border-radius:10px;padding:10px 14px;min-width:168px;}
#lb h3{font-size:9px;letter-spacing:3px;color:rgba(0,240,255,0.38);margin-bottom:8px;}
.lr{display:flex;align-items:center;gap:6px;margin-bottom:4px;font-size:11px;}
.lp{color:rgba(255,255,255,.22);width:14px;font-size:10px;}.lp.g{color:#ffd700;}
.ln{flex:1;color:#ddd;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:85px;}.ln.sub{color:#ff00cc;}
.ld{font-size:9px;color:rgba(255,255,255,.28);}
#sp{position:absolute;top:50px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.85);border:1px solid rgba(0,240,255,0.18);border-radius:10px;padding:12px 16px;pointer-events:auto;display:flex;flex-direction:column;gap:8px;min-width:240px;}
#sp h3{font-size:9px;letter-spacing:3px;color:rgba(0,240,255,0.4);text-align:center;}
#sp-row{display:flex;gap:6px;align-items:center;}
#sp-lbl{font-size:10px;color:rgba(255,255,255,0.5);white-space:nowrap;}
#dur{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.15);border-radius:4px;padding:4px 8px;color:#fff;font-size:11px;font-family:'Courier New',monospace;width:65px;outline:none;text-align:center;}
#sp-hint{font-size:9px;color:rgba(255,255,255,0.25);}
#btn-go{background:rgba(0,240,255,0.12);border:1px solid rgba(0,240,255,0.35);color:#00f0ff;border-radius:5px;padding:6px 14px;font-size:11px;letter-spacing:2px;cursor:pointer;font-family:'Courier New',monospace;flex:1;}
#btn-go:disabled{opacity:0.3;cursor:not-allowed;}
#btn-hide{font-size:9px;color:rgba(255,255,255,0.25);cursor:pointer;text-align:center;}
#btn-show{position:absolute;top:50px;left:50%;transform:translateX(-50%);font-size:9px;color:rgba(0,240,255,0.4);cursor:pointer;background:rgba(0,0,0,0.6);border:1px solid rgba(0,240,255,0.15);border-radius:4px;padding:3px 10px;display:none;pointer-events:auto;}
#chat{position:absolute;bottom:12px;left:12px;width:185px;background:rgba(0,0,0,0.78);border:1px solid rgba(255,255,255,0.07);border-radius:10px;padding:9px;pointer-events:auto;}
#ct{font-size:9px;letter-spacing:2px;color:rgba(255,255,255,.22);margin-bottom:5px;}
#cl{height:85px;overflow:hidden;display:flex;flex-direction:column;justify-content:flex-end;gap:2px;}
.cm{font-size:10px;line-height:1.4;animation:fi .2s ease;}
.cm .u{font-weight:700;}.cm .u.s{color:#ff00cc;}.cm .u.r{color:#00f0ff;}
.cm .c{color:rgba(255,255,255,.38);}
@keyframes fi{from{opacity:0;transform:translateY(3px);}to{opacity:1;}}
#cr{display:flex;gap:4px;margin-top:5px;}
#ci{flex:1;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.11);border-radius:4px;padding:3px 6px;color:#fff;font-size:10px;font-family:'Courier New',monospace;outline:none;}
#cg{background:rgba(0,240,255,0.1);border:1px solid rgba(0,240,255,0.28);color:#00f0ff;border-radius:4px;padding:3px 8px;font-size:11px;cursor:pointer;}
#mm{position:absolute;bottom:12px;right:12px;width:110px;height:110px;border-radius:50%;overflow:hidden;border:1px solid rgba(0,240,255,0.18);background:rgba(0,0,0,0.7);}
#mmc{width:110px;height:110px;}
#banner{position:absolute;top:45%;left:50%;transform:translate(-50%,-50%);font-size:34px;font-weight:900;letter-spacing:6px;color:#fff;text-shadow:0 0 30px #00f0ff;opacity:0;pointer-events:none;transition:opacity .3s;text-align:center;white-space:nowrap;}
#kfeed{position:absolute;top:56px;left:50%;transform:translateX(-50%);display:flex;flex-direction:column;align-items:center;gap:3px;pointer-events:none;}
.kf{font-size:11px;letter-spacing:1px;animation:kfa 2.5s forwards;}
@keyframes kfa{0%{opacity:1;transform:translateY(0);}100%{opacity:0;transform:translateY(-16px);}}
#hint{position:absolute;bottom:12px;left:50%;transform:translateX(-50%);font-size:9px;color:rgba(255,255,255,.16);pointer-events:none;white-space:nowrap;}
</style>
</head>
<body>
<div id="app">
<canvas id="c"></canvas>
<div id="ui">
  <div id="topbar">
    <div id="logo">ZORBS <span>on</span> Stream</div>
    <div id="cams">
      <button class="cb active" id="btn-follow" onclick="setCam('follow')">FOLLOW</button>
      <button class="cb" id="btn-wide" onclick="setCam('wide')">WIDE</button>
      <button class="cb" id="btn-chase" onclick="setCam('chase')">CHASE</button>
      <button class="cb" id="btn-auto" onclick="setCam('auto')">AUTO</button>
    </div>
  </div>
  <div id="info">
    <div class="pill"><div class="dot dg"></div><span>LIVE</span></div>
    <div class="pill"><div class="dot dp"></div><span id="cnt">0 racers</span></div>
    <div class="pill"><span id="stxt">LOBBY</span></div>
    <div class="pill" id="tpill" style="display:none"><span id="tdisplay">--:--</span></div>
  </div>
  <div id="sp">
    <h3>STREAMER CONTROLS</h3>
    <div id="sp-row">
      <span id="sp-lbl">TIMER</span>
      <input id="dur" type="text" placeholder="e.g. 3m" maxlength="5"/>
      <span id="sp-hint">optional</span>
    </div>
    <button id="btn-go" onclick="streamerStart()">START RACE</button>
    <div id="btn-hide" onclick="hidePanel()">hide panel</div>
  </div>
  <div id="btn-show" onclick="showPanel()">CONTROLS</div>
  <div id="lb"><h3>LEADERBOARD</h3><div id="lbr"></div></div>
  <div id="chat"><div id="ct">LIVE CHAT</div><div id="cl"></div>
    <div id="cr"><input id="ci" placeholder="!play or !boost" maxlength="20"/><button id="cg">go</button></div>
  </div>
  <div id="mm"><canvas id="mmc" width="110" height="110"></canvas></div>
  <div id="banner"></div><div id="kfeed"></div>
  <div id="hint">arrows=cam | space=boost | F=follow</div>
</div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ZORBS on Stream - Clean marble run
// Track = series of straight PIPE SEGMENTS connected end to end
// Each segment is a cylinder/half-pipe the ball rolls through
// Simple, no Frenet frame madness

const canvas = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({canvas,antialias:true});
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.shadowMap.enabled = true;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x05050f,0.009);
scene.background = new THREE.Color(0x05050f);
const camera = new THREE.PerspectiveCamera(70,1,0.1,800);

function resize(){
  const w=canvas.parentElement.offsetWidth,h=canvas.parentElement.offsetHeight||window.innerHeight;
  renderer.setSize(w,h,false);camera.aspect=w/h;camera.updateProjectionMatrix();
}
resize();window.addEventListener('resize',resize);

scene.add(new THREE.AmbientLight(0x334466,5));
const sun=new THREE.DirectionalLight(0xaaccff,2.5);
sun.position.set(30,80,30);sun.castShadow=true;
sun.shadow.mapSize.set(1024,1024);scene.add(sun);
const fill2=new THREE.DirectionalLight(0xff00cc,0.6);
fill2.position.set(-20,10,-20);
scene.add(fill2);
const movingLight=new THREE.PointLight(0x00f0ff,2,100);scene.add(movingLight);

// Stars
const sv=[];for(let i=0;i<2000;i++)sv.push((Math.random()-.5)*500,(Math.random()-.5)*500,(Math.random()-.5)*500);
const stg=new THREE.BufferGeometry();stg.setAttribute('position',new THREE.Float32BufferAttribute(sv,3));
scene.add(new THREE.Points(stg,new THREE.PointsMaterial({color:0xffffff,size:0.3,transparent:true,opacity:0.6})));

// Ground
const ground=new THREE.Mesh(new THREE.PlaneGeometry(600,600),new THREE.MeshStandardMaterial({color:0x020210,roughness:1}));
ground.rotation.x=-Math.PI/2;ground.position.y=-60;scene.add(ground);
const grid=new THREE.GridHelper(600,100,0x00f0ff07,0x00f0ff04);grid.position.y=-59;scene.add(grid);

const BALL_R=0.45;
const ZCOLORS=[0x00f0ff,0xff00cc,0xaaff00,0xff8800,0xff4488,0xaa44ff,0x00ffaa,0xffff00,0x44aaff,0xff6644];

// ── TRACK SEGMENTS ────────────────────────────────────────────
// Each segment: {start:V3, end:V3, dir:V3, len, pipeR}
// Ball constrained inside pipe radius around segment axis
// Gravity pulls ball along naturally when track slopes down

let segments = [];   // track segment objects
let segMeshes = [];  // Three.js meshes to dispose
let totalSegs = 0;

const PIPE_R = 1.6;  // inner radius of pipe

function clearTrack(){
  segMeshes.forEach(m=>scene.remove(m));
  segMeshes=[];segments=[];
}
function tAdd(m){scene.add(m);segMeshes.push(m);return m;}

// Build a pipe segment between two points
function makePipeSegment(start, end, color1, color2){
  const dir=new THREE.Vector3().subVectors(end,start);
  const len=dir.length();
  if(len<0.01) return {start:start.clone(),end:end.clone(),dir:new THREE.Vector3(0,-1,0),len:0.01};
  dir.normalize();
  const mid=new THREE.Vector3().addVectors(start,end).multiplyScalar(0.5);

  // Right vector perpendicular to dir
  let right=new THREE.Vector3();
  if(Math.abs(dir.y)<0.98){ right.crossVectors(dir,new THREE.Vector3(0,1,0)).normalize(); }
  else { right.crossVectors(dir,new THREE.Vector3(1,0,0)).normalize(); }
  const up=new THREE.Vector3().crossVectors(right,dir).normalize();

  // Build U-channel (half-pipe) as a series of quads around bottom arc
  const arcSegs = 10;  // segments around half circle
  const verts = [], idx = [];

  for(let ring=0;ring<2;ring++){
    const rp = ring===0 ? start : end;
    for(let i=0;i<=arcSegs;i++){
      // sweep from -PI*0.7 to +PI*0.7 (bottom 252 degrees)
      const a = -Math.PI*0.7 + (i/arcSegs)*Math.PI*1.4;
      const nx = right.x*Math.sin(a) - up.x*Math.cos(a);
      const ny = right.y*Math.sin(a) - up.y*Math.cos(a);
      const nz = right.z*Math.sin(a) - up.z*Math.cos(a);
      verts.push(rp.x+nx*PIPE_R, rp.y+ny*PIPE_R, rp.z+nz*PIPE_R);
    }
  }
  for(let i=0;i<arcSegs;i++){
    const a=i,b=i+1,c2=arcSegs+1+i,d=arcSegs+1+i+1;
    idx.push(a,c2,b, b,c2,d);
  }

  const geo=new THREE.BufferGeometry();
  geo.setAttribute('position',new THREE.Float32BufferAttribute(verts,3));
  geo.setIndex(idx);
  geo.computeVertexNormals();
  const mat=new THREE.MeshStandardMaterial({
    color:0x111835, roughness:0.15, metalness:0.85,
    emissive:0x050d28, emissiveIntensity:1.0,
    side:THREE.DoubleSide
  });
  tAdd(new THREE.Mesh(geo,mat));

  // Glowing edges at lips of half-pipe
  for(const side of [-1,1]){
    const a=side*Math.PI*0.7;
    const ex=right.x*Math.sin(a)-up.x*Math.cos(a);
    const ey=right.y*Math.sin(a)-up.y*Math.cos(a);
    const ez=right.z*Math.sin(a)-up.z*Math.cos(a);
    const eGeo=new THREE.BufferGeometry();
    eGeo.setAttribute('position',new THREE.Float32BufferAttribute([
      start.x+ex*PIPE_R,start.y+ey*PIPE_R,start.z+ez*PIPE_R,
      end.x+ex*PIPE_R,end.y+ey*PIPE_R,end.z+ez*PIPE_R
    ],3));
    tAdd(new THREE.Line(eGeo,new THREE.LineBasicMaterial({color:side>0?color1:color2})));
  }

  // Pillar
  if(mid.y>-55){
    const h=mid.y+58;
    if(h>1){
      const pillar=new THREE.Mesh(
        new THREE.CylinderGeometry(0.07,0.1,h,6),
        new THREE.MeshStandardMaterial({color:0x0a0a22,metalness:0.8,roughness:0.4})
      );
      pillar.position.set(mid.x,-58+h/2,mid.z);
      tAdd(pillar);
    }
  }

    // Store segment data for physics
  const seg={
    start:start.clone(), end:end.clone(), dir:dir.clone(), len,
    right:right2.clone(), up:up2.clone()
  };
  segments.push(seg);
  return seg;
}

// Junction connector - fill gap between segments with a small sphere
function makeJunction(pos, r){
  const m=new THREE.Mesh(
    new THREE.SphereGeometry(r*1.05,12,8),
    new THREE.MeshStandardMaterial({color:0x0d1230,roughness:0.1,metalness:0.95,emissive:0x060918,emissiveIntensity:0.8})
  );
  m.position.copy(pos);
  tAdd(m);
}

// Generate the full track as a sequence of segments
function buildTrack(complexity){
  clearTrack();

  const edgePairs=[
    [0x00f0ff,0xff00cc],[0xffff00,0xff8800],[0x00ff88,0x00aaff],[0xaa44ff,0xff4488]
  ];

  // Track nodes - just a list of 3D waypoints
  // Track ALWAYS goes downward overall so gravity drives the ball
  const nodes=[];
  nodes.push(new THREE.Vector3(0,40,20)); // start - high up
  nodes.push(new THREE.Vector3(0,38,10));
  nodes.push(new THREE.Vector3(0,36,0));
  nodes.push(new THREE.Vector3(0,34,-10)); // initial drop

  let x=0,y=34,z=-10;

  const numSections=3+complexity;
  for(let s=0;s<numSections;s++){
    const t=s%4;
    const ep=edgePairs[s%edgePairs.length];

    if(t===0){
      // Long sweeping right curve, dropping
      x+=25; z-=25; y-=8;
      nodes.push(new THREE.Vector3(x-12,y+4,z+12));
      nodes.push(new THREE.Vector3(x,y,z));
    } else if(t===1){
      // Sweeping left, dropping
      x-=25; z-=20; y-=6;
      nodes.push(new THREE.Vector3(x+12,y+3,z+10));
      nodes.push(new THREE.Vector3(x,y,z));
    } else if(t===2){
      // Big steep drop
      y-=18; z-=15;
      nodes.push(new THREE.Vector3(x+(Math.random()-.5)*10,y+8,z-5));
      nodes.push(new THREE.Vector3(x,y,z));
    } else {
      // Gradual S-bend
      x+=(s%2===0?15:-15); z-=20; y-=5;
      nodes.push(new THREE.Vector3(x,y,z-10));
      nodes.push(new THREE.Vector3(x,y,z));
    }
  }
  // Final approach
  z-=20; nodes.push(new THREE.Vector3(x,y,z));
  z-=20; nodes.push(new THREE.Vector3(x,y,z)); // finish

  // Smooth the nodes slightly by inserting midpoints
  const smoothed=[nodes[0]];
  for(let i=1;i<nodes.length;i++){
    // Insert a point 2/3 of the way as transition
    const prev=nodes[i-1], curr=nodes[i];
    smoothed.push(new THREE.Vector3().lerpVectors(prev,curr,0.5));
    smoothed.push(curr);
  }

  // Build pipe segments between consecutive nodes
  for(let i=0;i<smoothed.length-1;i++){
    const ep=edgePairs[Math.floor(i/2)%edgePairs.length];
    makePipeSegment(smoothed[i],smoothed[i+1],ep[0],ep[1]);
    if(i<smoothed.length-2) makeJunction(smoothed[i+1],PIPE_R);
  }

  // Start and finish markers
  const startPt=smoothed[0];
  const finishPt=smoothed[smoothed.length-1];

  // Start gate
  const gMat=new THREE.MeshBasicMaterial({color:0x00f0ff});
  [-2,2].forEach(ox=>{
    const p=new THREE.Mesh(new THREE.BoxGeometry(0.15,4,0.15),gMat);
    p.position.set(startPt.x+ox,startPt.y+2,startPt.z);tAdd(p);
  });
  const bar=new THREE.Mesh(new THREE.BoxGeometry(4.5,0.15,0.15),gMat);
  bar.position.set(startPt.x,startPt.y+4.1,startPt.z);tAdd(bar);

  // Finish arch (yellow)
  const fMat=new THREE.MeshBasicMaterial({color:0xffff00});
  [-2,2].forEach(ox=>{
    const p=new THREE.Mesh(new THREE.BoxGeometry(0.15,5,0.15),fMat);
    p.position.set(finishPt.x+ox,finishPt.y+2.5,finishPt.z);tAdd(p);
  });
  const fbar=new THREE.Mesh(new THREE.BoxGeometry(4.5,0.15,0.15),fMat);
  fbar.position.set(finishPt.x,finishPt.y+5.1,finishPt.z);tAdd(fbar);
  for(let i=0;i<8;i++){
    const sq=new THREE.Mesh(new THREE.BoxGeometry(0.5,0.5,0.1),
      new THREE.MeshBasicMaterial({color:i%2===0?0xffffff:0x222222}));
    sq.position.set(finishPt.x-1.75+i*0.5,finishPt.y+5.2,finishPt.z-0.1);tAdd(sq);
  }

  START_POS.set(startPt.x,startPt.y+0.5,startPt.z);
  FINISH_POS.copy(finishPt);
  totalSegs=segments.length;
  console.log('Track built:',segments.length,'segments, start:',START_POS.y.toFixed(1),'finish:',FINISH_POS.y.toFixed(1));
}

let START_POS=new THREE.Vector3();
let FINISH_POS=new THREE.Vector3();

// ── PHYSICS HELPERS ─────────────────────────────────
// For a segment, find the closest point on the segment axis to a position
// Returns {t:0-1, closestPt:V3, radial:V3, radDist:float}
function closestOnSegment(pos,seg){
  const toPos=new THREE.Vector3().subVectors(pos,seg.start);
  const t=Math.max(0,Math.min(1,toPos.dot(seg.dir)/seg.len));
  const closest=seg.start.clone().addScaledVector(seg.dir,t*seg.len);
  const radial=new THREE.Vector3().subVectors(pos,closest);
  return {t,closest,radial,radDist:radial.length()};
}

// Find which segment the ball is nearest to
function nearestSegment(pos, hintIdx){
  let best=hintIdx,bestD=Infinity;
  const lo=Math.max(0,hintIdx-2);
  const hi=Math.min(segments.length-1,hintIdx+5);
  for(let i=lo;i<=hi;i++){
    const {closest}=closestOnSegment(pos,segments[i]);
    const d=pos.distanceTo(closest);
    if(d<bestD){bestD=d;best=i;}
  }
  return best;
}

// ── ZORBS ──────────────────────────────────────────
const zorbs=[];
let phase='lobby';

function makeZorb(name,isSub,col){
  const mat=new THREE.MeshStandardMaterial({
    color:col,roughness:0.05,metalness:0.9,
    emissive:col,emissiveIntensity:isSub?0.45:0.18
  });
  const mesh=new THREE.Mesh(new THREE.SphereGeometry(BALL_R,22,22),mat);
  mesh.castShadow=true;
  mesh.add(new THREE.Mesh(new THREE.SphereGeometry(BALL_R*1.12,12,12),
    new THREE.MeshBasicMaterial({color:col,transparent:true,opacity:0.1,side:THREE.BackSide})));
  const ring=new THREE.Mesh(new THREE.TorusGeometry(BALL_R*1.4,0.05,6,24),
    new THREE.MeshBasicMaterial({color:col,transparent:true,opacity:0.6}));
  ring.rotation.x=Math.PI/2;mesh.add(ring);
  mesh.add(new THREE.PointLight(col,isSub?1.8:1.0,7));
  scene.add(mesh);

  const tGeo=new THREE.BufferGeometry();
  tGeo.setAttribute('position',new THREE.Float32BufferAttribute(new Float32Array(36*3),3));
  const trail=new THREE.Line(tGeo,new THREE.LineBasicMaterial({color:col,transparent:true,opacity:0.5}));
  scene.add(trail);

  const jitter=(Math.random()-.5)*0.4;
  return {
    name,isSub,color:col,mesh,ring,trail,
    pos:new THREE.Vector3(START_POS.x+jitter,START_POS.y,START_POS.z),
    vel:new THREE.Vector3(0,0,0),
    trailH:[],segIdx:0,boost:0,
    finished:false,rank:0,
    knockFlash:0,ringT:Math.random()*Math.PI*2
  };
}
function removeZorb(z){scene.remove(z.mesh);scene.remove(z.trail);}

// ── STEP PHYSICS ────────────────────────────────────
function stepZorb(z,dt){
  if(z.finished) return;

  // Gravity
  z.vel.y-=20*dt;

  // Boost along current segment direction
  if(z.boost>0 && segments.length>0){
    const seg=segments[Math.min(z.segIdx,segments.length-1)];
    z.vel.addScaledVector(seg.dir,z.boost*15*dt);
    z.boost=Math.max(0,z.boost-dt);
  }

  // Speed cap
  const spd=z.vel.length();
  if(spd>32) z.vel.multiplyScalar(32/spd);

  // Integrate
  z.pos.addScaledVector(z.vel,dt);

  if(!segments.length) return;

  // Find nearest segment
  const si=nearestSegment(z.pos,z.segIdx);
  z.segIdx=si;
  const seg=segments[si];

  const {t,closest,radial,radDist}=closestOnSegment(z.pos,seg);

  // Constrain inside pipe
  const maxR=PIPE_R-BALL_R;
  if(radDist>maxR && radDist>0.001){
    // Push back to pipe wall
    const radNorm=radial.clone().normalize();
    z.pos.copy(closest).addScaledVector(radNorm,maxR);

    // Reflect outward velocity component
    const vOut=z.vel.dot(radNorm);
    if(vOut>0){
      z.vel.addScaledVector(radNorm,-vOut*1.3);
      z.vel.multiplyScalar(0.88); // energy loss on bounce
    }
  }

  // Progress to next segment when near end
  if(t>0.92 && si<segments.length-1){
    z.segIdx=si+1;
  }

  // Slight forward nudge to keep things moving
  if(phase==='racing'){
    const fwd=seg.dir.dot(z.vel);
    if(fwd<0.5) z.vel.addScaledVector(seg.dir,(0.5-fwd)*2*dt);
  }

  // Safety respawn if way off
  if(radDist>PIPE_R*4){
    const rsi=Math.max(0,z.segIdx);
    const rs=segments[rsi];
    z.pos.copy(rs.start).addScaledVector(rs.dir,rs.len*0.1);
    z.vel.copy(rs.dir).multiplyScalar(2);
    showKO('FELL: '+z.name,0xff4444);
  }

  // Finish check
  if(!z.finished && si>=segments.length-2 && t>0.8){
    z.finished=true;
    const rank=zorbs.filter(r=>r.finished).length; z.rank=rank;
    if(rank===1){showBanner('WINNER: '+z.name,4500);setTimeout(resetRace,5500);}
    showKO('FINISH #'+rank+': '+z.name,0xffff00);
  }

  // Mesh
  z.mesh.position.copy(z.pos);
  z.knockFlash=Math.max(0,z.knockFlash-dt);
  z.mesh.material.emissiveIntensity=z.knockFlash>0?1.5:z.isSub?0.42:0.18;
  z.ringT+=dt*2; z.ring.rotation.x=Math.PI/2+Math.sin(z.ringT)*0.1;
}

function collideBalls(){
  for(let i=0;i<zorbs.length;i++){
    for(let j=i+1;j<zorbs.length;j++){
      const a=zorbs[i],b=zorbs[j];
      if(a.finished||b.finished)continue;
      const d=new THREE.Vector3().subVectors(a.pos,b.pos);
      const dist=d.length(),minD=BALL_R*2+0.02;
      if(dist<minD&&dist>0.001){
        d.normalize();
        const rv=new THREE.Vector3().subVectors(a.vel,b.vel);
        const dot=rv.dot(d);
        if(dot<0){const imp=d.clone().multiplyScalar(dot*0.2);a.vel.sub(imp);b.vel.add(imp);}
        const ov=(minD-dist)*0.5+0.01;
        a.pos.addScaledVector(d,ov);b.pos.addScaledVector(d,-ov);
      }
    }
  }
}

function updateVisuals(z){
  z.trailH.push(z.pos.clone());
  if(z.trailH.length>28)z.trailH.shift();
  if(z.trailH.length>1){
    const arr=new Float32Array(z.trailH.length*3);
    z.trailH.forEach((p,i)=>{arr[i*3]=p.x;arr[i*3+1]=p.y;arr[i*3+2]=p.z;});
    z.trail.geometry.setAttribute('position',new THREE.Float32BufferAttribute(arr,3));
    z.trail.material.opacity=Math.min(0.7,z.vel.length()/14);
  }
}

// ── CAMERA ──────────────────────────────────────────
let camMode='follow',camPos=new THREE.Vector3(0,15,30),camLook=new THREE.Vector3();
let autoTimer=0,autoIdx=0;

function setCam(m){
  camMode=m;
  document.querySelectorAll('.cb').forEach(b=>b.classList.remove('active'));
  const el=document.getElementById('btn-'+m);if(el)el.classList.add('active');
}

function updateCam(dt){
  const sm=Math.min(dt*4,0.12);
  const leader=zorbs.filter(z=>!z.finished).sort((a,b)=>b.segIdx-a.segIdx)[0]||zorbs[0];
  if(!leader||!segments.length) return;
  const lp=leader.pos;
  let mode=camMode;
  if(mode==='auto'){autoTimer+=dt;if(autoTimer>8){autoTimer=0;autoIdx=(autoIdx+1)%3;}
    mode=['follow','chase','wide'][autoIdx];}

  const si=Math.min(leader.segIdx,segments.length-1);
  const dir=segments[si].dir;

  if(mode==='follow'){
    const cp=lp.clone().addScaledVector(dir,-5).add(new THREE.Vector3(0,3.5,0));
    camPos.lerp(cp,sm*2);camLook.lerp(lp.clone().addScaledVector(dir,4),sm*3);
  } else if(mode==='chase'){
    const cp=lp.clone().addScaledVector(dir,-3).add(new THREE.Vector3(0,1.5,0));
    camPos.lerp(cp,sm*2.5);camLook.lerp(lp.clone().addScaledVector(dir,5),sm*4);
  } else {
    const avg=new THREE.Vector3();zorbs.forEach(z=>avg.add(z.pos));
    if(zorbs.length)avg.divideScalar(zorbs.length);
    camPos.lerp(avg.clone().add(new THREE.Vector3(15,25,20)),sm*0.35);camLook.lerp(avg,sm);
  }
  camera.position.copy(camPos);camera.lookAt(camLook);
}

// ── MINIMAP ─────────────────────────────────────────
const mmc=document.getElementById('mmc'),mmctx=mmc.getContext('2d');
function drawMM(){
  mmctx.clearRect(0,0,110,110);mmctx.fillStyle='rgba(0,0,0,0.6)';mmctx.fillRect(0,0,110,110);
  if(!segments.length)return;
  const allPts=segments.map(s=>s.start).concat([segments[segments.length-1].end]);
  const xs=allPts.map(p=>p.x),zs=allPts.map(p=>p.z);
  const minX=Math.min(...xs),maxX=Math.max(...xs),minZ=Math.min(...zs),maxZ=Math.max(...zs);
  const sc=Math.min(90/(maxX-minX||1),90/(maxZ-minZ||1));
  const ox=55-(minX+maxX)/2*sc,oz=55-(minZ+maxZ)/2*sc;
  mmctx.strokeStyle='rgba(0,240,255,0.4)';mmctx.lineWidth=2;mmctx.beginPath();
  allPts.forEach((p,i)=>{i===0?mmctx.moveTo(ox+p.x*sc,oz+p.z*sc):mmctx.lineTo(ox+p.x*sc,oz+p.z*sc);});
  mmctx.stroke();
  // Finish
  const fp=segments[segments.length-1].end;
  mmctx.fillStyle='#ffff00';mmctx.fillRect(ox+fp.x*sc-3,oz+fp.z*sc-3,6,6);
  // Zorbs
  zorbs.forEach(z=>{
    const mx=Math.max(5,Math.min(105,ox+z.pos.x*sc));
    const my=Math.max(5,Math.min(105,oz+z.pos.z*sc));
    const col='#'+z.color.toString(16).padStart(6,'0');
    mmctx.fillStyle=col;mmctx.shadowColor=col;mmctx.shadowBlur=6;
    mmctx.beginPath();mmctx.arc(mx,my,4,0,Math.PI*2);mmctx.fill();mmctx.shadowBlur=0;
  });
}

// ── LEADERBOARD ─────────────────────────────────────
function updateLB(){
  const sorted=[...zorbs].sort((a,b)=>b.segIdx-a.segIdx);
  const rows=document.getElementById('lbr');rows.innerHTML='';
  sorted.slice(0,7).forEach((z,i)=>{
    const pct=segments.length?Math.round(z.segIdx/segments.length*100):0;
    const d=document.createElement('div');d.className='lr';
    d.innerHTML='<span class="lp '+(i===0?'g':'')+'">'+( i+1)+'</span>'
      +'<span class="ln '+(z.isSub?'sub':'')+'">'+z.name+'</span>'
      +'<span class="ld">'+(z.finished?'FIN':pct+'%')+'</span>';
    rows.appendChild(d);
  });
}

// ── CHAT / UI ────────────────────────────────────────
const chatLog=document.getElementById('cl');
function addChat(name,cmd,isSub){
  const d=document.createElement('div');d.className='cm';
  d.innerHTML='<span class="u '+(isSub?'s':'r')+'">'+name+'</span> <span class="c">'+cmd+'</span>';
  chatLog.appendChild(d);while(chatLog.children.length>9)chatLog.removeChild(chatLog.firstChild);
}
function showKO(msg,color){
  const feed=document.getElementById('kfeed');
  const el=document.createElement('div');el.className='kf';
  el.style.color='#'+color.toString(16).padStart(6,'0');el.textContent=msg;
  feed.appendChild(el);setTimeout(()=>{if(el.parentNode)feed.removeChild(el);},2600);
  while(feed.children.length>4)feed.removeChild(feed.firstChild);
}
function showBanner(txt,dur){
  const el=document.getElementById('banner');el.textContent=txt;el.style.opacity='1';
  setTimeout(()=>el.style.opacity='0',dur);
}
function hidePanel(){document.getElementById('sp').style.display='none';document.getElementById('btn-show').style.display='block';}
function showPanel(){document.getElementById('sp').style.display='flex';document.getElementById('btn-show').style.display='none';}

// ── RACE STATE ───────────────────────────────────────
let raceDur=null,raceStart=null;
function parseDur(s){
  if(!s||!s.trim())return null;
  const m=s.trim().toLowerCase().match(/^(\d+(?:\.\d+)?)\s*(m|s)?$/);
  if(!m)return null;
  return m[2]==='s'?parseFloat(m[1]):parseFloat(m[1])*60;
}
function updateTimer(){
  if(phase!=='racing'||!raceDur||!raceStart)return;
  const left=Math.max(0,raceDur-(performance.now()-raceStart)/1000);
  const el=document.getElementById('tdisplay');
  el.textContent=Math.floor(left/60)+':'+(Math.floor(left%60)<10?'0':'')+Math.floor(left%60);
  if(left<30)el.classList.add('urgent');
  if(left<=0){showBanner('TIME UP!',3000);setTimeout(resetRace,3500);}
}
function handleCmd(name,cmd,isSub){
  addChat(name,cmd,isSub);
  const c=cmd.trim().toLowerCase();
  if(c==='!play'){
    if(zorbs.find(z=>z.name===name)||phase!=='lobby')return;
    const col=ZCOLORS[zorbs.length%ZCOLORS.length];
    zorbs.push(makeZorb(name,isSub,col));
    document.getElementById('cnt').textContent=zorbs.length+' racers';
  }
  if(c==='!boost'){
    const z=zorbs.find(z=>z.name===name);
    if(z&&phase==='racing')z.boost=isSub?2.5:1.2;
  }
}
function streamerStart(){
  if(phase!=='lobby')return;
  raceDur=parseDur(document.getElementById('dur').value);
  let cplx=3;
  if(raceDur!==null){if(raceDur<=60)cplx=1;else if(raceDur<=120)cplx=2;else if(raceDur<=300)cplx=3;else if(raceDur<=420)cplx=4;else cplx=5;}
  buildTrack(cplx);
  zorbs.forEach((z,i)=>{
    z.pos.set(START_POS.x+(i%2===0?-.4:.4),START_POS.y,START_POS.z);
    z.vel.set(0,0,0);z.trailH=[];z.segIdx=0;z.finished=false;
  });
  if(raceDur){
    document.getElementById('tpill').style.display='flex';
    document.getElementById('tdisplay').textContent='--:--';
    document.getElementById('tdisplay').classList.remove('urgent');
  } else document.getElementById('tpill').style.display='none';
  document.getElementById('btn-go').disabled=true;
  phase='countdown';document.getElementById('stxt').textContent='STARTING';
  showBanner('3',900);setTimeout(()=>showBanner('2',900),1000);
  setTimeout(()=>showBanner('1',900),2000);
  setTimeout(()=>{
    showBanner('GO!',800);phase='racing';
    document.getElementById('stxt').textContent='RACING';
    raceStart=performance.now();
    zorbs.forEach(z=>{
      const d=segments[0].dir;
      z.vel.set(d.x*2,d.y*2,d.z*2);
    });
  },3000);
}
function resetRace(){
  zorbs.forEach(removeZorb);zorbs.length=0;
  phase='lobby';raceStart=null;raceDur=null;
  document.getElementById('cnt').textContent='0 racers';
  document.getElementById('stxt').textContent='LOBBY';
  document.getElementById('tpill').style.display='none';
  document.getElementById('btn-go').disabled=false;
  document.getElementById('dur').value='';
  showBanner('NEW RACE - TYPE !play',2500);
  setTimeout(startMock,2500);
}

// ── MOCK ─────────────────────────────────────────────
const MOCK=[{name:'StreamKing',sub:true},{name:'NeonRacer',sub:false},{name:'CyberZorb',sub:true},
  {name:'VoidRunner',sub:false},{name:'NightFox',sub:false},{name:'GlitchQueen',sub:true},
  {name:'DataSurge',sub:false},{name:'PixelBolt',sub:true}];
let mockI=0;
function startMock(){mockI=0;setTimeout(nextMock,1200);}
function nextMock(){
  if(mockI>=MOCK.length)return;
  handleCmd(MOCK[mockI].name,'!play',MOCK[mockI].sub);mockI++;
  if(mockI<MOCK.length)setTimeout(nextMock,700+Math.random()*900);
  else setTimeout(()=>{document.getElementById('dur').value='';streamerStart();},2000);
}
setInterval(()=>{
  if(phase==='racing'&&zorbs.length>0)
    handleCmd(zorbs[Math.floor(Math.random()*zorbs.length)].name,'!boost',Math.random()>.5);
},5000);

document.addEventListener('keydown',e=>{
  const ms=['follow','chase','wide','auto'];
  if(e.key==='ArrowLeft'){const i=ms.indexOf(camMode);setCam(ms[(i-1+4)%4]);}
  if(e.key==='ArrowRight'){const i=ms.indexOf(camMode);setCam(ms[(i+1)%4]);}
  if(e.key===' '){if(zorbs.length>0)zorbs[0].boost=1.8;e.preventDefault();}
  if(e.key==='f'||e.key==='F')setCam('follow');
});
document.getElementById('cg').onclick=()=>{const v=document.getElementById('ci').value.trim();if(!v)return;handleCmd('You',v,false);document.getElementById('ci').value='';};
document.getElementById('ci').addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('cg').click();});

// ── MAIN LOOP ─────────────────────────────────────────
buildTrack(3);startMock();
let lastT=0,frame=0;
function loop(ts){
  requestAnimationFrame(loop);
  const dt=Math.min((ts-lastT)/1000,0.05);lastT=ts;frame++;
  if(phase==='racing'){
    updateTimer();
    for(let s=0;s<3;s++){zorbs.forEach(z=>stepZorb(z,dt/3));collideBalls();}
  }
  zorbs.forEach(updateVisuals);
  updateCam(dt);
  movingLight.intensity=1.5+Math.sin(frame*0.04)*0.5;
  movingLight.position.set(Math.sin(frame*0.01)*40,15,Math.cos(frame*0.01)*40);
  if(frame%18===0){updateLB();drawMM();}
  renderer.render(scene,camera);
}
requestAnimationFrame(t=>{lastT=t;loop(t);});
</script>
