<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ZORBS on Stream</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;background:#000;overflow:hidden;}
#app{width:100%;height:100vh;position:relative;}
#c{display:block;width:100%;height:100%;}
#ui{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;font-family:'Courier New',monospace;}
#topbar{position:absolute;top:0;left:0;right:0;display:flex;align-items:center;justify-content:space-between;padding:10px 16px;background:linear-gradient(180deg,rgba(0,0,0,0.92)0%,transparent);}
#logo{font-size:18px;font-weight:900;letter-spacing:4px;color:#00f0ff;text-shadow:0 0 18px #00f0ff;}
#logo span{color:#ff00cc;}
#cams{display:flex;gap:5px;pointer-events:auto;}
.cb{background:rgba(0,240,255,0.07);border:1px solid rgba(0,240,255,0.28);color:#00f0ff;padding:4px 10px;border-radius:4px;font-size:10px;cursor:pointer;letter-spacing:2px;font-family:'Courier New',monospace;}
.cb.active{background:rgba(0,240,255,0.2);border-color:#00f0ff;}
#info{position:absolute;top:50px;left:12px;display:flex;flex-direction:column;gap:5px;}
.pill{background:rgba(0,0,0,0.75);border:1px solid rgba(255,255,255,0.09);border-radius:20px;padding:4px 12px;font-size:10px;color:#fff;display:flex;align-items:center;gap:6px;letter-spacing:1px;}
.dot{width:5px;height:5px;border-radius:50%;}.dg{background:#00ff88;box-shadow:0 0 6px #00ff88;animation:blink 1.5s infinite;}.dp{background:#ff00cc;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:.3;}}
#timer-display{font-size:13px;font-weight:700;}.urgent{color:#ff4444!important;}
#lb{position:absolute;top:50px;right:12px;background:rgba(0,0,0,0.8);border:1px solid rgba(0,240,255,0.14);border-radius:10px;padding:10px 14px;min-width:170px;}
#lb h3{font-size:9px;letter-spacing:3px;color:rgba(0,240,255,0.38);margin-bottom:8px;}
.lr{display:flex;align-items:center;gap:6px;margin-bottom:4px;font-size:11px;}
.lp{color:rgba(255,255,255,.22);width:14px;font-size:10px;}.lp.g{color:#ffd700;}
.ln{flex:1;color:#ddd;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:85px;}.ln.sub{color:#ff00cc;}
.ld{font-size:9px;color:rgba(255,255,255,.28);}
#sp{position:absolute;top:50px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.85);border:1px solid rgba(0,240,255,0.18);border-radius:10px;padding:12px 16px;pointer-events:auto;display:flex;flex-direction:column;gap:8px;min-width:250px;}
#sp h3{font-size:9px;letter-spacing:3px;color:rgba(0,240,255,0.4);text-align:center;}
#sp-row{display:flex;gap:6px;align-items:center;}
#sp-lbl{font-size:10px;color:rgba(255,255,255,0.5);white-space:nowrap;}
#dur{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.15);border-radius:4px;padding:4px 8px;color:#fff;font-size:11px;font-family:'Courier New',monospace;width:65px;outline:none;text-align:center;}
#sp-hint{font-size:9px;color:rgba(255,255,255,0.25);}
#btn-go{background:rgba(0,240,255,0.12);border:1px solid rgba(0,240,255,0.35);color:#00f0ff;border-radius:5px;padding:6px 14px;font-size:11px;letter-spacing:2px;cursor:pointer;font-family:'Courier New',monospace;flex:1;}
#btn-go:disabled{opacity:0.3;cursor:not-allowed;}
#btn-hide{font-size:9px;color:rgba(255,255,255,0.25);cursor:pointer;text-align:center;}
#btn-show{position:absolute;top:50px;left:50%;transform:translateX(-50%);font-size:9px;color:rgba(0,240,255,0.4);cursor:pointer;background:rgba(0,0,0,0.6);border:1px solid rgba(0,240,255,0.15);border-radius:4px;padding:3px 10px;display:none;pointer-events:auto;}
#chat{position:absolute;bottom:12px;left:12px;width:188px;background:rgba(0,0,0,0.78);border:1px solid rgba(255,255,255,0.07);border-radius:10px;padding:9px;pointer-events:auto;}
#ct{font-size:9px;letter-spacing:2px;color:rgba(255,255,255,.22);margin-bottom:5px;}
#cl{height:88px;overflow:hidden;display:flex;flex-direction:column;justify-content:flex-end;gap:2px;}
.cm{font-size:10px;line-height:1.4;animation:fi .2s ease;}
.cm .u{font-weight:700;}.cm .u.s{color:#ff00cc;}.cm .u.r{color:#00f0ff;}
.cm .c{color:rgba(255,255,255,.38);}
@keyframes fi{from{opacity:0;transform:translateY(3px);}to{opacity:1;}}
#cr{display:flex;gap:4px;margin-top:5px;}
#ci{flex:1;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.11);border-radius:4px;padding:3px 6px;color:#fff;font-size:10px;font-family:'Courier New',monospace;outline:none;}
#cg{background:rgba(0,240,255,0.1);border:1px solid rgba(0,240,255,0.28);color:#00f0ff;border-radius:4px;padding:3px 8px;font-size:11px;cursor:pointer;}
#mm{position:absolute;bottom:12px;right:12px;width:110px;height:110px;border-radius:50%;overflow:hidden;border:1px solid rgba(0,240,255,0.18);background:rgba(0,0,0,0.7);}
#mmc{width:110px;height:110px;}
#banner{position:absolute;top:45%;left:50%;transform:translate(-50%,-50%);font-size:34px;font-weight:900;letter-spacing:6px;color:#fff;text-shadow:0 0 30px #00f0ff;opacity:0;pointer-events:none;transition:opacity .3s;text-align:center;white-space:nowrap;}
#kfeed{position:absolute;top:56px;left:50%;transform:translateX(-50%);display:flex;flex-direction:column;align-items:center;gap:3px;pointer-events:none;}
.kf{font-size:11px;letter-spacing:1px;animation:kfa 2.5s forwards;}
@keyframes kfa{0%{opacity:1;transform:translateY(0);}100%{opacity:0;transform:translateY(-16px);}}
#hint{position:absolute;bottom:12px;left:50%;transform:translateX(-50%);font-size:9px;color:rgba(255,255,255,.16);pointer-events:none;white-space:nowrap;}
</style>
</head>
<body>
<div id="app">
<canvas id="c"></canvas>
<div id="ui">
  <div id="topbar">
    <div id="logo">ZORBS <span>on</span> Stream</div>
    <div id="cams">
      <button class="cb active" id="btn-follow" onclick="setCam('follow')">FOLLOW</button>
      <button class="cb" id="btn-wide" onclick="setCam('wide')">WIDE</button>
      <button class="cb" id="btn-top" onclick="setCam('top')">TOP</button>
      <button class="cb" id="btn-auto" onclick="setCam('auto')">AUTO</button>
    </div>
  </div>
  <div id="info">
    <div class="pill"><div class="dot dg"></div><span>LIVE</span></div>
    <div class="pill"><div class="dot dp"></div><span id="cnt">0 racers</span></div>
    <div class="pill"><span id="stxt">LOBBY</span></div>
    <div class="pill" id="tpill" style="display:none"><span id="timer-display">--:--</span></div>
  </div>
  <div id="sp">
    <h3>STREAMER CONTROLS</h3>
    <div id="sp-row">
      <span id="sp-lbl">TIMER</span>
      <input id="dur" type="text" placeholder="e.g. 3m" maxlength="4"/>
      <span id="sp-hint">optional</span>
    </div>
    <button id="btn-go" onclick="streamerStart()">START RACE</button>
    <div id="btn-hide" onclick="hidePanel()">hide panel</div>
  </div>
  <div id="btn-show" onclick="showPanel()">CONTROLS</div>
  <div id="lb"><h3>LEADERBOARD</h3><div id="lbr"></div></div>
  <div id="chat"><div id="ct">LIVE CHAT</div><div id="cl"></div>
    <div id="cr"><input id="ci" placeholder="!play or !boost" maxlength="20"/><button id="cg">go</button></div>
  </div>
  <div id="mm"><canvas id="mmc" width="110" height="110"></canvas></div>
  <div id="banner"></div>
  <div id="kfeed"></div>
  <div id="hint">arrows=cam | space=boost | F=follow</div>
</div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ZORBS on Stream v0.4 - Path-based physics, stable track following

// ── RENDERER ─────────────────────────────────────────
const canvas = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({canvas, antialias:true});
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x010115,0.011);
scene.background = new THREE.Color(0x010115);
const camera = new THREE.PerspectiveCamera(65,1,0.1,800);

function onResize(){
  const w=canvas.parentElement.offsetWidth,h=canvas.parentElement.offsetHeight||window.innerHeight;
  renderer.setSize(w,h,false); camera.aspect=w/h; camera.updateProjectionMatrix();
}
onResize(); window.addEventListener('resize',onResize);

// ── LIGHTING ─────────────────────────────────────────
scene.add(new THREE.AmbientLight(0x223355,4));
const sun=new THREE.DirectionalLight(0xaabbff,2.5);
sun.position.set(40,80,20); sun.castShadow=true;
sun.shadow.mapSize.set(2048,2048);
sun.shadow.camera.left=-150; sun.shadow.camera.right=150;
sun.shadow.camera.top=150; sun.shadow.camera.bottom=-150;
sun.shadow.camera.far=600;
scene.add(sun);
const fill=new THREE.DirectionalLight(0xff00cc,0.55);
fill.position.set(-40,20,-40); scene.add(fill);
const pCyan=new THREE.PointLight(0x00f0ff,1.4,120); scene.add(pCyan);

// Stars
const sv=[];
for(let i=0;i<2500;i++) sv.push((Math.random()-.5)*600,(Math.random()-.5)*600,(Math.random()-.5)*600);
const sg=new THREE.BufferGeometry();
sg.setAttribute('position',new THREE.Float32BufferAttribute(sv,3));
scene.add(new THREE.Points(sg,new THREE.PointsMaterial({color:0xffffff,size:0.35,transparent:true,opacity:0.6})));

// ── CONSTANTS ────────────────────────────────────────
const BALL_R = 0.52;
const TW     = 5.6;  // track full width
const TW_HALF = TW/2;
const GRAV   = -20;
const BOUNCE = 0.2;
const FRIC   = 0.995; // less friction = balls keep rolling
const MIN_FWD = 2.5;
const ZCOLORS= [0x00f0ff,0xff00cc,0xaaff00,0xff8800,0xff4488,0xaa44ff,0x00ffaa,0xffff00,0x44aaff,0xff6644];

// ── PATH SYSTEM ───────────────────────────────────────
// The track is defined as a series of PATH NODES.
// Each node has: pos (Vector3), width (half-width), floorY
// Physics uses the path to keep balls on track by finding nearest point.

let pathNodes = [];   // [{pos:V3, dir:V3, up:V3, floorY, halfW}]
let trackMeshes = [];
let hammers = [], bumperObjs = [], funnels = [], boostPads = [];
let FINISH_POS = new THREE.Vector3(0,0,-200);
let START_POS  = new THREE.Vector3(0,1,4);

function clearCourse(){
  trackMeshes.forEach(m=>scene.remove(m)); trackMeshes=[];
  hammers=[]; bumperObjs=[]; funnels=[]; boostPads=[];
  pathNodes=[];
}

function addMesh(m){ scene.add(m); trackMeshes.push(m); return m; }

function makeBox(px,py,pz,sx,sy,sz,col,emit,rx=0,ry=0,rz=0){
  const m=new THREE.Mesh(new THREE.BoxGeometry(sx,sy,sz),
    new THREE.MeshStandardMaterial({color:col||0x111128,roughness:0.22,metalness:0.78,
      emissive:emit||0x001122,emissiveIntensity:0.18}));
  m.position.set(px,py,pz); m.rotation.set(rx,ry,rz);
  m.castShadow=m.receiveShadow=true; return addMesh(m);
}
function makeGlow(px,py,pz,sx,sy,sz,col){
  const m=new THREE.Mesh(new THREE.BoxGeometry(sx,sy,sz),new THREE.MeshBasicMaterial({color:col}));
  m.position.set(px,py,pz); return addMesh(m);
}

// Add path nodes along a segment
function addPathSegment(from, to, floorY, halfW=TW_HALF){
  const dir=new THREE.Vector3().subVectors(to,from).normalize();
  const steps=Math.max(2,Math.ceil(from.distanceTo(to)/2));
  for(let i=0;i<=steps;i++){
    const t=i/steps;
    const pos=new THREE.Vector3().lerpVectors(from,to,t);
    pos.y=floorY;
    pathNodes.push({pos:pos.clone(), dir:dir.clone(), floorY, halfW});
  }
}

// Find nearest path node to a world position
// Cache last node index per zorb via a global map
const _nodeCache = new WeakMap();
function nearestNode(worldPos, hintNode){
  // Full search but cache result per position
  let best=null, bestDist=Infinity;
  // Start from hint if available for speed
  let startIdx=0;
  if(hintNode){
    const hi=pathNodes.indexOf(hintNode);
    if(hi>=0) startIdx=Math.max(0,hi-10);
  }
  // Search full array but score forward-bias
  for(let i=0;i<pathNodes.length;i++){
    const n=pathNodes[i];
    const d=n.pos.distanceTo(worldPos);
    if(d<bestDist){bestDist=d;best=n;}
    // Early exit if close enough and we've moved past start
    if(d<0.5&&i>startIdx+5) break;
  }
  return {node:best, dist:bestDist};
}

// ── TRACK SEGMENT BUILDERS ────────────────────────────

function buildStraight(x,y,z1,z2,eL=0x00f0ff,eR=0xff00cc){
  const len=Math.abs(z2-z1), mz=(z1+z2)/2;
  makeBox(x,y-0.2,mz, TW,0.4,len);
  makeBox(x+TW_HALF+0.15,y+0.55,mz, 0.28,1.4,len, 0x0a1020,0x000820);
  makeBox(x-TW_HALF-0.15,y+0.55,mz, 0.28,1.4,len, 0x0a1020,0x000820);
  makeGlow(x+TW_HALF+0.15,y+1.3,mz, 0.1,0.1,len, eL);
  makeGlow(x-TW_HALF-0.15,y+1.3,mz, 0.1,0.1,len, eR);
  const a=new THREE.Vector3(x,y,z1), b=new THREE.Vector3(x,y,z2);
  addPathSegment(a,b,y);
}

function buildRamp(x,y1,z1,y2,z2){
  const dz=z2-z1,dy=y2-y1,len=Math.sqrt(dz*dz+dy*dy);
  const angle=Math.atan2(-dy,-dz);
  const mz=(z1+z2)/2,my=(y1+y2)/2;
  makeBox(x,my-0.1,mz, TW,0.4,len+0.3, 0x111128,0x001122, angle);
  makeBox(x+TW_HALF+0.15,my+0.6,mz, 0.28,1.6,len, 0x0a1020,0x000820, angle);
  makeBox(x-TW_HALF-0.15,my+0.6,mz, 0.28,1.6,len, 0x0a1020,0x000820, angle);
  // Path nodes interpolate Y along the ramp
  const steps=Math.max(4,Math.ceil(len/2));
  for(let i=0;i<=steps;i++){
    const t=i/steps;
    const pz=z1+(z2-z1)*t, py=y1+(y2-y1)*t;
    const dir=new THREE.Vector3(0,dy/len,dz/len).normalize().negate();
    pathNodes.push({pos:new THREE.Vector3(x,py,pz), dir, floorY:py, halfW:TW_HALF});
  }
}

// Curved section: horizontal arc (constant Y)
// cx,cz = center of circle, radius, startAngle, endAngle (radians, 0=forward/-Z)
function buildCurve(cx,cy,cz,radius,startAngle,endAngle,eL=0x00f0ff,eR=0xff00cc){
  const steps=Math.max(10,Math.ceil(Math.abs(endAngle-startAngle)*radius/2));
  for(let i=0;i<steps;i++){
    const t1=i/steps, t2=(i+1)/steps;
    const a1=startAngle+(endAngle-startAngle)*t1;
    const a2=startAngle+(endAngle-startAngle)*t2;
    const am=(a1+a2)/2;
    // Position on arc
    const px=cx+Math.sin(am)*radius;
    const pz=cz-Math.cos(am)*radius;
    const segLen=radius*Math.abs(endAngle-startAngle)/steps*1.05;
    // Floor plank
    const fm=new THREE.Mesh(new THREE.BoxGeometry(TW,0.4,segLen),
      new THREE.MeshStandardMaterial({color:0x111128,roughness:0.22,metalness:0.78,emissive:0x001122,emissiveIntensity:0.18}));
    fm.position.set(px,cy-0.2,pz); fm.rotation.y=-am;
    fm.castShadow=fm.receiveShadow=true; addMesh(fm);
    // Walls - right vector is perpendicular to forward
    // forward = (cos(am), 0, -sin(am)), so right = (sin(am), 0, cos(am))
    for(const side of [-1,1]){
      const wx=px+Math.sin(am)*side*(TW_HALF+0.15);
      const wz=pz+Math.cos(am)*side*(TW_HALF+0.15);
      const wm=new THREE.Mesh(new THREE.BoxGeometry(0.28,1.4,segLen+0.1),
        new THREE.MeshStandardMaterial({color:0x0a1020,roughness:0.22,metalness:0.78}));
      wm.position.set(wx, cy+0.55, wz); wm.rotation.y=-am;
      wm.castShadow=wm.receiveShadow=true; addMesh(wm);
      const gm=new THREE.Mesh(new THREE.BoxGeometry(0.1,0.1,segLen+0.1),
        new THREE.MeshBasicMaterial({color:side>0?eL:eR}));
      gm.position.set(wx, cy+1.3, wz); gm.rotation.y=-am; addMesh(gm);
    }
    // Path node
    const dir=new THREE.Vector3(Math.cos(am),0,-Math.sin(am)).normalize();
    pathNodes.push({pos:new THREE.Vector3(px,cy,pz), dir, floorY:cy, halfW:TW_HALF});
  }
}

function buildFunnel(cx,cy,cz,rTop,rBot,h){
  const yBot=cy-h;
  // Funnel mesh
  const fm=new THREE.Mesh(new THREE.CylinderGeometry(rTop,rBot,h,32,1,true),
    new THREE.MeshStandardMaterial({color:0x0a0a1e,roughness:0.2,metalness:0.85,side:THREE.DoubleSide,emissive:0x000833,emissiveIntensity:0.28}));
  fm.position.set(cx,cy-h/2,cz); addMesh(fm);
  for(let i=0;i<5;i++){
    const t=i/4,r=rBot+(rTop-rBot)*(1-t)*0.92;
    const rm=new THREE.Mesh(new THREE.TorusGeometry(r,0.09,8,36),new THREE.MeshBasicMaterial({color:i%2===0?0x00f0ff:0xff00cc}));
    rm.position.set(cx,cy-h*t,cz); rm.rotation.x=Math.PI/2; addMesh(rm);
  }
  // SOLID EXIT FLOOR
  makeBox(cx,yBot-0.2,cz, TW+2,0.4,14);
  makeBox(cx+TW_HALF+1.15,yBot+0.55,cz, 0.28,1.4,14, 0x0a1020);
  makeBox(cx-TW_HALF-1.15,yBot+0.55,cz, 0.28,1.4,14, 0x0a1020);
  makeGlow(cx+TW_HALF+1.15,yBot+1.3,cz, 0.1,0.1,14, 0x00f0ff);
  makeGlow(cx-TW_HALF-1.15,yBot+1.3,cz, 0.1,0.1,14, 0xff00cc);
  // Path nodes on the exit platform
  for(let dz=-6;dz<=6;dz+=2){
    pathNodes.push({pos:new THREE.Vector3(cx,yBot,cz+dz), dir:new THREE.Vector3(0,0,-1), floorY:yBot, halfW:TW_HALF+0.6});
  }
  funnels.push({cx,cz,yTop:cy,yBot,rTop,rBot});
  return yBot;
}

function buildBoostPad(x,y,z){
  makeBox(x,y+0.02,z, TW-1.2,0.06,2.5, 0x00ff88,0x00ff44);
  for(let j=0;j<3;j++) makeGlow(x,y+0.04,z-0.6+j*0.6, TW-2,0.05,0.22, 0x00ff88);
  boostPads.push({z1:z-1.25,z2:z+1.25,x1:x-TW_HALF+0.6,x2:x+TW_HALF-0.6,y});
}

function buildHammers(x,y,z1,z2,count){
  const spacing=Math.abs(z2-z1)/(count+1);
  for(let i=0;i<count;i++){
    const hz=z1-spacing*(i+1);
    const grp=new THREE.Group();
    const handle=new THREE.Mesh(new THREE.CylinderGeometry(0.13,0.13,4,8),
      new THREE.MeshStandardMaterial({color:0x334455,roughness:0.4,metalness:0.7}));
    grp.add(handle);
    const head=new THREE.Mesh(new THREE.BoxGeometry(3.4,0.75,0.85),
      new THREE.MeshStandardMaterial({color:0x223344,roughness:0.15,metalness:0.95,emissive:0xff2200,emissiveIntensity:0.28}));
    head.position.y=-2.15; grp.add(head);
    const gs=new THREE.Mesh(new THREE.BoxGeometry(3.5,0.12,0.9),new THREE.MeshBasicMaterial({color:0xff4400}));
    gs.position.y=-2.52; grp.add(gs);
    grp.position.set(x,y+4,hz); scene.add(grp); trackMeshes.push(grp);
    hammers.push({grp,pivY:y+4,hz,x,phase:i*(Math.PI*2/count),speed:(0.8+Math.random()*0.4)*(i%2===0?1:-1)});
  }
}

function buildBumpers(x,y,z1,z2,count){
  const spacing=Math.abs(z2-z1)/(count+1);
  for(let i=0;i<count;i++){
    const bz=z1-spacing*(i+1);
    const bx=x+(i%2===0?1.4:-1.4);
    const cyl=new THREE.Mesh(new THREE.CylinderGeometry(0.65,0.65,1.4,12),
      new THREE.MeshStandardMaterial({color:0x223355,roughness:0.2,metalness:0.9,emissive:0x003399,emissiveIntensity:0.55}));
    cyl.position.set(bx,y+0.7,bz); cyl.castShadow=true; addMesh(cyl);
    const ring=new THREE.Mesh(new THREE.TorusGeometry(0.78,0.08,8,16),new THREE.MeshBasicMaterial({color:0x0066ff}));
    ring.position.set(bx,y+1.15,bz); ring.rotation.x=Math.PI/2; addMesh(ring);
    bumperObjs.push({x:bx,y:y+0.7,z:bz,r:0.75});
  }
}

function buildFinish(x,y,z){
  FINISH_POS.set(x,y,z);
  makeBox(x,y-0.2,z-2, TW+2,0.4,8, 0x111133,0x001133);
  const am=new THREE.MeshBasicMaterial({color:0xffff00});
  for(const ax of [TW_HALF+0.5,-TW_HALF-0.5]){
    const p=new THREE.Mesh(new THREE.BoxGeometry(0.3,5,0.3),am);
    p.position.set(x+ax,y+2.5,z); addMesh(p);
  }
  const top=new THREE.Mesh(new THREE.BoxGeometry(TW+2,0.3,0.3),am);
  top.position.set(x,y+5,z); addMesh(top);
  for(let i=0;i<9;i++){
    const sq=new THREE.Mesh(new THREE.BoxGeometry(0.55,0.55,0.1),
      new THREE.MeshBasicMaterial({color:i%2===0?0xffffff:0x111111}));
    sq.position.set(x-2.2+i*0.55,y+5.3,z); addMesh(sq);
  }
  makeGlow(x,y+0.04,z-2, TW+2,0.08,8, 0xffff00);
  // Path nodes at finish
  for(let dz=2;dz>=-6;dz-=2)
    pathNodes.push({pos:new THREE.Vector3(x,y,z+dz), dir:new THREE.Vector3(0,0,-1), floorY:y, halfW:TW_HALF+0.8});
}

// ── COURSE GENERATOR ─────────────────────────────────
function parseDur(str){
  if(!str||!str.trim()) return null;
  const s=str.trim().toLowerCase();
  const m=s.match(/^(\d+(?:\.\d+)?)\s*(m|min|s|sec)?$/);
  if(!m) return null;
  const n=parseFloat(m[1]),u=m[2]||'m';
  return u.startsWith('s')?n:n*60;
}

function buildBankedCurve(x1,y1,z1, x2,y2,z2, eL, eR){
  const steps = 8;
  let prevX=x1, prevY=y1, prevZ=z1;
  for(let i=1;i<=steps;i++){
    const t=i/steps;
    const et=t<0.5?2*t*t:1-Math.pow(-2*t+2,2)/2;
    const nx=x1+(x2-x1)*et;
    const ny=y1+(y2-y1)*et;
    const nz=z1+(z2-z1)*et;
    const from=new THREE.Vector3(prevX,prevY,prevZ);
    const to=new THREE.Vector3(nx,ny,nz);
    const dir=new THREE.Vector3().subVectors(to,from).normalize();
    const segLen=from.distanceTo(to);
    if(segLen<0.01){prevX=nx;prevY=ny;prevZ=nz;continue;}
    // Dense path nodes
    const segSteps=Math.max(3,Math.ceil(segLen/1.5));
    for(let j=0;j<=segSteps;j++){
      const sp=from.clone().lerp(to,j/segSteps);
      pathNodes.push({pos:sp.clone(), dir:dir.clone(), floorY:sp.y, halfW:TW_HALF});
    }
    // Rotation angle - segment goes in XZ plane
    const ry=Math.atan2(dir.x,-dir.z);
    const mx=(prevX+nx)/2, my=(prevY+ny)/2, mz=(prevZ+nz)/2;
    const len=segLen+0.3; // slight overlap to close gaps
    // Floor plank - ROTATED to face direction
    const fm=new THREE.Mesh(new THREE.BoxGeometry(TW,0.4,len),
      new THREE.MeshStandardMaterial({color:0x111128,roughness:0.22,metalness:0.78,emissive:0x001122,emissiveIntensity:0.18}));
    fm.position.set(mx,my-0.2,mz); fm.rotation.y=ry;
    fm.castShadow=fm.receiveShadow=true; addMesh(fm);
    // Walls - offset in local right direction
    const right=new THREE.Vector3(Math.cos(ry),0,Math.sin(ry)); // local right
    for(const side of [-1,1]){
      const wx=mx+right.x*side*(TW_HALF+0.15);
      const wz=mz+right.z*side*(TW_HALF+0.15);
      const wm=new THREE.Mesh(new THREE.BoxGeometry(0.28,1.4,len),
        new THREE.MeshStandardMaterial({color:0x0a1020,roughness:0.22,metalness:0.78}));
      wm.position.set(wx,my+0.55,wz); wm.rotation.y=ry;
      wm.castShadow=wm.receiveShadow=true; addMesh(wm);
      const gm=new THREE.Mesh(new THREE.BoxGeometry(0.1,0.1,len),
        new THREE.MeshBasicMaterial({color:side>0?eL:eR}));
      gm.position.set(wx,my+1.3,wz); gm.rotation.y=ry; addMesh(gm);
    }
    prevX=nx; prevY=ny; prevZ=nz;
  }
}

function buildCourse(durSecs){
  clearCourse();
  let complexity=3;
  if(durSecs!==null){
    if(durSecs<=60) complexity=1;
    else if(durSecs<=120) complexity=2;
    else if(durSecs<=300) complexity=3;
    else if(durSecs<=420) complexity=4;
    else complexity=5;
  }
  // No timer = decent medium-long course
  const numSections = complexity+2; // 3-7 sections

  let x=0, y=0, z=6; // cursor

  // ── START PAD
  makeBox(x,y-0.2,z-4, TW+2,0.4,10, 0x111128,0x001122);
  makeGlow(x+TW_HALF+1,y+0.3,z-4, 0.12,0.6,10, 0x00f0ff);
  makeGlow(x-TW_HALF-1,y+0.3,z-4, 0.12,0.6,10, 0xff00cc);
  makeGlow(x-TW_HALF-0.5,y+1.5,z+1, 0.18,3.2,0.18, 0x00f0ff);
  makeGlow(x+TW_HALF+0.5,y+1.5,z+1, 0.18,3.2,0.18, 0x00f0ff);
  makeGlow(x,y+3.1,z+1, TW+1.2,0.18,0.18, 0x00f0ff);
  for(let dz=2;dz>=-8;dz-=2)
    pathNodes.push({pos:new THREE.Vector3(x,y,z+dz), dir:new THREE.Vector3(0,0,-1), floorY:y, halfW:TW_HALF+0.8});
  START_POS.set(x, y+BALL_R+0.5, z-2);
  z-=8;

  // ── SECTIONS
  // Randomly pick sections - mix of straights, banked curves, drops
  const sectionPool = ['straight','straight','drop','curve_bank','straight','drop','curve_bank','straight'];
  // Shuffle pool for this race
  for(let i=sectionPool.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [sectionPool[i],sectionPool[j]]=[sectionPool[j],sectionPool[i]];
  }
  const edgePalette=[[0x00f0ff,0xff00cc],[0xffff00,0xff8800],[0x00ff88,0x00aaff],[0xaa44ff,0xff4488]];

  for(let s=0;s<numSections;s++){
    const type=sectionPool[s%sectionPool.length];
    const [eL,eR]=edgePalette[s%edgePalette.length];

    if(type==='straight'){
      const len=22+Math.floor(Math.random()*18); // 22-40 units
      buildStraight(x,y,z,z-len,eL,eR);
      z-=len;

    } else if(type==='drop'){
      // Ramp drops down 6-12 units over 14-20 units forward
      const dropY=6+Math.floor(Math.random()*6);
      const dropLen=14+Math.floor(Math.random()*6);
      buildRamp(x,y,z, y-dropY, z-dropLen);
      z-=dropLen; y-=dropY;
      // Short flat after drop
      buildStraight(x,y,z,z-12,eL,eR);
      z-=12;

    } else if(type==='curve_bank'){
      // Banked curve: slight X shift + drop, with banked path nodes
      const shift=(Math.random()<0.5?1:-1)*(8+Math.floor(Math.random()*8));
      const dropY=2+Math.floor(Math.random()*4);
      const len=20+Math.floor(Math.random()*12);
      buildBankedCurve(x,y,z, x+shift, y-dropY, z-len, eL, eR);
      x+=shift; y-=dropY; z-=len;
    }
  }

  // ── FINAL SPRINT
  const zFinal=z-22;
  buildStraight(x,y,z,zFinal, 0x00ff88,0x00ff88);
  buildBoostPad(x,y,z-8);
  z=zFinal;

  // ── FINISH
  buildFinish(x,y,z+2);

  // Background grid
  const grid=new THREE.GridHelper(500,100,0x00f0ff08,0x00f0ff05);
  grid.position.set(0,y-12,z/2); addMesh(grid);

  console.log('Course built: complexity='+complexity+', nodes='+pathNodes.length+', finish='+FINISH_POS.z.toFixed(0));
}

// ── ZORBS ─────────────────────────────────────────────
const zorbs=[];
let phase='lobby';

function createZorb(name,isSub,col){
  const mat=new THREE.MeshStandardMaterial({color:col,roughness:0.07,metalness:0.92,emissive:col,emissiveIntensity:isSub?0.42:0.18});
  const mesh=new THREE.Mesh(new THREE.SphereGeometry(BALL_R,24,24),mat);
  mesh.castShadow=true;
  // Glow shell
  mesh.add(new THREE.Mesh(new THREE.SphereGeometry(BALL_R*1.1,12,12),
    new THREE.MeshBasicMaterial({color:col,transparent:true,opacity:0.09,side:THREE.BackSide})));
  // Flat ring (horizontal)
  const ring=new THREE.Mesh(new THREE.TorusGeometry(BALL_R*1.38,0.052,6,28),
    new THREE.MeshBasicMaterial({color:col,transparent:true,opacity:0.55}));
  // rotation.x=0 = ring lies in XZ plane = horizontal = Saturn style
  mesh.add(ring);
  mesh.add(new THREE.PointLight(col,isSub?1.6:0.9,8));
  scene.add(mesh);

  // Trail
  const tGeo=new THREE.BufferGeometry();
  tGeo.setAttribute('position',new THREE.Float32BufferAttribute(new Float32Array(38*3),3));
  const tLine=new THREE.Line(tGeo,new THREE.LineBasicMaterial({color:col,transparent:true,opacity:0.4}));
  scene.add(tLine);

  // Streaks
  const streaks=[];
  for(let i=0;i<8;i++){
    const sg2=new THREE.BufferGeometry();
    sg2.setAttribute('position',new THREE.Float32BufferAttribute(new Float32Array(6),3));
    scene.add(new THREE.Line(sg2,new THREE.LineBasicMaterial({color:col,transparent:true,opacity:0})));
    streaks.push(scene.children[scene.children.length-1]);
  }

  // Spawn exactly on start pad
  const sx=START_POS.x+(Math.random()-0.5)*(TW-1.5);
  const sz=START_POS.z+(Math.random()-0.5)*2;

  return {
    name,isSub,color:col,mesh,ring,tLine,streaks,
    trailHistory:[],
    pos:new THREE.Vector3(sx, START_POS.y, sz),
    vel:new THREE.Vector3(0,0,0),
    speedMult: 0.88 + Math.random()*0.24, // 0.88-1.12 random speed multiplier
    boost:0,
    onTrack:false,
    finished:false,finishTime:0,rank:0,
    knockFlash:0,
    ringBob:Math.random()*Math.PI*2,
    // Path following
    pathT:0,   // progress along path (index into pathNodes)
    offTrack:false
  };
}

function removeZorb(z){
  scene.remove(z.mesh); scene.remove(z.tLine); z.streaks.forEach(s=>scene.remove(s));
}

// ── PHYSICS ───────────────────────────────────────────
function stepPhysics(z,dt){
  if(z.finished) return;

  // Gravity always - ramps need it to pull ball down along slope
  z.vel.y+=GRAV*dt;

  // ── Boost
  if(z.boost>0){
    const {node}=nearestNode(z.pos, z._lastNode);
    if(node){
      z.vel.x+=node.dir.x*22*dt;
      z.vel.z+=node.dir.z*22*dt;
    }
    z.boost=Math.max(0,z.boost-dt*1.8);
  }

  // ── Clamp speed
  const hSpd=Math.sqrt(z.vel.x*z.vel.x+z.vel.z*z.vel.z);
  if(hSpd>28){ const s=28/hSpd; z.vel.x*=s; z.vel.z*=s; }
  if(Math.abs(z.vel.y)>25) z.vel.y=Math.sign(z.vel.y)*25;

  // ── Integrate position
  z.pos.x+=z.vel.x*dt;
  z.pos.y+=z.vel.y*dt;
  z.pos.z+=z.vel.z*dt;

  // Find nearest path node (forward-biased with hint)
  const {node,dist}=nearestNode(z.pos, z._lastNode);
  z._lastNode=node;

  if(node){
    const floorY=node.floorY+BALL_R;
    const hw=node.halfW-BALL_R-0.1;

    // Floor collision - with small bounce for ramps
    if(z.pos.y<=floorY){
      z.pos.y=floorY;
      if(z.vel.y<-0.5) z.vel.y=-z.vel.y*BOUNCE*0.4; // tiny bounce
      else z.vel.y=0;
      z.onTrack=true;
      // Light friction
      z.vel.x*=Math.pow(0.995,dt*60);
      z.vel.z*=Math.pow(0.995,dt*60);
    } else {
      z.onTrack=false;
    }

    // Wall constraint - ONLY push, never kill forward momentum
    const right=new THREE.Vector3(-node.dir.z,0,node.dir.x).normalize();
    const toPos=new THREE.Vector3().subVectors(z.pos,node.pos);
    const lateral=toPos.dot(right);

    if(Math.abs(lateral)>hw){
      const excess=Math.abs(lateral)-hw;
      const pushDir=Math.sign(lateral);
      // Push ball back to wall boundary
      z.pos.x-=right.x*pushDir*excess;
      z.pos.z-=right.z*pushDir*excess;
      // Kill ONLY the outward lateral velocity - keep forward speed
      const vLat=z.vel.x*right.x+z.vel.z*right.z;
      if(Math.sign(vLat)===pushDir){
        z.vel.x-=vLat*right.x*1.1;
        z.vel.z-=vLat*right.z*1.1;
      }
    }

    // Forward push - constant slope force
    if(phase==='racing'){
      const sf=z.speedMult||1;
      const fwdSpeed=z.vel.x*node.dir.x+z.vel.z*node.dir.z;
      // Always-on gentle push like gravity on a slope
      z.vel.x+=node.dir.x*5*sf*dt;
      z.vel.z+=node.dir.z*5*sf*dt;
      // Hard kick if nearly stopped
      if(fwdSpeed<MIN_FWD){
        z.vel.x+=node.dir.x*(MIN_FWD-fwdSpeed)*15*dt;
        z.vel.z+=node.dir.z*(MIN_FWD-fwdSpeed)*15*dt;
      }
    }

    // Safety net - fell through
    if(z.pos.y<node.floorY-15){
      z.pos.set(node.pos.x,node.floorY+BALL_R+0.5,node.pos.z);
      z.vel.set(node.dir.x*3,0,node.dir.z*3);
      showKO('FELL: '+z.name,0xff4444);
    }
  }

  // ── Boost pads

  // ── Bumpers

  // ── Finish
  if(!z.finished){
    const toFinish=new THREE.Vector3().subVectors(FINISH_POS,z.pos);
    toFinish.y=0;
    if(toFinish.length()<3){
      z.finished=true; z.finishTime=performance.now();
      const rank=zorbs.filter(r=>r.finished).length; z.rank=rank;
      if(rank===1){showBanner('WINNER: '+z.name,4500);setTimeout(resetRace,5500);}
      showKO('FINISH #'+rank+': '+z.name,0xffff00);
    }
  }

  // ── Mesh update
  z.mesh.position.copy(z.pos);
  const spd2d=Math.sqrt(z.vel.x*z.vel.x+z.vel.z*z.vel.z);
  z.mesh.rotation.x-=z.vel.z/BALL_R*dt;
  z.mesh.rotation.z+=z.vel.x/BALL_R*dt;
  z.knockFlash=Math.max(0,z.knockFlash-dt);
  z.mesh.material.emissiveIntensity=z.knockFlash>0?1.2:z.isSub?0.38:0.18;
  // Ring bob
  z.ringBob+=dt*2;
  z.ring.rotation.x=Math.sin(z.ringBob)*0.12;
}

function ballCollide(){
  for(let i=0;i<zorbs.length;i++){
    for(let j=i+1;j<zorbs.length;j++){
      const a=zorbs[i],b=zorbs[j];
      if(a.finished||b.finished) continue;
      const d=new THREE.Vector3().subVectors(a.pos,b.pos);
      const dist=d.length(),minD=BALL_R*2+0.02;
      if(dist<minD&&dist>0.001){
        d.normalize();
        const rv=new THREE.Vector3().subVectors(a.vel,b.vel);
        const dot=rv.dot(d);
        if(dot<0){
          // Very soft - just separate, minimal impulse
          const imp=d.clone().multiplyScalar(dot*0.15);
          a.vel.sub(imp); b.vel.add(imp);
        }
        const ov=(minD-dist)*0.5+0.01;
        a.pos.addScaledVector(d,ov); b.pos.addScaledVector(d,-ov);
      }
    }
  }
}

function updateHammers(dt){
  hammers.forEach(h=>{
    h.phase+=h.speed*dt;
    h.grp.rotation.z=Math.sin(h.phase)*1.1;
    const swing=Math.sin(h.phase);
    const tipX=h.x+swing*2.1;
    const tipY=h.pivY-Math.cos(h.phase)*2.1;
    zorbs.forEach(z=>{
      if(z.finished) return;
      const dx=z.pos.x-tipX,dy=z.pos.y-tipY,dz=z.pos.z-h.hz;
      if(Math.sqrt(dx*dx+dy*dy+dz*dz)<BALL_R+0.9){
        // Gentle sideways nudge only
        z.vel.x+=(dx>0?1:-1)*2.0;
        z.vel.y+=1.2;
        // Keep moving forward - just slow slightly
        const {node}=nearestNode(z.pos);
        if(node){
          const fwdV=z.vel.x*node.dir.x+z.vel.z*node.dir.z;
          if(fwdV>0){z.vel.x-=node.dir.x*fwdV*0.3;z.vel.z-=node.dir.z*fwdV*0.3;}
        }
        z.knockFlash=0.3;
        showKO('SMASHED: '+z.name,0xff4400);
      }
    });
  });
}

// ── VISUALS ───────────────────────────────────────────
function updateVisuals(z,frame){
  if(z.finished) return;
  const spd=Math.sqrt(z.vel.x*z.vel.x+z.vel.z*z.vel.z),ns=Math.min(spd/18,1);
  z.trailHistory.push(z.pos.clone());
  if(z.trailHistory.length>36) z.trailHistory.shift();
  if(z.trailHistory.length>1){
    const arr=new Float32Array(z.trailHistory.length*3);
    z.trailHistory.forEach((p,i)=>{arr[i*3]=p.x;arr[i*3+1]=p.y;arr[i*3+2]=p.z;});
    z.tLine.geometry.setAttribute('position',new THREE.Float32BufferAttribute(arr,3));
    z.tLine.material.opacity=0.15+ns*0.5;
  }
  z.streaks.forEach((s,i)=>{
    const a=(i/z.streaks.length)*Math.PI*2;
    const ox=Math.cos(a)*BALL_R*1.3,oy=Math.sin(a)*BALL_R*1.3;
    const len=ns*2.2,vn=z.vel.length()>0.1?z.vel.clone().normalize():new THREE.Vector3(0,0,-1);
    const pa=s.geometry.attributes.position.array;
    pa[0]=z.pos.x+ox;pa[1]=z.pos.y+oy;pa[2]=z.pos.z;
    pa[3]=z.pos.x+ox-vn.x*len;pa[4]=z.pos.y+oy-vn.y*len;pa[5]=z.pos.z-vn.z*len;
    s.geometry.attributes.position.needsUpdate=true;
    s.material.opacity=ns*0.5;
  });
}

// ── CAMERA ────────────────────────────────────────────
let camMode='follow',camPos=new THREE.Vector3(0,8,12),camLook=new THREE.Vector3(0,0,0);
let autoTimer=0,autoIdx=0;
const autoModes=['follow','wide','top'];

function setCam(m){
  camMode=m;
  document.querySelectorAll('.cb').forEach(b=>b.classList.remove('active'));
  const el=document.getElementById('btn-'+m); if(el)el.classList.add('active');
}

function updateCamera(dt){
  const sm=Math.min(dt*5,0.15);
  const leader=zorbs.filter(z=>!z.finished).sort((a,b)=>a.pos.distanceTo(FINISH_POS)-b.pos.distanceTo(FINISH_POS))[0]||zorbs[0];
  if(!leader)return;
  const lp=leader.pos;
  let mode=camMode;
  if(mode==='auto'){autoTimer+=dt;if(autoTimer>7){autoTimer=0;autoIdx=(autoIdx+1)%autoModes.length;}mode=autoModes[autoIdx];}
  if(mode==='follow'){
    const spd=Math.sqrt(leader.vel.x*leader.vel.x+leader.vel.z*leader.vel.z);
    const {node}=nearestNode(lp);
    const back=node?node.dir.clone().negate():new THREE.Vector3(0,0,1);
    const cp=lp.clone().add(back.multiplyScalar(4+spd*0.1)).add(new THREE.Vector3(0,3,0));
    camPos.lerp(cp,sm*2); camLook.lerp(lp,sm*3);
  } else if(mode==='wide'){
    const avg=new THREE.Vector3(); zorbs.forEach(z=>avg.add(z.pos)); if(zorbs.length>0)avg.divideScalar(zorbs.length);
    camPos.lerp(new THREE.Vector3(avg.x+10,avg.y+28,avg.z+25),sm*0.4); camLook.lerp(avg,sm);
  } else if(mode==='top'){
    camPos.lerp(new THREE.Vector3(lp.x,lp.y+26,lp.z+5),sm); camLook.lerp(lp,sm*2);
  }
  camera.position.copy(camPos); camera.lookAt(camLook);
}

// ── MINIMAP ───────────────────────────────────────────
const mmc=document.getElementById('mmc'),mmctx=mmc.getContext('2d');
function drawMinimap(){
  mmctx.clearRect(0,0,110,110); mmctx.fillStyle='rgba(0,0,0,0.5)'; mmctx.fillRect(0,0,110,110);
  if(!zorbs.length||!pathNodes.length) return;
  // Draw path
  const allX=pathNodes.map(n=>n.pos.x),allZ=pathNodes.map(n=>n.pos.z);
  const minX=Math.min(...allX),maxX=Math.max(...allX);
  const minZ=Math.min(...allZ),maxZ=Math.max(...allZ);
  const spanX=maxX-minX||1,spanZ=maxZ-minZ||1;
  const sc=Math.min(90/spanX,90/spanZ);
  const ox=55-(minX+maxX)/2*sc, oz=55-(minZ+maxZ)/2*sc;
  mmctx.strokeStyle='rgba(0,240,255,0.25)';mmctx.lineWidth=1.5;mmctx.beginPath();
  pathNodes.forEach((n,i)=>{
    const mx=ox+n.pos.x*sc,my=oz+n.pos.z*sc;
    i===0?mmctx.moveTo(mx,my):mmctx.lineTo(mx,my);
  });
  mmctx.stroke();
  // Finish
  const fx=ox+FINISH_POS.x*sc,fz=oz+FINISH_POS.z*sc;
  mmctx.strokeStyle='rgba(255,255,0,0.7)';mmctx.lineWidth=2;
  mmctx.beginPath();mmctx.moveTo(fx-5,fz);mmctx.lineTo(fx+5,fz);mmctx.stroke();
  // Zorbs
  zorbs.forEach(z=>{
    const mx=ox+z.pos.x*sc,my=oz+z.pos.z*sc;
    const hex='#'+z.color.toString(16).padStart(6,'0');
    mmctx.fillStyle=hex;mmctx.shadowColor=hex;mmctx.shadowBlur=5;
    mmctx.beginPath();mmctx.arc(Math.max(5,Math.min(105,mx)),Math.max(5,Math.min(105,my)),3.5,0,Math.PI*2);
    mmctx.fill();mmctx.shadowBlur=0;
  });
}

// ── LEADERBOARD ───────────────────────────────────────
function updateLB(){
  const sorted=[...zorbs].sort((a,b)=>a.pos.distanceTo(FINISH_POS)-b.pos.distanceTo(FINISH_POS));
  const rows=document.getElementById('lbr');rows.innerHTML='';
  sorted.slice(0,7).forEach((z,i)=>{
    const d=document.createElement('div');d.className='lr';
    const dist=Math.round(z.pos.distanceTo(FINISH_POS));
    d.innerHTML='<span class="lp '+(i===0?'g':'')+'">'+( i+1)+'</span><span class="ln '+(z.isSub?'sub':'')+'" title="'+z.name+'">'+z.name+'</span><span class="ld">'+(z.finished?'FIN':dist+'m')+'</span>';
    rows.appendChild(d);
  });
}

// ── CHAT/UI ───────────────────────────────────────────
const chatLog=document.getElementById('cl');
function addChat(name,cmd,isSub){
  const d=document.createElement('div');d.className='cm';
  d.innerHTML='<span class="u '+(isSub?'s':'r')+'">'+name+'</span> <span class="c">'+cmd+'</span>';
  chatLog.appendChild(d);
  while(chatLog.children.length>9)chatLog.removeChild(chatLog.firstChild);
}
function showKO(msg,color){
  const feed=document.getElementById('kfeed');
  const el=document.createElement('div');el.className='kf';
  el.style.color='#'+color.toString(16).padStart(6,'0');el.textContent=msg;
  feed.appendChild(el); setTimeout(()=>{if(el.parentNode)feed.removeChild(el);},2600);
  while(feed.children.length>4)feed.removeChild(feed.firstChild);
}
function showBanner(txt,dur){
  const el=document.getElementById('banner');el.textContent=txt;el.style.opacity='1';
  setTimeout(()=>el.style.opacity='0',dur);
}
function hidePanel(){document.getElementById('sp').style.display='none';document.getElementById('btn-show').style.display='block';}
function showPanel(){document.getElementById('sp').style.display='flex';document.getElementById('btn-show').style.display='none';}

// ── RACE STATE ────────────────────────────────────────
let raceDurSecs=null,raceStartTime=null;

function updateTimer(){
  if(phase!=='racing'||raceDurSecs===null||raceStartTime===null)return;
  const left=Math.max(0,raceDurSecs-(performance.now()-raceStartTime)/1000);
  const el=document.getElementById('timer-display');
  el.textContent=Math.floor(left/60)+':'+(Math.floor(left%60)<10?'0':'')+Math.floor(left%60);
  if(left<30)el.classList.add('urgent');
  if(left<=0){showBanner('TIME UP!',3000);setTimeout(resetRace,3500);}
}

function handleCmd(name,cmd,isSub){
  addChat(name,cmd,isSub);
  const raw=cmd.trim().toLowerCase();
  if(raw==='!play'){
    if(zorbs.find(z=>z.name===name)||phase!=='lobby')return;
    const c=ZCOLORS[zorbs.length%ZCOLORS.length];
    zorbs.push(createZorb(name,isSub,c));
    document.getElementById('cnt').textContent=zorbs.length+' racers';
  }
  if(raw==='!boost'){
    const z=zorbs.find(z=>z.name===name);
    if(z&&phase==='racing'){
      z.boost=isSub?1.5:0.8; // subs get longer boost
      showKO((isSub?'SUPER':'') + 'BOOST: '+z.name, isSub?0xff00cc:0x00f0ff);
    }
  }
}

function streamerStart(){
  if(phase!=='lobby')return;
  raceDurSecs=parseDur(document.getElementById('dur').value);
  buildCourse(raceDurSecs);
  // Respawn all zorbs on new track
  zorbs.forEach(z=>{
    z.pos.set(START_POS.x+(Math.random()-0.5)*(TW-1.5), START_POS.y, START_POS.z+(Math.random()-0.5)*2);
    z.vel.set(0,0,0); z.trailHistory=[];
  });
  if(raceDurSecs!==null){
    document.getElementById('tpill').style.display='flex';
    const el=document.getElementById('timer-display');el.textContent='--:--';el.classList.remove('urgent');
  } else document.getElementById('tpill').style.display='none';
  document.getElementById('btn-go').disabled=true;
  phase='countdown'; document.getElementById('stxt').textContent='STARTING';
  showBanner('3',900);
  setTimeout(()=>showBanner('2',900),1000);
  setTimeout(()=>showBanner('1',900),2000);
  setTimeout(()=>{
    showBanner('GO!',800); phase='racing';
    document.getElementById('stxt').textContent='RACING';
    raceStartTime=performance.now();
    zorbs.forEach(z=>{
      // Give initial push in path direction
      const {node}=nearestNode(z.pos);
      const dir=node?node.dir:new THREE.Vector3(0,0,-1);
      z.vel.set(dir.x*(1.5+Math.random()*0.5),0,dir.z*(1.5+Math.random()*0.5));
    });
  },3000);
}

function resetRace(){
  zorbs.forEach(z=>removeZorb(z)); zorbs.length=0;
  phase='lobby'; raceStartTime=null; raceDurSecs=null;
  document.getElementById('cnt').textContent='0 racers';
  document.getElementById('stxt').textContent='LOBBY';
  document.getElementById('tpill').style.display='none';
  document.getElementById('btn-go').disabled=false;
  document.getElementById('dur').value='';
  showBanner('NEW RACE - TYPE !play',2500);
  setTimeout(startMock,2500);
}

// ── MOCK CHAT ─────────────────────────────────────────
const MOCK=[
  {name:'StreamKing',sub:true},{name:'NeonRacer',sub:false},
  {name:'CyberZorb',sub:true},{name:'VoidRunner',sub:false},
  {name:'NightFox',sub:false},{name:'GlitchQueen',sub:true},
  {name:'DataSurge',sub:false},{name:'PixelBolt',sub:true},
];
let mockI=0;
function startMock(){mockI=0;setTimeout(nextMock,1200);}
function nextMock(){
  if(mockI>=MOCK.length)return;
  handleCmd(MOCK[mockI].name,'!play',MOCK[mockI].sub); mockI++;
  if(mockI<MOCK.length)setTimeout(nextMock,700+Math.random()*900);
  else setTimeout(()=>{document.getElementById('dur').value='';streamerStart();},2000);
}
setInterval(()=>{
  if(phase==='racing'&&zorbs.length>0)
    handleCmd(zorbs[Math.floor(Math.random()*zorbs.length)].name,'!boost',Math.random()>0.5);
},4500);

document.addEventListener('keydown',e=>{
  const ms=['follow','wide','top','auto'];
  if(e.key==='ArrowLeft'){const i=ms.indexOf(camMode);setCam(ms[(i-1+4)%4]);}
  if(e.key==='ArrowRight'){const i=ms.indexOf(camMode);setCam(ms[(i+1)%4]);}
  if(e.key===' '){if(zorbs.length>0)zorbs[0].boost=1.8;e.preventDefault();}
  if(e.key==='f'||e.key==='F')setCam('follow');
});
document.getElementById('cg').onclick=()=>{
  const v=document.getElementById('ci').value.trim();if(!v)return;
  handleCmd('You',v,false);document.getElementById('ci').value='';
};
document.getElementById('ci').addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('cg').click();});

// ── MAIN LOOP ─────────────────────────────────────────
buildCourse(null);
startMock();

let lastT=0,frame=0;
function loop(ts){
  requestAnimationFrame(loop);
  const dt=Math.min((ts-lastT)/1000,0.05);lastT=ts;frame++;
  if(phase==='racing'){
    updateTimer();
    const SUB=3;
    for(let s=0;s<SUB;s++){zorbs.forEach(z=>stepPhysics(z,dt/SUB));ballCollide();}
  }
  zorbs.forEach(z=>updateVisuals(z,frame));
  updateCamera(dt);
  pCyan.intensity=1.2+Math.sin(frame*0.033)*0.38;
  pCyan.position.set(Math.sin(frame*0.011)*30,8,FINISH_POS.z*0.5);
  // Random gust every ~15s
  if(frame%900===450 && phase==="racing" && zorbs.length>0){
    const nhits=Math.ceil(zorbs.length*0.4);
    for(let hi=0;hi<nhits;hi++){
      const gz=zorbs[Math.floor(Math.random()*zorbs.length)];
      if(!gz.finished){gz.vel.x+=(Math.random()-0.5)*6;gz.vel.z+=(Math.random()-0.5)*3;showKO("GUST: "+gz.name,0xaaaaff);}
    }
  }
  if(frame%18===0){updateLB();drawMinimap();}
  renderer.render(scene,camera);
}
requestAnimationFrame(t=>{lastT=t;loop(t);});
</script>
