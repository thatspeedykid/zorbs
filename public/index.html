<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ZORBS on Stream</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;background:#000;overflow:hidden;}
#app{width:100%;height:100vh;position:relative;}
#c{display:block;width:100%;height:100%;}
#ui{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;font-family:'Courier New',monospace;}
#topbar{position:absolute;top:0;left:0;right:0;display:flex;align-items:center;justify-content:space-between;padding:10px 16px;background:linear-gradient(180deg,rgba(0,0,0,0.9)0%,transparent);}
#logo{font-size:18px;font-weight:900;letter-spacing:4px;color:#00f0ff;text-shadow:0 0 18px #00f0ff;}
#logo span{color:#ff00cc;}
#cams{display:flex;gap:5px;pointer-events:auto;}
.cb{background:rgba(0,240,255,0.07);border:1px solid rgba(0,240,255,0.28);color:#00f0ff;padding:4px 10px;border-radius:4px;font-size:10px;cursor:pointer;letter-spacing:2px;font-family:'Courier New',monospace;}
.cb.active{background:rgba(0,240,255,0.2);border-color:#00f0ff;}
#info{position:absolute;top:50px;left:12px;display:flex;flex-direction:column;gap:5px;}
.pill{background:rgba(0,0,0,0.75);border:1px solid rgba(255,255,255,0.09);border-radius:20px;padding:4px 12px;font-size:10px;color:#fff;display:flex;align-items:center;gap:6px;letter-spacing:1px;}
.dot{width:5px;height:5px;border-radius:50%;}.dg{background:#00ff88;box-shadow:0 0 6px #00ff88;animation:blink 1.5s infinite;}.dp{background:#ff00cc;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:.3;}}
#timer-display{font-size:13px;font-weight:700;color:#fff;}
.urgent{color:#ff4444!important;}
#lb{position:absolute;top:50px;right:12px;background:rgba(0,0,0,0.8);border:1px solid rgba(0,240,255,0.14);border-radius:10px;padding:10px 14px;min-width:168px;}
#lb h3{font-size:9px;letter-spacing:3px;color:rgba(0,240,255,0.38);margin-bottom:8px;}
.lr{display:flex;align-items:center;gap:6px;margin-bottom:4px;font-size:11px;}
.lp{color:rgba(255,255,255,.22);width:14px;font-size:10px;}.lp.g{color:#ffd700;}
.ln{flex:1;color:#ddd;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:85px;}.ln.sub{color:#ff00cc;}
.ld{font-size:9px;color:rgba(255,255,255,.28);}
#sp{position:absolute;top:50px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.85);border:1px solid rgba(0,240,255,0.18);border-radius:10px;padding:12px 16px;pointer-events:auto;display:flex;flex-direction:column;gap:8px;min-width:240px;}
#sp h3{font-size:9px;letter-spacing:3px;color:rgba(0,240,255,0.4);text-align:center;}
#sp-row{display:flex;gap:6px;align-items:center;}
#sp-lbl{font-size:10px;color:rgba(255,255,255,0.5);white-space:nowrap;}
#dur{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.15);border-radius:4px;padding:4px 8px;color:#fff;font-size:11px;font-family:'Courier New',monospace;width:65px;outline:none;text-align:center;}
#sp-hint{font-size:9px;color:rgba(255,255,255,0.25);}
#btn-go{background:rgba(0,240,255,0.12);border:1px solid rgba(0,240,255,0.35);color:#00f0ff;border-radius:5px;padding:6px 14px;font-size:11px;letter-spacing:2px;cursor:pointer;font-family:'Courier New',monospace;flex:1;}
#btn-go:disabled{opacity:0.3;cursor:not-allowed;}
#btn-hide{font-size:9px;color:rgba(255,255,255,0.25);cursor:pointer;text-align:center;}
#btn-show{position:absolute;top:50px;left:50%;transform:translateX(-50%);font-size:9px;color:rgba(0,240,255,0.4);cursor:pointer;background:rgba(0,0,0,0.6);border:1px solid rgba(0,240,255,0.15);border-radius:4px;padding:3px 10px;display:none;pointer-events:auto;}
#chat{position:absolute;bottom:12px;left:12px;width:185px;background:rgba(0,0,0,0.78);border:1px solid rgba(255,255,255,0.07);border-radius:10px;padding:9px;pointer-events:auto;}
#ct{font-size:9px;letter-spacing:2px;color:rgba(255,255,255,.22);margin-bottom:5px;}
#cl{height:85px;overflow:hidden;display:flex;flex-direction:column;justify-content:flex-end;gap:2px;}
.cm{font-size:10px;line-height:1.4;animation:fi .2s ease;}
.cm .u{font-weight:700;}.cm .u.s{color:#ff00cc;}.cm .u.r{color:#00f0ff;}
.cm .c{color:rgba(255,255,255,.38);}
@keyframes fi{from{opacity:0;transform:translateY(3px);}to{opacity:1;}}
#cr{display:flex;gap:4px;margin-top:5px;}
#ci{flex:1;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.11);border-radius:4px;padding:3px 6px;color:#fff;font-size:10px;font-family:'Courier New',monospace;outline:none;}
#cg{background:rgba(0,240,255,0.1);border:1px solid rgba(0,240,255,0.28);color:#00f0ff;border-radius:4px;padding:3px 8px;font-size:11px;cursor:pointer;}
#mm{position:absolute;bottom:12px;right:12px;width:110px;height:110px;border-radius:50%;overflow:hidden;border:1px solid rgba(0,240,255,0.18);background:rgba(0,0,0,0.7);}
#mmc{width:110px;height:110px;}
#banner{position:absolute;top:45%;left:50%;transform:translate(-50%,-50%);font-size:34px;font-weight:900;letter-spacing:6px;color:#fff;text-shadow:0 0 30px #00f0ff;opacity:0;pointer-events:none;transition:opacity .3s;text-align:center;white-space:nowrap;}
#kfeed{position:absolute;top:56px;left:50%;transform:translateX(-50%);display:flex;flex-direction:column;align-items:center;gap:3px;pointer-events:none;}
.kf{font-size:11px;letter-spacing:1px;animation:kfa 2.5s forwards;}
@keyframes kfa{0%{opacity:1;transform:translateY(0);}100%{opacity:0;transform:translateY(-16px);}}
#hint{position:absolute;bottom:12px;left:50%;transform:translateX(-50%);font-size:9px;color:rgba(255,255,255,.16);pointer-events:none;white-space:nowrap;}
</style>
</head>
<body>
<div id="app">
<canvas id="c"></canvas>
<div id="ui">
  <div id="topbar">
    <div id="logo">ZORBS <span>on</span> Stream</div>
    <div id="cams">
      <button class="cb active" id="btn-follow" onclick="setCam('follow')">FOLLOW</button>
      <button class="cb" id="btn-wide" onclick="setCam('wide')">WIDE</button>
      <button class="cb" id="btn-chase" onclick="setCam('chase')">CHASE</button>
      <button class="cb" id="btn-auto" onclick="setCam('auto')">AUTO</button>
    </div>
  </div>
  <div id="info">
    <div class="pill"><div class="dot dg"></div><span>LIVE</span></div>
    <div class="pill"><div class="dot dp"></div><span id="cnt">0 racers</span></div>
    <div class="pill"><span id="stxt">LOBBY</span></div>
    <div class="pill" id="tpill" style="display:none"><span id="timer-display">--:--</span></div>
  </div>
  <div id="sp">
    <h3>STREAMER CONTROLS</h3>
    <div id="sp-row">
      <span id="sp-lbl">TIMER</span>
      <input id="dur" type="text" placeholder="e.g. 3m" maxlength="5"/>
      <span id="sp-hint">optional</span>
    </div>
    <button id="btn-go" onclick="streamerStart()">START RACE</button>
    <div id="btn-hide" onclick="hidePanel()">hide panel</div>
  </div>
  <div id="btn-show" onclick="showPanel()">CONTROLS</div>
  <div id="lb"><h3>LEADERBOARD</h3><div id="lbr"></div></div>
  <div id="chat"><div id="ct">LIVE CHAT</div><div id="cl"></div>
    <div id="cr"><input id="ci" placeholder="!play or !boost" maxlength="20"/><button id="cg">go</button></div>
  </div>
  <div id="mm"><canvas id="mmc" width="110" height="110"></canvas></div>
  <div id="banner"></div>
  <div id="kfeed"></div>
  <div id="hint">arrows=cam | space=boost | F=follow</div>
</div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ZORBS on Stream - Marble Run / Hot Wheels style
// Track is a TUBE the ball rolls THROUGH, gravity pulls it down and forward

const canvas = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({canvas, antialias:true});
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.shadowMap.enabled = true;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;

const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x05050f,0.012);
scene.background = new THREE.Color(0x05050f);
const camera = new THREE.PerspectiveCamera(70,1,0.1,600);
camera.position.set(0,8,20);

function resize(){
  const w=canvas.parentElement.offsetWidth,h=canvas.parentElement.offsetHeight||window.innerHeight;
  renderer.setSize(w,h,false);camera.aspect=w/h;camera.updateProjectionMatrix();
}
resize(); window.addEventListener('resize',resize);

// Lighting
scene.add(new THREE.AmbientLight(0x334466,5));
const sun=new THREE.DirectionalLight(0xaaccff,2);
sun.position.set(20,60,20);sun.castShadow=true;
sun.shadow.mapSize.set(1024,1024);
scene.add(sun);
const pinkFill=new THREE.DirectionalLight(0xff00cc,0.6);
pinkFill.position.set(-20,10,-20);scene.add(pinkFill);
const glow=new THREE.PointLight(0x00f0ff,2,80);scene.add(glow);

// Stars
const sv=[];
for(let i=0;i<2000;i++)sv.push((Math.random()-.5)*400,(Math.random()-.5)*400,(Math.random()-.5)*400);
const stGeo=new THREE.BufferGeometry();
stGeo.setAttribute('position',new THREE.Float32BufferAttribute(sv,3));
scene.add(new THREE.Points(stGeo,new THREE.PointsMaterial({color:0xffffff,size:0.3,transparent:true,opacity:0.7})));

// ── CONSTANTS ─────────────────────────────
const BALL_R = 0.45;
const ZCOLORS = [0x00f0ff,0xff00cc,0xaaff00,0xff8800,0xff4488,0xaa44ff,0x00ffaa,0xffff00,0x44aaff,0xff6644];

// ── SPLINE TRACK ──────────────────────────
// The track is a CatmullRom spline.
// We build a TUBE around it (open half-pipe style).
// Balls live inside - gravity pulls them along naturally.

let spline = null;
let splineLen = 0;
let trackMeshes = [];
let splinePts = [];   // sampled world positions along curve
let splineTans = [];  // tangents
let FINISH_IDX = 0;
let START_POS = new THREE.Vector3();

function clearTrack(){
  trackMeshes.forEach(m=>scene.remove(m));
  trackMeshes=[];
  splinePts=[];
  splineTans=[];
}
function tAdd(m){scene.add(m);trackMeshes.push(m);return m;}

function buildTrack(complexity){
  clearTrack();

  // ── Generate control points ────────────
  // Track starts high, flows DOWN and FORWARD through curves
  // Like a marble run - gravity does the work
  const cps = [];

  // Always start with a flat-ish launch section
  cps.push(new THREE.Vector3(0, 30, 0));
  cps.push(new THREE.Vector3(0, 28, -8));
  cps.push(new THREE.Vector3(0, 25, -18));

  let cx=0, cy=25, cz=-18;

  // How many sections
  const sections = 3 + complexity;

  for(let i=0;i<sections;i++){
    const roll = (i*7919+complexity*13)%100/100; // deterministic-ish variety
    const seg = i % 5;

    if(seg===0){
      // Long sweeping drop to the right
      cx += 15+roll*20; cy -= 8+roll*6; cz -= 25+roll*15;
      cps.push(new THREE.Vector3(cx-8,cy+4,cz+8));
      cps.push(new THREE.Vector3(cx,cy,cz));
    } else if(seg===1){
      // Sweeping left curve, slight drop
      cx -= 20+roll*15; cy -= 5+roll*4; cz -= 20+roll*20;
      cps.push(new THREE.Vector3(cx+10,cy+3,cz+10));
      cps.push(new THREE.Vector3(cx,cy,cz));
    } else if(seg===2){
      // Big drop straight down then forward
      cy -= 15+roll*10; cz -= 10;
      cps.push(new THREE.Vector3(cx+roll*6-3,cy+5,cz-5));
      cps.push(new THREE.Vector3(cx,cy,cz));
      cz -= 20+roll*10;
      cps.push(new THREE.Vector3(cx,cy,cz));
    } else if(seg===3){
      // Helix - spiral around going down
      const hr=12+roll*8;
      for(let h=0;h<4;h++){
        const ang=(h/4)*Math.PI*2;
        cps.push(new THREE.Vector3(
          cx+Math.sin(ang)*hr,
          cy-h*5,
          cz-Math.cos(ang)*hr-h*8
        ));
      }
      cx+=Math.sin(Math.PI*2)*hr; cy-=20; cz-=40;
    } else {
      // Gentle S-bend staying somewhat level
      cx += (roll-.5)*30; cz -= 25+roll*10; cy -= 3+roll*3;
      cps.push(new THREE.Vector3(cx,cy,cz));
    }
  }

  // Final straight approach to finish
  cz -= 15; cps.push(new THREE.Vector3(cx,cy,cz));
  cz -= 15; cps.push(new THREE.Vector3(cx,cy,cz));

  spline = new THREE.CatmullRomCurve3(cps,false,'catmullrom',0.5);

  // ── Sample spline ─────────────────────
  const N = 500 + complexity*80;
  splinePts = [];
  splineTans = [];
  for(let i=0;i<=N;i++){
    const t=i/N;
    splinePts.push(spline.getPoint(t));
    splineTans.push(spline.getTangent(t).normalize());
  }
  FINISH_IDX = splinePts.length-1;

  // Start = first point, elevated above track center
  START_POS.copy(splinePts[0]).y += BALL_R + 0.3;

  // ── Build tube geometry ────────────────
  // Half-pipe: open top U-channel
  // Balls roll inside under gravity
  const TUBE_R = 1.8;      // inner radius of half-pipe
  const TUBE_SEGS = 14;    // segments around circumference
  const OPEN_ANGLE = Math.PI * 0.72; // how open the top is (0=fully closed, PI=flat)

  // Build as a series of ring-cross-sections connected
  const stepEvery = 1; // use every Nth sample for geometry
  const frames = spline.computeFrenetFrames(N, false);

  // Vertices: for each spline sample, place arc of vertices
  const positions = [];
  const normals2 = [];
  const uvs2 = [];
  const indices = [];

  const arcSegs = TUBE_SEGS;
  // Arc goes from -OPEN_ANGLE to +OPEN_ANGLE (bottom of pipe)
  // 0 = bottom, PI = top

  for(let i=0;i<=N;i++){
    const pos=splinePts[i];
    const tan=frames.tangents[i];
    const norm=frames.normals[i];
    const binorm=frames.binormals[i];

    for(let j=0;j<=arcSegs;j++){
      // angle: bottom of pipe is 0, goes up both sides
      const a = -OPEN_ANGLE + (j/arcSegs)*OPEN_ANGLE*2;
      // Rotate around tangent axis
      const cosA=Math.cos(a), sinA=Math.sin(a);
      // In Frenet frame: norm = "up" for the curve, binorm = "right"
      // We want pipe bottom to face "down" in world space roughly
      // So bottom of pipe at a=0 should point toward world -Y (gravity)
      const rx = -norm.x*cosA + binorm.x*sinA;
      const ry = -norm.y*cosA + binorm.y*sinA;
      const rz = -norm.z*cosA + binorm.z*sinA;

      positions.push(
        pos.x + rx*TUBE_R,
        pos.y + ry*TUBE_R,
        pos.z + rz*TUBE_R
      );
      // Normal points inward (toward center of tube)
      normals2.push(-rx,-ry,-rz);
      uvs2.push(j/arcSegs, i/N);
    }
  }

  for(let i=0;i<N;i++){
    for(let j=0;j<arcSegs;j++){
      const a=(arcSegs+1)*i+j;
      const b=a+1;
      const c=a+(arcSegs+1);
      const d=c+1;
      indices.push(a,c,b, b,c,d);
    }
  }

  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position',new THREE.Float32BufferAttribute(positions,3));
  geo.setAttribute('normal',new THREE.Float32BufferAttribute(normals2,3));
  geo.setAttribute('uv',new THREE.Float32BufferAttribute(uvs2,2));
  geo.setIndex(indices);

  const mat = new THREE.MeshStandardMaterial({
    color:0x0e1535,
    roughness:0.15,
    metalness:0.9,
    emissive:0x060b22,
    emissiveIntensity:1,
    side:THREE.FrontSide,
  });
  const tube = new THREE.Mesh(geo,mat);
  tube.receiveShadow=true;
  tAdd(tube);

  // ── Glowing edge strips ────────────────
  // Left and right lip of the half-pipe
  for(const side of [-1,1]){
    const edgePts=[];
    for(let i=0;i<=N;i++){
      const pos=splinePts[i];
      const norm=frames.normals[i];
      const binorm=frames.binormals[i];
      const a=side*OPEN_ANGLE;
      const rx=-norm.x*Math.cos(a)+binorm.x*Math.sin(a);
      const ry=-norm.y*Math.cos(a)+binorm.y*Math.sin(a);
      const rz=-norm.z*Math.cos(a)+binorm.z*Math.sin(a);
      edgePts.push(
        pos.x+rx*TUBE_R,
        pos.y+ry*TUBE_R,
        pos.z+rz*TUBE_R
      );
    }
    const eGeo=new THREE.BufferGeometry();
    eGeo.setAttribute('position',new THREE.Float32BufferAttribute(edgePts,3));
    const eLine=new THREE.Line(eGeo,new THREE.LineBasicMaterial({
      color:side>0?0x00f0ff:0xff00cc,
      linewidth:2
    }));
    tAdd(eLine);
  }

  // ── Support struts ─────────────────────
  // Pillars holding the track up, every ~20 samples
  for(let i=10;i<splinePts.length;i+=30){
    const p=splinePts[i];
    const groundY=-5;
    if(p.y<groundY+2) continue;
    const h=p.y-groundY;
    const pillar=new THREE.Mesh(
      new THREE.CylinderGeometry(0.08,0.12,h,6),
      new THREE.MeshStandardMaterial({color:0x0a0a22,metalness:0.8,roughness:0.4,emissive:0x000416})
    );
    pillar.position.set(p.x,groundY+h/2,p.z);
    tAdd(pillar);
  }

  // ── Start platform ─────────────────────
  const sp=splinePts[0];
  const sMat=new THREE.MeshStandardMaterial({color:0x112244,metalness:0.8,emissive:0x001133,emissiveIntensity:0.5});
  const platform=new THREE.Mesh(new THREE.BoxGeometry(6,0.3,8),sMat);
  platform.position.set(sp.x,sp.y-TUBE_R-0.15,sp.z+2);
  tAdd(platform);
  // Start gate
  const gMat=new THREE.MeshBasicMaterial({color:0x00f0ff});
  for(const sx of [-2.5,2.5]){
    const post=new THREE.Mesh(new THREE.BoxGeometry(0.15,4,0.15),gMat);
    post.position.set(sp.x+sx,sp.y-TUBE_R+2,sp.z+3);
    tAdd(post);
  }
  const bar=new THREE.Mesh(new THREE.BoxGeometry(5.5,0.15,0.15),gMat);
  bar.position.set(sp.x,sp.y-TUBE_R+4,sp.z+3);
  tAdd(bar);

  // ── Finish line ────────────────────────
  const fp=splinePts[FINISH_IDX];
  const fMat=new THREE.MeshBasicMaterial({color:0xffff00});
  for(const fx of [-2.5,2.5]){
    const fp2=new THREE.Mesh(new THREE.BoxGeometry(0.15,5,0.15),fMat);
    fp2.position.set(fp.x+fx,fp.y+2,fp.z);
    tAdd(fp2);
  }
  const fbar=new THREE.Mesh(new THREE.BoxGeometry(5.5,0.15,0.15),fMat);
  fbar.position.set(fp.x,fp.y+4.5,fp.z);
  tAdd(fbar);
  // Checkered squares
  for(let i=0;i<8;i++){
    const sq=new THREE.Mesh(new THREE.BoxGeometry(0.55,0.55,0.1),
      new THREE.MeshBasicMaterial({color:i%2===0?0xffffff:0x222222}));
    sq.position.set(fp.x-1.93+i*0.55,fp.y+4.6,fp.z-0.1);
    tAdd(sq);
  }

  console.log('Track: '+splinePts.length+' pts, start='+JSON.stringify({x:START_POS.x.toFixed(1),y:START_POS.y.toFixed(1),z:START_POS.z.toFixed(1)}));
}

// ── FIND NEAREST POINT ON SPLINE ──────────
// Returns the index of the nearest sample
function nearestIdx(pos, hintIdx){
  // Search forward-biased window around hint
  const lo = Math.max(0, hintIdx-8);
  const hi = Math.min(splinePts.length-1, hintIdx+40);
  let best=hintIdx, bestD=Infinity;
  for(let i=lo;i<=hi;i++){
    const d=splinePts[i].distanceToSquared(pos);
    if(d<bestD){bestD=d;best=i;}
  }
  return best;
}

// ── ZORBS ─────────────────────────────────
const zorbs = [];
let phase = 'lobby';

function makeZorb(name,isSub,col){
  // Ball mesh
  const geo = new THREE.SphereGeometry(BALL_R,20,20);
  const mat = new THREE.MeshStandardMaterial({
    color:col, roughness:0.05, metalness:0.9,
    emissive:col, emissiveIntensity:isSub?0.5:0.2
  });
  const mesh = new THREE.Mesh(geo,mat);
  mesh.castShadow=true;
  // Glow shell
  mesh.add(new THREE.Mesh(
    new THREE.SphereGeometry(BALL_R*1.15,12,12),
    new THREE.MeshBasicMaterial({color:col,transparent:true,opacity:0.1,side:THREE.BackSide})
  ));
  // Flat ring (Saturn style)
  const ring=new THREE.Mesh(
    new THREE.TorusGeometry(BALL_R*1.4,0.05,6,24),
    new THREE.MeshBasicMaterial({color:col,transparent:true,opacity:0.6})
  );
  ring.rotation.x=Math.PI/2;
  mesh.add(ring);
  // Point light on ball
  const pl=new THREE.PointLight(col,isSub?1.8:1.0,7);
  mesh.add(pl);
  scene.add(mesh);

  // Trail
  const tGeo=new THREE.BufferGeometry();
  tGeo.setAttribute('position',new THREE.Float32BufferAttribute(new Float32Array(36*3),3));
  const trail=new THREE.Line(tGeo,new THREE.LineBasicMaterial({color:col,transparent:true,opacity:0.5}));
  scene.add(trail);

  // Spawn inside the tube at the start
  const jitter=(Math.random()-.5)*0.6;
  const pos=START_POS.clone();
  pos.x+=jitter; pos.y-=jitter*0.3;

  return {
    name,isSub,color:col,mesh,ring,trail,
    pos:pos.clone(),
    vel:new THREE.Vector3(0,0,0),
    trailHist:[],
    splineIdx:3,
    boost:0,
    finished:false,rank:0,finishTime:0,
    knockFlash:0,
    ringT:Math.random()*Math.PI*2
  };
}

function removeZorb(z){
  scene.remove(z.mesh);
  scene.remove(z.trail);
}

// ── PHYSICS ───────────────────────────────
// Simple and reliable:
// 1. Apply gravity
// 2. Find nearest point on spline (tube center)
// 3. If ball is outside tube radius, push it back in
// 4. That's it - the tube shape guides the ball naturally

const TUBE_INNER = 1.8;  // matches tube geometry
const GRAVITY_VEC = new THREE.Vector3(0,-18,0);

function stepZorb(z, dt){
  if(z.finished) return;

  // Gravity
  z.vel.addScaledVector(GRAVITY_VEC, dt);

  // Boost along spline tangent
  if(z.boost>0){
    const tan=splineTans[z.splineIdx];
    z.vel.addScaledVector(tan, z.boost*14*dt);
    z.boost=Math.max(0,z.boost-dt);
  }

  // Clamp speed
  const spd=z.vel.length();
  if(spd>30) z.vel.multiplyScalar(30/spd);

  // Integrate
  z.pos.addScaledVector(z.vel,dt);

  // Find nearest spline point
  const idx=nearestIdx(z.pos, z.splineIdx);
  z.splineIdx=idx;
  const center=splinePts[idx];
  const tan=splineTans[idx];

  // Vector from tube center to ball
  const toBall=new THREE.Vector3().subVectors(z.pos,center);
  // Remove component along tangent (we only care about cross-section)
  const tanComp=toBall.dot(tan);
  const radial=toBall.clone().addScaledVector(tan,-tanComp);
  const radDist=radial.length();

  // Constrain ball inside tube
  const maxR=TUBE_INNER-BALL_R;
  if(radDist>maxR){
    // Push ball back inside
    const push=radial.clone().normalize().multiplyScalar(maxR);
    z.pos.copy(center.clone().addScaledVector(tan,tanComp).add(push));

    // Reflect velocity off tube wall
    const wallNorm=radial.clone().normalize().negate(); // points inward
    const vDotN=z.vel.dot(wallNorm.clone().negate()); // velocity going outward
    if(vDotN>0){
      z.vel.addScaledVector(wallNorm.clone().negate(), -vDotN*1.25); // bounce
    }
    // Dampen
    z.vel.multiplyScalar(0.85);
  }

  // Safety: if ball somehow escapes far from spline, respawn
  if(radDist>TUBE_INNER*3 || z.pos.y < center.y-15){
    const ri=Math.max(3,z.splineIdx-5);
    z.pos.copy(splinePts[ri]).y+=BALL_R;
    z.vel.copy(splineTans[ri]).multiplyScalar(2);
    z.splineIdx=ri;
    showKO('FELL: '+z.name,0xff4444);
  }

  // Slight forward nudge so balls don't stall
  if(phase==='racing'){
    const fwdSpd=z.vel.dot(tan);
    if(fwdSpd<0.8) z.vel.addScaledVector(tan,(0.8-fwdSpd)*1.5*dt);
  }

  // Finish
  if(!z.finished && idx>=FINISH_IDX-10){
    z.finished=true; z.finishTime=performance.now();
    const rank=zorbs.filter(r=>r.finished).length; z.rank=rank;
    if(rank===1){showBanner('WINNER: '+z.name,4500);setTimeout(resetRace,5500);}
    showKO('FINISH #'+rank+': '+z.name,0xffff00);
  }

  // Update mesh
  z.mesh.position.copy(z.pos);
  // Orient ring horizontal
  z.ringT+=dt*2;
  z.ring.rotation.x=Math.PI/2+Math.sin(z.ringT)*0.12;
  z.knockFlash=Math.max(0,z.knockFlash-dt);
  z.mesh.material.emissiveIntensity=z.knockFlash>0?1.5:z.isSub?0.45:0.2;
}

function collideBalls(){
  for(let i=0;i<zorbs.length;i++){
    for(let j=i+1;j<zorbs.length;j++){
      const a=zorbs[i],b=zorbs[j];
      if(a.finished||b.finished)continue;
      const d=new THREE.Vector3().subVectors(a.pos,b.pos);
      const dist=d.length();
      const minD=BALL_R*2+0.02;
      if(dist<minD&&dist>0.001){
        d.normalize();
        const rv=new THREE.Vector3().subVectors(a.vel,b.vel);
        const dot=rv.dot(d);
        if(dot<0){
          const imp=d.clone().multiplyScalar(dot*0.2);
          a.vel.sub(imp);b.vel.add(imp);
        }
        const ov=(minD-dist)*0.5+0.01;
        a.pos.addScaledVector(d,ov);
        b.pos.addScaledVector(d,-ov);
      }
    }
  }
}

function updateVisuals(z){
  z.trailHist.push(z.pos.clone());
  if(z.trailHist.length>30)z.trailHist.shift();
  if(z.trailHist.length>1){
    const arr=new Float32Array(z.trailHist.length*3);
    z.trailHist.forEach((p,i)=>{arr[i*3]=p.x;arr[i*3+1]=p.y;arr[i*3+2]=p.z;});
    z.trail.geometry.setAttribute('position',new THREE.Float32BufferAttribute(arr,3));
    const spd=z.vel.length();
    z.trail.material.opacity=Math.min(0.7,spd/15);
  }
}

// ── CAMERA ────────────────────────────────
let camMode='follow';
let camPos=new THREE.Vector3(0,10,20);
let camLook=new THREE.Vector3(0,0,0);
let autoTimer=0,autoIdx=0;
const autoModes=['follow','chase','wide'];

function setCam(m){
  camMode=m;
  document.querySelectorAll('.cb').forEach(b=>b.classList.remove('active'));
  const el=document.getElementById('btn-'+m);if(el)el.classList.add('active');
}

function updateCam(dt){
  const sm=Math.min(dt*4,0.12);
  const leader=zorbs.filter(z=>!z.finished).sort((a,b)=>b.splineIdx-a.splineIdx)[0]||zorbs[0];
  if(!leader)return;
  const lp=leader.pos;
  let mode=camMode;
  if(mode==='auto'){autoTimer+=dt;if(autoTimer>8){autoTimer=0;autoIdx=(autoIdx+1)%autoModes.length;}mode=autoModes[autoIdx];}

  const lidx=leader.splineIdx;
  const ltan=splineTans[Math.max(0,lidx)];

  if(mode==='follow'){
    // Behind and slightly above
    const back=ltan.clone().negate().multiplyScalar(5);
    const cp=lp.clone().add(back).add(new THREE.Vector3(0,3.5,0));
    camPos.lerp(cp,sm*2);
    camLook.lerp(lp.clone().addScaledVector(ltan,3),sm*3);
  } else if(mode==='chase'){
    // Very close, low
    const back=ltan.clone().negate().multiplyScalar(3);
    const cp=lp.clone().add(back).add(new THREE.Vector3(0,1.5,0));
    camPos.lerp(cp,sm*2.5);
    camLook.lerp(lp.clone().addScaledVector(ltan,4),sm*4);
  } else if(mode==='wide'){
    const avg=new THREE.Vector3();
    zorbs.forEach(z=>avg.add(z.pos));
    if(zorbs.length)avg.divideScalar(zorbs.length);
    camPos.lerp(avg.clone().add(new THREE.Vector3(15,25,20)),sm*0.4);
    camLook.lerp(avg,sm);
  }
  camera.position.copy(camPos);
  camera.lookAt(camLook);
}

// ── MINIMAP ───────────────────────────────
const mmc=document.getElementById('mmc'),mmctx=mmc.getContext('2d');
function drawMM(){
  mmctx.clearRect(0,0,110,110);
  mmctx.fillStyle='rgba(0,0,0,0.6)';mmctx.fillRect(0,0,110,110);
  if(!splinePts.length)return;
  const xs=splinePts.map(p=>p.x),zs=splinePts.map(p=>p.z);
  const minX=Math.min(...xs),maxX=Math.max(...xs);
  const minZ=Math.min(...zs),maxZ=Math.max(...zs);
  const sc=Math.min(90/(maxX-minX||1),90/(maxZ-minZ||1));
  const ox=55-(minX+maxX)/2*sc,oz=55-(minZ+maxZ)/2*sc;
  // Track path
  mmctx.strokeStyle='rgba(0,240,255,0.35)';mmctx.lineWidth=2;mmctx.beginPath();
  splinePts.forEach((p,i)=>{
    const mx=ox+p.x*sc,my=oz+p.z*sc;
    i===0?mmctx.moveTo(mx,my):mmctx.lineTo(mx,my);
  });
  mmctx.stroke();
  // Finish dot
  const fp=splinePts[FINISH_IDX];
  mmctx.fillStyle='#ffff00';
  mmctx.fillRect(ox+fp.x*sc-3,oz+fp.z*sc-3,6,6);
  // Zorbs
  zorbs.forEach(z=>{
    const mx=Math.max(5,Math.min(105,ox+z.pos.x*sc));
    const my=Math.max(5,Math.min(105,oz+z.pos.z*sc));
    const col='#'+z.color.toString(16).padStart(6,'0');
    mmctx.fillStyle=col;mmctx.shadowColor=col;mmctx.shadowBlur=6;
    mmctx.beginPath();mmctx.arc(mx,my,4,0,Math.PI*2);mmctx.fill();
    mmctx.shadowBlur=0;
  });
}

// ── LEADERBOARD ───────────────────────────
function updateLB(){
  const sorted=[...zorbs].sort((a,b)=>b.splineIdx-a.splineIdx);
  const rows=document.getElementById('lbr');rows.innerHTML='';
  sorted.slice(0,7).forEach((z,i)=>{
    const pct=Math.round(z.splineIdx/FINISH_IDX*100);
    const d=document.createElement('div');d.className='lr';
    d.innerHTML='<span class="lp '+(i===0?'g':'')+'">'+( i+1)+'</span>'
      +'<span class="ln '+(z.isSub?'sub':'')+'">'+z.name+'</span>'
      +'<span class="ld">'+(z.finished?'FIN':pct+'%')+'</span>';
    rows.appendChild(d);
  });
}

// ── CHAT / UI ─────────────────────────────
const chatLog=document.getElementById('cl');
function addChat(name,cmd,isSub){
  const d=document.createElement('div');d.className='cm';
  d.innerHTML='<span class="u '+(isSub?'s':'r')+'">'+name+'</span> <span class="c">'+cmd+'</span>';
  chatLog.appendChild(d);
  while(chatLog.children.length>9)chatLog.removeChild(chatLog.firstChild);
}
function showKO(msg,color){
  const feed=document.getElementById('kfeed');
  const el=document.createElement('div');el.className='kf';
  el.style.color='#'+color.toString(16).padStart(6,'0');el.textContent=msg;
  feed.appendChild(el);setTimeout(()=>{if(el.parentNode)feed.removeChild(el);},2600);
  while(feed.children.length>4)feed.removeChild(feed.firstChild);
}
function showBanner(txt,dur){
  const el=document.getElementById('banner');el.textContent=txt;el.style.opacity='1';
  setTimeout(()=>el.style.opacity='0',dur);
}
function hidePanel(){document.getElementById('sp').style.display='none';document.getElementById('btn-show').style.display='block';}
function showPanel(){document.getElementById('sp').style.display='flex';document.getElementById('btn-show').style.display='none';}

// ── RACE STATE ────────────────────────────
let raceDur=null,raceStart=null;

function parseDur(s){
  if(!s||!s.trim())return null;
  const m=s.trim().toLowerCase().match(/^(\d+(?:\.\d+)?)\s*(m|s)?$/);
  if(!m)return null;
  return m[2]==='s'?parseFloat(m[1]):parseFloat(m[1])*60;
}

function updateTimer(){
  if(phase!=='racing'||!raceDur||!raceStart)return;
  const left=Math.max(0,raceDur-(performance.now()-raceStart)/1000);
  const el=document.getElementById('timer-display');
  el.textContent=Math.floor(left/60)+':'+(Math.floor(left%60)<10?'0':'')+Math.floor(left%60);
  if(left<30)el.classList.add('urgent');
  if(left<=0){showBanner('TIME UP!',3000);setTimeout(resetRace,3500);}
}

function handleCmd(name,cmd,isSub){
  addChat(name,cmd,isSub);
  const c=cmd.trim().toLowerCase();
  if(c==='!play'){
    if(zorbs.find(z=>z.name===name)||phase!=='lobby')return;
    const col=ZCOLORS[zorbs.length%ZCOLORS.length];
    zorbs.push(makeZorb(name,isSub,col));
    document.getElementById('cnt').textContent=zorbs.length+' racers';
  }
  if(c==='!boost'){
    const z=zorbs.find(z=>z.name===name);
    if(z&&phase==='racing')z.boost=isSub?2.5:1.2;
  }
}

function streamerStart(){
  if(phase!=='lobby')return;
  raceDur=parseDur(document.getElementById('dur').value);
  let complexity=3;
  if(raceDur!==null){
    if(raceDur<=60)complexity=1;
    else if(raceDur<=120)complexity=2;
    else if(raceDur<=300)complexity=3;
    else if(raceDur<=420)complexity=4;
    else complexity=5;
  }
  buildTrack(complexity);
  // Respawn zorbs at track start
  zorbs.forEach(z=>{
    const jitter=(Math.random()-.5)*0.6;
    z.pos.copy(START_POS);z.pos.x+=jitter;
    z.vel.set(0,0,0);z.trailHist=[];z.splineIdx=3;
  });
  if(raceDur){
    document.getElementById('tpill').style.display='flex';
    document.getElementById('timer-display').textContent='--:--';
    document.getElementById('timer-display').classList.remove('urgent');
  } else document.getElementById('tpill').style.display='none';
  document.getElementById('btn-go').disabled=true;
  phase='countdown';document.getElementById('stxt').textContent='STARTING';
  showBanner('3',900);
  setTimeout(()=>showBanner('2',900),1000);
  setTimeout(()=>showBanner('1',900),2000);
  setTimeout(()=>{
    showBanner('GO!',800);phase='racing';
    document.getElementById('stxt').textContent='RACING';
    raceStart=performance.now();
    zorbs.forEach(z=>{
      const tan=splineTans[z.splineIdx];
      z.vel.copy(tan.clone().multiplyScalar(2+Math.random()*0.5));
    });
  },3000);
}

function resetRace(){
  zorbs.forEach(z=>removeZorb(z));zorbs.length=0;
  phase='lobby';raceStart=null;raceDur=null;
  document.getElementById('cnt').textContent='0 racers';
  document.getElementById('stxt').textContent='LOBBY';
  document.getElementById('tpill').style.display='none';
  document.getElementById('btn-go').disabled=false;
  document.getElementById('dur').value='';
  showBanner('NEW RACE - TYPE !play',2500);
  setTimeout(startMock,2500);
}

// ── MOCK CHAT ─────────────────────────────
const MOCK=[
  {name:'StreamKing',sub:true},{name:'NeonRacer',sub:false},
  {name:'CyberZorb',sub:true},{name:'VoidRunner',sub:false},
  {name:'NightFox',sub:false},{name:'GlitchQueen',sub:true},
  {name:'DataSurge',sub:false},{name:'PixelBolt',sub:true},
];
let mockI=0;
function startMock(){mockI=0;setTimeout(nextMock,1200);}
function nextMock(){
  if(mockI>=MOCK.length)return;
  handleCmd(MOCK[mockI].name,'!play',MOCK[mockI].sub);mockI++;
  if(mockI<MOCK.length)setTimeout(nextMock,700+Math.random()*900);
  else setTimeout(()=>{document.getElementById('dur').value='';streamerStart();},2000);
}
setInterval(()=>{
  if(phase==='racing'&&zorbs.length>0)
    handleCmd(zorbs[Math.floor(Math.random()*zorbs.length)].name,'!boost',Math.random()>.5);
},5000);

document.addEventListener('keydown',e=>{
  const ms=['follow','chase','wide','auto'];
  if(e.key==='ArrowLeft'){const i=ms.indexOf(camMode);setCam(ms[(i-1+4)%4]);}
  if(e.key==='ArrowRight'){const i=ms.indexOf(camMode);setCam(ms[(i+1)%4]);}
  if(e.key===' '){if(zorbs.length>0)zorbs[0].boost=1.8;e.preventDefault();}
  if(e.key==='f'||e.key==='F')setCam('follow');
});
document.getElementById('cg').onclick=()=>{
  const v=document.getElementById('ci').value.trim();if(!v)return;
  handleCmd('You',v,false);document.getElementById('ci').value='';
};
document.getElementById('ci').addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('cg').click();});

// ── MAIN LOOP ─────────────────────────────
buildTrack(3);
startMock();

let lastT=0,frame=0;
function loop(ts){
  requestAnimationFrame(loop);
  const dt=Math.min((ts-lastT)/1000,0.05);lastT=ts;frame++;
  if(phase==='racing'){
    updateTimer();
    const SUB=3;
    for(let s=0;s<SUB;s++){
      zorbs.forEach(z=>stepZorb(z,dt/SUB));
      collideBalls();
    }
  }
  zorbs.forEach(updateVisuals);
  updateCam(dt);
  glow.intensity=1.5+Math.sin(frame*0.04)*0.5;
  glow.position.set(Math.sin(frame*0.01)*30,10,Math.cos(frame*0.01)*30);
  if(frame%18===0){updateLB();drawMM();}
  renderer.render(scene,camera);
}
requestAnimationFrame(t=>{lastT=t;loop(t);});
</script>
