<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ZORBS on Stream</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;background:#000;overflow:hidden;}
#app{width:100%;height:100vh;position:relative;}
#c{display:block;width:100%;height:100%;}
#ui{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;font-family:'Courier New',monospace;}
#topbar{position:absolute;top:0;left:0;right:0;display:flex;align-items:center;justify-content:space-between;padding:10px 16px;background:linear-gradient(180deg,rgba(0,0,0,0.92)0%,transparent);pointer-events:auto;}
#logo{font-size:18px;font-weight:900;letter-spacing:4px;color:#00f0ff;text-shadow:0 0 18px #00f0ff;pointer-events:auto;}
#logo span{color:#ff00cc;}
#cams{display:flex;gap:5px;pointer-events:auto;}
.cb{background:rgba(0,240,255,0.07);border:1px solid rgba(0,240,255,0.28);color:#00f0ff;padding:4px 10px;border-radius:4px;font-size:10px;cursor:pointer;letter-spacing:2px;font-family:'Courier New',monospace;}
.cb.active{background:rgba(0,240,255,0.2);border-color:#00f0ff;}
#info{position:absolute;top:50px;left:12px;display:flex;flex-direction:column;gap:5px;}
.pill{background:rgba(0,0,0,0.75);border:1px solid rgba(255,255,255,0.09);border-radius:20px;padding:4px 12px;font-size:10px;color:#fff;display:flex;align-items:center;gap:6px;letter-spacing:1px;}
.dot{width:5px;height:5px;border-radius:50%;}.dg{background:#00ff88;box-shadow:0 0 6px #00ff88;animation:blink 1.5s infinite;}.dp{background:#ff00cc;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:.3;}}
#timer-display{font-size:13px;font-weight:700;}.urgent{color:#ff4444!important;}
#lb{position:absolute;top:50px;right:12px;background:rgba(0,0,0,0.8);border:1px solid rgba(0,240,255,0.14);border-radius:10px;padding:10px 14px;min-width:170px;}
#lb h3{font-size:9px;letter-spacing:3px;color:rgba(0,240,255,0.38);margin-bottom:8px;}
.lr{display:flex;align-items:center;gap:6px;margin-bottom:4px;font-size:11px;}
.lp{color:rgba(255,255,255,.22);width:14px;font-size:10px;}.lp.g{color:#ffd700;}
.ln{flex:1;color:#ddd;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:85px;}.ln.sub{color:#ff00cc;}
.ld{font-size:9px;color:rgba(255,255,255,.28);}
#sp{position:absolute;top:50px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.85);border:1px solid rgba(0,240,255,0.18);border-radius:10px;padding:12px 16px;pointer-events:auto;display:flex;flex-direction:column;gap:8px;min-width:260px;}
#sp h3{font-size:9px;letter-spacing:3px;color:rgba(0,240,255,0.4);text-align:center;}
#sp-row{display:flex;gap:6px;align-items:center;}
#sp-lbl{font-size:10px;color:rgba(255,255,255,0.5);white-space:nowrap;}
#dur{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.15);border-radius:4px;padding:4px 8px;color:#fff;font-size:11px;font-family:'Courier New',monospace;width:75px;outline:none;text-align:center;}
#sp-hint{font-size:9px;color:rgba(255,255,255,0.25);}
#btn-go{background:rgba(0,240,255,0.12);border:1px solid rgba(0,240,255,0.35);color:#00f0ff;border-radius:5px;padding:6px 14px;font-size:11px;letter-spacing:2px;cursor:pointer;font-family:'Courier New',monospace;flex:1;}
#btn-go:disabled{opacity:0.3;cursor:not-allowed;}
#btn-hide{font-size:9px;color:rgba(255,255,255,0.25);cursor:pointer;text-align:center;}
#btn-show{position:absolute;top:50px;left:50%;transform:translateX(-50%);font-size:9px;color:rgba(0,240,255,0.4);cursor:pointer;background:rgba(0,0,0,0.6);border:1px solid rgba(0,240,255,0.15);border-radius:4px;padding:3px 10px;display:none;pointer-events:auto;}
#chat{position:absolute;bottom:12px;left:12px;width:188px;background:rgba(0,0,0,0.78);border:1px solid rgba(255,255,255,0.07);border-radius:10px;padding:9px;pointer-events:auto;}
#ct{font-size:9px;letter-spacing:2px;color:rgba(255,255,255,.22);margin-bottom:5px;}
#cl{height:88px;overflow:hidden;display:flex;flex-direction:column;justify-content:flex-end;gap:2px;}
.cm{font-size:10px;line-height:1.4;animation:fi .2s ease;}
.cm .u{font-weight:700;}.cm .u.s{color:#ff00cc;}.cm .u.r{color:#00f0ff;}
.cm .c{color:rgba(255,255,255,.38);}
@keyframes fi{from{opacity:0;transform:translateY(3px);}to{opacity:1;}}
#cr{display:flex;gap:4px;margin-top:5px;}
#ci{flex:1;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.11);border-radius:4px;padding:3px 6px;color:#fff;font-size:10px;font-family:'Courier New',monospace;outline:none;}
#cg{background:rgba(0,240,255,0.1);border:1px solid rgba(0,240,255,0.28);color:#00f0ff;border-radius:4px;padding:3px 8px;font-size:11px;cursor:pointer;}
#mm{position:absolute;bottom:12px;right:12px;width:110px;height:110px;border-radius:50%;overflow:hidden;border:1px solid rgba(0,240,255,0.18);background:rgba(0,0,0,0.7);}
#mmc{width:110px;height:110px;}
#banner{position:absolute;top:45%;left:50%;transform:translate(-50%,-50%);font-size:34px;font-weight:900;letter-spacing:6px;color:#fff;text-shadow:0 0 30px #00f0ff;opacity:0;pointer-events:none;transition:opacity .3s;text-align:center;white-space:nowrap;}

@keyframes cdpop{0%{transform:translate(-50%,-50%) scale(1.7);opacity:0;}25%{opacity:1;}100%{transform:translate(-50%,-50%) scale(1);}}

@keyframes kfa{0%{opacity:1;transform:translateY(0);}100%{opacity:0;transform:translateY(-16px);}}
#speedline{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;opacity:0;transition:opacity 0.2s;}
#hint{position:absolute;bottom:12px;left:50%;transform:translateX(-50%);font-size:9px;color:rgba(255,255,255,.16);pointer-events:none;white-space:nowrap;}
</style>

<script>
// Seeded random - replaces Math.random() for track generation only
function mulberry32(seed){
  return function(){
    seed|=0; seed=seed+0x6D2B79F5|0;
    var t=Math.imul(seed^seed>>>15,1|seed);
    t=t+Math.imul(t^t>>>7,61|t)^t;
    return ((t^t>>>14)>>>0)/4294967296;
  };
}
let _trackRng = null;
let _trackSeed = null;
function setTrackSeed(seed){
  _trackSeed = seed;
  _trackRng = mulberry32(seed);
}
// Patch Math.random during track build
function buildCourseSeeded(dur, seed){
  setTrackSeed(seed || Math.floor(Math.random()*999999));
  const _origRandom = Math.random;
  Math.random = _trackRng;
  buildCourse(dur);
  Math.random = _origRandom;
  return _trackSeed;
}
</script>
<script>
// ZORBS on Stream v2.0 - Fixed track turning, fast balls, time-based course gen

// ── RENDERER ─────────────────────────────────────────
const canvas = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({canvas, antialias:true});
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.12;
const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x06101f,0.0048);
// Starfield
{
  const starGeo = new THREE.BufferGeometry();
  const starVerts = [];
  for(let i=0;i<700;i++){
    starVerts.push((Math.random()-0.5)*900, 30+Math.random()*250, (Math.random()-0.5)*900);
  }
  starGeo.setAttribute('position', new THREE.Float32BufferAttribute(starVerts,3));
  scene.add(new THREE.Points(starGeo, new THREE.PointsMaterial({color:0x8899ff,size:0.7,sizeAttenuation:true,transparent:true,opacity:0.7})));
}
scene.background = new THREE.Color(0x02030a);
// Tron gradient skybox - deep blue-black up top, subtle cyan glow at horizon
{
  const skyGeo = new THREE.SphereGeometry(700, 32, 16);
  const skyMat = new THREE.ShaderMaterial({
    side: THREE.BackSide, depthWrite:false, fog:false,
    uniforms:{
      topColor:{value:new THREE.Color(0x02030a)},
      midColor:{value:new THREE.Color(0x0a1633)},
      horizonColor:{value:new THREE.Color(0x0e3a55)},
    },
    vertexShader:`varying vec3 vP; void main(){ vP=position; gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0);}`,
    fragmentShader:`
      varying vec3 vP; uniform vec3 topColor; uniform vec3 midColor; uniform vec3 horizonColor;
      void main(){
        float h = normalize(vP).y;          // -1..1
        float t = smoothstep(-0.15, 0.5, h);
        vec3 col = mix(horizonColor, midColor, smoothstep(-0.15,0.25,h));
        col = mix(col, topColor, smoothstep(0.25,0.8,h));
        // faint horizon band glow
        float band = exp(-abs(h)*9.0)*0.35;
        col += horizonColor*band;
        gl_FragColor = vec4(col,1.0);
      }`
  });
  scene.add(new THREE.Mesh(skyGeo, skyMat));
}
const camera = new THREE.PerspectiveCamera(70,1,0.1,1200);
// ── BLOOM COMPOSER (graceful fallback if CDN blocked) ──
let composer = null;
try {
  if (THREE.EffectComposer && THREE.UnrealBloomPass) {
    composer = new THREE.EffectComposer(renderer);
    composer.setPixelRatio(window.devicePixelRatio || 1);
    composer.setSize(innerWidth, innerHeight);
    composer.addPass(new THREE.RenderPass(scene, camera));
    const bloom = new THREE.UnrealBloomPass(
      new THREE.Vector2(innerWidth, innerHeight), 0.85, 0.45, 0.78);
    composer.addPass(bloom);
  }
} catch(e) { composer = null; }

function onResize(){
  const w=canvas.parentElement.offsetWidth, h=canvas.parentElement.offsetHeight||window.innerHeight;
  renderer.setSize(w,h,false); camera.aspect=w/h; camera.updateProjectionMatrix();
  const sl=document.getElementById('speedline');
  sl.width=w; sl.height=h;
}
onResize(); window.addEventListener('resize',onResize);

// ── LIGHTING ─────────────────────────────────────────
scene.add(new THREE.AmbientLight(0x0a1830,2.2));
const sun=new THREE.DirectionalLight(0xcce6ff,2.4);
sun.position.set(40,80,20); sun.castShadow=true;
sun.shadow.mapSize.set(2048,2048);
sun.shadow.camera.left=-300; sun.shadow.camera.right=300;
sun.shadow.camera.top=300; sun.shadow.camera.bottom=-300;
sun.shadow.camera.far=1000;
scene.add(sun);
const fill=new THREE.DirectionalLight(0x0088ff,0.6);
fill.position.set(-40,20,-40); scene.add(fill);
const pCyan=new THREE.PointLight(0x00f0ff,1.8,160); scene.add(pCyan);
const pMagenta=new THREE.PointLight(0xff00cc,1.2,120); scene.add(pMagenta);

// Stars
const sv=[];
for(let i=0;i<3500;i++) sv.push((Math.random()-.5)*1200,(Math.random()-.5)*800,(Math.random()-.5)*1200);
const sg=new THREE.BufferGeometry();
sg.setAttribute('position',new THREE.Float32BufferAttribute(sv,3));
scene.add(new THREE.Points(sg,new THREE.PointsMaterial({color:0xffffff,size:0.4,transparent:true,opacity:0.55})));

// ── CONSTANTS ────────────────────────────────────────
const BALL_R   = 0.52;
const TW       = 5.6;
const TW_HALF  = TW/2;
const GRAV     = -52;
const BOUNCE   = 0.28;
const FRIC     = 0.88; // per-second rolling friction
// Target ball speed (units/sec). ~12-16 units/sec feels great visually.
// Course unit ≈ roughly 1 meter. At 14 u/s, 1000u track ≈ 71s ≈ 2min.
const BASE_SPEED = 14;
const MIN_FWD  = BASE_SPEED * 0.75;  // minimum forward velocity
const MAX_SPD  = 42;                 // cap for normal; boost can briefly exceed
const FORWARD_ACCEL = 28; // stronger push           // push force toward MIN_FWD
// Generate 1000 colors by cycling hues
const ZCOLORS = Array.from({length:1000},(_,i)=>{
  const h=(i*137.508)%360; // golden angle distribution
  const s=0.7+Math.random()*0.3, l=0.5+Math.random()*0.2;
  // HSL to hex
  const c=(1-Math.abs(2*l-1))*s, x=c*(1-Math.abs((h/60)%2-1)), m=l-c/2;
  let r=0,g=0,b=0;
  if(h<60){r=c;g=x;}else if(h<120){r=x;g=c;}else if(h<180){g=c;b=x;}
  else if(h<240){g=x;b=c;}else if(h<300){r=x;b=c;}else{r=c;b=x;}
  return ((Math.round((r+m)*255)<<16)|( Math.round((g+m)*255)<<8)|Math.round((b+m)*255));
});

// ── SPEED LINE OVERLAY ────────────────────────────────
const slCanvas = document.getElementById('speedline');
const slCtx = slCanvas.getContext('2d');
let globalBoostFlash = 0; // 0..1

function drawSpeedLines(intensity){
  if(intensity<=0.01){slCtx.clearRect(0,0,slCanvas.width,slCanvas.height);return;}
  slCtx.clearRect(0,0,slCanvas.width,slCanvas.height);
  const cx=slCanvas.width/2, cy=slCanvas.height/2;
  const count = Math.floor(intensity*60);
  for(let i=0;i<count;i++){
    const a=Math.random()*Math.PI*2;
    const r0=Math.random()*120+60;
    const r1=r0+Math.random()*300*intensity;
    const x0=cx+Math.cos(a)*r0, y0=cy+Math.sin(a)*r0;
    const x1=cx+Math.cos(a)*r1, y1=cy+Math.sin(a)*r1;
    const alpha=Math.random()*0.35*intensity;
    slCtx.strokeStyle=`rgba(0,240,255,${alpha})`;
    slCtx.lineWidth=Math.random()*1.5;
    slCtx.beginPath(); slCtx.moveTo(x0,y0); slCtx.lineTo(x1,y1); slCtx.stroke();
  }
}

// ── SCENE OBJECTS ─────────────────────────────────────
var pathNodes = [];
let trackMeshes= [];
let hammers=[], blades=[], windZones=[], trapDoors=[];
let bumperObjs = [];
let boostPads  = [];
let funnels    = [];
let FINISH_POS = new THREE.Vector3();
let START_POS  = new THREE.Vector3();
let courseLength = 0; // approx units

function clearCourse(){
  trackMeshes.forEach(m=>scene.remove(m)); trackMeshes=[];
  hammers=[]; bumperObjs=[]; boostPads=[]; funnels=[]; blades=[]; windZones=[]; trapDoors=[]; gateObjs=[]; tubeZones=[]; funnelZones=[]; forkZones=[];
  pathNodes=[]; courseLength=0;
}
function addMesh(m){ scene.add(m); trackMeshes.push(m); return m; }

// ════════════════════════════════════════════════════
// HEADING-AWARE TRACK BUILDER
// ── CURSOR & HELPERS ──────────────────────────────────
function makeCursor(x,y,z,dx=0,dz=-1){
  return {pos:new THREE.Vector3(x,y,z), dir:new THREE.Vector3(dx,0,dz).normalize()};
}
function perpRight(dir){ return new THREE.Vector3(dir.z,0,-dir.x); }

const _floorMat = new THREE.MeshStandardMaterial({color:0x16163a,roughness:0.18,metalness:0.85,emissive:0x0a0a30,emissiveIntensity:0.45,side:THREE.DoubleSide});
const _wallMat  = new THREE.MeshStandardMaterial({color:0x0a1020,roughness:0.3,metalness:0.7,side:THREE.DoubleSide});

// ── SEGMENT BUILDERS ──────────────────────────────────
// Quad-strip mesh track builder.
// This is the RIGHT way to do it - Three.js handles all the geometry.

function _buildTube(splinePts, eL, eR){
  // Build track from spline points as quad-strip meshes.
  // For each consecutive pair of points, build one floor quad + two wall quads.
  // Each quad is just 2 triangles - simple, no rotation bugs, no spikes.
  if(splinePts.length < 2) return;

  const floorVerts=[], wallLVerts=[], wallRVerts=[], glowLPts=[], glowRPts=[];

  for(let i=0;i<splinePts.length;i++){
    const p = splinePts[i];
    // Tangent - central difference for interior, forward/back for edges
    let tx, tz;
    if(i === 0){ tx=splinePts[1].x-p.x; tz=splinePts[1].z-p.z; }
    else if(i===splinePts.length-1){ tx=p.x-splinePts[i-1].x; tz=p.z-splinePts[i-1].z; }
    else { tx=splinePts[i+1].x-splinePts[i-1].x; tz=splinePts[i+1].z-splinePts[i-1].z; }
    const tl=Math.sqrt(tx*tx+tz*tz)||1;
    const tnx=tx/tl, tnz=tz/tl;
    // Right = cross(tangent, worldUp) = tangent x (0,1,0)
    // cross((tx,0,tz),(0,1,0)) = (0*0-tz*1, tz*0-tx*0, tx*1-0*0) = (-tz, 0, tx)
    const rx=-tnz, rz=tnx;
    const y = p.y;

    // Floor: left edge and right edge at floor level
    floorVerts.push(
      p.x - rx*TW_HALF,  y,  p.z - rz*TW_HALF,
      p.x + rx*TW_HALF,  y,  p.z + rz*TW_HALF
    );
    // Left wall: two verts (bottom and top)
    wallLVerts.push(
      p.x - rx*(TW_HALF+0.04),  y,      p.z - rz*(TW_HALF+0.04),
      p.x - rx*(TW_HALF+0.04),  y+1.4,  p.z - rz*(TW_HALF+0.04)
    );
    // Right wall
    wallRVerts.push(
      p.x + rx*(TW_HALF+0.04),  y,      p.z + rz*(TW_HALF+0.04),
      p.x + rx*(TW_HALF+0.04),  y+1.4,  p.z + rz*(TW_HALF+0.04)
    );
    glowLPts.push(new THREE.Vector3(p.x - rx*(TW_HALF+0.04), y+1.42, p.z - rz*(TW_HALF+0.04)));
    glowRPts.push(new THREE.Vector3(p.x + rx*(TW_HALF+0.04), y+1.42, p.z + rz*(TW_HALF+0.04)));
  }

  // Build quad-strip indices
  const N = splinePts.length;
  function qIdx(n){
    const idx=[];
    for(let i=0;i<n-1;i++){
      const a=i*2,b=i*2+1,c=i*2+2,d=i*2+3;
      idx.push(a,b,c, b,d,c);
    }
    return idx;
  }
  function mkMesh(verts, idx, mat){
    const g = new THREE.BufferGeometry();
    g.setAttribute('position', new THREE.Float32BufferAttribute(verts,3));
    g.setIndex(idx); g.computeVertexNormals();
    const m = new THREE.Mesh(g, mat); m.receiveShadow=true; return addMesh(m);
  }
  mkMesh(floorVerts, qIdx(N), _floorMat);
  mkMesh(wallLVerts, qIdx(N), _wallMat);
  mkMesh(wallRVerts, qIdx(N), _wallMat);

  const glg=new THREE.BufferGeometry().setFromPoints(glowLPts);
  addMesh(new THREE.Line(glg,new THREE.LineBasicMaterial({color:eL})));
  const grg=new THREE.BufferGeometry().setFromPoints(glowRPts);
  addMesh(new THREE.Line(grg,new THREE.LineBasicMaterial({color:eR})));
}

function segStraight(cur, length, eL=0x00f0ff, eR=0xff00cc, withBoost=false){
  const end = cur.pos.clone().addScaledVector(cur.dir, length); end.y = cur.pos.y;
  _buildTube([cur.pos.clone(), end.clone()], eL, eR);
  const steps = Math.max(2, Math.ceil(length/3));
  const right = perpRight(cur.dir);
  for(let i=0;i<=steps;i++){
    const pos = cur.pos.clone().addScaledVector(cur.dir, length*(i/steps)); pos.y = cur.pos.y;
    pathNodes.push({pos, dir:cur.dir.clone(), right:right.clone(), floorY:cur.pos.y, halfW:TW_HALF});
  }
  courseLength += length;
  if(withBoost){ buildBoostPad(cur.pos.clone().addScaledVector(cur.dir,length*0.55), cur.dir, cur.pos.y); }
  return makeCursor(end.x, cur.pos.y, end.z, cur.dir.x, cur.dir.z);
}

function segRamp(cur, length, dropY, eL=0x00f0ff, eR=0xff00cc){
  const ey = cur.pos.y - dropY;
  const end = cur.pos.clone().addScaledVector(cur.dir, length); end.y = ey;
  // Multiple points along ramp so tube follows the slope
  const steps = Math.max(3, Math.ceil(length/5));
  const rampPts = [];
  for(let i=0;i<=steps;i++){
    const t=i/steps;
    const p = cur.pos.clone().addScaledVector(cur.dir, length*t);
    p.y = cur.pos.y + (ey - cur.pos.y)*t;
    rampPts.push(p);
  }
  _buildTube(rampPts, eL, eR);
  const right = perpRight(cur.dir);
  rampPts.forEach(pos => {
    pathNodes.push({pos:pos.clone(), dir:cur.dir.clone(), right:right.clone(), floorY:pos.y, halfW:TW_HALF});
  });
  courseLength += length;
  return makeCursor(end.x, ey, end.z, cur.dir.x, cur.dir.z);
}

function segCurve(cur, angleDelta, radius, eL=0x00f0ff, eR=0xff00cc){
  // Build curve as many tiny straight segments - each straight already works perfectly
  const absA = Math.abs(angleDelta), arcLen = radius*absA;
  const steps = Math.max(16, Math.ceil(arcLen/2));
  const stepAngle = angleDelta / steps;
  const segLen = arcLen / steps;
  let c2 = cur;
  for(let i=0;i<steps;i++){
    // Rotate the cursor direction by stepAngle
    const cos = Math.cos(stepAngle), sin = Math.sin(stepAngle);
    const ndx = c2.dir.x*cos - c2.dir.z*sin;
    const ndz = c2.dir.x*sin + c2.dir.z*cos;
    const nextDir = new THREE.Vector3(ndx,0,ndz).normalize();
    // Build one short straight from current pos in current direction
    const end = c2.pos.clone().addScaledVector(c2.dir, segLen);
    end.y = c2.pos.y;
    // Extend slightly past end to overlap next segment and close gaps
    const endExt = end.clone().addScaledVector(c2.dir, 0.3);
    _buildTube([c2.pos.clone(), endExt], eL, eR);
    const right = perpRight(c2.dir);
    pathNodes.push({pos:end.clone(), dir:c2.dir.clone(), right:right.clone(), floorY:c2.pos.y, halfW:TW_HALF});
    courseLength += segLen;
    c2 = makeCursor(end.x, c2.pos.y, end.z, nextDir.x, nextDir.z);
  }
  return c2;
}

// FORK: track splits into 2 parallel lanes (left/right or high/low), each with
// its own short flavor, then merges back. Balls pick a side and commit.
// Returns the cursor at the merge point. Deterministic (uses seeded rnd via Math.random).
function segFork(cur, eL, eR){
  const rnd=(a,b)=>a+Math.floor(Math.random()*(b-a+1));
  const right = perpRight(cur.dir);
  const sep = TW * 0.95;          // how far apart the two lanes sit
  const branchLen = rnd(40, 64);  // length of each branch
  const startPos = cur.pos.clone();
  const dir = cur.dir.clone();

  // Mark the split point so physics can nudge balls onto whichever side they're on
  forkZones.push({
    pos: startPos.clone(), dir: dir.clone(), right: right.clone(),
    sep, len: branchLen, floorY: startPos.y, phase:'split'
  });

  // Build each branch as an offset parallel ribbon with a distinct hazard
  const branchKinds = ['speed','rough','drop']; // pick 2 different flavors
  const k1 = branchKinds[rnd(0,2)];
  let k2 = branchKinds[rnd(0,2)]; if(k2===k1) k2 = branchKinds[(branchKinds.indexOf(k1)+1)%3];

  function buildBranch(side, kind){
    // Start offset to the side, run parallel, ease back to center at the end
    let bc = makeCursor(
      startPos.x + right.x*sep*side, startPos.y, startPos.z + right.z*sep*side,
      dir.x, dir.z
    );
    const segs = 18, segLen = branchLen/segs;
    for(let i=0;i<segs;i++){
      const t = i/segs;
      // lateral offset: full at start/mid, eases to 0 at the very end to merge
      const off = (t < 0.82) ? sep*side : sep*side*(1-(t-0.82)/0.18);
      const cx = startPos.x + dir.x*(branchLen*t) + right.x*off;
      const cz = startPos.z + dir.z*(branchLen*t) + right.z*off;
      let cy = startPos.y;
      if(kind==='drop') cy = startPos.y - Math.sin(t*Math.PI)*8;      // dips down
      if(kind==='speed') cy = startPos.y + Math.sin(t*Math.PI)*1.5;    // slight crest, fast
      const p = new THREE.Vector3(cx,cy,cz);
      const pe = p.clone().addScaledVector(dir, segLen+0.3);
      _buildTube([new THREE.Vector3(cx-dir.x*0.1,cy,cz-dir.z*0.1), pe], eL, eR);
      pathNodes.push({pos:p.clone(), dir:dir.clone(), right:right.clone(), floorY:cy, halfW:TW_HALF, branch:side});
      // Per-branch hazard flavor
      if(kind==='rough' && i===9) buildBumpers(makeCursor(cx,cy,cz,dir.x,dir.z), 2);
      if(kind==='speed' && i===6){ /* speed lane: drop a boost pad */ buildBoostPad(p, dir, cy); }
    }
  }
  buildBranch(-1, k1);
  buildBranch(+1, k2);

  // Merge point: continue from center, just past the branches
  const mergePos = startPos.clone().addScaledVector(dir, branchLen);
  forkZones.push({ pos: mergePos.clone(), dir: dir.clone(), phase:'merge' });
  return makeCursor(mergePos.x, startPos.y, mergePos.z, dir.x, dir.z);
}

// Helical descent - curve AND drop smoothly together (no jagged Y cut)
function segCurveDrop(cur, angleDelta, radius, totalDrop, eL=0x00f0ff, eR=0xff00cc){
  const absA = Math.abs(angleDelta), arcLen = radius*absA;
  const steps = Math.max(20, Math.ceil(arcLen/1.5));
  const stepAngle = angleDelta / steps;
  const segLen = arcLen / steps;
  const dropPer = totalDrop / steps;
  let c2 = cur;
  for(let i=0;i<steps;i++){
    const cos = Math.cos(stepAngle), sin = Math.sin(stepAngle);
    const ndx = c2.dir.x*cos - c2.dir.z*sin;
    const ndz = c2.dir.x*sin + c2.dir.z*cos;
    const nextDir = new THREE.Vector3(ndx,0,ndz).normalize();
    const end = c2.pos.clone().addScaledVector(c2.dir, segLen);
    end.y = c2.pos.y - dropPer; // continuous descent
    const endExt = end.clone().addScaledVector(c2.dir, 0.3);
    _buildTube([c2.pos.clone(), endExt], eL, eR);
    const right = perpRight(c2.dir);
    pathNodes.push({pos:end.clone(), dir:c2.dir.clone(), right:right.clone(), floorY:end.y, halfW:TW_HALF});
    courseLength += segLen;
    c2 = makeCursor(end.x, end.y, end.z, nextDir.x, nextDir.z);
  }
  return c2;
}

// ── BOOST PAD ─────────────────────────────────────────
function buildBoostPad(pos, dir, floorY){
  const right=perpRight(dir), angle=Math.atan2(dir.x,dir.z);
  const pm=new THREE.Mesh(new THREE.BoxGeometry(TW-1.2,0.07,3.2),new THREE.MeshBasicMaterial({color:0x00ff88}));
  pm.position.set(pos.x,floorY+0.04,pos.z); pm.rotation.y=angle; addMesh(pm);
  for(let row=0;row<3;row++){
    const fwd=dir.clone().multiplyScalar(-0.8+row*0.8);
    const ar=new THREE.Mesh(new THREE.BoxGeometry(TW-2.5,0.09,0.2),new THREE.MeshBasicMaterial({color:0x00ffaa}));
    ar.position.set(pos.x+fwd.x,floorY+0.09,pos.z+fwd.z); ar.rotation.y=angle; addMesh(ar);
  }
  boostPads.push({pos:new THREE.Vector3(pos.x,floorY,pos.z),dir:dir.clone(),right,halfLen:1.6,halfW:TW_HALF-0.5});
}

// ── OBSTACLES ─────────────────────────────────────────
function buildHammers(cur, count){
  const spacing=8; const hright=perpRight(cur.dir);
  for(let i=0;i<count;i++){
    const off=cur.dir.clone().multiplyScalar(spacing*(i+1));
    const hx=cur.pos.x+off.x, hz=cur.pos.z+off.z, hy=cur.pos.y;
    const grp=new THREE.Group();
    grp.add(new THREE.Mesh(new THREE.CylinderGeometry(0.13,0.13,4,8),new THREE.MeshStandardMaterial({color:0x334455,roughness:0.4,metalness:0.7})));
    const head=new THREE.Mesh(new THREE.BoxGeometry(3.4,0.75,0.85),new THREE.MeshStandardMaterial({color:0x223344,roughness:0.15,metalness:0.95,emissive:0xff2200,emissiveIntensity:0.35}));
    head.position.y=-2.15; grp.add(head);
    const gs=new THREE.Mesh(new THREE.BoxGeometry(3.5,0.12,0.9),new THREE.MeshBasicMaterial({color:0xff4400}));
    gs.position.y=-2.52; grp.add(gs);
    grp.position.set(hx,hy+2.2,hz); grp.rotation.y=Math.atan2(cur.dir.x,cur.dir.z); scene.add(grp); trackMeshes.push(grp);
    hammers.push({grp,pivY:hy+2.2,x:hx,z:hz,right:hright.clone(),phase:i*(Math.PI*2/count),speed:(0.9+Math.random()*0.4)*(i%2===0?1:-1)});
  }
}

function buildBumpers(cur, count){
  const spacing=7, right=perpRight(cur.dir);
  for(let i=0;i<count;i++){
    const off=cur.dir.clone().multiplyScalar(spacing*(i+1));
    const side=(i%2===0?1:-1)*1.5;
    const bx=cur.pos.x+off.x+right.x*side, bz=cur.pos.z+off.z+right.z*side, by=cur.pos.y;
    // Electric shock post
    const cyl=new THREE.Mesh(new THREE.CylinderGeometry(0.5,0.5,1.3,10),
      new THREE.MeshStandardMaterial({color:0x001133,roughness:0.1,metalness:0.95,emissive:0x00ccff,emissiveIntensity:1.0}));
    cyl.position.set(bx,by+0.65,bz); cyl.castShadow=true; addMesh(cyl);
    // Cyan electric ring
    const ring=new THREE.Mesh(new THREE.TorusGeometry(0.7,0.1,8,16),
      new THREE.MeshBasicMaterial({color:0x00ffff}));
    ring.position.set(bx,by+1.1,bz); ring.rotation.x=Math.PI/2; addMesh(ring);
    // Yellow inner ring
    const ring2=new THREE.Mesh(new THREE.TorusGeometry(0.4,0.07,8,16),
      new THREE.MeshBasicMaterial({color:0xffff00}));
    ring2.position.set(bx,by+0.4,bz); ring2.rotation.x=Math.PI/2; addMesh(ring2);
    // Glow light
    const pl=new THREE.PointLight(0x00ffff,2,5);
    pl.position.set(bx,by+0.8,bz); addMesh(pl);
    bumperObjs.push({x:bx,y:by+0.65,z:bz,r:0.72});
  }
}

// SPINNING BLADE - flat disc rotating on track, deflects balls sideways
function buildBlade(cur){
  const pos=cur.pos.clone().addScaledVector(cur.dir,5);
  pos.y=cur.pos.y+0.15;
  const blade=new THREE.Mesh(
    new THREE.CylinderGeometry(TW_HALF*0.8,TW_HALF*0.8,0.12,16),
    new THREE.MeshStandardMaterial({color:0x334466,roughness:0.1,metalness:0.95,emissive:0x0044aa,emissiveIntensity:0.4})
  );
  blade.position.copy(pos); scene.add(blade); trackMeshes.push(blade);
  // Glow ring on blade edge
  const ring=new THREE.Mesh(new THREE.TorusGeometry(TW_HALF*0.8,0.08,6,24),
    new THREE.MeshBasicMaterial({color:0x4488ff}));
  ring.position.copy(pos); ring.rotation.x=Math.PI/2; scene.add(ring); trackMeshes.push(ring);
  // Arrow indicators
  const pl=new THREE.PointLight(0x4488ff,1.5,6); pl.position.copy(pos); scene.add(pl); trackMeshes.push(pl);
  blades.push({mesh:blade,ring,pos:pos.clone(),phase:Math.random()*Math.PI*2,
    speed:(1.5+Math.random())*(Math.random()<0.5?1:-1),dir:cur.dir.clone(),right:perpRight(cur.dir)});
}

// WIND TUNNEL - section pushes balls sideways (random dir per race)
function buildWindZone(cur, length){
  const windDir=(Math.random()<0.5?1:-1); // random left or right
  const mid=cur.pos.clone().addScaledVector(cur.dir,length/2);
  // Visual - glowing floor strips showing wind direction
  const right=perpRight(cur.dir);
  for(let i=0;i<5;i++){
    const t=(i/4-0.5)*TW*0.8;
    const strip=new THREE.Mesh(new THREE.BoxGeometry(0.15,0.06,length*0.8),
      new THREE.MeshBasicMaterial({color:windDir>0?0x00ffaa:0xffaa00}));
    strip.position.set(mid.x+right.x*t,cur.pos.y+0.03,mid.z+right.z*t);
    strip.rotation.y=Math.atan2(cur.dir.x,cur.dir.z);
    scene.add(strip); trackMeshes.push(strip);
  }
  const end=cur.pos.clone().addScaledVector(cur.dir,length);
  windZones.push({start:cur.pos.clone(),end:end.clone(),dir:cur.dir.clone(),
    right:perpRight(cur.dir),windDir,force:3.5+Math.random()*2});
}

// NARROW GATE - track squeezes, forces bunching
let gateObjs=[]; var tubeZones=[]; var funnelZones=[]; var forkZones=[];
function buildNarrowGate(cur){
  const pos=cur.pos.clone().addScaledVector(cur.dir,4);
  const right=perpRight(cur.dir);
  const angle=Math.atan2(cur.dir.x,cur.dir.z);
  // Two walls jutting in from sides, gap in middle
  for(const side of [-1,1]){
    const wx=pos.x+right.x*side*TW_HALF*0.45, wz=pos.z+right.z*side*TW_HALF*0.45;
    // Cluster of menacing cones = actual spikes
    const barrier=new THREE.Group();
    const spikeMat=new THREE.MeshStandardMaterial({color:0xffaa00,roughness:0.25,metalness:0.7,emissive:0xff5500,emissiveIntensity:0.7});
    for(let si=-1;si<=1;si++){
      const cone=new THREE.Mesh(new THREE.ConeGeometry(0.34,1.9+Math.random()*0.5,6),spikeMat);
      cone.position.set(si*0.55,0.95,0);
      barrier.add(cone);
    }
    barrier.position.set(wx,pos.y+0.9,wz); barrier.rotation.y=angle;
    scene.add(barrier); trackMeshes.push(barrier);
    gateObjs.push({x:wx,z:wz,y:pos.y,r:TW_HALF*0.32,mesh:barrier,baseY:pos.y+0.9,phase:Math.random()*Math.PI*2,speed:0.8+Math.random()*0.9});
  }
}

// TRAP DOOR - section of floor randomly drops, balls fall through then respawn
function buildTrapDoor(cur){
  const pos=cur.pos.clone().addScaledVector(cur.dir,5);
  const angle=Math.atan2(cur.dir.x,cur.dir.z);
  const door=new THREE.Mesh(new THREE.BoxGeometry(TW*0.85,0.3,4),
    new THREE.MeshStandardMaterial({color:0x331100,roughness:0.3,metalness:0.7,emissive:0x220800,emissiveIntensity:0.6}));
  door.position.set(pos.x,cur.pos.y-0.05,pos.z); door.rotation.y=angle;
  scene.add(door); trackMeshes.push(door);
  // Warning stripes
  const warn=new THREE.Mesh(new THREE.BoxGeometry(TW*0.85,0.05,4),
    new THREE.MeshBasicMaterial({color:0xff8800}));
  warn.position.set(pos.x,cur.pos.y+0.18,pos.z); warn.rotation.y=angle;
  scene.add(warn); trackMeshes.push(warn);
  const tlight=new THREE.PointLight(0xff2200,0,7);
  tlight.position.set(pos.x,cur.pos.y+1.2,pos.z); scene.add(tlight); trackMeshes.push(tlight);
  trapDoors.push({mesh:door,warn,light:tlight,pos:pos.clone(),dir:cur.dir.clone(),
    open:false,timer:2+Math.random()*3,floorY:cur.pos.y,angle});
}

// TUBE RUN - neon pipe over the track; balls get squeezed to center + launched out
function buildTube(cur, len){
  const right=perpRight(cur.dir);
  const segs=Math.ceil(len/2.5);
  const tubeMat=new THREE.MeshStandardMaterial({color:0x0a2a4a,roughness:0.15,metalness:0.9,
    emissive:0x00f0ff,emissiveIntensity:0.25,transparent:true,opacity:0.42,side:THREE.DoubleSide});
  for(let i=0;i<=segs;i++){
    const p=cur.pos.clone().addScaledVector(cur.dir,(i/segs)*len);
    const ring=new THREE.Mesh(new THREE.TorusGeometry(2.1,0.11,8,24),
      new THREE.MeshBasicMaterial({color:i%2?0x00f0ff:0xff00cc}));
    ring.position.set(p.x,cur.pos.y+1.55,p.z);
    ring.rotation.y=Math.atan2(cur.dir.x,cur.dir.z);
    addMesh(ring);
  }
  const body=new THREE.Mesh(new THREE.CylinderGeometry(2.05,2.05,len,18,1,true),tubeMat);
  const mid=cur.pos.clone().addScaledVector(cur.dir,len/2);
  body.position.set(mid.x,cur.pos.y+1.55,mid.z);
  // Align the cylinder's long axis (local Y) to the track direction - euler order
  // composes wrong here, quaternion is exact on any heading
  body.quaternion.setFromUnitVectors(new THREE.Vector3(0,1,0),
    new THREE.Vector3(cur.dir.x,0,cur.dir.z).normalize());
  addMesh(body);
  tubeZones.push({start:cur.pos.clone(),dir:cur.dir.clone(),right,len,floorY:cur.pos.y});
}

// FUNNEL - walls angle inward, squeezing the pack to the middle, then release
function buildFunnel(cur, len){
  const right=perpRight(cur.dir);
  const angle=Math.atan2(cur.dir.x,cur.dir.z);
  const wallMat=new THREE.MeshStandardMaterial({color:0x2a0a3a,roughness:0.2,metalness:0.85,
    emissive:0xff00cc,emissiveIntensity:0.45});
  for(const side of [-1,1]){
    const wall=new THREE.Mesh(new THREE.BoxGeometry(0.35,1.5,len*1.02),wallMat);
    const mid=cur.pos.clone().addScaledVector(cur.dir,len/2)
      .addScaledVector(right,side*(TW_HALF*0.62));
    wall.position.set(mid.x,cur.pos.y+0.75,mid.z);
    // Angle inward: rotate around Y a bit toward center
    wall.rotation.y=angle + side*0.16;
    addMesh(wall);
  }
  funnelZones.push({start:cur.pos.clone(),dir:cur.dir.clone(),right,len,floorY:cur.pos.y});
}

// ── GATES ─────────────────────────────────────────────
function buildStartGate(cur){
  const right=perpRight(cur.dir), angle=Math.atan2(cur.dir.x,cur.dir.z);
  for(const s of [-1,+1]){
    const px=cur.pos.x+right.x*s*(TW_HALF+0.8), pz=cur.pos.z+right.z*s*(TW_HALF+0.8);
    const post=new THREE.Mesh(new THREE.BoxGeometry(0.3,5,0.3),new THREE.MeshBasicMaterial({color:0x00f0ff}));
    post.position.set(px,cur.pos.y+2.5,pz); addMesh(post);
  }
  const top=new THREE.Mesh(new THREE.BoxGeometry(TW+2.0,0.3,0.3),new THREE.MeshBasicMaterial({color:0x00f0ff}));
  top.position.set(cur.pos.x,cur.pos.y+5,cur.pos.z); top.rotation.y=angle; addMesh(top);
}

function buildFinishGate(cur){
  FINISH_POS.set(cur.pos.x,cur.pos.y,cur.pos.z);
  const right=perpRight(cur.dir), angle=Math.atan2(cur.dir.x,cur.dir.z);
  const am=new THREE.MeshBasicMaterial({color:0xffff00});
  for(const s of [-1,+1]){
    const px=cur.pos.x+right.x*s*(TW_HALF+0.5), pz=cur.pos.z+right.z*s*(TW_HALF+0.5);
    addMesh(new THREE.Mesh(new THREE.BoxGeometry(0.3,5,0.3),am)).position.set(px,cur.pos.y+2.5,pz);
  }
  const top=new THREE.Mesh(new THREE.BoxGeometry(TW+2,0.3,0.3),am);
  top.position.set(cur.pos.x,cur.pos.y+5,cur.pos.z); top.rotation.y=angle; addMesh(top);
  for(let i=0;i<9;i++){
    const off=right.clone().multiplyScalar(-2.2+i*0.55);
    const sq=new THREE.Mesh(new THREE.BoxGeometry(0.55,0.55,0.1),new THREE.MeshBasicMaterial({color:i%2===0?0xffffff:0x111111}));
    sq.position.set(cur.pos.x+off.x,cur.pos.y+5.3,cur.pos.z+off.z); sq.rotation.y=angle; addMesh(sq);
  }
  const fs=new THREE.Mesh(new THREE.BoxGeometry(TW+2,0.06,1.2),new THREE.MeshBasicMaterial({color:0xffff00}));
  fs.position.set(cur.pos.x,cur.pos.y+0.03,cur.pos.z); fs.rotation.y=angle; addMesh(fs);
  for(let i=0;i<=10;i++){
    const p=cur.pos.clone().addScaledVector(cur.dir,i*1.5);
    pathNodes.push({pos:p,dir:cur.dir.clone(),right,floorY:cur.pos.y,halfW:TW_HALF+1.0});
  }
}

function nearestNodeFromHint(worldPos, hintIdx){
  const N=pathNodes.length;
  if(N===0) return {node:null,idx:0,dist:Infinity};
  const searchWindow=Math.min(120,N);
  let best=null, bestDist=Infinity, bestIdx=hintIdx%N;
  for(let i=0;i<searchWindow;i++){
    const idx=(hintIdx+i)%N;
    const d=pathNodes[idx].pos.distanceTo(worldPos);
    if(d<bestDist){bestDist=d;best=pathNodes[idx];bestIdx=idx;}
    else if(d>bestDist+20) break;
  }
  for(let i=1;i<Math.min(40,N);i++){
    const idx=((hintIdx-i)%N+N)%N;
    const d=pathNodes[idx].pos.distanceTo(worldPos);
    if(d<bestDist){bestDist=d;best=pathNodes[idx];bestIdx=idx;}
  }
  return {node:best||pathNodes[hintIdx%N], idx:bestIdx, dist:bestDist};
}

// ── COURSE GENERATOR ─────────────────────────────────
function parseDur(str){
  if(!str||!str.trim()) return null;
  const s=str.trim().toLowerCase();
  const m=s.match(/^(\d+(?:\.\d+)?)\s*(m|min|s|sec)?$/);
  if(!m) return null;
  const n=parseFloat(m[1]),u=m[2]||'m';
  return u.startsWith('s')?n:n*60;
}

// How many track units do we need for `seconds` of race time?
// BASE_SPEED = 14 u/s, but obstacles/turns slow it to ~0.75x effective
// so targetUnits = durSecs * BASE_SPEED * 0.75
function durToUnits(secs){ return Math.round(secs * BASE_SPEED * 0.75); }

function buildCourse(durSecs){
  clearCourse();

  // Default (no duration): generate a cool 2-3 min map → target ~150s
  const targetSecs = durSecs !== null ? durSecs : 150 + Math.random()*30;
  const targetUnits = durToUnits(targetSecs);

  const edgePalettes=[
    [0x00f0ff,0xff00cc],[0xffff00,0xff8800],[0x00ff88,0x00aaff],[0xaa44ff,0xff4488],[0xff4400,0x00f0ff],
    [0x44ffff,0xffaa00],[0xff44ff,0x44ff88]
  ];
  const rnd=(a,b)=>a+Math.floor(Math.random()*(b-a+1));

  let cur = makeCursor(0, 0, 6, 0, -1);
  START_POS.set(cur.pos.x, cur.pos.y+BALL_R+0.5, cur.pos.z-2);

  // Start pad -- use spine system, wider spawn area for 1000 balls
  // Spawn pad is a wide flat section before the gate (30 units long)
  const spawnPadLen = 30;
  const gatePos = cur.pos.clone().addScaledVector(cur.dir, spawnPadLen);
  // Add spine samples for spawn pad (wider than track for staggered spawning)
  for(let i=0;i<=12;i++){
    const t=i/12;
    const p=cur.pos.clone().addScaledVector(cur.dir, spawnPadLen*t); p.y=cur.pos.y;
    pathNodes.push({pos:p.clone(),dir:cur.dir.clone(),right:perpRight(cur.dir),floorY:cur.pos.y,halfW:TW_HALF});
  }
  // Build wide spawn pad with walls
  const padMid=cur.pos.clone().addScaledVector(cur.dir,spawnPadLen/2);
  const padRy=Math.atan2(cur.dir.x,cur.dir.z);
  const padFm=new THREE.Mesh(new THREE.BoxGeometry(TW,0.4,spawnPadLen),_floorMat);
  padFm.position.set(padMid.x,cur.pos.y-0.2,padMid.z); padFm.rotation.y=padRy;
  padFm.castShadow=padFm.receiveShadow=true; addMesh(padFm);
  // Spawn pad walls
  const spr=new THREE.Vector3(Math.cos(padRy),0,Math.sin(padRy));
  for(const side of [-1,1]){
    const wx=padMid.x+spr.x*side*(TW_HALF+0.04);
    const wz=padMid.z+spr.z*side*(TW_HALF+0.04);
    const wm=new THREE.Mesh(new THREE.BoxGeometry(0.3,1.4,spawnPadLen),_wallMat);
    wm.position.set(wx,cur.pos.y+0.5,wz); wm.rotation.y=padRy;
    wm.castShadow=true; addMesh(wm);
    const gm=new THREE.Mesh(new THREE.BoxGeometry(0.12,0.12,spawnPadLen),
      new THREE.MeshBasicMaterial({color:side<0?0x00f0ff:0xff00cc}));
    gm.position.set(wx,cur.pos.y+1.32,wz); gm.rotation.y=padRy; addMesh(gm);
  }
  buildStartGate({pos:gatePos, dir:cur.dir});
  cur = makeCursor(gatePos.x, cur.pos.y, gatePos.z, cur.dir.x, cur.dir.z);

  // Segment type pool — weighted toward variety
  // Build a random flowing map like a real marble track
  // Mix of: long sweeps, spirals, drops, S-bends, straights
  // Each race is totally different
  const trackStyles = ['sweep_right','sweep_left','s_bend','spiral_drop','straight_run','ramp_straight'];
  const obstacleTypes = ['bumper_gauntlet','hammer_zone','blade_zone','wind_zone','narrow_gate','trap_door','tube_run','funnel_squeeze'];
  
  // Shuffle both
  function shuffleArr(a){for(let i=a.length-1;i>0;i--){const j=rnd(0,i);[a[i],a[j]]=[a[j],a[i]];} return a;}
  shuffleArr(obstacleTypes);
  
  // Build pool: alternate between track shape and obstacle
  // guarantees every obstacle appears once, track shapes are random
  const segPool=[];
  for(let i=0;i<obstacleTypes.length;i++){
    // 1-3 track shape sections between each obstacle
    const numShapes = rnd(1,3);
    for(let j=0;j<numShapes;j++){
      segPool.push(trackStyles[rnd(0,trackStyles.length-1)]);
    }
    segPool.push(obstacleTypes[i]);
  }
  // Sprinkle in 1-2 forks (branching paths) at random positions
  const numForks = rnd(1,2);
  for(let f=0; f<numForks; f++){
    const insertAt = rnd(2, segPool.length-1);
    segPool.splice(insertAt, 0, 'fork');
  }
  // End with a couple track sections leading to finish
  segPool.push(trackStyles[rnd(0,trackStyles.length-1)],'straight_run');
  // Shuffle pool
  function shuffle(a){for(let i=a.length-1;i>0;i--){const j=rnd(0,i);[a[i],a[j]]=[a[j],a[i]];} return a;}
  let pool = segPool;
  let pIdx = 0;

  // Keep adding sections until we hit the target course length
  let safetyCount = 0;
  while(pIdx < pool.length && safetyCount < 80){
    safetyCount++;
    const type = pool[pIdx % pool.length]; pIdx++;
    const [eL,eR] = edgePalettes[pIdx % edgePalettes.length];

    if(type==='straight_run'){
      // Long straight, feels fast
      cur = segStraight(cur, rnd(30,55), eL, eR);

    } else if(type==='sweep_right'){
      // Big sweeping right turn - like the outer loops in the drawing
      const angle = Math.PI/4 + Math.random()*(Math.PI/4); // 45-90 deg sweep
      const radius = rnd(35,60); // large radius = gentle feel
      cur = segCurve(cur, +angle, radius, eL, eR);
      cur = segStraight(cur, rnd(10,20), eL, eR);

    } else if(type==='sweep_left'){
      // Big sweeping left turn
      const angle = Math.PI/4 + Math.random()*(Math.PI/4);
      const radius = rnd(35,60);
      cur = segCurve(cur, -angle, radius, eL, eR);
      cur = segStraight(cur, rnd(10,20), eL, eR);

    } else if(type==='s_bend'){
      // S-curve - gentle left then right (or right then left)
      const angle = Math.PI/5 + Math.random()*(Math.PI/8); // 36-58 deg
      const radius = rnd(28,45);
      const dir = Math.random()<0.5?1:-1;
      cur = segCurve(cur, dir*angle, radius, eL, eR);
      cur = segStraight(cur, rnd(8,16), eL, eR);
      cur = segCurve(cur, -dir*angle, radius, eR, eL);
      cur = segStraight(cur, rnd(8,16), eL, eR);

    } else if(type==='spiral_drop'){
      // Smooth helical descent - curves and drops together, no jagged cuts
      const dir = Math.random()<0.5?1:-1;
      const radius = rnd(16,26);
      const totalAngle = (Math.PI*1.2 + Math.random()*Math.PI*1.3); // 1.2-2.5 turns worth
      const totalDrop = rnd(10,20);
      cur = segCurveDrop(cur, dir*totalAngle, radius, totalDrop, eL, eR);
      cur = segStraight(cur, rnd(8,14), eL, eR, true); // exit boost

    } else if(type==='ramp_straight'){
      // Drop down then long straight - feels like picking up speed
      const dropY = rnd(6,12), dropLen = rnd(16,26);
      cur = segRamp(cur, dropLen, dropY, eL, eR);
      cur = segStraight(cur, rnd(20,35), eL, eR, true); // boost at end

    } else if(type==='bumper_gauntlet'){
      cur = segStraight(cur, 8, eL, eR);
      buildBumpers(cur, rnd(2,4));
      cur = segStraight(cur, 20, eL, eR);
    } else if(type==='blade_zone'){
      cur = segStraight(cur, 6, eL, eR);
      buildBlade(cur);
      cur = segStraight(cur, 16, eL, eR);
    } else if(type==='wind_zone'){
      cur = segStraight(cur, 5, eL, eR);
      buildWindZone(cur, 18);
      cur = segStraight(cur, 18, eL, eR);
    } else if(type==='narrow_gate'){
      cur = segStraight(cur, 10, eL, eR);
      buildNarrowGate(cur);
      cur = segStraight(cur, 6, eL, eR);
      buildNarrowGate(cur);
      cur = segStraight(cur, 10, eL, eR);
    } else if(type==='trap_door'){
      cur = segStraight(cur, 8, eL, eR);
      buildTrapDoor(cur);
      cur = segStraight(cur, 12, eL, eR);
    } else if(type==='tube_run'){
      cur = segStraight(cur, 6, eL, eR);
      const tlen = rnd(18,26);
      buildTube(cur, tlen);
      cur = segStraight(cur, tlen+8, eL, eR);
    } else if(type==='funnel_squeeze'){
      cur = segStraight(cur, 6, eL, eR);
      const flen = rnd(14,20);
      buildFunnel(cur, flen);
      cur = segStraight(cur, flen+6, eL, eR);
    } else if(type==='hammer_zone'){
      cur = segStraight(cur, 10, eL, eR);
      buildHammers(cur, rnd(2,3));
      cur = segStraight(cur, 18, eL, eR);
    } else if(type==='fork'){
      cur = segStraight(cur, 6, eL, eR);
      cur = segFork(cur, eL, eR);
      cur = segStraight(cur, 8, eL, eR);
    }
  }

  // Final sprint + finish
  cur = segStraight(cur, 10, 0x00ff88, 0x00ff88);
  const boostP = cur.pos.clone().addScaledVector(cur.dir, -3);
  buildBoostPad(boostP, cur.dir, cur.pos.y);
  cur = segStraight(cur, 18, 0xffff00, 0xffff00);
  buildFinishGate(cur);

  // Background grid
  const midX=(START_POS.x+cur.pos.x)/2;
  const midZ=(START_POS.z+cur.pos.z)/2;
  const grid=new THREE.GridHelper(1200,200,0x00f0ff06,0x00f0ff03);
  grid.position.set(midX, cur.pos.y-12, midZ); addMesh(grid);

  START_POS.set(pathNodes[0].pos.x, pathNodes[0].pos.y+BALL_R+0.5, pathNodes[0].pos.z);
  console.log(`Course: units=${courseLength.toFixed(0)}, target=${targetUnits}, nodes=${pathNodes.length}, ${(courseLength/BASE_SPEED/0.75/60).toFixed(1)}min est.`);
}

// ── ZORBS ─────────────────────────────────────────────
var zorbs=[];
var phase='lobby';

// Shared low-poly sphere geometry for all balls (performance for 1000 balls)
const _SPHERE_GEO_HI  = new THREE.SphereGeometry(BALL_R,16,12); // subs / top ~50
const _SPHERE_GEO_LO  = new THREE.SphereGeometry(BALL_R,8,6);   // rest
const _RING_GEO       = new THREE.TorusGeometry(BALL_R*1.42,0.055,6,20);

function createZorb(name,isSub,col){
  // Use lower-poly sphere for normal users, higher for subs
  const useHi = isSub || zorbs.length < 50;
  const skin = (typeof ZSKINS!=='undefined') ? ZSKINS.resolve(name, isSub).build({THREE,color:col,isSub,BALL_R}) : null;
  const mat = skin ? skin.material : new THREE.MeshStandardMaterial({color:col,roughness:0.12,metalness:0.85,emissive:col,emissiveIntensity:isSub?0.45:0.22});
  const mesh=new THREE.Mesh(useHi?_SPHERE_GEO_HI:_SPHERE_GEO_LO, mat);
  mesh.castShadow = zorbs.length < 200;
  const ringCol = skin ? skin.ringColor : col;
  const ring=new THREE.Mesh(_RING_GEO,
    new THREE.MeshBasicMaterial({color:ringCol,transparent:true,opacity:0.5}));
  mesh._skinPulse = skin && skin.pulse;
  mesh.add(ring);
  // Only add point lights for first 40 balls (perf)
  const light = zorbs.length < 40 ? new THREE.PointLight(col,isSub?2.0:1.1,10) : null;
  if(light) mesh.add(light);
  scene.add(mesh);

  // Trail -- only for first 100 balls
  let tLine=null;
  if(zorbs.length < 100){
    const tGeo=new THREE.BufferGeometry();
    tGeo.setAttribute('position',new THREE.Float32BufferAttribute(new Float32Array(30*3),3));
    tLine=new THREE.Line(tGeo,new THREE.LineBasicMaterial({color:col,transparent:true,opacity:0.45}));
    scene.add(tLine);
  }

  // Speed streaks -- only for first 30 balls
  const streaks=[];
  if(zorbs.length < 30){
    for(let i=0;i<6;i++){
      const sg2=new THREE.BufferGeometry();
      sg2.setAttribute('position',new THREE.Float32BufferAttribute(new Float32Array(6),3));
      scene.add(new THREE.Line(sg2,new THREE.LineBasicMaterial({color:col,transparent:true,opacity:0})));
      streaks.push(scene.children[scene.children.length-1]);
    }
  }

  const spawnNode=pathNodes[Math.floor(Math.random()*Math.min(5,pathNodes.length))];
  const right=spawnNode?perpRight(spawnNode.dir):new THREE.Vector3(1,0,0);
  const sx=(spawnNode?spawnNode.pos.x:START_POS.x)+(Math.random()-0.5)*(TW-1.6)*right.x;
  const sz=(spawnNode?spawnNode.pos.z:START_POS.z)+(Math.random()-0.5)*(TW-1.6)*right.z;
  const sy=(spawnNode?spawnNode.floorY:START_POS.y)+BALL_R+0.3;

  // Name label above ball
  const nameLabel = document.createElement('div');
  nameLabel.className = 'ball-name';
  nameLabel.textContent = name;
  nameLabel.style.cssText = `position:absolute;font-family:'Courier New',monospace;font-size:9px;font-weight:700;color:#${col.toString(16).padStart(6,'0')};text-shadow:0 0 6px #${col.toString(16).padStart(6,'0')};pointer-events:none;transform:translateX(-50%);white-space:nowrap;letter-spacing:1px;`;
  document.getElementById('ui').appendChild(nameLabel);

  return {
    name,isSub,color:col,nameLabel,mesh,ring,tLine,streaks,light,
    speedF:0.88+Math.random()*0.24, wanderP:Math.random()*Math.PI*2,
    wanderFreq:0.5+Math.random()*1.4, wanderAmp:2.5+Math.random()*3.5,
    wanderP2:Math.random()*Math.PI*2,
    trailHistory:[],
    pos:new THREE.Vector3(sx,sy,sz),
    vel:new THREE.Vector3(0,0,0),
    speedMult:0.90+Math.random()*0.20,
    boost:0, boostTime:0,
    boostUsed:0,          // how many boosts used this race
    lastBoostAt:-9999,    // timestamp of last boost use
    onGround:false,
    finished:false,finishTime:0,rank:0,
    disqualified:false,
    knockFlash:0,
    ringBob:Math.random()*Math.PI*2,
    nodeIdx:0
  };
}

function removeZorb(z){
  if(z.nameLabel&&z.nameLabel.parentNode)z.nameLabel.parentNode.removeChild(z.nameLabel);
  scene.remove(z.mesh);
  if(z.tLine) scene.remove(z.tLine);
  z.streaks.forEach(s=>scene.remove(s));
}

// ── PHYSICS ───────────────────────────────────────────
function stepPhysics(z,dt){
  if(z.finished || z.disqualified) return;

  if(!z.onGround) z.vel.y+=GRAV*dt;

  // Boost — strong directional kick
  if(z.boost>0){
    const {node,idx}=nearestNodeFromHint(z.pos,z.nodeIdx);
    if(node){
      z.nodeIdx=idx;
      // Powerful boost: 3x normal push
      const bForce = 55 * z.boost;
      z.vel.x+=node.dir.x*bForce*dt;
      z.vel.z+=node.dir.z*bForce*dt;
    }
    z.boost=Math.max(0,z.boost-dt*0.7);
  }

  // Speed cap (boost can exceed normal cap briefly)
  const hSpd=Math.sqrt(z.vel.x*z.vel.x+z.vel.z*z.vel.z);
  const cap = z.boost>0.1 ? MAX_SPD*2.2 : MAX_SPD;
  if(hSpd>cap){const s=cap/hSpd; z.vel.x*=s; z.vel.z*=s;}
  if(Math.abs(z.vel.y)>32) z.vel.y=Math.sign(z.vel.y)*32;

  // Integrate
  z.pos.x+=z.vel.x*dt;
  z.pos.y+=z.vel.y*dt;
  z.pos.z+=z.vel.z*dt;

  // Nearest node
  const {node,idx}=nearestNodeFromHint(z.pos,z.nodeIdx);
  if(node) z.nodeIdx=idx;

  if(node){
    const floorY=node.floorY+BALL_R;
    const hw=node.halfW-BALL_R-0.05;

    // Floor
    if(z.pos.y<=floorY){
      z.pos.y=floorY;
      if(z.vel.y<0) z.vel.y*=-BOUNCE;
      z.onGround=true;
      // Frame-rate independent friction
      const fric=Math.pow(FRIC,dt*60);
      z.vel.x*=fric; z.vel.z*=fric;
    } else {
      z.onGround=false;
    }

    // Marble personality: layered out-of-phase wander so the pack spreads
    // across the track width instead of forming a conga line.
    if(z.onGround){
      z.wanderP  += dt*z.wanderFreq;
      z.wanderP2 += dt*z.wanderFreq*0.6;
      const wob = (Math.sin(z.wanderP) + Math.sin(z.wanderP2)*0.6) * z.wanderAmp;
      z.vel.x += node.right.x*wob*dt;
      z.vel.z += node.right.z*wob*dt;
      // Frequent small random nudges = lively, marble-like jitter
      if(Math.random()<0.08){
        z.vel.x += (Math.random()-0.5)*2.0;
        z.vel.z += (Math.random()-0.5)*2.0;
      }
      // Occasional bigger "bump off course correction" so leaders shuffle
      if(Math.random()<0.012){
        z.vel.x += node.right.x*(Math.random()-0.5)*7;
        z.vel.z += node.right.z*(Math.random()-0.5)*7;
      }
    }

    // Wall constraint - only while ball is below wall top (1.6u).
    // Hard knocks with enough height clear the wall = off the track = DQ.
    const toPos=new THREE.Vector3().subVectors(z.pos,node.pos);
    const lateral=toPos.dot(node.right);
    // Only let a ball escape over the wall if it was genuinely launched (real height + rising)
    const overWall = z.pos.y > node.floorY + 1.9 && z.vel.y > 1.5;
    if(!overWall && Math.abs(lateral)>hw){
      const push=Math.sign(lateral)*(Math.abs(lateral)-hw);
      z.pos.x-=node.right.x*push;
      z.pos.z-=node.right.z*push;
      const vLat=z.vel.x*node.right.x+z.vel.z*node.right.z;
      if(Math.sign(vLat)===Math.sign(lateral)){
        z.vel.x-=vLat*node.right.x*(1+BOUNCE*0.5);
        z.vel.z-=vLat*node.right.z*(1+BOUNCE*0.5);
      }
    } else if(Math.abs(lateral)>hw*0.75){
      // Soft inward nudge before hitting wall - smoother feel
      const inward=-Math.sign(lateral)*2;
      z.vel.x+=node.right.x*inward*dt;
      z.vel.z+=node.right.z*inward*dt;
    }

    // ★ FORWARD PUSH — keeps balls fast and moving
    if(phase==='racing'){
      const sf = z.speedMult * (z.speedF||1);
      const fwd = z.vel.x*node.dir.x + z.vel.z*node.dir.z;
      // Constant gentle push forward
      z.vel.x += node.dir.x * FORWARD_ACCEL * sf * dt;
      z.vel.z += node.dir.z * FORWARD_ACCEL * sf * dt;
      // Strong kick if below minimum speed
      if(fwd < MIN_FWD * sf){
        const kick = (MIN_FWD*sf - fwd) * 18 * dt;
        z.vel.x += node.dir.x * kick;
        z.vel.z += node.dir.z * kick;
      }
    }

    // Fell off track - ELIMINATED
    if(z.pos.y < node.floorY - 10){
      z.disqualified = true;
      z.finished = true;
      z.finishTime = performance.now();
      const dqRank = zorbs.filter(r => r.finished).length;
      z.rank = dqRank;
      z.mesh.visible = false;
      if(z.tLine) z.tLine.visible = false;
      z.streaks.forEach(s => s.visible = false);
      showKO('💀 ELIMINATED: '+z.name, 0xff2200); ZAUDIO.play('eliminated');
      const remaining = zorbs.filter(r => !r.finished);
      if(remaining.length === 0 && zorbs.length > 0){ setTimeout(resetRace, 3000); }
      return;
    }
  }

  // Boost pads
  for(const bp of boostPads){
    const toB=new THREE.Vector3().subVectors(z.pos,bp.pos);
    const fwdDist=toB.dot(bp.dir);
    const latDist=Math.abs(toB.dot(bp.right));
    if(fwdDist>-bp.halfLen&&fwdDist<bp.halfLen&&latDist<bp.halfW){
      if(z.boost<=0.1){ z.boost=1.0; showKO('⚡ BOOST: '+z.name,0x00ff88); ZAUDIO.play('boost'); }
    }
  }

  // Bumpers
  for(const b of bumperObjs){
    const dx=z.pos.x-b.x,dy=z.pos.y-b.y,dz2=z.pos.z-b.z;
    const d2=Math.sqrt(dx*dx+dy*dy+dz2*dz2);
    const minD=BALL_R+b.r;
    if(d2<minD&&d2>0.001){
      const nx=dx/d2, nz=dz2/d2;
      // Push out of bumper
      z.pos.x+=nx*(minD-d2+0.1); z.pos.z+=nz*(minD-d2+0.1);
      // Strong random electric knockback - can knock off track
      const power=14+Math.random()*10;
      z.vel.x=nx*power+(Math.random()-0.5)*8;
      z.vel.z=nz*power+(Math.random()-0.5)*8;
      z.vel.y=3+Math.random()*4;
      z.knockFlash=0.5;
      showKO('⚡ ZAPPED: '+z.name,0x00ffff); ZAUDIO.play('zap');
    }
  }

  // SPIKE PILLARS - rise/fall; when up they strike balls hard (can knock you out)
  for(const g of gateObjs){
    const up = Math.sin(g.phase) > 0; // raised half the cycle
    if(!up) continue; // sunken into floor = safe to pass over
    const gdx=z.pos.x-g.x, gdz=z.pos.z-g.z;
    const gd=Math.sqrt(gdx*gdx+gdz*gdz);
    const minG=BALL_R+g.r;
    if(gd<minG && gd>0.001 && Math.abs(z.pos.y-g.y)<2.4){
      const nx=gdx/gd, nz=gdz/gd;
      const rising = Math.cos(g.phase) > 0.3; // striking upward right now
      const pow = rising ? 13+Math.random()*6 : 6;
      z.pos.x+=nx*(minG-gd+0.05); z.pos.z+=nz*(minG-gd+0.05);
      z.vel.x+=nx*pow; z.vel.z+=nz*pow;
      if(rising){ z.vel.y=7+Math.random()*4; showKO('⚠ SPIKED: '+z.name,0xff8800); ZAUDIO.play('spike'); }
      z.knockFlash=0.45;
    }
  }

  // Fork zones: at the split, commit the ball to whichever lane it's leaning toward
  for(const fk of forkZones){
    if(fk.phase!=='split') continue;
    const toF=new THREE.Vector3().subVectors(z.pos, fk.pos);
    const along=toF.dot(fk.dir);
    if(along>-2 && along<fk.len*0.85){
      const lat=toF.dot(fk.right);
      // Pick side once (sticky) based on initial lean; then steer toward that lane center
      if(z._forkSide===undefined || along<2) z._forkSide = lat>=0 ? 1 : -1;
      const targetLat = fk.sep * z._forkSide * (along < fk.len*0.7 ? 1 : (1-(along-fk.len*0.7)/(fk.len*0.3)));
      const err = targetLat - lat;
      z.vel.x += fk.right.x*err*3.0*dt;
      z.vel.z += fk.right.z*err*3.0*dt;
    } else if(along>=fk.len*0.85){
      z._forkSide = undefined; // released at merge
    }
  }

  // Safety: clamp horizontal speed so collisions/scatter can't fling balls off-world
  {
    const vh = Math.hypot(z.vel.x, z.vel.z);
    const VMAX = 42;
    if(vh > VMAX){ const s=VMAX/vh; z.vel.x*=s; z.vel.z*=s; }
    if(z.vel.y > 22) z.vel.y = 22;
  }

  // Tube zones: squeeze to centerline, speed up, launch at exit
  for(const tz of tubeZones){
    const toZ=new THREE.Vector3().subVectors(z.pos,tz.start);
    const along=toZ.dot(tz.dir);
    if(along>0 && along<tz.len){
      const lat=toZ.dot(tz.right);
      z.vel.x += -lat*tz.right.x*6*dt + tz.dir.x*10*dt;
      z.vel.z += -lat*tz.right.z*6*dt + tz.dir.z*10*dt;
      if(!z._inTube){ z._inTube=true; }
      if(along>tz.len-2 && !z._tubeShot){
        z._tubeShot=true;
        z.vel.x+=tz.dir.x*14; z.vel.z+=tz.dir.z*14; z.vel.y+=2;
        showKO('🚀 LAUNCHED: '+z.name,0x00f0ff); ZAUDIO.play('launch');
        setTimeout(()=>{ z._tubeShot=false; },3000);
      }
    } else if(z._inTube){ z._inTube=false; }
  }

  // Funnel zones: progressive squeeze toward center (pack collisions ahoy)
  for(const fz of funnelZones){
    const toF=new THREE.Vector3().subVectors(z.pos,fz.start);
    const alongF=toF.dot(fz.dir);
    if(alongF>0 && alongF<fz.len){
      const prog=alongF/fz.len; // tighter the further in
      const latF=toF.dot(fz.right);
      const squeeze=(2.5+prog*6);
      z.vel.x += -latF*fz.right.x*squeeze*dt;
      z.vel.z += -latF*fz.right.z*squeeze*dt;
    }
  }

  // Boost pads - flying over one gives a speed surge
  for(const bp of boostPads){
    const toBp=new THREE.Vector3().subVectors(z.pos,bp.pos);
    const along=Math.abs(toBp.dot(bp.dir)), lat=Math.abs(toBp.dot(bp.right));
    if(along<bp.halfLen && lat<bp.halfW && Math.abs(z.pos.y-bp.pos.y)<1.2){
      if(!z._padCd || performance.now()-z._padCd>2500){
        z._padCd=performance.now();
        z.vel.x+=bp.dir.x*16; z.vel.z+=bp.dir.z*16;
        z.knockFlash=0.25;
        showKO('⚡ PAD BOOST: '+z.name,0x00ff88); ZAUDIO.play('pad');
      }
    }
  }

  // Finish
  if(!z.finished){
    const toFin=new THREE.Vector3().subVectors(FINISH_POS,z.pos); toFin.y=0;
    if(toFin.length()<4.5){
      z.finished=true; z.finishTime=performance.now();
      const rank=zorbs.filter(r=>r.finished).length; z.rank=rank;
      if(window.IS_HOST){
        if(rank===1){
          showBanner('🏆 WINNER: '+z.name,4500); ZAUDIO.play('finish');
          setTimeout(showEndLeaderboard,4500);
          setTimeout(resetRace,16000);
          // Broadcast winner to viewers
          if(typeof ZORBS_SESSION!=='undefined')
            ZORBS_SESSION.publishEvent('winner', z.name, rank);
        }
        showKO('🏁 #'+rank+': '+z.name,0xffff00);
        if(typeof ZORBS_SESSION!=='undefined')
          ZORBS_SESSION.publishEvent('finish', z.name, rank);
      }
    }
  }

  z.mesh.position.copy(z.pos);
  z.mesh.rotation.x-=z.vel.z/BALL_R*dt;
  z.mesh.rotation.z+=z.vel.x/BALL_R*dt;
  z.knockFlash=Math.max(0,z.knockFlash-dt);
  z.mesh.material.emissiveIntensity=z.knockFlash>0?1.5:(z.boost>0.1?0.9:z.isSub?0.42:0.2);
  z.ringBob+=dt*2.5;
  z.ring.rotation.x=Math.sin(z.ringBob)*0.15;
  // Scale ring/light with speed
  const spd=Math.sqrt(z.vel.x*z.vel.x+z.vel.z*z.vel.z);
  z.light.intensity = (z.isSub?2.0:1.2) * (1 + Math.min(spd/MAX_SPD,1)*0.8);
}

function ballCollide(){
  // Sort by nodeIdx so nearby balls on track are adjacent in array
  // Only check balls within a window (O(n) instead of O(n^2) for large counts)
  const active = zorbs.filter(z=>!z.finished&&!z.disqualified);
  const N = active.length;
  if(N<2) return;
  // For small counts use full O(n^2), for large use sliding window
  const WINDOW = N > 80 ? 12 : N;
  // Sort by nodeIdx for spatial coherence
  active.sort((a,b)=>a.nodeIdx-b.nodeIdx);
  const minD = BALL_R*2+0.02;
  for(let i=0;i<N;i++){
    const a=active[i];
    for(let j=i+1;j<Math.min(i+WINDOW+1,N);j++){
      const b=active[j];
      const dx=a.pos.x-b.pos.x, dy=a.pos.y-b.pos.y, dz=a.pos.z-b.pos.z;
      const dist2=dx*dx+dy*dy+dz*dz;
      if(dist2<minD*minD&&dist2>0.0001){
        const dist=Math.sqrt(dist2);
        const nx=dx/dist, ny=dy/dist, nz=dz/dist;
        const dvx=a.vel.x-b.vel.x, dvy=a.vel.y-b.vel.y, dvz=a.vel.z-b.vel.z;
        const dot=dvx*nx+dvy*ny+dvz*nz;
        if(dot<0){
          const e=0.6; const imp=dot*(1+e)*0.5; // stable elastic bounce
          a.vel.x-=imp*nx; a.vel.y-=imp*ny; a.vel.z-=imp*nz;
          b.vel.x+=imp*nx; b.vel.y+=imp*ny; b.vel.z+=imp*nz;
        }
        const ov=(minD-dist)*0.5+0.01;
        a.pos.x+=nx*ov; a.pos.y+=ny*ov; a.pos.z+=nz*ov;
        b.pos.x-=nx*ov; b.pos.y-=ny*ov; b.pos.z-=nz*ov;
        // Small tangential scatter ONLY on genuine impacts (keeps pack lively, not explosive)
        if(dot<-2){
          const tx=-nz, tz=nx; const scat=(Math.random()-0.5)*0.4;
          a.vel.x+=tx*scat; a.vel.z+=tz*scat;
          b.vel.x-=tx*scat; b.vel.z-=tz*scat;
        }
      }
    }
  }
}

function updateHammers(dt){
  hammers.forEach(h=>{
    h.phase+=h.speed*dt;
    h.grp.rotation.z=Math.sin(h.phase)*1.1;
    const swing=Math.sin(h.phase);
    // Tip swings ACROSS the track (along right vector), drops to ball height
    const tipX=h.x+h.right.x*swing*2.1, tipZ=h.z+h.right.z*swing*2.1;
    const tipY=h.pivY-Math.abs(Math.cos(h.phase))*2.1;
    zorbs.forEach(z=>{
      if(z.finished) return;
      const dx=z.pos.x-tipX, dy=z.pos.y-tipY, dz2=z.pos.z-tipZ;
      if(Math.sqrt(dx*dx+dy*dy+dz2*dz2)<BALL_R+1.4){
        const kick=(swing>0?1:-1)*(9+Math.random()*5);
        z.vel.x+=h.right.x*kick; z.vel.z+=h.right.z*kick; z.vel.y=3.5;
        z.knockFlash=0.5; showKO('🔨 SMASHED: '+z.name,0xff4400); ZAUDIO.play('smash');
      }
    });
  });
}

// ── VISUALS ───────────────────────────────────────────
function updateVisuals(z,frame){
  // Update name label position
  if(z.nameLabel){
    if(z.finished||z.disqualified){ z.nameLabel.style.display='none'; return; }
    const pos=z.pos.clone().add(new THREE.Vector3(0,1.2,0));
    const proj=pos.project(camera);
    const x=(proj.x*0.5+0.5)*canvas.clientWidth;
    const y=(-proj.y*0.5+0.5)*canvas.clientHeight;
    if(proj.z<1){
      z.nameLabel.style.display='block';
      z.nameLabel.style.left=x+'px';
      z.nameLabel.style.top=y+'px';
    } else { z.nameLabel.style.display='none'; }
  }
  if(z.finished) return;
  const spd=Math.sqrt(z.vel.x*z.vel.x+z.vel.z*z.vel.z);
  const ns=Math.min(spd/MAX_SPD,1);

  if(z.tLine){
    z.trailHistory.push(z.pos.clone());
    if(z.trailHistory.length>28) z.trailHistory.shift();
    if(z.trailHistory.length>1){
      const arr=new Float32Array(z.trailHistory.length*3);
      z.trailHistory.forEach((p,i)=>{arr[i*3]=p.x;arr[i*3+1]=p.y;arr[i*3+2]=p.z;});
      z.tLine.geometry.setAttribute('position',new THREE.Float32BufferAttribute(arr,3));
      z.tLine.material.opacity=0.1+ns*0.6;
    }
  }
  // Speed streaks
  z.streaks.forEach((s,i)=>{
    const a=(i/z.streaks.length)*Math.PI*2;
    const ox=Math.cos(a)*BALL_R*1.4,oy=Math.sin(a)*BALL_R*1.4;
    const len=ns*3.5+(z.boost>0.1?3:0);
    const vn=z.vel.length()>0.1?z.vel.clone().normalize():new THREE.Vector3(0,0,-1);
    const pa=s.geometry.attributes.position.array;
    pa[0]=z.pos.x+ox;pa[1]=z.pos.y+oy;pa[2]=z.pos.z;
    pa[3]=z.pos.x+ox-vn.x*len;pa[4]=z.pos.y+oy-vn.y*len;pa[5]=z.pos.z-vn.z*len;
    s.geometry.attributes.position.needsUpdate=true;
    s.material.opacity=(ns*0.6)+(z.boost>0.1?0.4:0);
  });
}

// ── CAMERA ────────────────────────────────────────────
let camMode='follow';
let camPos=new THREE.Vector3(0,8,12),camLook=new THREE.Vector3(0,0,0);
let autoTimer=0,autoIdx=0;
const autoModes=['follow','wide','top'];

function setCam(m){
  camMode=m;
  // Reset smooth cam when switching modes to avoid jump
  _camInit=false;
  // When entering free cam, seed target at current leader pos
  if(m==='free' && zorbs.length>0){
    const leader=zorbs.filter(z=>!z.finished&&!z.disqualified).sort((a,b)=>b.nodeIdx-a.nodeIdx)[0]||zorbs[0];
    if(leader){ freeCam.target.copy(leader.pos); freeCam.target.y+=4; }
  }
  document.querySelectorAll('.cb').forEach(b=>b.classList.remove('active'));
  const el=document.getElementById('btn-'+m); if(el)el.classList.add('active');
}

const freeCam = {
  target: new THREE.Vector3(0,5,0),
  phi: Math.PI/4,    // vertical angle
  theta: 0,          // horizontal angle  
  dist: 40,          // distance from target
  dragging: false,
  lastX: 0, lastY: 0
};
const _smoothCamPos = new THREE.Vector3();
let _camInit = false;
let _camLeaderName = null;
function updateCamera(dt){
  const sm=Math.min(dt*5,0.15);
  // Follow local player if they're still racing, else follow leader
  const localZorb = window._myName ? zorbs.find(z=>z.name===window._myName) : null;
  const activeZorbs = zorbs.filter(z=>!z.disqualified);
  const racingZorbs = activeZorbs.filter(z=>!z.finished);
  // Prefer: local player racing > any racing ball > local player finished > any ball
  const leader = (localZorb && !localZorb.disqualified ? localZorb : null)
    || racingZorbs.sort((a,b)=>b.nodeIdx-a.nodeIdx)[0]
    || activeZorbs[0]
    || zorbs[0];
  if(!leader) return;
  // Reset smooth cam if leader changed drastically (e.g. camera was tracking finished ball)
  if(_camLeaderName && _camLeaderName !== leader.name){
    _camInit = false; // snap to new leader immediately
  }
  _camLeaderName = leader.name;
  // Smooth the leader position we track - prevents stutter from knockbacks
  if(!_camInit){ _smoothCamPos.copy(leader.pos); _camInit=true; }
  // Max 12 units/sec movement prevents sudden jumps when ball gets zapped
  const step = new THREE.Vector3().subVectors(leader.pos, _smoothCamPos);
  const maxD = 20 * dt; // faster tracking, still smooth
  if(step.length() > maxD) step.setLength(maxD);
  _smoothCamPos.add(step);
  const lp = _smoothCamPos;
  let mode=camMode;
  if(mode==='auto'){autoTimer+=dt;if(autoTimer>7){autoTimer=0;autoIdx=(autoIdx+1)%autoModes.length;}mode=autoModes[autoIdx];}
  if(mode==='free'){
    // Spherical orbit around target point
    const sc = freeCam;
    // Keep target roughly at track level (follow leader height slowly)
    if(zorbs.length>0){
      const leader=zorbs.filter(z=>!z.finished&&!z.disqualified).sort((a,b)=>b.nodeIdx-a.nodeIdx)[0]||zorbs[0];
      if(leader) sc.target.lerp(leader.pos, 0.02); // very slow follow so it feels manual
    }
    const x = sc.target.x + sc.dist*Math.sin(sc.phi)*Math.sin(sc.theta);
    const y = sc.target.y + sc.dist*Math.cos(sc.phi);
    const z2 = sc.target.z + sc.dist*Math.sin(sc.phi)*Math.cos(sc.theta);
    camera.position.set(x,y,z2);
    camera.lookAt(sc.target);
    return;
  } else if(mode==='follow'){
    const spd=Math.sqrt(leader.vel.x*leader.vel.x+leader.vel.z*leader.vel.z);
    // Always use path node direction - never ball velocity
    // This prevents camera snapping when ball gets knocked
    const {node:camNode}=nearestNodeFromHint(lp, leader.nodeIdx||0);
    const travelDir = camNode
      ? new THREE.Vector3(camNode.dir.x,0,camNode.dir.z).normalize()
      : new THREE.Vector3(0,0,1);
    const back = travelDir.clone().negate();
    // Close behind ball, low angle - feels like racing game
    const pullDist = 3.5;
    const cp = lp.clone()
      .addScaledVector(back, pullDist)
      .add(new THREE.Vector3(0, 1.8, 0));
    // Very slow lerp for position = smooth, no snapping on hits
    camPos.lerp(cp, sm * 1.2);
    // Look slightly ahead of ball
    const lookAhead = lp.clone().addScaledVector(travelDir, 2).add(new THREE.Vector3(0,0.3,0));
    camLook.lerp(lookAhead, sm * 2);
  } else if(mode==='wide'){
    const avg=new THREE.Vector3(); zorbs.forEach(z=>avg.add(z.pos));
    if(zorbs.length>0) avg.divideScalar(zorbs.length);
    camPos.lerp(new THREE.Vector3(avg.x+10,avg.y+35,avg.z+30),sm*0.4); camLook.lerp(avg,sm);
  } else if(mode==='top'){
    camPos.lerp(new THREE.Vector3(lp.x,lp.y+32,lp.z+6),sm); camLook.lerp(lp,sm*2);
  }
  camera.position.copy(camPos); camera.lookAt(camLook);
}

// ── MINIMAP ───────────────────────────────────────────
const mmc=document.getElementById('mmc'),mmctx=mmc.getContext('2d');
function drawMinimap(){
  mmctx.clearRect(0,0,110,110);
  mmctx.fillStyle='rgba(0,0,0,0.5)'; mmctx.fillRect(0,0,110,110);
  if(!zorbs.length||!pathNodes.length) return;
  const allX=pathNodes.map(n=>n.pos.x),allZ=pathNodes.map(n=>n.pos.z);
  const minX=Math.min(...allX),maxX=Math.max(...allX),minZ=Math.min(...allZ),maxZ=Math.max(...allZ);
  const sc=Math.min(90/(maxX-minX||1),90/(maxZ-minZ||1));
  const ox=55-(minX+maxX)/2*sc, oz=55-(minZ+maxZ)/2*sc;
  mmctx.strokeStyle='rgba(0,240,255,0.3)'; mmctx.lineWidth=1.5; mmctx.beginPath();
  pathNodes.forEach((n,i)=>{
    const mx=ox+n.pos.x*sc, my=oz+n.pos.z*sc;
    i===0?mmctx.moveTo(mx,my):mmctx.lineTo(mx,my);
  });
  mmctx.stroke();
  mmctx.strokeStyle='rgba(255,255,0,0.8)'; mmctx.lineWidth=2;
  const fx=ox+FINISH_POS.x*sc,fz=oz+FINISH_POS.z*sc;
  mmctx.beginPath(); mmctx.moveTo(fx-5,fz); mmctx.lineTo(fx+5,fz); mmctx.stroke();
  zorbs.forEach(z=>{
    const mx=ox+z.pos.x*sc,my=oz+z.pos.z*sc;
    const hex='#'+z.color.toString(16).padStart(6,'0');
    mmctx.fillStyle=hex; mmctx.shadowColor=hex; mmctx.shadowBlur=5;
    mmctx.beginPath(); mmctx.arc(Math.max(5,Math.min(105,mx)),Math.max(5,Math.min(105,my)),3.5,0,Math.PI*2);
    mmctx.fill(); mmctx.shadowBlur=0;
  });
}

  const rows=document.getElementById('lbr'); rows.innerHTML='';
  sorted.slice(0,15).forEach((z,i)=>{
    const d=document.createElement('div'); d.className='lr';
    const spd=Math.sqrt(z.vel.x*z.vel.x+z.vel.z*z.vel.z);
    const dist=Math.round(z.pos.distanceTo(FINISH_POS));
    d.innerHTML='<span class="lp '+(i===0?'g':'')+'">'+(i+1)+'</span>'
      +'<span class="ln '+(z.isSub?'sub':'')+'" title="'+z.name+'">'+z.name+'</span>'
      +'<span class="ld">'+(z.finished?(z.disqualified?'DQ':'FIN'):dist+'m')+'</span>'
      +'<span class="ld" style="color:#00f0ff;font-size:8px;">⚡'+(2-z.boostUsed)+'</span>';
    rows.appendChild(d);
  });
}

let raceDurSecs=null,raceStartTime=null;
function updateTimer(){
  if(phase!=='racing'||raceDurSecs===null||raceStartTime===null) return;
  const left=Math.max(0,raceDurSecs-(performance.now()-raceStartTime)/1000);
  const el=document.getElementById('timer-display');
  el.textContent=Math.floor(left/60)+':'+(Math.floor(left%60)<10?'0':'')+Math.floor(left%60);
  if(left<30) el.classList.add('urgent');
  if(left<=0){showBanner('⏰ TIME UP!',3000);setTimeout(resetRace,3500);}
}

function handleCmd(name,cmd,isSub){
  addChat(name,cmd,isSub);
  const raw=cmd.trim().toLowerCase();
  if(raw==='!play'){
    if(zorbs.find(z=>z.name===name)||zorbs.length>=1000) return;
    if(phase!=='lobby'){
      // Queue for next race instead of silently dropping
      window._pendingJoins = window._pendingJoins||[];
      if(!window._pendingJoins.find(p=>p.name===name)){
        window._pendingJoins.push({name,isSub});
        showKO('⏳ '+name+' joins next race',0x88aaff);
      }
      return;
    }
    const c=ZCOLORS[zorbs.length%ZCOLORS.length];
    zorbs.push(createZorb(name,isSub,c));
    const dqCount=zorbs.filter(z=>z.disqualified).length; document.getElementById('cnt').textContent=zorbs.length+' racers'+(dqCount?' ('+dqCount+' DQ)':'');
  }
  if(raw==='!boost'){
    const z=zorbs.find(z=>z.name===name);
    if(z && phase==='racing' && !z.finished){
      const now = performance.now() / 1000;
      const BOOST_LIMIT = 2;
      const BOOST_COOLDOWN = 40; // seconds between boosts
      if(z.boostUsed >= BOOST_LIMIT){
        showKO('❌ NO BOOST LEFT: '+z.name, 0x888888);
      } else if(now - z.lastBoostAt < BOOST_COOLDOWN){
        const wait = Math.ceil(BOOST_COOLDOWN - (now - z.lastBoostAt));
        showKO('⏳ BOOST COOLDOWN '+wait+'s: '+z.name, 0xffaa00);
      } else {
        z.boost = isSub ? 2.2 : 1.5;
        z.boostUsed++;
        z.lastBoostAt = now;
        globalBoostFlash = isSub ? 0.9 : 0.55;
        const remaining = BOOST_LIMIT - z.boostUsed;
        showKO((isSub?'🚀 MEGA ':'⚡ BOOST: ')+z.name+' ('+remaining+' left)', isSub?0xff00cc:0x00f0ff);
      }
    }
  }
}

function streamerStart(){
  if(phase!=='lobby') return;
  // Hard block: never run on viewer tabs
  if(typeof ZORBS_SESSION !== 'undefined' && !window.IS_HOST) return;
  raceDurSecs=parseDur(document.getElementById('dur').value);
  // Build course with a new seed - broadcast to all viewers so they match
  const raceSeed = Math.floor(Math.random()*999999);
  window._currentSeed = raceSeed;
  window._courseBuilt = false; // allow rebuild
  buildCourseSeeded(raceDurSecs, raceSeed);
  window._courseBuilt = true;
  // Broadcast seed to viewers immediately + retry
  if(typeof ZORBS_SESSION !== 'undefined' && ZORBS_SESSION.amHost()){
    ZORBS_SESSION.publishEvent('seed', raceSeed, 0);
    setTimeout(()=>ZORBS_SESSION.publishEvent('seed', raceSeed, 0), 500);
    setTimeout(()=>ZORBS_SESSION.publishEvent('seed', raceSeed, 0), 1500);
  }

  // Stagger balls across the full spawn pad (up to 1000 balls)
  const spawnLen = Math.min(20, Math.ceil(zorbs.length / 8)); // rows
  zorbs.forEach((z,idx)=>{
    // spread evenly: row along track, column across width
    const row = Math.floor(idx / 8);
    const col = idx % 8;
    const spawnNodeIdx = Math.min(row * 2, 12); // stay on the spawn pad, behind the gate
    const spawnNode = pathNodes[Math.min(spawnNodeIdx, pathNodes.length-1)];
    const right = spawnNode ? perpRight(spawnNode.dir) : new THREE.Vector3(1,0,0);
    const lane  = (col/7)*2 - 1; // -1..+1
    const laneW = TW_HALF - BALL_R - 0.3; // keep fully ON the pad
    z.pos.set(
      spawnNode.pos.x + right.x*lane*laneW,
      spawnNode.floorY + BALL_R + 0.3,
      spawnNode.pos.z + right.z*lane*laneW
    );
    z.vel.set(0,0,0); z.trailHistory=[]; z.nodeIdx=0; z.onGround=false;
    z.finished=false; z.disqualified=false; z.rank=0; z.boost=0;
    z.boostUsed=0; z.lastBoostAt=-9999;
    z.mesh.visible=true;
    if(z.tLine) z.tLine.visible=true;
    z.streaks.forEach(s=>s.visible=true);
  });

  if(raceDurSecs!==null){
    document.getElementById('tpill').style.display='flex';
    const el=document.getElementById('timer-display'); el.textContent='--:--'; el.classList.remove('urgent');
  } else document.getElementById('tpill').style.display='none';
  document.getElementById('btn-go').disabled=true;
  phase='countdown';
  document.getElementById('stxt').textContent='STARTING';
  showBanner('3',900);
  setTimeout(()=>showBanner('2',900),1000);
  setTimeout(()=>showBanner('1',900),2000);
  setTimeout(()=>{
    showBanner('GO! 🚀',800); phase='racing';
    document.getElementById('stxt').textContent='RACING';
    // Broadcast race start to all viewers
    if(typeof ZORBS_SESSION !== 'undefined' && ZORBS_SESSION.amHost()){
      ZORBS_SESSION.publishEvent('phase','racing',0);
      ZORBS_SESSION.publishEvent('banner','GO! 🚀',0);
    }
    raceStartTime=performance.now();
    zorbs.forEach(z=>{
      const {node}=nearestNodeFromHint(z.pos,0);
      const d=node?node.dir:new THREE.Vector3(0,0,-1);
      // Launch balls with a good initial speed so they feel fast immediately
      const initSpd = MIN_FWD * (1.1 + Math.random()*0.3);
      z.vel.set(d.x*initSpd, 0, d.z*initSpd);
    });
  },3000);
}

function showEndLeaderboard(){
  // Show full scrolling leaderboard
  const fin=[...zorbs].filter(z=>z.finished).sort((a,b)=>a.rank-b.rank);
  const notFin=[...zorbs].filter(z=>!z.finished);

  const list=document.createElement('div');

  zorbs.forEach(z=>removeZorb(z)); zorbs.length=0;

    (window._pendingJoins||[]).forEach(p=>handleCmd(p.name,'!play',p.isSub));

  phase='lobby'; raceStartTime=null; raceDurSecs=null;
