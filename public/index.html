<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ZORBS on Stream</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;background:#000;overflow:hidden;}
#app{width:100%;height:100vh;position:relative;}
#c{display:block;width:100%;height:100%;}
#ui{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;font-family:'Courier New',monospace;}
#topbar{position:absolute;top:0;left:0;right:0;display:flex;align-items:center;justify-content:space-between;padding:10px 16px;background:linear-gradient(180deg,rgba(0,0,0,0.9)0%,transparent);}
#logo{font-size:18px;font-weight:900;letter-spacing:4px;color:#00f0ff;text-shadow:0 0 18px #00f0ff;}
#logo span{color:#ff00cc;}
#cams{display:flex;gap:5px;pointer-events:auto;}
.cb{background:rgba(0,240,255,0.07);border:1px solid rgba(0,240,255,0.28);color:#00f0ff;padding:4px 10px;border-radius:4px;font-size:10px;cursor:pointer;letter-spacing:2px;font-family:'Courier New',monospace;}
.cb.active{background:rgba(0,240,255,0.2);border-color:#00f0ff;}
#info{position:absolute;top:50px;left:12px;display:flex;flex-direction:column;gap:5px;}
.pill{background:rgba(0,0,0,0.75);border:1px solid rgba(255,255,255,0.09);border-radius:20px;padding:4px 12px;font-size:10px;color:#fff;display:flex;align-items:center;gap:6px;letter-spacing:1px;}
.dot{width:5px;height:5px;border-radius:50%;}.dg{background:#00ff88;box-shadow:0 0 6px #00ff88;animation:blink 1.5s infinite;}.dp{background:#ff00cc;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:.3;}}
#timer-display{font-size:13px;font-weight:700;color:#fff;}
.urgent{color:#ff4444!important;text-shadow:0 0 8px #ff4444!important;}
#lb{position:absolute;top:50px;right:12px;background:rgba(0,0,0,0.8);border:1px solid rgba(0,240,255,0.14);border-radius:10px;padding:10px 14px;min-width:168px;}
#lb h3{font-size:9px;letter-spacing:3px;color:rgba(0,240,255,0.38);margin-bottom:8px;}
.lr{display:flex;align-items:center;gap:6px;margin-bottom:4px;font-size:11px;}
.lp{color:rgba(255,255,255,.22);width:14px;font-size:10px;}.lp.g{color:#ffd700;}
.ln{flex:1;color:#ddd;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:85px;}.ln.sub{color:#ff00cc;}
.ld{font-size:9px;color:rgba(255,255,255,.28);}
#sp{position:absolute;top:50px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.85);border:1px solid rgba(0,240,255,0.18);border-radius:10px;padding:12px 16px;pointer-events:auto;display:flex;flex-direction:column;gap:8px;min-width:240px;}
#sp h3{font-size:9px;letter-spacing:3px;color:rgba(0,240,255,0.4);text-align:center;}
#sp-row{display:flex;gap:6px;align-items:center;}
#sp-lbl{font-size:10px;color:rgba(255,255,255,0.5);white-space:nowrap;}
#dur{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.15);border-radius:4px;padding:4px 8px;color:#fff;font-size:11px;font-family:'Courier New',monospace;width:65px;outline:none;text-align:center;}
#sp-hint{font-size:9px;color:rgba(255,255,255,0.25);}
#btn-go{background:rgba(0,240,255,0.12);border:1px solid rgba(0,240,255,0.35);color:#00f0ff;border-radius:5px;padding:6px 14px;font-size:11px;letter-spacing:2px;cursor:pointer;font-family:'Courier New',monospace;flex:1;}
#btn-go:disabled{opacity:0.3;cursor:not-allowed;}
#btn-hide{font-size:9px;color:rgba(255,255,255,0.25);cursor:pointer;text-align:center;}
#btn-show{position:absolute;top:50px;left:50%;transform:translateX(-50%);font-size:9px;color:rgba(0,240,255,0.4);cursor:pointer;background:rgba(0,0,0,0.6);border:1px solid rgba(0,240,255,0.15);border-radius:4px;padding:3px 10px;display:none;pointer-events:auto;}
#chat{position:absolute;bottom:12px;left:12px;width:185px;background:rgba(0,0,0,0.78);border:1px solid rgba(255,255,255,0.07);border-radius:10px;padding:9px;pointer-events:auto;}
#ct{font-size:9px;letter-spacing:2px;color:rgba(255,255,255,.22);margin-bottom:5px;}
#cl{height:85px;overflow:hidden;display:flex;flex-direction:column;justify-content:flex-end;gap:2px;}
.cm{font-size:10px;line-height:1.4;animation:fi .2s ease;}
.cm .u{font-weight:700;}.cm .u.s{color:#ff00cc;}.cm .u.r{color:#00f0ff;}
.cm .c{color:rgba(255,255,255,.38);}
@keyframes fi{from{opacity:0;transform:translateY(3px);}to{opacity:1;}}
#cr{display:flex;gap:4px;margin-top:5px;}
#ci{flex:1;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.11);border-radius:4px;padding:3px 6px;color:#fff;font-size:10px;font-family:'Courier New',monospace;outline:none;}
#cg{background:rgba(0,240,255,0.1);border:1px solid rgba(0,240,255,0.28);color:#00f0ff;border-radius:4px;padding:3px 8px;font-size:11px;cursor:pointer;}
#mm{position:absolute;bottom:12px;right:12px;width:110px;height:110px;border-radius:50%;overflow:hidden;border:1px solid rgba(0,240,255,0.18);background:rgba(0,0,0,0.7);}
#mmc{width:110px;height:110px;}
#banner{position:absolute;top:45%;left:50%;transform:translate(-50%,-50%);font-size:34px;font-weight:900;letter-spacing:6px;color:#fff;text-shadow:0 0 30px #00f0ff;opacity:0;pointer-events:none;transition:opacity .3s;text-align:center;white-space:nowrap;}
#kfeed{position:absolute;top:56px;left:50%;transform:translateX(-50%);display:flex;flex-direction:column;align-items:center;gap:3px;pointer-events:none;}
.kf{font-size:11px;letter-spacing:1px;animation:kfa 2.5s forwards;}
@keyframes kfa{0%{opacity:1;transform:translateY(0);}100%{opacity:0;transform:translateY(-16px);}}
#hint{position:absolute;bottom:12px;left:50%;transform:translateX(-50%);font-size:9px;color:rgba(255,255,255,.16);pointer-events:none;white-space:nowrap;}
</style>
</head>
<body>
<div id="app">
<canvas id="c"></canvas>
<div id="ui">
  <div id="topbar">
    <div id="logo">ZORBS <span>on</span> Stream</div>
    <div id="cams">
      <button class="cb active" id="btn-follow" onclick="setCam('follow')">FOLLOW</button>
      <button class="cb" id="btn-wide" onclick="setCam('wide')">WIDE</button>
      <button class="cb" id="btn-chase" onclick="setCam('chase')">CHASE</button>
      <button class="cb" id="btn-auto" onclick="setCam('auto')">AUTO</button>
    </div>
  </div>
  <div id="info">
    <div class="pill"><div class="dot dg"></div><span>LIVE</span></div>
    <div class="pill"><div class="dot dp"></div><span id="cnt">0 racers</span></div>
    <div class="pill"><span id="stxt">LOBBY</span></div>
    <div class="pill" id="tpill" style="display:none"><span id="timer-display">--:--</span></div>
  </div>
  <div id="sp">
    <h3>STREAMER CONTROLS</h3>
    <div id="sp-row">
      <span id="sp-lbl">TIMER</span>
      <input id="dur" type="text" placeholder="e.g. 3m" maxlength="5"/>
      <span id="sp-hint">optional</span>
    </div>
    <button id="btn-go" onclick="streamerStart()">START RACE</button>
    <div id="btn-hide" onclick="hidePanel()">hide panel</div>
  </div>
  <div id="btn-show" onclick="showPanel()">CONTROLS</div>
  <div id="lb"><h3>LEADERBOARD</h3><div id="lbr"></div></div>
  <div id="chat"><div id="ct">LIVE CHAT</div><div id="cl"></div>
    <div id="cr"><input id="ci" placeholder="!play or !boost" maxlength="20"/><button id="cg">go</button></div>
  </div>
  <div id="mm"><canvas id="mmc" width="110" height="110"></canvas></div>
  <div id="banner"></div>
  <div id="kfeed"></div>
  <div id="hint">arrows=cam | space=boost | F=follow</div>
</div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ═══════════════════════════════════════════════
// ZORBS on Stream v0.5 - Hot Wheels style track
// Spline-based continuous track, balls ride ON it
// ═══════════════════════════════════════════════

const canvas = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({canvas, antialias:true});
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.3;

const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x010115,0.008);
scene.background = new THREE.Color(0x010115);
const camera = new THREE.PerspectiveCamera(65,1,0.1,1000);

function onResize(){
  const w=canvas.parentElement.offsetWidth, h=canvas.parentElement.offsetHeight||window.innerHeight;
  renderer.setSize(w,h,false); camera.aspect=w/h; camera.updateProjectionMatrix();
}
onResize(); window.addEventListener('resize',onResize);

// Lighting
scene.add(new THREE.AmbientLight(0x223355,4));
const sun=new THREE.DirectionalLight(0xaabbff,2.5);
sun.position.set(40,80,20); sun.castShadow=true;
sun.shadow.mapSize.set(2048,2048);
sun.shadow.camera.left=-200; sun.shadow.camera.right=200;
sun.shadow.camera.top=200; sun.shadow.camera.bottom=-200;
sun.shadow.camera.far=800;
scene.add(sun);
const fill=new THREE.DirectionalLight(0xff00cc,0.5);
fill.position.set(-40,20,-40); scene.add(fill);
const pCyan=new THREE.PointLight(0x00f0ff,1.2,150); scene.add(pCyan);

// Stars
const sv=[];
for(let i=0;i<3000;i++) sv.push((Math.random()-.5)*800,(Math.random()-.5)*800,(Math.random()-.5)*800);
const sg=new THREE.BufferGeometry();
sg.setAttribute('position',new THREE.Float32BufferAttribute(sv,3));
scene.add(new THREE.Points(sg,new THREE.PointsMaterial({color:0xffffff,size:0.4,transparent:true,opacity:0.6})));

// Ground plane (far below)
const groundMesh=new THREE.Mesh(new THREE.PlaneGeometry(800,800),
  new THREE.MeshStandardMaterial({color:0x020210,roughness:1,metalness:0}));
groundMesh.rotation.x=-Math.PI/2; groundMesh.position.y=-40; scene.add(groundMesh);
const grid=new THREE.GridHelper(800,120,0x00f0ff0a,0x00f0ff06);
grid.position.y=-39.5; scene.add(grid);

// ── CONSTANTS ─────────────────────────────────
const BALL_R = 0.5;
const TRACK_W = 4.5;      // half-width of track surface
const TRACK_THICKNESS = 0.8;
const GRAVITY = new THREE.Vector3(0,-22,0);
const ZCOLORS = [0x00f0ff,0xff00cc,0xaaff00,0xff8800,0xff4488,0xaa44ff,0x00ffaa,0xffff00,0x44aaff,0xff6644];

// ── SPLINE TRACK SYSTEM ──────────────────────
// The track is ONE CatmullRom spline from start to finish.
// We sample it densely and build geometry from it.
// Balls find their nearest point on the spline and ride it.

let trackSpline = null;
let trackSamples = [];   // [{pos, tangent, normal, binormal, t}] sampled at even intervals
let trackMeshes = [];
let hammers=[], bumperObjs=[], boostPads=[];
let FINISH_T = 1.0;
let TOTAL_LENGTH = 1;

function clearTrack(){
  trackMeshes.forEach(m=>scene.remove(m)); trackMeshes=[];
  hammers=[]; bumperObjs=[]; boostPads=[];
  trackSpline=null; trackSamples=[];
}
function addM(m){ scene.add(m); trackMeshes.push(m); return m; }

// Sample the spline and build frame data
function sampleSpline(spline, numSamples){
  const samples=[];
  const frames=spline.computeFrenetFrames(numSamples,false);
  for(let i=0;i<=numSamples;i++){
    const t=i/numSamples;
    const pos=spline.getPoint(t);
    const tan=spline.getTangent(t).normalize();
    const norm=frames.normals[i];
    const binorm=frames.binormals[i];
    samples.push({pos:pos.clone(), tangent:tan.clone(), normal:norm.clone(), binormal:binorm.clone(), t});
  }
  // Compute cumulative arc length
  let len=0;
  samples[0].dist=0;
  for(let i=1;i<samples.length;i++){
    len+=samples[i].pos.distanceTo(samples[i-1].pos);
    samples[i].dist=len;
  }
  TOTAL_LENGTH=len;
  return samples;
}

// Get the nearest sample index to a world position
function nearestSample(worldPos){
  let best=0, bestD=Infinity;
  for(let i=0;i<trackSamples.length;i++){
    const d=trackSamples[i].pos.distanceTo(worldPos);
    if(d<bestD){bestD=d;best=i;}
  }
  return best;
}

// Get track surface normal (up direction) at sample index
// For a banked curve this points "up" relative to the track
function trackUp(sampleIdx){
  const s=trackSamples[sampleIdx];
  // The "up" for the ball to rest on is the binormal cross tangent
  // We want the direction pointing away from center of curvature
  // Use normal (points toward center) flipped, combined with world up
  // Simple approach: blend between world up and track normal
  const worldUp=new THREE.Vector3(0,1,0);
  const trackNorm=s.normal.clone();
  // If going upside-down (loop), the normal points toward center (inward)
  // Use binormal as "right", tangent as "forward", normal should point "inward"
  // Track surface up = -normal (outward from loop center)
  return trackNorm.clone().negate().normalize();
}

// ── TRACK GEOMETRY BUILDER ────────────────────
function buildTrackGeometry(samples){
  // Build the track as a tube-like ribbon along the spline
  const positions=[], normals=[], uvs=[], indices=[];
  const W=TRACK_W;

  for(let i=0;i<samples.length;i++){
    const s=samples[i];
    const right=s.binormal.clone(); // "right" across track width
    // Left and right edges of track surface
    const left=s.pos.clone().addScaledVector(right,-W);
    const right2=s.pos.clone().addScaledVector(right,W);
    // Top surface vertices
    positions.push(left.x,left.y,left.z, right2.x,right2.y,right2.z);
    // Normal points "up" from track = negative of Frenet normal (outward)
    const up=s.normal.clone().negate();
    normals.push(up.x,up.y,up.z, up.x,up.y,up.z);
    uvs.push(0,i/samples.length, 1,i/samples.length);
  }

  for(let i=0;i<samples.length-1;i++){
    const a=i*2, b=i*2+1, c=(i+1)*2, d=(i+1)*2+1;
    indices.push(a,b,c, b,d,c);
  }

  const geo=new THREE.BufferGeometry();
  geo.setAttribute('position',new THREE.Float32BufferAttribute(positions,3));
  geo.setAttribute('normal',new THREE.Float32BufferAttribute(normals,3));
  geo.setAttribute('uv',new THREE.Float32BufferAttribute(uvs,2));
  geo.setIndex(indices);

  const mat=new THREE.MeshStandardMaterial({
    color:0x141435, roughness:0.15, metalness:0.9,
    emissive:0x0a0a33, emissiveIntensity:0.4,
    side:THREE.DoubleSide
  });
  const mesh=new THREE.Mesh(geo,mat);
  mesh.castShadow=true; mesh.receiveShadow=true;
  addM(mesh);

  // Build glowing left/right edge strips
  for(const side of [-1,1]){
    const ePos=[];
    for(const s of samples){
      const p=s.pos.clone().addScaledVector(s.binormal,side*W);
      ePos.push(p.x,p.y,p.z);
    }
    const eGeo=new THREE.BufferGeometry();
    eGeo.setAttribute('position',new THREE.Float32BufferAttribute(ePos,3));
    const eCol=side>0?0x00f0ff:0xff00cc;
    const eLine=new THREE.Line(eGeo,new THREE.LineBasicMaterial({color:eCol,linewidth:2}));
    addM(eLine);
  }

  // Build support pillars every Nth sample
  const pillarEvery=Math.max(10,Math.floor(samples.length/30));
  for(let i=0;i<samples.length;i+=pillarEvery){
    const s=samples[i];
    const groundY=-38;
    const height=s.pos.y-groundY;
    if(height<1) continue;
    const pillar=new THREE.Mesh(
      new THREE.CylinderGeometry(0.12,0.18,height,6),
      new THREE.MeshStandardMaterial({color:0x111133,roughness:0.4,metalness:0.7,emissive:0x000422})
    );
    pillar.position.set(s.pos.x,groundY+height/2,s.pos.z);
    addM(pillar);
  }
}

// ── CONTROL POINTS → SPLINE ───────────────────
// Control points define the track shape.
// Each point: [x, y, z]
// The spline flows through all of them smoothly.

function generateControlPoints(complexity){
  // Build a Hot Wheels style track:
  // - Starts elevated
  // - Has banked curves, drops, rises
  // - Ends at a finish
  const pts=[];
  const seed=Math.floor(Math.random()*1000);
  const rng=(n)=>Math.sin(seed*n*127.1+n*311.7)*0.5+0.5;

  // Start FLAT - give balls time to settle before any curves
  pts.push(new THREE.Vector3(0,20,60));
  pts.push(new THREE.Vector3(0,20,45));
  pts.push(new THREE.Vector3(0,20,30));
  pts.push(new THREE.Vector3(0,20,15));
  pts.push(new THREE.Vector3(0,20,0));

  let x=0,y=20,z=0;
  const numSegments=4+complexity;

  for(let i=0;i<numSegments;i++){
    const type=i%5;
    if(type===0){
      // Long sweeping left curve going down
      const r=30+rng(i*3)*20;
      x-=r;z-=r;y-=6+rng(i)*4;
      pts.push(new THREE.Vector3(x-r*0.5,y+3,z));
      pts.push(new THREE.Vector3(x,y,z-r*0.5));
      pts.push(new THREE.Vector3(x+r*0.3,y-2,z-r));
    } else if(type===1){
      // Long sweeping right curve
      const r=28+rng(i*5)*18;
      x+=r;z-=r;y-=4+rng(i*2)*3;
      pts.push(new THREE.Vector3(x+r*0.5,y+2,z));
      pts.push(new THREE.Vector3(x,y,z-r*0.5));
      pts.push(new THREE.Vector3(x-r*0.3,y-1,z-r));
    } else if(type===2){
      // Drop and rise (valley)
      z-=40;y-=12;
      pts.push(new THREE.Vector3(x+rng(i*7)*10-5,y,z-10));
      pts.push(new THREE.Vector3(x+rng(i*8)*8-4,y-8,z-20));
      pts.push(new THREE.Vector3(x+rng(i*9)*6-3,y-4,z-35));
      y+=8; z-=20;
      pts.push(new THREE.Vector3(x,y,z));
    } else if(type===3){
      // Helix spiral going down
      const steps=4;
      const helixR=20;
      for(let h=0;h<steps;h++){
        const ang=(h/steps)*Math.PI*1.5;
        const hx=x+Math.sin(ang)*helixR;
        const hz=z-h*15-Math.cos(ang)*helixR;
        const hy=y-(h/steps)*10;
        pts.push(new THREE.Vector3(hx,hy,hz));
      }
      x+=Math.sin(Math.PI*1.5)*helixR;
      z-=steps*15;
      y-=10;
    } else {
      // Straight with slight wave
      z-=35;y-=rng(i*4)*6;
      pts.push(new THREE.Vector3(x+rng(i*6)*8-4,y+3,z-10));
      pts.push(new THREE.Vector3(x-rng(i*7)*8+4,y,z-22));
      pts.push(new THREE.Vector3(x,y,z-34));
    }
  }

  // Final approach - straighten out to finish line
  z-=20;
  pts.push(new THREE.Vector3(x,y,z-5));
  pts.push(new THREE.Vector3(x,y,z-15));
  pts.push(new THREE.Vector3(x,y,z-25)); // FINISH

  return pts;
}

function buildTrack(complexity){
  clearTrack();

  const ctrlPts=generateControlPoints(complexity);
  trackSpline=new THREE.CatmullRomCurve3(ctrlPts,false,'catmullrom',0.5);

  const numSamples=600+complexity*100;
  trackSamples=sampleSpline(trackSpline,numSamples);

  buildTrackGeometry(trackSamples);

  // Start and finish
  const startSample=trackSamples[0];
  const endSample=trackSamples[trackSamples.length-1];

  // Start gate
  const sUp=startSample.normal.clone().negate();
  const startTop=startSample.pos.clone().addScaledVector(sUp,4);
  const gm=new THREE.MeshBasicMaterial({color:0x00f0ff});
  for(const side of [-1,1]){
    const post=new THREE.Mesh(new THREE.BoxGeometry(0.2,4,0.2),gm);
    post.position.copy(startSample.pos.clone().addScaledVector(startSample.binormal,side*TRACK_W).addScaledVector(sUp,2));
    addM(post);
  }
  const crossbar=new THREE.Mesh(new THREE.BoxGeometry(TRACK_W*2+0.4,0.2,0.2),gm);
  crossbar.position.copy(startSample.pos.clone().addScaledVector(sUp,4));
  addM(crossbar);

  // Finish gate (yellow)
  const eUp=endSample.normal.clone().negate();
  const fm=new THREE.MeshBasicMaterial({color:0xffff00});
  for(const side of [-1,1]){
    const post=new THREE.Mesh(new THREE.BoxGeometry(0.2,5,0.2),fm);
    post.position.copy(endSample.pos.clone().addScaledVector(endSample.binormal,side*TRACK_W).addScaledVector(eUp,2.5));
    addM(post);
  }
  const fcross=new THREE.Mesh(new THREE.BoxGeometry(TRACK_W*2+0.4,0.2,0.2),fm);
  fcross.position.copy(endSample.pos.clone().addScaledVector(eUp,5));
  addM(fcross);
  // Checkered pattern
  for(let i=0;i<8;i++){
    const sq=new THREE.Mesh(new THREE.BoxGeometry(0.5,0.5,0.1),
      new THREE.MeshBasicMaterial({color:i%2===0?0xffffff:0x111111}));
    sq.position.copy(endSample.pos.clone().addScaledVector(endSample.binormal,(i-3.5)*0.5).addScaledVector(eUp,5.1));
    sq.rotation.setFromRotationMatrix(new THREE.Matrix4().lookAt(
      sq.position, sq.position.clone().add(endSample.tangent), eUp));
    addM(sq);
  }

  // Place hammers along track
  const hammerSpacing=Math.floor(trackSamples.length/8);
  const hammerCount=2+complexity;
  for(let i=0;i<hammerCount;i++){
    const si=Math.floor(trackSamples.length*0.1+i*(trackSamples.length*0.7/hammerCount));
    const s=trackSamples[si];
    const up=s.normal.clone().negate();
    const grp=new THREE.Group();
    const handle=new THREE.Mesh(new THREE.CylinderGeometry(0.12,0.12,3.5,8),
      new THREE.MeshStandardMaterial({color:0x334455,roughness:0.4,metalness:0.7}));
    grp.add(handle);
    const head=new THREE.Mesh(new THREE.BoxGeometry(TRACK_W*1.5,0.65,0.75),
      new THREE.MeshStandardMaterial({color:0x223344,metalness:0.95,emissive:0xff2200,emissiveIntensity:0.28}));
    head.position.y=-1.8; grp.add(head);
    const gs=new THREE.Mesh(new THREE.BoxGeometry(TRACK_W*1.55,0.12,0.8),new THREE.MeshBasicMaterial({color:0xff4400}));
    gs.position.y=-2.1; grp.add(gs);
    grp.position.copy(s.pos.clone().addScaledVector(up,2.5));
    // Orient hammer pivot to track normal
    const quat=new THREE.Quaternion();
    const upVec=new THREE.Vector3(0,1,0);
    quat.setFromUnitVectors(upVec,up);
    grp.quaternion.copy(quat);
    scene.add(grp); trackMeshes.push(grp);
    hammers.push({grp, sampleIdx:si, phase:i*(Math.PI*2/hammerCount),
      speed:(0.8+Math.random()*0.5)*(i%2===0?1:-1), up:up.clone(), pivotPos:grp.position.clone()});
  }

  // Boost pads
  const boostCount=3+complexity;
  for(let i=0;i<boostCount;i++){
    const si=Math.floor(trackSamples.length*0.15+i*(trackSamples.length*0.65/boostCount));
    const s=trackSamples[si];
    const up=s.normal.clone().negate();
    const padPos=s.pos.clone().addScaledVector(up,0.05);
    const pad=new THREE.Mesh(new THREE.BoxGeometry(TRACK_W*1.5,0.08,2.5),
      new THREE.MeshStandardMaterial({color:0x00ff88,emissive:0x00ff44,emissiveIntensity:0.5}));
    pad.position.copy(padPos);
    pad.quaternion.setFromUnitVectors(new THREE.Vector3(0,1,0),up);
    addM(pad);
    boostPads.push({sampleIdx:si, pos:padPos.clone(), radius:2.5});
  }

  console.log('Track built: '+trackSamples.length+' samples, length='+TOTAL_LENGTH.toFixed(0)+'u');
  return {start:trackSamples[0], end:trackSamples[trackSamples.length-1]};
}

const zorbs=[];
let phase='lobby';
let trackInfo=null;

function createZorb(name,isSub,col){
  const geo=new THREE.SphereGeometry(BALL_R,24,24);
  const mat=new THREE.MeshStandardMaterial({color:col,roughness:0.05,metalness:0.95,emissive:col,emissiveIntensity:isSub?0.5:0.2});
  const mesh=new THREE.Mesh(geo,mat); mesh.castShadow=true;
  mesh.add(new THREE.Mesh(new THREE.SphereGeometry(BALL_R*1.12,12,12),
    new THREE.MeshBasicMaterial({color:col,transparent:true,opacity:0.1,side:THREE.BackSide})));
  // Flat ring
  const ring=new THREE.Mesh(new THREE.TorusGeometry(BALL_R*1.4,0.055,6,28),
    new THREE.MeshBasicMaterial({color:col,transparent:true,opacity:0.55}));
  ring.rotation.x=Math.PI/2;
  mesh.add(ring);
  mesh.add(new THREE.PointLight(col,isSub?1.8:1.0,8));
  scene.add(mesh);

  // Trail
  const tGeo=new THREE.BufferGeometry();
  tGeo.setAttribute('position',new THREE.Float32BufferAttribute(new Float32Array(40*3),3));
  const tLine=new THREE.Line(tGeo,new THREE.LineBasicMaterial({color:col,transparent:true,opacity:0.5}));
  scene.add(tLine);

  // Spawn on start of track
  const s=trackSamples[Math.min(8, trackSamples.length-1)];
  const up=s.normal.clone().negate();
  const spawnOff=(Math.random()-0.5)*(TRACK_W*1.2);
  const spawnPos=s.pos.clone().addScaledVector(up,BALL_R+0.1).addScaledVector(s.binormal,spawnOff);

  return {
    name,isSub,color:col,mesh,ring,tLine,
    trailHistory:[],
    pos:spawnPos.clone(),
    vel:new THREE.Vector3(0,0,0),
    boost:0,
    sampleIdx:2,  // which sample we're nearest to (progress tracker)
    onTrack:false,
    airTime:0,
    finished:false,finishTime:0,rank:0,
    knockFlash:0,
    ringBob:Math.random()*Math.PI*2
  };
}

function removeZorb(z){
  scene.remove(z.mesh); scene.remove(z.tLine);
}

// ── PHYSICS ────────────────────────────────────
// Hot Wheels physics:
// 1. Find nearest point on spline
// 2. Compute surface normal (track "up")
// 3. Apply gravity relative to track surface
// 4. Keep ball ON surface with a strong constraint
// 5. Let ball slide forward along track naturally

function stepPhysics(z, dt){
  if(z.finished) return;

  // Find nearest sample
  let si=z.sampleIdx;
  // Search nearby samples for closest (not entire array - too slow)
  const searchRange=40;
  let bestD=Infinity;
  const lo=Math.max(0,si-10);
  const hi=Math.min(trackSamples.length-1,si+searchRange*4); // strongly bias forward
  for(let i=lo;i<=hi;i++){
    const d=trackSamples[i].pos.distanceTo(z.pos);
    if(d<bestD){bestD=d;si=i;}
  }
  z.sampleIdx=si;
  const sample=trackSamples[si];

  // Track frame
  const trackFwd=sample.tangent.clone();
  const trackRight=sample.binormal.clone();
  const trackUp=sample.normal.clone().negate(); // points away from center = "up" for ball

  // Surface point (where ball should rest)
  const surfacePoint=sample.pos.clone().addScaledVector(trackUp,BALL_R);

  // Vector from surface to ball
  const toSurface=new THREE.Vector3().subVectors(z.pos,surfacePoint);
  const distFromSurface=toSurface.dot(trackUp); // positive = above track, negative = below

  // Gravity (full world gravity)
  z.vel.addScaledVector(GRAVITY,dt);

  // Boost
  if(z.boost>0){
    z.vel.addScaledVector(trackFwd,z.boost*15*dt);
    z.boost=Math.max(0,z.boost-dt);
  }

  // ── TRACK SURFACE CONSTRAINT ─────────────────
  // If close to track, apply surface physics
  // Strong track sticking - Hot Wheels style
  const trackProximity = 4.0;
  if(distFromSurface < trackProximity && distFromSurface > -2.5){
    z.onTrack = true;
    z.airTime = 0;

    // Hard surface correction - snap ball to surface
    if(distFromSurface < BALL_R){
      // Push above surface
      z.pos.addScaledVector(trackUp, BALL_R - distFromSurface);
      const vN = z.vel.dot(trackUp);
      if(vN < 0) z.vel.addScaledVector(trackUp, -vN * 1.1);
    }

    // FULLY cancel gravity in track-normal direction
    // This is what makes Hot Wheels loops work - centripetal force replaces gravity
    const gravDotUp = GRAVITY.dot(trackUp);
    z.vel.addScaledVector(trackUp, -gravDotUp * dt);

    // Strong lateral damping - ball cannot drift sideways off track
    const velRight = z.vel.dot(trackRight);
    z.vel.addScaledVector(trackRight, -velRight * Math.min(1, dt * 15));

    // Light forward friction only
    const velFwd = z.vel.dot(trackFwd);
    const newFwd = velFwd * Math.pow(0.994, dt * 60);
    z.vel.addScaledVector(trackFwd, newFwd - velFwd);

    // Always-forward push
    if(phase === "racing"){
      const fwdSpeed = z.vel.dot(trackFwd);
      if(fwdSpeed < 2.0){
        z.vel.addScaledVector(trackFwd, (2.0 - fwdSpeed) * 3.0 * dt);
      }
    }

    // Wall constraint - hard stop at track edges
    const lateralOff = toSurface.dot(trackRight);
    const maxLat = TRACK_W - BALL_R - 0.1;
    if(Math.abs(lateralOff) > maxLat){
      const push = Math.sign(lateralOff) * (Math.abs(lateralOff) - maxLat + 0.05);
      z.pos.addScaledVector(trackRight, -push);
      const vR = z.vel.dot(trackRight);
      if(Math.sign(vR) === Math.sign(lateralOff))
        z.vel.addScaledVector(trackRight, -vR * 1.3);
    }

  } else {
    z.onTrack = false;
    z.airTime += dt;
    // Quick respawn if off track
    if(z.airTime > 1.5 || distFromSurface < -6){
      const rsi = Math.max(0, z.sampleIdx - 3);
      const rs = trackSamples[rsi];
      const rup = rs.normal.clone().negate();
      z.pos.copy(rs.pos.clone().addScaledVector(rup, BALL_R + 0.2));
      z.vel.copy(rs.tangent.clone().multiplyScalar(2.5));
      z.airTime = 0; z.sampleIdx = rsi;
      showKO("FELL OFF: " + z.name, 0xff4444);
    }
  }

  // Speed cap
  const spd=z.vel.length();
  if(spd>28) z.vel.multiplyScalar(28/spd);

  // Integrate
  z.pos.addScaledVector(z.vel,dt);

  // Check boost pads
  for(const bp of boostPads){
    if(z.pos.distanceTo(bp.pos)<bp.radius+BALL_R){
      const s2=trackSamples[bp.sampleIdx];
      z.vel.addScaledVector(s2.tangent,5);
      showKO('BOOST: '+z.name,0x00ff88);
    }
  }

  // Finish check
  if(!z.finished&&z.sampleIdx>=trackSamples.length-15){
    z.finished=true; z.finishTime=performance.now();
    const rank=zorbs.filter(r=>r.finished).length; z.rank=rank;
    if(rank===1){showBanner('WINNER: '+z.name,4500);setTimeout(resetRace,5500);}
    showKO('FINISH #'+rank+': '+z.name,0xffff00);
  }

  // Mesh
  z.mesh.position.copy(z.pos);
  // Orient ball upright relative to track
  const up2=sample.normal.clone().negate();
  const quat=new THREE.Quaternion();
  quat.setFromUnitVectors(new THREE.Vector3(0,1,0),up2);
  z.mesh.quaternion.slerp(quat,0.2);
  // Roll
  const rollAx=new THREE.Vector3().crossVectors(up2,z.vel.clone().normalize()).normalize();
  const rollSpd=z.vel.length()/BALL_R*dt;
  if(rollSpd>0.01){
    const rollQ=new THREE.Quaternion().setFromAxisAngle(rollAx,rollSpd);
    z.mesh.quaternion.multiply(rollQ);
  }

  z.knockFlash=Math.max(0,z.knockFlash-dt);
  z.mesh.material.emissiveIntensity=z.knockFlash>0?1.4:z.isSub?0.45:0.2;
  // Ring bob
  z.ringBob+=dt*3;
  z.ring.rotation.x=Math.sin(z.ringBob)*0.15;
}

function ballCollide(){
  for(let i=0;i<zorbs.length;i++){
    for(let j=i+1;j<zorbs.length;j++){
      const a=zorbs[i],b=zorbs[j];
      if(a.finished||b.finished) continue;
      const d=new THREE.Vector3().subVectors(a.pos,b.pos);
      const dist=d.length(),minD=BALL_R*2+0.02;
      if(dist<minD&&dist>0.001){
        d.normalize();
        const rv=new THREE.Vector3().subVectors(a.vel,b.vel);
        const dot=rv.dot(d);
        if(dot<0){
          const imp=d.clone().multiplyScalar(dot*0.2);
          a.vel.sub(imp); b.vel.add(imp);
        }
        const ov=(minD-dist)*0.5+0.01;
        a.pos.addScaledVector(d,ov); b.pos.addScaledVector(d,-ov);
      }
    }
  }
}

function updateHammers(dt){
  hammers.forEach(h=>{
    h.phase+=h.speed*dt;
    // Swing hammer perpendicular to track
    const swingAng=Math.sin(h.phase)*1.0;
    h.grp.rotation.z=swingAng; // local rotation relative to track orientation
    // Tip world position
    const localTip=new THREE.Vector3(0,-1.8,0);
    localTip.applyQuaternion(h.grp.quaternion);
    const tipPos=h.grp.position.clone().add(localTip);
    zorbs.forEach(z=>{
      if(z.finished) return;
      const diff=new THREE.Vector3().subVectors(z.pos,tipPos);
      if(diff.length()<BALL_R+1.0){
        // Push ball sideways along track, keep forward
        const s=trackSamples[h.sampleIdx];
        const pushDir=s.binormal.clone().multiplyScalar(Math.sign(diff.dot(s.binormal)));
        z.vel.addScaledVector(pushDir,2.5);
        z.vel.addScaledVector(h.up,1.0);
        z.knockFlash=0.3;
        showKO('SMASHED: '+z.name,0xff4400);
      }
    });
  });
}

// ── VISUALS ─────────────────────────────────────
function updateVisuals(z,frame){
  if(z.finished) return;
  const spd=z.vel.length(),ns=Math.min(spd/20,1);
  z.trailHistory.push(z.pos.clone());
  if(z.trailHistory.length>35) z.trailHistory.shift();
  if(z.trailHistory.length>1){
    const arr=new Float32Array(z.trailHistory.length*3);
    z.trailHistory.forEach((p,i)=>{arr[i*3]=p.x;arr[i*3+1]=p.y;arr[i*3+2]=p.z;});
    z.tLine.geometry.setAttribute('position',new THREE.Float32BufferAttribute(arr,3));
    z.tLine.material.opacity=0.2+ns*0.5;
  }
}

// ── CAMERA ──────────────────────────────────────
let camMode='follow',camPos=new THREE.Vector3(0,30,60),camLook=new THREE.Vector3(0,0,0);
let autoTimer=0,autoIdx=0;
const autoModes=['follow','chase','wide'];

function setCam(m){
  camMode=m;
  document.querySelectorAll('.cb').forEach(b=>b.classList.remove('active'));
  const el=document.getElementById('btn-'+m); if(el)el.classList.add('active');
}

function updateCamera(dt){
  const sm=Math.min(dt*4,0.12);
  const leader=zorbs.filter(z=>!z.finished).sort((a,b)=>b.sampleIdx-a.sampleIdx)[0]||zorbs[0];
  if(!leader) return;
  const lp=leader.pos;
  let mode=camMode;
  if(mode==='auto'){autoTimer+=dt;if(autoTimer>8){autoTimer=0;autoIdx=(autoIdx+1)%autoModes.length;}mode=autoModes[autoIdx];}

  if(mode==='follow'){
    // Behind and above, looking at ball
    const si=Math.max(0,leader.sampleIdx-15);
    const s=trackSamples[si];
    const up=s.normal.clone().negate();
    const cp=lp.clone().sub(s.tangent.clone().multiplyScalar(6)).addScaledVector(up,3);
    camPos.lerp(cp,sm*2); camLook.lerp(lp,sm*3);
  } else if(mode==='chase'){
    // Low, tight follow
    const si=Math.max(0,leader.sampleIdx-8);
    const s=trackSamples[si];
    const up=s.normal.clone().negate();
    const cp=lp.clone().sub(s.tangent.clone().multiplyScalar(4)).addScaledVector(up,1.5);
    camPos.lerp(cp,sm*2.5); camLook.lerp(lp.clone().addScaledVector(s.tangent,3),sm*3);
  } else if(mode==='wide'){
    const avg=new THREE.Vector3(); zorbs.forEach(z=>avg.add(z.pos)); if(zorbs.length>0)avg.divideScalar(zorbs.length);
    camPos.lerp(new THREE.Vector3(avg.x+15,avg.y+35,avg.z+30),sm*0.35); camLook.lerp(avg,sm);
  }
  camera.position.copy(camPos); camera.lookAt(camLook);
}

// ── MINIMAP ──────────────────────────────────────
const mmc=document.getElementById('mmc'),mmctx=mmc.getContext('2d');
function drawMinimap(){
  mmctx.clearRect(0,0,110,110); mmctx.fillStyle='rgba(0,0,0,0.5)'; mmctx.fillRect(0,0,110,110);
  if(!trackSamples.length) return;
  const allX=trackSamples.map(s=>s.pos.x),allZ=trackSamples.map(s=>s.pos.z);
  const minX=Math.min(...allX),maxX=Math.max(...allX);
  const minZ=Math.min(...allZ),maxZ=Math.max(...allZ);
  const spanX=maxX-minX||1,spanZ=maxZ-minZ||1;
  const sc=Math.min(90/spanX,90/spanZ);
  const ox=55-(minX+maxX)/2*sc,oz=55-(minZ+maxZ)/2*sc;
  // Track path
  mmctx.strokeStyle='rgba(0,240,255,0.3)';mmctx.lineWidth=2;mmctx.beginPath();
  trackSamples.forEach((s,i)=>{
    const mx=ox+s.pos.x*sc,my=oz+s.pos.z*sc;
    i===0?mmctx.moveTo(mx,my):mmctx.lineTo(mx,my);
  });
  mmctx.stroke();
  // Finish
  const fs=trackSamples[trackSamples.length-1];
  mmctx.fillStyle='rgba(255,255,0,0.8)';
  mmctx.fillRect(ox+fs.pos.x*sc-3,oz+fs.pos.z*sc-3,6,6);
  // Zorbs
  zorbs.forEach(z=>{
    const mx=Math.max(5,Math.min(105,ox+z.pos.x*sc));
    const my=Math.max(5,Math.min(105,oz+z.pos.z*sc));
    const hex='#'+z.color.toString(16).padStart(6,'0');
    mmctx.fillStyle=hex; mmctx.shadowColor=hex; mmctx.shadowBlur=5;
    mmctx.beginPath(); mmctx.arc(mx,my,4,0,Math.PI*2); mmctx.fill();
    mmctx.shadowBlur=0;
  });
}

// ── RACE STATE ─────────────────────────────────────
let raceDurSecs=null,raceStartTime=null;

function parseDur(str){
  if(!str||!str.trim()) return null;
  const m=(str.trim().toLowerCase()).match(/^(\d+(?:\.\d+)?)\s*(m|min|s|sec)?$/);
  if(!m) return null;
  return m[2]&&m[2].startsWith('s')?parseFloat(m[1]):parseFloat(m[1])*60;
}

function updateTimer(){
  if(phase!=='racing'||raceDurSecs===null||raceStartTime===null) return;
  const left=Math.max(0,raceDurSecs-(performance.now()-raceStartTime)/1000);
  const el=document.getElementById('timer-display');
  el.textContent=Math.floor(left/60)+':'+(Math.floor(left%60)<10?'0':'')+Math.floor(left%60);
  if(left<30) el.classList.add('urgent');
  if(left<=0){showBanner('TIME UP!',3000);setTimeout(resetRace,3500);}
}

function handleCmd(name,cmd,isSub){
  addChat(name,cmd,isSub);
  const raw=cmd.trim().toLowerCase();
  if(raw==='!play'){
    if(zorbs.find(z=>z.name===name)||phase!=='lobby') return;
    const c=ZCOLORS[zorbs.length%ZCOLORS.length];
    zorbs.push(createZorb(name,isSub,c));
    document.getElementById('cnt').textContent=zorbs.length+' racers';
  }
  if(raw==='!boost'){
    const z=zorbs.find(z=>z.name===name);
    if(z&&phase==='racing') z.boost=isSub?2.5:1.2;
  }
}

function streamerStart(){
  if(phase!=='lobby') return;
  raceDurSecs=parseDur(document.getElementById('dur').value);
  let complexity=3;
  if(raceDurSecs!==null){
    if(raceDurSecs<=60) complexity=1;
    else if(raceDurSecs<=120) complexity=2;
    else if(raceDurSecs<=300) complexity=3;
    else if(raceDurSecs<=420) complexity=4;
    else complexity=5;
  }
  trackInfo=buildTrack(complexity);
  // Respawn zorbs at track start
  zorbs.forEach((z,idx)=>{
    const s=trackSamples[Math.min(8+idx*2, 20)];
    const up=s.normal.clone().negate();
    const off=(Math.random()-0.5)*(TRACK_W*1.2);
    z.pos.copy(s.pos.clone().addScaledVector(up,BALL_R+0.1).addScaledVector(s.binormal,off));
    z.vel.set(0,0,0); z.trailHistory=[]; z.sampleIdx=2;
  });
  if(raceDurSecs!==null){
    document.getElementById('tpill').style.display='flex';
    document.getElementById('timer-display').textContent='--:--';
    document.getElementById('timer-display').classList.remove('urgent');
  } else document.getElementById('tpill').style.display='none';
  document.getElementById('btn-go').disabled=true;
  phase='countdown'; document.getElementById('stxt').textContent='STARTING';
  showBanner('3',900);
  setTimeout(()=>showBanner('2',900),1000);
  setTimeout(()=>showBanner('1',900),2000);
  setTimeout(()=>{
    showBanner('GO!',800); phase='racing';
    document.getElementById('stxt').textContent='RACING';
    raceStartTime=performance.now();
    zorbs.forEach(z=>{
      const s=trackSamples[z.sampleIdx];
      z.vel.copy(s.tangent.clone().multiplyScalar(2+Math.random()*0.5));
    });
  },3000);
}

function resetRace(){
  zorbs.forEach(z=>removeZorb(z)); zorbs.length=0;
  phase='lobby'; raceStartTime=null; raceDurSecs=null;
  document.getElementById('cnt').textContent='0 racers';
  document.getElementById('stxt').textContent='LOBBY';
  document.getElementById('tpill').style.display='none';
  document.getElementById('btn-go').disabled=false;
  document.getElementById('dur').value='';
  showBanner('NEW RACE - TYPE !play',2500);
  setTimeout(startMock,2500);
}

document.addEventListener('keydown',e=>{
  const ms=['follow','chase','wide','auto'];
  if(e.key==='ArrowLeft'){const i=ms.indexOf(camMode);setCam(ms[(i-1+4)%4]);}
  if(e.key==='ArrowRight'){const i=ms.indexOf(camMode);setCam(ms[(i+1)%4]);}
  if(e.key===' '){if(zorbs.length>0)zorbs[0].boost=1.8;e.preventDefault();}
  if(e.key==='f'||e.key==='F')setCam('follow');
});
document.getElementById('cg').onclick=()=>{
  const v=document.getElementById('ci').value.trim(); if(!v) return;
  handleCmd('You',v,false); document.getElementById('ci').value='';
};
document.getElementById('ci').addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('cg').click();});

// ── MAIN LOOP ───────────────────────────────────────
// Build initial track so something is visible in lobby
buildTrack(3);

startMock();

let lastT=0,frame=0;
function loop(ts){
  requestAnimationFrame(loop);
  const dt=Math.min((ts-lastT)/1000,0.05); lastT=ts; frame++;
  if(phase==='racing'){
    updateTimer();
    const SUB=3;
    for(let s=0;s<SUB;s++){zorbs.forEach(z=>stepPhysics(z,dt/SUB));ballCollide();}
    updateHammers(dt);
  }
  zorbs.forEach(z=>updateVisuals(z,frame));
  updateCamera(dt);
  pCyan.intensity=1.2+Math.sin(frame*0.033)*0.38;
  pCyan.position.set(Math.sin(frame*0.011)*40,10,Math.cos(frame*0.011)*40);
  if(frame%18===0){updateLB();drawMinimap();}
  renderer.render(scene,camera);
}
requestAnimationFrame(t=>{lastT=t;loop(t);});
</script>
</body>
</html>
