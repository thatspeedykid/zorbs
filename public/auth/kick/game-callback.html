<!DOCTYPE html><html><head><title>Joining race...</title>
<style>body{background:#05050f;color:#00f0ff;font-family:'Courier New',monospace;display:flex;align-items:center;justify-content:center;height:100vh;margin:0;font-size:13px;letter-spacing:2px;flex-direction:column;gap:12px;}</style>
</head><body>
<div>VERIFYING KICK ACCOUNT...</div>
<div id="s" style="font-size:10px;color:rgba(255,255,255,0.3)">Please wait</div>
<script>
const params = new URLSearchParams(window.location.search);
const code = params.get('code');
const verifier = sessionStorage.getItem('kick_verifier') || '';
if(!code){ document.getElementById('s').textContent='Error: no code'; }
else {
  fetch('/api/kick-game-auth?code='+encodeURIComponent(code)+'&verifier='+encodeURIComponent(verifier))
    .then(r=>r.json())
    .then(data=>{
      if(data.username){
        window.location.href='/?kick_join='+encodeURIComponent(data.username)+'&sub='+(data.isSub?'1':'0');
      } else {
        document.getElementById('s').textContent='Error: '+(data.error||'unknown');
        setTimeout(()=>window.location.href='/',2500);
      }
    })
    .catch(()=>{ setTimeout(()=>window.location.href='/',2000); });
}
</script></body></html>
