<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>ZORBS — Map Editor (v0.4 beta)</title>
<style>
  :root{
    --bg:#0a0e1a; --panel:#121829; --panel2:#0e1322; --line:#23304d;
    --txt:#dfe8ff; --dim:#7f8cad; --accent:#39c8e0; --accent2:#ff8800;
    --good:#2ec27e; --bad:#ff4d5e;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;background:var(--bg);color:var(--txt);
    font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;overflow:hidden}
  a{color:var(--accent)}
  .app{display:grid;grid-template-columns:240px 1fr 280px;grid-template-rows:52px 1fr;
    height:100%;width:100%}
  header{grid-column:1/4;display:flex;align-items:center;gap:14px;padding:0 16px;
    background:var(--panel);border-bottom:1px solid var(--line)}
  header h1{font-size:16px;margin:0;letter-spacing:.5px}
  header .ver{font-size:11px;color:var(--dim);border:1px solid var(--line);
    border-radius:20px;padding:2px 8px}
  header .sp{flex:1}
  button{font:inherit;color:var(--txt);background:#1b2540;border:1px solid var(--line);
    border-radius:8px;padding:8px 12px;cursor:pointer;transition:.12s}
  button:hover{border-color:var(--accent);background:#22325a}
  button.primary{background:var(--accent);color:#04121a;border-color:var(--accent);font-weight:700}
  button.primary:hover{filter:brightness(1.1)}
  button.warn{background:#2a1320;border-color:#5a2030;color:#ffb3bd}
  button:disabled{opacity:.4;cursor:not-allowed}

  /* palette */
  aside.palette{background:var(--panel2);border-right:1px solid var(--line);overflow:auto;padding:12px}
  aside.palette h2{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--dim);
    margin:14px 0 8px}
  aside.palette h2:first-child{margin-top:0}
  .piece{display:flex;align-items:center;gap:10px;padding:9px 10px;margin-bottom:7px;
    background:#141b30;border:1px solid var(--line);border-radius:9px;cursor:grab;user-select:none}
  .piece:hover{border-color:var(--accent);background:#1a2542}
  .piece:active{cursor:grabbing}
  .piece .ic{width:30px;height:30px;flex:none;border-radius:6px;display:grid;place-items:center}
  .piece .nm{font-size:13px;font-weight:600}
  .piece .ds{font-size:10px;color:var(--dim)}
  .piece svg{width:30px;height:30px}

  /* canvas / stage */
  main.stage{position:relative;overflow:hidden;background:
    radial-gradient(1200px 600px at 50% -10%, #142036 0%, #0a0e1a 60%)}
  canvas{position:absolute;inset:0;width:100%;height:100%}
  .stagebar{position:absolute;left:12px;top:12px;display:flex;gap:8px;z-index:5}
  .stagebar button{padding:6px 10px;font-size:12px}
  .hint{position:absolute;left:50%;bottom:16px;transform:translateX(-50%);
    background:rgba(10,14,26,.85);border:1px solid var(--line);border-radius:20px;
    padding:7px 16px;font-size:12px;color:var(--dim);z-index:5}
  .valid{position:absolute;right:12px;top:12px;z-index:5;font-size:12px;
    padding:6px 12px;border-radius:8px;border:1px solid var(--line);background:rgba(10,14,26,.85)}
  .valid.ok{color:var(--good);border-color:#1d5a3e}
  .valid.bad{color:var(--bad);border-color:#5a2030}

  /* sequence strip (bottom of stage) */
  .strip{position:absolute;left:0;right:0;bottom:0;height:84px;background:rgba(10,14,26,.92);
    border-top:1px solid var(--line);display:flex;gap:6px;align-items:center;padding:8px 12px;
    overflow-x:auto;z-index:4}
  .chip{flex:none;width:62px;height:64px;border-radius:9px;background:#141b30;
    border:1px solid var(--line);display:flex;flex-direction:column;align-items:center;
    justify-content:center;gap:3px;cursor:pointer;position:relative}
  .chip.sel{border-color:var(--accent);box-shadow:0 0 0 1px var(--accent) inset}
  .chip .lbl{font-size:9px;color:var(--dim);text-align:center;line-height:1.1}
  .chip svg{width:26px;height:26px}
  .chip .x{position:absolute;top:-7px;right:-7px;width:18px;height:18px;border-radius:50%;
    background:var(--bad);color:#fff;font-size:11px;line-height:18px;text-align:center;display:none}
  .chip:hover .x{display:block}
  .strip .drop{flex:none;width:8px;height:64px;border-radius:4px}
  .strip.dragover .drop.active{background:var(--accent)}

  /* properties panel */
  aside.props{background:var(--panel2);border-left:1px solid var(--line);overflow:auto;padding:14px}
  aside.props h2{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--dim);margin:0 0 10px}
  .field{margin-bottom:12px}
  .field label{display:block;font-size:11px;color:var(--dim);margin-bottom:4px}
  .field input,.field select,.field textarea{width:100%;background:#0c1120;color:var(--txt);
    border:1px solid var(--line);border-radius:7px;padding:8px;font:inherit}
  .field textarea{resize:vertical;min-height:54px}
  .field .row{display:flex;align-items:center;gap:8px}
  .field input[type=range]{flex:1}
  .field .val{font-size:12px;color:var(--accent);min-width:38px;text-align:right}
  .empty{color:var(--dim);font-size:12px;line-height:1.5;margin-top:10px}
  .seg{display:flex;gap:6px;margin-bottom:12px}
  .seg button{flex:1;padding:6px;font-size:12px}
  .seg button.on{background:var(--accent);color:#04121a;border-color:var(--accent);font-weight:700}
  .toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%);background:#11203a;
    border:1px solid var(--accent);color:var(--txt);padding:12px 20px;border-radius:10px;
    z-index:50;opacity:0;transition:.25s;pointer-events:none}
  .toast.show{opacity:1}
</style>
</head>
<body>
<div class="app">
  <header>
    <h1>🗺️ ZORBS Map Editor</h1>
    <span class="ver">v0.4 beta</span>
    <span class="sp"></span>
    <button id="btn-clear" class="warn">Clear</button>
    <button id="btn-test">▶ Test Map</button>
    <button id="btn-submit" class="primary">Submit for Review</button>
  </header>

  <aside class="palette" id="palette"></aside>

  <main class="stage">
    <div class="stagebar">
      <button id="zin">＋</button><button id="zout">－</button><button id="zfit">Fit</button>
    </div>
    <div class="valid" id="valid">—</div>
    <canvas id="cv"></canvas>
    <div class="hint">Drag pieces from the left onto the timeline below — they snap end-to-end into a track.</div>
    <div class="strip" id="strip"></div>
  </main>

  <aside class="props" id="props">
    <h2>Map details</h2>
    <div class="field"><label>Name</label><input id="m-name" maxlength="40" placeholder="My Wild Track"></div>
    <div class="field"><label>Description</label><textarea id="m-desc" maxlength="140" placeholder="What makes this track fun?"></textarea></div>
    <div class="field"><label>Difficulty</label>
      <div class="seg" id="m-diff">
        <button data-d="easy">Easy</button><button data-d="medium" class="on">Medium</button><button data-d="hard">Hard</button>
      </div>
    </div>
    <div class="field"><label>Theme</label>
      <select id="m-theme">
        <option value="">Random</option><option value="cyberCity">Cyber City</option>
        <option value="volcano">Volcano</option><option value="glacier">Glacier</option>
        <option value="neonJungle">Neon Jungle</option><option value="deepSpace">Deep Space</option>
      </select></div>
    <hr style="border:none;border-top:1px solid var(--line);margin:16px 0">
    <h2 id="psel-h">Selected piece</h2>
    <div id="psel"><div class="empty">Click a piece in the timeline to tune it.</div></div>
  </aside>
</div>
<div class="toast" id="toast"></div>

<script>
// ============================================================================
// ZORBS MAP EDITOR — builds the same {kind,len,...} section plan the track
// generator (public/beta/track.js) consumes. The "track" is an ordered chain
// of pieces; each piece snaps onto the end of the previous one. A faithful 2D
// top-down preview is computed by integrating heading yaw exactly like the
// generator does, so what you build is what races.
// ============================================================================

// ---- piece palette: each defines defaults + which params it exposes ----
const PALETTE = [
  { kind:'straight', name:'Straight',  desc:'flat run',        color:'#5b7cff', def:{len:30} },
  { kind:'sweep',    name:'Turn',      desc:'banked curve',    color:'#39c8e0', def:{len:46,dir:1,sharp:0.06} },
  { kind:'funnel',   name:'Funnel',    desc:'wide → narrow',   color:'#ffb020', def:{len:22,min:0.45} },
  { kind:'narrower', name:'Narrower',  desc:'bottleneck',      color:'#ff7a45', def:{len:22,min:0.36} },
  { kind:'moguls',   name:'Moguls',    desc:'washboard bumps', color:'#b06bff', def:{len:30} },
  { kind:'drop',     name:'Drop',      desc:'steep descent',   color:'#2ec27e', def:{len:18,drop:1.4} },
  { kind:'spiral',   name:'Spiral',    desc:'helix descent',   color:'#ff5db0', def:{len:36,dir:1} },
  { kind:'tunnel',   name:'Tunnel',    desc:'enclosed run',    color:'#7f8cad', def:{len:22,dir:1} },
];
const SPLITTABLE = ['straight'];   // pieces that can be flagged as a split-zone (multi-path)
const byKind = k => PALETTE.find(p => p.kind === k);

// little inline SVG glyph per kind (top-down impression)
function glyph(kind, c){
  c = c || '#fff';
  const s = (p) => `<svg viewBox="0 0 32 32" fill="none" stroke="${c}" stroke-width="3" stroke-linecap="round">${p}</svg>`;
  switch(kind){
    case 'straight': return s('<path d="M16 3v26"/>');
    case 'sweep':    return s('<path d="M9 4 Q26 12 14 28"/>');
    case 'funnel':   return s('<path d="M5 4 L14 28 M27 4 L18 28"/>');
    case 'narrower': return s('<path d="M6 4 L14 16 6 28 M26 4 L18 16 26 28"/>');
    case 'moguls':   return s('<path d="M4 16 q4 -8 7 0 q4 8 7 0 q4 -8 7 0"/>');
    case 'drop':     return s('<path d="M16 3v18 M9 16l7 7 7-7"/>');
    case 'spiral':   return s('<path d="M16 16 m0 -10 a10 10 0 1 1 -7 17" /><circle cx="16" cy="16" r="3"/>');
    case 'tunnel':   return s('<rect x="6" y="5" width="20" height="22" rx="9"/>');
    default:         return s('<circle cx="16" cy="16" r="9"/>');
  }
}

// ---- state ----
let sections = [];       // the authored plan
let selIdx = -1;
let view = { ox:0, oy:0, scale:1, panx:0, pany:0 };
const author = (() => {
  try { const s = JSON.parse(localStorage.getItem('zorbs_session')||'{}'); return s.username || s.name || ''; } catch(_) { return ''; }
})();
let difficulty = 'medium';

// ---- build palette UI ----
const paletteEl = document.getElementById('palette');
function renderPalette(){
  paletteEl.innerHTML = '<h2>Track pieces</h2>';
  PALETTE.forEach(p => {
    const d = document.createElement('div');
    d.className = 'piece'; d.draggable = true; d.dataset.kind = p.kind;
    d.innerHTML = `<div class="ic" style="background:${p.color}22;border:1px solid ${p.color}55">${glyph(p.kind,p.color)}</div>
      <div><div class="nm">${p.name}</div><div class="ds">${p.desc}</div></div>`;
    d.addEventListener('dragstart', e => { e.dataTransfer.setData('kind', p.kind); e.dataTransfer.effectAllowed='copy'; });
    d.addEventListener('click', () => addPiece(p.kind));   // click also adds (mobile-friendly)
    paletteEl.appendChild(d);
  });
}
renderPalette();

// ---- sequence strip ----
const stripEl = document.getElementById('strip');
function renderStrip(){
  stripEl.innerHTML = '';
  sections.forEach((s, i) => {
    const p = byKind(s.kind);
    const chip = document.createElement('div');
    chip.className = 'chip' + (i===selIdx ? ' sel':'');
    chip.draggable = true; chip.dataset.idx = i;
    chip.innerHTML = `${glyph(s.kind, p.color)}<div class="lbl">${p.name}${s.split?'<br>⑂':''}</div><div class="x">×</div>`;
    chip.addEventListener('click', e => { if(e.target.classList.contains('x')){ removePiece(i); } else { select(i); } });
    chip.addEventListener('dragstart', e => { e.dataTransfer.setData('reorder', String(i)); e.dataTransfer.effectAllowed='move'; });
    stripEl.appendChild(chip);
  });
  if(!sections.length){
    const e = document.createElement('div'); e.className='lbl';
    e.style.cssText='color:var(--dim);padding:0 8px'; e.textContent='Empty — drag a piece here to start.';
    stripEl.appendChild(e);
  }
}
// strip is a drop target for both new pieces and reorders
stripEl.addEventListener('dragover', e => { e.preventDefault(); stripEl.classList.add('dragover'); });
stripEl.addEventListener('dragleave', () => stripEl.classList.remove('dragover'));
stripEl.addEventListener('drop', e => {
  e.preventDefault(); stripEl.classList.remove('dragover');
  const kind = e.dataTransfer.getData('kind');
  const reorder = e.dataTransfer.getData('reorder');
  const at = dropIndex(e.clientX);
  if(kind){ addPiece(kind, at); }
  else if(reorder!==''){ movePiece(+reorder, at); }
});
function dropIndex(clientX){
  const chips = [...stripEl.querySelectorAll('.chip')];
  for(let i=0;i<chips.length;i++){ const r=chips[i].getBoundingClientRect(); if(clientX < r.left+r.width/2) return i; }
  return chips.length;
}

// ---- mutations ----
function addPiece(kind, at){
  const p = byKind(kind); if(!p) return;
  const s = Object.assign({kind}, JSON.parse(JSON.stringify(p.def)));
  if(at==null||at>sections.length) at = sections.length;
  sections.splice(at, 0, s);
  pushUndo(); selIdx = at; refresh();
}
function removePiece(i){ sections.splice(i,1); if(selIdx>=sections.length) selIdx=sections.length-1; pushUndo(); refresh(); }
function movePiece(from, to){
  const [s] = sections.splice(from,1);
  if(from < to) to--;
  sections.splice(to,0,s); selIdx = to; pushUndo(); refresh();
}
function select(i){ selIdx = i; renderStrip(); renderProps(); }

// ---- undo/redo ----
let undoStack=[], redoStack=[];
function pushUndo(){ undoStack.push(JSON.stringify(sections)); if(undoStack.length>50)undoStack.shift(); redoStack=[]; }
function undo(){ if(!undoStack.length)return; redoStack.push(JSON.stringify(sections)); sections=JSON.parse(undoStack.pop()); selIdx=Math.min(selIdx,sections.length-1); refresh(); }
function redo(){ if(!redoStack.length)return; undoStack.push(JSON.stringify(sections)); sections=JSON.parse(redoStack.pop()); refresh(); }
addEventListener('keydown', e => {
  if((e.ctrlKey||e.metaKey)&&e.key==='z'){ e.preventDefault(); e.shiftKey?redo():undo(); }
  if((e.ctrlKey||e.metaKey)&&e.key==='y'){ e.preventDefault(); redo(); }
  if((e.key==='Delete'||e.key==='Backspace')&&selIdx>=0&&document.activeElement.tagName!=='INPUT'&&document.activeElement.tagName!=='TEXTAREA'){ removePiece(selIdx); }
});

// ---- properties panel ----
const pselEl = document.getElementById('psel');
function renderProps(){
  if(selIdx<0||!sections[selIdx]){ pselEl.innerHTML='<div class="empty">Click a piece in the timeline to tune it.</div>'; return; }
  const s = sections[selIdx], p = byKind(s.kind);
  let h = `<div style="display:flex;align-items:center;gap:8px;margin-bottom:12px">
    <div class="ic" style="width:34px;height:34px;border-radius:7px;background:${p.color}22;border:1px solid ${p.color}55;display:grid;place-items:center">${glyph(s.kind,p.color)}</div>
    <div><div style="font-weight:700">${p.name}</div><div style="font-size:11px;color:var(--dim)">piece ${selIdx+1} of ${sections.length}</div></div></div>`;
  h += slider('Length', 'len', s.len, 6, 120, 1);
  if('sharp' in s) h += slider('Sharpness', 'sharp', s.sharp, 0.02, 0.12, 0.005);
  if('min'   in s) h += slider('Throat width', 'min', s.min, 0.25, 0.85, 0.01);
  if('drop'  in s) h += slider('Steepness', 'drop', s.drop, 0.5, 3, 0.1);
  if('dir'   in s) h += `<div class="field"><label>Direction</label><div class="seg" id="dirseg">
      <button data-v="-1" class="${s.dir<0?'on':''}">◀ Left</button><button data-v="1" class="${s.dir>0?'on':''}">Right ▶</button></div></div>`;
  if(SPLITTABLE.includes(s.kind))
    h += `<div class="field"><label>Split zone (multiple paths)</label><div class="seg" id="splitseg">
      <button data-v="0" class="${!s.split?'on':''}">Single</button><button data-v="1" class="${s.split?'on':''}">⑂ Split</button></div></div>`;
  h += `<button class="warn" style="width:100%;margin-top:6px" onclick="removePiece(${selIdx})">Delete piece</button>`;
  pselEl.innerHTML = h;
  pselEl.querySelectorAll('input[type=range]').forEach(inp => {
    inp.addEventListener('input', () => {
      sections[selIdx][inp.dataset.k] = parseFloat(inp.value);
      inp.parentElement.querySelector('.val').textContent = fmt(inp.dataset.k, inp.value);
      draw(); validate();
    });
    inp.addEventListener('change', pushUndo);
  });
  const dseg = pselEl.querySelector('#dirseg');
  if(dseg) dseg.querySelectorAll('button').forEach(b=>b.onclick=()=>{ sections[selIdx].dir=+b.dataset.v; pushUndo(); refresh(); });
  const sseg = pselEl.querySelector('#splitseg');
  if(sseg) sseg.querySelectorAll('button').forEach(b=>b.onclick=()=>{ if(+b.dataset.v) sections[selIdx].split=true; else delete sections[selIdx].split; pushUndo(); refresh(); });
}
function fmt(k,v){ return (k==='len')? (v|0) : (+v).toFixed(2); }
function slider(label,key,val,min,max,step){
  return `<div class="field"><label>${label}</label><div class="row">
    <input type="range" data-k="${key}" min="${min}" max="${max}" step="${step}" value="${val}">
    <span class="val">${fmt(key,val)}</span></div></div>`;
}

// difficulty seg
document.getElementById('m-diff').querySelectorAll('button').forEach(b=>b.onclick=()=>{
  difficulty=b.dataset.d;
  document.getElementById('m-diff').querySelectorAll('button').forEach(x=>x.classList.toggle('on',x===b));
});

// ============================================================================
// 2D PREVIEW — integrate the centerline top-down, mirroring track.js heading
// math: each section sets a target yaw rate + width behaviour; we step it.
// ============================================================================
const STEP = 1.3, WIDTH = 7.0;
function buildPath(){
  const pts = [];
  let x=0, z=0, ang=0;          // ang = heading yaw (0 = +z / up-screen)
  let turn=0;
  // start platform
  for(let i=0;i<14;i++){ z+=STEP; pts.push({x,z,w:WIDTH*1.4,kind:'platform'}); }
  for(const s of sections){
    let target=0, len=s.len|0;
    if(s.kind==='sweep')   target = (s.dir||1) * (s.sharp||0.05);
    if(s.kind==='spiral')  target = (s.dir||1) * 0.05;
    if(s.kind==='tunnel')  target = (s.dir||1) * 0.012;
    for(let i=0;i<len;i++){
      turn += (target - turn)*0.12;
      ang += turn;
      x += Math.sin(ang)*STEP; z += Math.cos(ang)*STEP;
      let w = WIDTH;
      const t = len>1? i/(len-1):0;
      if(s.kind==='funnel')   w = WIDTH*(1 - (1-(s.min||0.45))*t);
      if(s.kind==='narrower') w = WIDTH*( t<0.5 ? 1-(1-(s.min||0.36))*(t*2) : (s.min||0.36) );
      if(s.kind==='tunnel')   w = WIDTH*0.8;
      pts.push({x,z,w,kind:s.kind,split:s.split});
    }
  }
  return pts;
}

const cv = document.getElementById('cv'), ctx = cv.getContext('2d');
function resize(){ cv.width = cv.clientWidth*devicePixelRatio; cv.height = cv.clientHeight*devicePixelRatio; draw(); }
addEventListener('resize', resize);

function fit(){
  const pts = buildPath(); if(!pts.length) return;
  let minx=1e9,maxx=-1e9,minz=1e9,maxz=-1e9;
  pts.forEach(p=>{ minx=Math.min(minx,p.x);maxx=Math.max(maxx,p.x);minz=Math.min(minz,p.z);maxz=Math.max(maxz,p.z); });
  const pad=60, W=cv.width, H=cv.height-84*devicePixelRatio;
  const sx=(W-pad*2)/Math.max(1,(maxx-minx)), sy=(H-pad*2)/Math.max(1,(maxz-minz));
  view.scale = Math.min(sx,sy,40*devicePixelRatio);
  view.panx = W/2 - ((minx+maxx)/2)*view.scale;
  view.pany = (H/2 + 20) - ((minz+maxz)/2)*view.scale;
  draw();
}
function W2S(p){ return { x: p.x*view.scale + view.panx, y: cv.height - (p.z*view.scale + view.pany) }; }

function draw(){
  ctx.clearRect(0,0,cv.width,cv.height);
  // grid
  ctx.strokeStyle='#16203a'; ctx.lineWidth=1;
  const g=40*view.scale/ (40*devicePixelRatio) * devicePixelRatio;
  // (simple faint grid)
  const pts = buildPath();
  if(pts.length<2){ return; }
  // track ribbon
  const left=[], right=[];
  for(let i=0;i<pts.length;i++){
    const a=pts[i], b=pts[Math.min(i+1,pts.length-1)];
    let dx=b.x-a.x, dz=b.z-a.z; const l=Math.hypot(dx,dz)||1; dx/=l; dz/=l;
    const nx=-dz, nz=dx;       // left normal
    left.push(W2S({x:a.x+nx*a.w, z:a.z+nz*a.w}));
    right.push(W2S({x:a.x-nx*a.w, z:a.z-nz*a.w}));
  }
  ctx.beginPath();
  left.forEach((p,i)=> i?ctx.lineTo(p.x,p.y):ctx.moveTo(p.x,p.y));
  for(let i=right.length-1;i>=0;i--) ctx.lineTo(right[i].x,right[i].y);
  ctx.closePath();
  ctx.fillStyle='rgba(57,200,224,0.10)'; ctx.fill();
  // edges colored per piece
  function edge(side){
    for(let i=1;i<pts.length;i++){
      const p = pts[i]; const col = p.kind==='platform' ? '#2a3a5e' : (byKind(p.kind)?.color || '#39c8e0');
      ctx.strokeStyle = col; ctx.lineWidth = (p.split?3:2)*devicePixelRatio;
      ctx.beginPath(); ctx.moveTo(side[i-1].x,side[i-1].y); ctx.lineTo(side[i].x,side[i].y); ctx.stroke();
    }
  }
  edge(left); edge(right);
  // centerline
  ctx.strokeStyle='rgba(223,232,255,.25)'; ctx.lineWidth=1*devicePixelRatio; ctx.setLineDash([6,6]);
  ctx.beginPath(); pts.forEach((p,i)=>{ const s=W2S(p); i?ctx.lineTo(s.x,s.y):ctx.moveTo(s.x,s.y); }); ctx.stroke();
  ctx.setLineDash([]);
  // start (green) + finish (orange) markers
  mark(W2S(pts[0]), '#2ec27e', 'START');
  mark(W2S(pts[pts.length-1]), '#ff8800', 'FINISH');
}
function mark(s,col,txt){
  ctx.fillStyle=col; ctx.beginPath(); ctx.arc(s.x,s.y,6*devicePixelRatio,0,7); ctx.fill();
  ctx.fillStyle=col; ctx.font=`${11*devicePixelRatio}px system-ui`; ctx.fillText(txt, s.x+9*devicePixelRatio, s.y+4*devicePixelRatio);
}

// pan + zoom
let drag=null;
cv.addEventListener('pointerdown', e=>{ drag={x:e.clientX,y:e.clientY,px:view.panx,py:view.pany}; });
addEventListener('pointermove', e=>{ if(!drag)return; view.panx=drag.px+(e.clientX-drag.x)*devicePixelRatio; view.pany=drag.py-(e.clientY-drag.y)*devicePixelRatio; draw(); });
addEventListener('pointerup', ()=>drag=null);
cv.addEventListener('wheel', e=>{ e.preventDefault(); const f=e.deltaY<0?1.1:0.9; view.scale*=f; draw(); }, {passive:false});
document.getElementById('zin').onclick =()=>{ view.scale*=1.2; draw(); };
document.getElementById('zout').onclick=()=>{ view.scale*=0.83; draw(); };
document.getElementById('zfit').onclick = fit;

// ---- validation ----
function validate(){
  const v = document.getElementById('valid');
  const total = sections.reduce((a,s)=>a+(s.len|0),0);
  const probs = [];
  if(sections.length<3) probs.push('add at least 3 pieces');
  if(total<120) probs.push('track too short');
  if(total>1600) probs.push('track too long');
  // no two heavy bottlenecks back to back
  for(let i=1;i<sections.length;i++){
    const heavy=k=>['funnel','narrower','drop'].includes(k);
    if(heavy(sections[i].kind)&&heavy(sections[i-1].kind)) { probs.push('two bottlenecks in a row'); break; }
  }
  const ok = probs.length===0;
  v.className = 'valid ' + (ok?'ok':'bad');
  v.textContent = ok ? `✓ Ready · ${sections.length} pieces · ~${(total*1.3/10|0)}s` : '⚠ ' + probs[0];
  document.getElementById('btn-submit').disabled = !ok;
  document.getElementById('btn-test').disabled = sections.length<2;
  return ok;
}

function refresh(){ renderStrip(); renderProps(); draw(); validate(); }

// ---- toast ----
let toastT;
function toast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); clearTimeout(toastT); toastT=setTimeout(()=>t.classList.remove('show'),2600); }

// ---- current map object ----
function currentMap(){
  return {
    name: document.getElementById('m-name').value.trim() || 'Untitled Track',
    description: document.getElementById('m-desc').value.trim(),
    difficulty, theme: document.getElementById('m-theme').value,
    author: author || 'anon',
    sections: JSON.parse(JSON.stringify(sections)),
  };
}

// ---- TEST: stash the plan and open the game in custom-map preview mode ----
document.getElementById('btn-test').onclick = ()=>{
  if(sections.length<2) return;
  try { sessionStorage.setItem('zorbs_testmap', JSON.stringify(currentMap())); } catch(_){}
  window.open('/beta/?map=test', '_blank');
};

// ---- SUBMIT ----
document.getElementById('btn-submit').onclick = async ()=>{
  if(!validate()) return;
  if(!author){ toast('Sign in on the dashboard first so we can credit your track.'); }
  const btn = document.getElementById('btn-submit'); btn.disabled=true; btn.textContent='Submitting…';
  try {
    const r = await fetch('/api/maps', { method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ action:'submit', map: currentMap() }) });
    const j = await r.json().catch(()=>({}));
    if(j && j.ok){ toast('✓ Submitted! An admin will review it soon.'); }
    else toast('Submit failed: ' + (j&&j.error||'try again'));
  } catch(e){ toast('Network error — try again.'); }
  btn.textContent='Submit for Review'; btn.disabled=false; validate();
};

document.getElementById('btn-clear').onclick = ()=>{ if(confirm('Clear the whole track?')){ sections=[]; selIdx=-1; pushUndo(); refresh(); fit(); } };

// ---- seed a starter track so the canvas isn't empty ----
function seedStarter(){
  sections = [
    {kind:'straight',len:26},
    {kind:'sweep',len:46,dir:1,sharp:0.06},
    {kind:'funnel',len:22,min:0.45},
    {kind:'straight',len:30,split:true},
    {kind:'moguls',len:28},
    {kind:'sweep',len:44,dir:-1,sharp:0.07},
    {kind:'narrower',len:20,min:0.4},
  ];
}
seedStarter();
resize(); fit(); refresh();
</script>
