<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>ZORBS — Map Editor (v0.7)</title>
<style>
  :root{
    --bg:#0a0e1a; --panel:#121829; --panel2:#0e1322; --line:#23304d;
    --txt:#dfe8ff; --dim:#7f8cad; --accent:#39c8e0; --good:#2ec27e; --bad:#ff4d5e; --splitc:#ffcc00;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;background:var(--bg);color:var(--txt);font-family:system-ui,Segoe UI,Roboto,sans-serif;overflow:hidden}
  button{font-family:inherit;cursor:pointer}
  #top{height:50px;display:flex;align-items:center;gap:10px;padding:0 14px;background:var(--panel);border-bottom:1px solid var(--line)}
  #top .logo{font-weight:800;letter-spacing:1px;color:var(--accent)}
  #top .ver{font-size:10px;color:var(--dim);margin-left:-4px}
  #top .sp{flex:1}
  #top input{background:var(--panel2);border:1px solid var(--line);color:var(--txt);border-radius:7px;padding:7px 10px;font-size:13px;width:200px}
  #top button{background:var(--panel2);border:1px solid var(--line);color:var(--txt);border-radius:7px;padding:8px 12px;font-size:12px}
  #top button.pri{background:var(--accent);color:#04141a;border:0;font-weight:700}
  #top button:disabled{opacity:.4;cursor:not-allowed}
  #main{display:flex;height:calc(100% - 50px)}
  #palette{width:184px;background:var(--panel);border-right:1px solid var(--line);padding:10px;overflow-y:auto}
  #stage{flex:1;position:relative;background:radial-gradient(circle at 50% 40%,#0d1326,#070a13)}
  #cv{width:100%;height:100%;display:block;touch-action:none}
  #side{width:300px;background:var(--panel);border-left:1px solid var(--line);padding:12px;overflow-y:auto}
  .sectitle{font-size:10px;letter-spacing:1px;color:var(--dim);margin:2px 0 8px}
  .palItem{display:flex;align-items:center;gap:8px;background:var(--panel2);border:1px solid var(--line);border-radius:8px;padding:8px;margin-bottom:6px;cursor:pointer;user-select:none}
  .palItem:hover{border-color:var(--accent)}
  .palItem:active{transform:scale(.98)}
  .palItem.split{border-style:dashed;border-color:var(--splitc)}
  .palItem.split:hover{border-color:#ffe066}
  .sw{width:18px;height:18px;border-radius:5px;flex:0 0 auto;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700}
  .palItem .nm{font-size:12px;font-weight:600}
  .palItem .ds{font-size:10px;color:var(--dim)}
  .field{margin-bottom:9px}
  .field label{display:block;font-size:10px;color:var(--dim);margin-bottom:3px}
  .field input,.field textarea,.field select{width:100%;background:var(--panel2);border:1px solid var(--line);color:var(--txt);border-radius:7px;padding:7px;font-size:12px}
  .field textarea{resize:vertical;min-height:40px}
  .seg{display:flex;gap:4px}
  .seg button{flex:1;background:var(--panel2);border:1px solid var(--line);color:var(--dim);border-radius:7px;padding:6px;font-size:11px}
  .seg button.on{background:var(--accent);color:#04141a;border-color:var(--accent);font-weight:700}
  .item{border:1px solid var(--line);border-radius:8px;margin-bottom:6px;overflow:hidden}
  .item.sel{border-color:var(--accent)}
  .item.split{border-color:var(--splitc)}
  .itemHd{display:flex;align-items:center;gap:7px;padding:7px 9px;cursor:pointer;background:var(--panel2)}
  .itemHd .nm{flex:1;font-size:12px}
  .itemHd .mini{font-size:10px;color:var(--dim)}
  .itemHd button{background:transparent;border:0;color:var(--dim);font-size:13px;padding:2px 5px}
  .itemHd button:hover{color:var(--txt)}
  .itemBody{padding:8px 10px;background:var(--panel2);border-top:1px solid var(--line)}
  .rng{display:flex;align-items:center;gap:8px;margin-bottom:6px}
  .rng label{font-size:10px;color:var(--dim);width:62px}
  .rng input[type=range]{flex:1}
  .rng .v{font-size:11px;width:42px;text-align:right;color:var(--accent)}
  .hint{font-size:11px;color:var(--dim);line-height:1.5}
  .danger{background:#3a1622!important;border:1px solid #5a2030!important;color:#ff8a9c!important}
  .full{width:100%}
  #emptyHint{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;color:var(--dim);pointer-events:none;text-align:center}
  #emptyHint h2{margin:0;color:var(--txt);font-weight:800}
  #toast{position:absolute;bottom:18px;left:50%;transform:translateX(-50%);background:#10203a;border:1px solid var(--accent);color:var(--txt);padding:10px 16px;border-radius:10px;font-size:13px;opacity:0;transition:.2s;pointer-events:none;z-index:30}
  #toast.show{opacity:1}
  #draftModal{position:absolute;inset:0;background:rgba(7,10,19,.85);display:none;align-items:center;justify-content:center;z-index:25}
  #draftBox{background:var(--panel);border:1px solid var(--line);border-radius:14px;width:520px;max-width:92%;max-height:80%;overflow:auto;padding:18px}
  #draftBox h3{margin:0 0 12px}
  .draftItem{display:flex;gap:10px;align-items:center;background:var(--panel2);border:1px solid var(--line);border-radius:8px;padding:8px;margin-bottom:8px}
  .draftItem img{width:80px;height:50px;object-fit:cover;border-radius:6px;background:#0c0f1a;flex:0 0 auto}
  .draftItem .meta{flex:1;min-width:0}
  .draftItem .meta .t{font-weight:600;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .draftItem .meta .s{font-size:11px;color:var(--dim)}
  .draftItem button{border:0;border-radius:6px;padding:7px 11px;font-size:12px}
</style>
</head>
<body>
<div id="top">
  <span class="logo">ZORBS</span><span class="ver">editor v0.7</span>
  <input id="m-name" maxlength="40" placeholder="Track name" />
  <span class="sp"></span>
  <button id="btn-clear">↻ Clear</button>
  <button id="btn-load">📂 Load</button>
  <button id="btn-save">💾 Save</button>
  <button id="btn-test">▶ Test</button>
  <button class="pri" id="btn-submit">Submit</button>
</div>
<div id="main">
  <div id="palette">
    <div class="sectitle">TRACK PIECES</div>
    <div id="pal-list"></div>
    <div class="sectitle" style="margin-top:12px">SPLIT PIECES</div>
    <div class="hint" style="margin-bottom:6px">Click to add a self-contained split — the marbles fork and rejoin inside it.</div>
    <div id="pal-splits"></div>
  </div>
  <div id="stage">
    <canvas id="cv"></canvas>
    <div id="emptyHint"><h2>Build your track</h2><div>Click a piece on the left to add it. Splits are pieces too — just drop one in.</div></div>
    <div id="toast"></div>
  </div>
  <div id="side">
    <div class="sectitle">YOUR TRACK — start → finish</div>
    <div id="trackArea"></div>
    <hr style="border:0;border-top:1px solid var(--line);margin:14px 0">
    <div class="sectitle">MAP DETAILS</div>
    <div class="field"><label>Description</label><textarea id="m-desc" maxlength="140" placeholder="What makes this track fun?"></textarea></div>
    <div class="field"><label>Difficulty</label>
      <div class="seg" id="m-diff"><button data-d="easy">Easy</button><button data-d="medium" class="on">Medium</button><button data-d="hard">Hard</button></div>
    </div>
    <div class="field"><label>Theme</label>
      <select id="m-theme">
        <option value="">Random</option><option value="cyberCity">Cyber City</option>
        <option value="volcano">Volcano</option><option value="glacier">Glacier</option>
        <option value="neonJungle">Neon Jungle</option><option value="deepSpace">Deep Space</option>
      </select>
    </div>
  </div>
</div>

<div id="draftModal"><div id="draftBox">
  <h3>Your saved drafts</h3>
  <div id="draftList"></div>
  <button class="full" style="background:var(--panel2);border:1px solid var(--line);color:var(--txt);border-radius:8px;padding:9px;margin-top:6px" onclick="closeDraftModal()">Close</button>
</div></div>

<script src="/beta/telemetry.js?v=b14"></script>
<script>
// ============================================================================
// ZORBS Map Editor v0.7 — dead-simple linear track. Every entry is ONE piece,
// including splits. A split is a SELF-CONTAINED segment: the marbles fork into
// lanes and rejoin inside it; you don't fill anything. Export auto-builds the
// branch lanes for each split, so the author just drops the piece in.
// ============================================================================

const STEP = 1.3, WIDTH = 7.0;
const TRACK_PIECES = [
  { kind:'straight', name:'Straight',  desc:'flat run',          color:'#5b7cff', def:{len:30} },
  { kind:'sweep',    name:'Turn',      desc:'banked curve',      color:'#39c8e0', def:{len:40,dir:1,sharp:0.028} },
  { kind:'funnel',   name:'Funnel',    desc:'wide → narrow',     color:'#ffb020', def:{len:22,min:0.45} },
  { kind:'narrower', name:'Narrower',  desc:'bottleneck',        color:'#ff7a45', def:{len:20,min:0.38} },
  { kind:'moguls',   name:'Moguls',    desc:'washboard bumps',   color:'#b06bff', def:{len:28} },
  { kind:'drop',     name:'Drop',      desc:'steep descent',     color:'#2ec27e', def:{len:16,drop:1.2} },
  { kind:'cascade',  name:'Cascade',   desc:'stepped descent',   color:'#5ad1a0', def:{len:44,steps:4} },
  { kind:'arena',    name:'Arena',     desc:'wide open zone',    color:'#f5c518', def:{len:40,w:14} },
  { kind:'spiral',   name:'Spiral',    desc:'helix descent',     color:'#ff5db0', def:{len:32,dir:1} },
  { kind:'tunnel',   name:'Tunnel',    desc:'enclosed run',      color:'#7f8cad', def:{len:20,dir:1} },
];
// Splits are pieces. sides = which lanes the marbles fork into; noMiddle = no straight-through.
const SPLIT_PIECES = [
  { type:'split3',  name:'Split into 3', desc:'left · middle · right', sides:['left','right'], noMiddle:false, icon:'⅄' },
  { type:'split2',  name:'Split into 2', desc:'left · right (no mid)', sides:['left','right'], noMiddle:true,  icon:'Y' },
  { type:'splitML', name:'Middle + Left',  desc:'straight + left lane', sides:['left'],  noMiddle:false, icon:'⌐' },
  { type:'splitMR', name:'Middle + Right', desc:'straight + right lane', sides:['right'], noMiddle:false, icon:'¬' },
];
const byKind = k => TRACK_PIECES.find(p => p.kind === k);
const bySplit = t => SPLIT_PIECES.find(p => p.type === t);
const clone = o => JSON.parse(JSON.stringify(o));
const author = (() => { try { const s=JSON.parse(localStorage.getItem('zorbs_session')||'{}'); return (s.username||s.name||'').toLowerCase(); } catch(_){return '';} })();

// ---- MODEL: a flat list. normal = {kind,len,...}; split = {kind:'split',type,len} ----
let track = [];
let openItem = -1;
let passObstacles = [];
let difficulty = 'medium';
let undoStack = [], redoStack = [];
let currentDraftId = null;

const cv = document.getElementById('cv'), ctx = cv.getContext('2d');
let view = { panx:0, pany:0, scale:6 };

function mkPiece(kind){ return Object.assign({kind},clone(byKind(kind).def)); }
function mkSplit(type){ return { kind:'split', type, len:44 }; }
function isSplit(it){ return it && it.kind==='split'; }

// ---- PALETTE ----
function buildPalette(){
  document.getElementById('pal-list').innerHTML = TRACK_PIECES.map(p=>`
    <div class="palItem" draggable="true" data-kind="${p.kind}"><div class="sw" style="background:${p.color}"></div>
      <div><div class="nm">${p.name}</div><div class="ds">${p.desc}</div></div></div>`).join('');
  document.getElementById('pal-splits').innerHTML = SPLIT_PIECES.map(p=>`
    <div class="palItem split" draggable="true" data-split="${p.type}"><div class="sw" style="background:#2a2410;color:#ffcc00;border:1px solid #ffcc00">${p.icon}</div>
      <div><div class="nm">${p.name}</div><div class="ds">${p.desc}</div></div></div>`).join('');
  document.querySelectorAll('#pal-list .palItem').forEach(el=>{
    el.onclick=()=>add(mkPiece(el.dataset.kind));
    el.ondragstart=e=>{ ghost={kind:el.dataset.kind}; e.dataTransfer.effectAllowed='copy'; try{e.dataTransfer.setData('text/plain',el.dataset.kind);}catch(_){} };
    el.ondragend=()=>{ ghost=null; draw(); };
  });
  document.querySelectorAll('#pal-splits .palItem').forEach(el=>{
    el.onclick=()=>add(mkSplit(el.dataset.split));
    el.ondragstart=e=>{ ghost={split:el.dataset.split}; e.dataTransfer.effectAllowed='copy'; try{e.dataTransfer.setData('text/plain',el.dataset.split);}catch(_){} };
    el.ondragend=()=>{ ghost=null; draw(); };
  });
}
function add(item){ track.push(item); openItem=track.length-1; pushUndo(); refresh(); fit(); }
// build-at-the-end drag: a ghost of the piece being dragged is previewed at the track tip.
let ghost=null, ghostOver=false;
function ghostItem(){ if(!ghost) return null; return ghost.split?mkSplit(ghost.split):mkPiece(ghost.kind); }

// ---- 2D PREVIEW ----
function layPieces(pieces, x, z, ang, laneId){
  const pts=[]; let turn=0;
  for(const s of pieces){
    const len=s.len|0; let target=0;
    if(s.kind==='sweep')  target=(s.dir||1)*(s.sharp||0.028);
    if(s.kind==='spiral') target=(s.dir||1)*0.030;
    if(s.kind==='tunnel') target=(s.dir||1)*0.012;
    for(let i=0;i<len;i++){
      turn+=(target-turn)*0.12; ang+=turn;
      x+=Math.sin(ang)*STEP; z+=Math.cos(ang)*STEP;
      let w=WIDTH; const t=len>1?i/(len-1):0;
      if(s.kind==='funnel')   w=WIDTH*(1-Math.sin(t*Math.PI)*(1-(s.min||0.45)));
      if(s.kind==='narrower') w=WIDTH*(t<0.5?1-(1-(s.min||0.38))*(t*2):(s.min||0.38));
      if(s.kind==='tunnel')   w=WIDTH*0.8;
      if(s.kind==='arena'){ const r=Math.min(1,t/0.15,(1-t)/0.15); const e=r*r*(3-2*r); w=WIDTH*(1+((s.w||14)/WIDTH-1)*Math.max(0,e)); }
      pts.push({x,z,w,lane:laneId});
    }
  }
  return { pts, end:{x,z,ang} };
}
// Walk the track: main spine continues through everything; a split forks parallel
// side lanes over its own length and the spine keeps going straight (the middle).
function buildPreview(){
  const paths=[]; let x=0,z=0,ang=0; let spine=[];
  for(const it of track){
    if(!isSplit(it)){
      const r=layPieces([it],x,z,ang,'main');
      spine=spine.concat(r.pts); x=r.end.x; z=r.end.z; ang=r.end.ang; continue;
    }
    // split: side lanes fan parallel from here; the middle continues the spine straight
    const sp=bySplit(it.type); const rx=Math.cos(ang), rz=-Math.sin(ang);
    const lane=[{kind:'straight',len:it.len}];
    if(sp.sides.includes('left'))  paths.push({lane:'left', pts:layPieces(lane, x+rx*WIDTH*-0.95, z+rz*WIDTH*-0.95, ang,'left').pts});
    if(sp.sides.includes('right')) paths.push({lane:'right',pts:layPieces(lane, x+rx*WIDTH* 0.95, z+rz*WIDTH* 0.95, ang,'right').pts});
    const r=layPieces([{kind:'straight',len:it.len}],x,z,ang,'main'); // middle through
    spine=spine.concat(r.pts); x=r.end.x; z=r.end.z; ang=r.end.ang;
  }
  paths.unshift({lane:'main',pts:spine});
  return { paths, finishPt: spine[spine.length-1]||{x:0,z:0}, end:{x,z,ang} };
}
// preview one candidate piece laid at the current track tip (for the drag ghost)
function ghostPaths(){
  const g=ghostItem(); if(!g) return null;
  const {end}=buildPreview(); const {x,z,ang}=end;
  const out=[];
  if(isSplit(g)){ const sp=bySplit(g.type); const rx=Math.cos(ang),rz=-Math.sin(ang); const lane=[{kind:'straight',len:g.len}];
    if(sp.sides.includes('left'))  out.push({lane:'left', pts:layPieces(lane,x+rx*WIDTH*-0.95,z+rz*WIDTH*-0.95,ang,'g').pts});
    if(sp.sides.includes('right')) out.push({lane:'right',pts:layPieces(lane,x+rx*WIDTH* 0.95,z+rz*WIDTH* 0.95,ang,'g').pts});
    out.push({lane:'main',pts:layPieces([{kind:'straight',len:g.len}],x,z,ang,'g').pts});
  } else { out.push({lane:'main',pts:layPieces([g],x,z,ang,'g').pts}); }
  return out;
}

// ---- EXPORT ----
function exportData(){
  const sections=[]; const branches=[]; let bid=1; let anyNoMid=false;
  for(const it of track){
    if(!isSplit(it)){ sections.push(clone(it)); continue; }
    if(!sections.length) sections.push({kind:'straight',len:20});   // a split needs a trunk
    const sp=bySplit(it.type); const fromSection=sections.length-1;
    const laneSecs=[{kind:'straight',len:Math.max(12,it.len|0)}];
    if(sp.noMiddle) anyNoMid=true;
    if(sp.sides.includes('left'))  branches.push({ id:bid++, fromSection, side:-1, end:'rejoin', noMiddle:sp.noMiddle, sections:clone(laneSecs), obstacles:[] });
    if(sp.sides.includes('right')) branches.push({ id:bid++, fromSection, side: 1, end:'rejoin', noMiddle:sp.noMiddle, sections:clone(laneSecs), obstacles:[] });
    sections.push({kind:'straight',len:Math.max(12,it.len|0)});      // the middle through-lane
  }
  return { sections, branches, noMiddle:anyNoMid };
}

// ---- IMPORT (reconstruct the simple list from a saved map) ----
function importMap(d){
  const sections=Array.isArray(d.sections)?clone(d.sections):[];
  const branches=Array.isArray(d.branches)?clone(d.branches):[];
  passObstacles=Array.isArray(d.obstacles)?clone(d.obstacles):[];
  const byFrom=new Map();
  branches.filter(b=>b.side===-1||b.side===1).forEach(b=>{ const k=Math.max(0,b.fromSection|0); if(!byFrom.has(k))byFrom.set(k,[]); byFrom.get(k).push(b); });
  track=[];
  for(let i=0;i<sections.length;i++){
    if(byFrom.has(i)){
      // a split lived just after section i: emit the section, then a split piece, and
      // SKIP the next section (it was the split's auto middle straight).
      track.push(sections[i]);
      const brs=byFrom.get(i);
      const left=brs.find(b=>b.side===-1), right=brs.find(b=>b.side===1);
      const noMiddle=brs.some(b=>b.noMiddle)||d.noMiddle===true;
      const type = noMiddle?'split2' : (left&&right?'split3' : left?'splitML':'splitMR');
      const len = (left||right) ? ((left||right).sections[0]?.len||44) : 44;
      track.push({ kind:'split', type, len });
      if(i+1<sections.length) i++;   // consume the middle straight
      continue;
    }
    track.push(sections[i]);
  }
  document.getElementById('m-name').value = d.name && !/^untitled/i.test(d.name) ? d.name : '';
  document.getElementById('m-desc').value = d.description||'';
  difficulty=['easy','medium','hard'].includes(d.difficulty)?d.difficulty:'medium';
  document.getElementById('m-diff').querySelectorAll('button').forEach(b=>b.classList.toggle('on',b.dataset.d===difficulty));
  document.getElementById('m-theme').value=d.theme||'';
  openItem=-1; undoStack=[]; redoStack=[]; refresh(); fit();
}

// ---- CANVAS ----
function resize(){ const r=cv.getBoundingClientRect(); cv.width=r.width*devicePixelRatio; cv.height=r.height*devicePixelRatio; draw(); }
function W2S(wx,wz){ return { x:wx*view.scale+view.panx, y:cv.height-(wz*view.scale+view.pany) }; }
const laneColor={main:'#39c8e0',left:'#2ec27e',right:'#ff7a45'};
function fit(){
  const {paths}=buildPreview(); let pts=[]; paths.forEach(p=>pts=pts.concat(p.pts));
  if(!pts.length){ view={panx:cv.width/2,pany:cv.height/2,scale:6}; draw(); return; }
  let minx=1e9,maxx=-1e9,minz=1e9,maxz=-1e9;
  pts.forEach(p=>{minx=Math.min(minx,p.x);maxx=Math.max(maxx,p.x);minz=Math.min(minz,p.z);maxz=Math.max(maxz,p.z);});
  const pad=70*devicePixelRatio;
  view.scale=Math.min((cv.width-pad*2)/Math.max(8,maxx-minx),(cv.height-pad*2)/Math.max(8,maxz-minz),26*devicePixelRatio);
  view.panx=cv.width/2-((minx+maxx)/2)*view.scale;
  view.pany=cv.height/2-((minz+maxz)/2)*view.scale; draw();
}
function draw(){
  ctx.clearRect(0,0,cv.width,cv.height);
  document.getElementById('emptyHint').style.display = track.length?'none':'flex';
  if(!track.length) return;
  const {paths,finishPt}=buildPreview();
  paths.forEach(({lane,pts})=>{
    if(pts.length<2) return; const col=laneColor[lane]||'#39c8e0';
    const left=[],right=[];
    for(let i=0;i<pts.length;i++){ const a=pts[i],b=pts[Math.min(i+1,pts.length-1)];
      let dx=b.x-a.x,dz=b.z-a.z;const l=Math.hypot(dx,dz)||1;dx/=l;dz/=l; const nx=-dz,nz=dx;
      left.push(W2S(a.x+nx*a.w,a.z+nz*a.w)); right.push(W2S(a.x-nx*a.w,a.z-nz*a.w)); }
    ctx.beginPath(); left.forEach((p,i)=>i?ctx.lineTo(p.x,p.y):ctx.moveTo(p.x,p.y));
    for(let i=right.length-1;i>=0;i--) ctx.lineTo(right[i].x,right[i].y);
    ctx.closePath(); ctx.fillStyle=col+'15'; ctx.fill();
    ctx.strokeStyle=col; ctx.lineWidth=2*devicePixelRatio;
    ctx.beginPath(); left.forEach((p,i)=>i?ctx.lineTo(p.x,p.y):ctx.moveTo(p.x,p.y)); ctx.stroke();
    ctx.beginPath(); right.forEach((p,i)=>i?ctx.lineTo(p.x,p.y):ctx.moveTo(p.x,p.y)); ctx.stroke();
  });
  const main=paths[0].pts;
  if(main.length) marker(W2S(main[0].x,main[0].z),'#2ec27e','START');
  marker(W2S(finishPt.x,finishPt.z),'#ff8800','FINISH');
  // GHOST: preview the dragged piece snapping onto the track tip (RCT-style build-at-end)
  if(ghost){
    const gp=ghostPaths();
    if(gp) gp.forEach(({pts})=>{
      if(pts.length<2) return;
      const left=[],right=[];
      for(let i=0;i<pts.length;i++){ const a=pts[i],b=pts[Math.min(i+1,pts.length-1)];
        let dx=b.x-a.x,dz=b.z-a.z;const l=Math.hypot(dx,dz)||1;dx/=l;dz/=l; const nx=-dz,nz=dx;
        left.push(W2S(a.x+nx*a.w,a.z+nz*a.w)); right.push(W2S(a.x-nx*a.w,a.z-nz*a.w)); }
      ctx.save(); ctx.setLineDash([7,5]); ctx.strokeStyle=ghostOver?'#7CFFb0':'#ffffff'; ctx.globalAlpha=ghostOver?0.95:0.55; ctx.lineWidth=2.5*devicePixelRatio;
      ctx.beginPath(); left.forEach((p,i)=>i?ctx.lineTo(p.x,p.y):ctx.moveTo(p.x,p.y)); ctx.stroke();
      ctx.beginPath(); right.forEach((p,i)=>i?ctx.lineTo(p.x,p.y):ctx.moveTo(p.x,p.y)); ctx.stroke();
      ctx.restore();
    });
    // tip marker
    const {end}=buildPreview(); const s=W2S(end.x,end.z);
    ctx.save(); ctx.setLineDash([]); ctx.strokeStyle='#7CFFb0'; ctx.globalAlpha=0.9; ctx.lineWidth=2*devicePixelRatio;
    ctx.beginPath(); ctx.arc(s.x,s.y,9*devicePixelRatio,0,7); ctx.stroke(); ctx.restore();
  }
}
// stage drop target: dragging a palette piece over the canvas previews it at the tip;
// dropping snaps it on (append). Works alongside click-to-add.
const stage=document.getElementById('stage');
stage.addEventListener('dragover',e=>{ if(!ghost) return; e.preventDefault(); e.dataTransfer.dropEffect='copy'; if(!ghostOver){ ghostOver=true; } draw(); });
stage.addEventListener('dragleave',e=>{ if(e.target===stage||!stage.contains(e.relatedTarget)){ ghostOver=false; draw(); } });
stage.addEventListener('drop',e=>{ e.preventDefault(); const g=ghostItem(); ghostOver=false; ghost=null; if(g){ add(g); } });
function marker(s,col,label){
  ctx.beginPath(); ctx.arc(s.x,s.y,5*devicePixelRatio,0,7); ctx.fillStyle=col; ctx.fill();
  ctx.fillStyle=col; ctx.font=`bold ${11*devicePixelRatio}px system-ui`; ctx.textAlign='left'; ctx.textBaseline='middle';
  ctx.fillText(label,s.x+8*devicePixelRatio,s.y);
}
let pdrag=null;
cv.addEventListener('pointerdown',e=>{ pdrag={x:e.clientX,y:e.clientY,px:view.panx,py:view.pany}; cv.setPointerCapture(e.pointerId); });
cv.addEventListener('pointermove',e=>{ if(!pdrag)return; view.panx=pdrag.px+(e.clientX-pdrag.x)*devicePixelRatio; view.pany=pdrag.py-(e.clientY-pdrag.y)*devicePixelRatio; draw(); });
cv.addEventListener('pointerup',()=>pdrag=null);
cv.addEventListener('wheel',e=>{ e.preventDefault(); const f=e.deltaY<0?1.1:0.9; const r=cv.getBoundingClientRect(); const mx=(e.clientX-r.left)*devicePixelRatio,my=(e.clientY-r.top)*devicePixelRatio; const wx=(mx-view.panx)/view.scale, wz=(cv.height-my-view.pany)/view.scale; view.scale*=f; view.panx=mx-wx*view.scale; view.pany=(cv.height-my)-wz*view.scale; draw(); },{passive:false});

// ---- RIGHT PANEL ----
function refresh(){ renderTrack(); draw(); validate(); }
function renderTrack(){
  const host=document.getElementById('trackArea');
  if(!track.length){ host.innerHTML='<div class="hint">Empty — add pieces from the left.</div>'; return; }
  host.innerHTML = track.map((it,idx)=>{
    const open=(openItem===idx);
    if(isSplit(it)){ const sp=bySplit(it.type);
      return `<div class="item split ${open?'sel':''}"><div class="itemHd" data-open="${idx}">
        <div class="sw" style="width:16px;height:16px;background:#2a2410;color:#ffcc00;border:1px solid #ffcc00">${sp.icon}</div>
        <div class="nm" style="color:#ffcc00">${sp.name}</div><div class="mini">${open?'▼':'▶'} len ${it.len}</div>
        <button data-up="${idx}">▲</button><button data-down="${idx}">▼</button><button data-del="${idx}" style="color:var(--bad)">✕</button></div>
        ${open?`<div class="itemBody"><div class="rng"><label>Length</label><input type="range" data-k="len" min="20" max="120" step="2" value="${it.len}"><span class="v" id="v-len">${it.len}</span></div>
          <div class="hint">${sp.desc} — marbles fork and rejoin automatically.</div></div>`:''}</div>`;
    }
    const pc=byKind(it.kind);
    return `<div class="item ${open?'sel':''}"><div class="itemHd" data-open="${idx}">
      <div class="sw" style="width:16px;height:16px;background:${pc.color}"></div>
      <div class="nm" style="color:${pc.color}">${pc.name}</div><div class="mini">${open?'▼':'▶'} len ${it.len}</div>
      <button data-up="${idx}">▲</button><button data-down="${idx}">▼</button><button data-del="${idx}" style="color:var(--bad)">✕</button></div>
      ${open?`<div class="itemBody">${propsHTML(it)}</div>`:''}</div>`;
  }).join('');
  wire(host);
}
function propsHTML(s){
  let h=''; const rng=(k,label,min,max,step,val)=>`<div class="rng"><label>${label}</label><input type="range" data-k="${k}" min="${min}" max="${max}" step="${step}" value="${val}"><span class="v" id="v-${k}">${val}</span></div>`;
  h+=rng('len','Length',6,200,1,s.len);
  if(s.kind==='sweep'){ h+=rng('sharp','Sharpness',0.01,0.12,0.002,s.sharp); }
  if(s.kind==='funnel'||s.kind==='narrower'){ h+=rng('min','Throat',0.25,0.9,0.01,s.min); }
  if(s.kind==='drop'){ h+=rng('drop','Steepness',0.4,3,0.1,s.drop); }
  if(s.kind==='cascade'){ h+=rng('steps','Steps',2,8,1,s.steps); }
  if(s.kind==='arena'){ h+=rng('w','Width',8,30,1,s.w); }
  if(s.kind==='sweep'||s.kind==='spiral'||s.kind==='tunnel'){
    h+=`<div style="font-size:10px;color:var(--dim);margin:2px 0 4px">Direction</div>
        <div class="seg" data-dir="1"><button data-v="-1" class="${(s.dir||1)<0?'on':''}">◀ Left</button><button data-v="1" class="${(s.dir||1)>0?'on':''}">Right ▶</button></div>`;
  }
  return h;
}
function wire(host){
  host.querySelectorAll('.itemHd[data-open]').forEach(hd=>hd.onclick=e=>{
    if(e.target.dataset.del!=null||e.target.dataset.up!=null||e.target.dataset.down!=null) return;
    const i=+hd.dataset.open; openItem=(openItem===i?-1:i); renderTrack(); });
  host.querySelectorAll('[data-del]').forEach(b=>b.onclick=e=>{ e.stopPropagation(); const i=+b.dataset.del; track.splice(i,1); if(openItem===i)openItem=-1; else if(openItem>i)openItem--; pushUndo(); refresh(); });
  host.querySelectorAll('[data-up]').forEach(b=>b.onclick=e=>{ e.stopPropagation(); const i=+b.dataset.up; if(i>0){ [track[i-1],track[i]]=[track[i],track[i-1]]; openItem=i-1; pushUndo(); refresh(); } });
  host.querySelectorAll('[data-down]').forEach(b=>b.onclick=e=>{ e.stopPropagation(); const i=+b.dataset.down; if(i<track.length-1){ [track[i+1],track[i]]=[track[i],track[i+1]]; openItem=i+1; pushUndo(); refresh(); } });
  if(openItem>=0 && track[openItem]){
    const s=track[openItem]; const body=host.querySelectorAll('.item')[openItem]?.querySelector('.itemBody');
    if(body){
      body.querySelectorAll('input[type=range]').forEach(r=>{
        r.oninput=()=>{ const k=r.dataset.k; s[k]=(k==='len'||k==='steps'||k==='w')?(+r.value|0):+r.value; const v=body.querySelector('#v-'+k); if(v)v.textContent=s[k]; draw(); validate(); };
        r.onchange=pushUndo; });
      const ds=body.querySelector('[data-dir]'); if(ds) ds.querySelectorAll('button').forEach(b=>b.onclick=()=>{ s.dir=+b.dataset.v; pushUndo(); refresh(); });
    }
  }
}

// ---- UNDO ----
function snap(){ return JSON.stringify({track,difficulty}); }
function pushUndo(){ undoStack.push(snap()); if(undoStack.length>80)undoStack.shift(); redoStack=[]; }
function restore(s){ const d=JSON.parse(s); track=d.track; difficulty=d.difficulty; refresh(); }
window.addEventListener('keydown',e=>{
  if((e.ctrlKey||e.metaKey)&&e.key==='z'&&!e.shiftKey){ if(undoStack.length){ redoStack.push(snap()); restore(undoStack.pop()); } e.preventDefault(); }
  else if((e.ctrlKey||e.metaKey)&&(e.key==='y'||(e.key==='z'&&e.shiftKey))){ if(redoStack.length){ undoStack.push(snap()); restore(redoStack.pop()); } e.preventDefault(); }
});

// ---- VALIDATION ----
function validate(){ const ok=exportData().sections.length>=2; document.getElementById('btn-test').disabled=!ok; document.getElementById('btn-submit').disabled=!ok; return ok; }

// ---- MAP DATA ----
function currentMap(){
  const {sections,branches,noMiddle}=exportData();
  return { name:document.getElementById('m-name').value.trim()||'Untitled Track',
    description:document.getElementById('m-desc').value.trim(), difficulty, theme:document.getElementById('m-theme').value,
    author:author||'anon', sections, branches, obstacles:passObstacles, noMiddle:!!noMiddle };
}
function makeThumb(){
  try{ const {paths}=buildPreview(); let pts=[]; paths.forEach(p=>pts=pts.concat(p.pts)); if(!pts.length) return '';
    let minx=1e9,maxx=-1e9,minz=1e9,maxz=-1e9; pts.forEach(q=>{minx=Math.min(minx,q.x);maxx=Math.max(maxx,q.x);minz=Math.min(minz,q.z);maxz=Math.max(maxz,q.z);});
    const W=320,H=200,pad=16; const c=document.createElement('canvas'); c.width=W;c.height=H; const g=c.getContext('2d');
    g.fillStyle='#0c0f1a'; g.fillRect(0,0,W,H);
    const sc=Math.min((W-pad*2)/Math.max(1,maxx-minx),(H-pad*2)/Math.max(1,maxz-minz));
    const ox=pad+((W-pad*2)-(maxx-minx)*sc)/2, oz=pad+((H-pad*2)-(maxz-minz)*sc)/2;
    const X=q=>ox+(q.x-minx)*sc, Y=q=>H-(oz+(q.z-minz)*sc); g.lineCap='round'; g.lineJoin='round';
    paths.forEach(({lane,pts})=>{ if(pts.length<2)return; g.strokeStyle=laneColor[lane]||'#39c8e0'; g.lineWidth=Math.max(3,WIDTH*sc*1.2);
      g.beginPath(); pts.forEach((q,i)=>i?g.lineTo(X(q),Y(q)):g.moveTo(X(q),Y(q))); g.stroke(); });
    return c.toDataURL('image/png');
  }catch(_){ return ''; }
}

// ---- TOAST ----
let toastT=null; function toast(m){ const el=document.getElementById('toast'); el.textContent=m; el.classList.add('show'); clearTimeout(toastT); toastT=setTimeout(()=>el.classList.remove('show'),2600); }

// ---- BUTTONS ----
document.getElementById('btn-clear').onclick=()=>{ if(track.length && !confirm('Clear the whole track?')) return; track=[]; openItem=-1; currentDraftId=null; refresh(); };
document.getElementById('btn-test').onclick=()=>{ if(!validate()) return; try{ sessionStorage.setItem('zorbs_testmap',JSON.stringify(currentMap())); }catch(_){}; window.open('/beta/?map=test','_blank'); };
document.getElementById('m-diff').querySelectorAll('button').forEach(b=>b.onclick=()=>{ difficulty=b.dataset.d; document.getElementById('m-diff').querySelectorAll('button').forEach(x=>x.classList.toggle('on',x===b)); });

document.getElementById('btn-save').onclick=async()=>{
  if(!author){ toast('Sign in on the dashboard first to save drafts.'); return; }
  if(!track.length){ toast('Nothing to save yet.'); return; }
  const btn=document.getElementById('btn-save'); btn.disabled=true; const old=btn.textContent; btn.textContent='Saving…';
  try{ const map=Object.assign(currentMap(),{thumb:makeThumb()});
    const r=await fetch('/api/maps',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'draft-save',map,id:currentDraftId||undefined})});
    const j=await r.json().catch(()=>({})); if(j&&j.ok){ currentDraftId=j.id; toast('💾 Draft saved.'); } else toast('Save failed: '+(j&&j.error||'try again'));
  }catch(_){ toast('Network error.'); } btn.textContent=old; btn.disabled=false;
};
document.getElementById('btn-submit').onclick=async()=>{
  if(!validate()) return; if(!author){ toast('Sign in on the dashboard first.'); return; }
  const btn=document.getElementById('btn-submit'); btn.disabled=true; const old=btn.textContent; btn.textContent='Submitting…';
  try{ const r=await fetch('/api/maps',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'submit',map:Object.assign(currentMap(),{thumb:makeThumb()})})});
    const j=await r.json().catch(()=>({})); if(j&&j.ok) toast('✓ Submitted for review!'); else toast('Submit failed: '+(j&&j.error||'try again'));
  }catch(_){ toast('Network error.'); } btn.textContent=old; btn.disabled=false; validate();
};

document.getElementById('btn-load').onclick=openDraftModal;
function closeDraftModal(){ document.getElementById('draftModal').style.display='none'; }
async function openDraftModal(){
  if(!author){ toast('Sign in on the dashboard first to load drafts.'); return; }
  const modal=document.getElementById('draftModal'), list=document.getElementById('draftList');
  modal.style.display='flex'; list.innerHTML='<div style="color:#9aa6c4;padding:20px;text-align:center">Loading…</div>';
  try{ const r=await fetch('/api/maps?list=drafts&author='+encodeURIComponent(author)); const j=await r.json().catch(()=>({}));
    const drafts=(j&&j.drafts)||[];
    if(!drafts.length){ list.innerHTML='<div style="color:#9aa6c4;padding:24px;text-align:center">No saved drafts yet.</div>'; return; }
    list.innerHTML=drafts.map(d=>{ const when=d.updated?new Date(d.updated).toLocaleString():'';
      const img=d.thumb?`<img src="${d.thumb}">`:`<div style="width:80px;height:50px;border-radius:6px;background:#0c0f1a;flex:0 0 auto"></div>`;
      const nm=(d.name||'Untitled Draft').replace(/[<>&]/g,'');
      return `<div class="draftItem">${img}<div class="meta"><div class="t">${nm}</div><div class="s">${d.sectionCount} pieces · ${d.difficulty||'medium'}</div><div class="s" style="font-size:10px;color:#6b7596">${when}</div></div>
        <button style="background:#2a6cff;color:#fff" onclick="loadDraft('${d.id}')">Load</button><button class="danger" onclick="delDraft('${d.id}')">🗑</button></div>`;
    }).join('');
  }catch(_){ list.innerHTML='<div style="color:#ff8a9c;padding:20px;text-align:center">Couldn’t load drafts.</div>'; }
}
async function loadDraft(id){ try{ const r=await fetch('/api/maps?draft='+encodeURIComponent(id)+'&author='+encodeURIComponent(author)); const j=await r.json().catch(()=>({}));
  if(j&&j.ok&&j.draft){ currentDraftId=id; importMap(j.draft); closeDraftModal(); toast('Loaded draft.'); } else toast('Could not load that draft.'); }catch(_){ toast('Network error.'); } }
async function delDraft(id){ if(!confirm('Delete this draft?')) return; try{ await fetch('/api/maps',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'draft-delete',id,author})}); openDraftModal(); }catch(_){} }
window.loadDraft=loadDraft; window.delDraft=delDraft; window.closeDraftModal=closeDraftModal;

// ---- INIT ----
buildPalette();
window.addEventListener('resize',resize);
resize(); refresh();
</script>
