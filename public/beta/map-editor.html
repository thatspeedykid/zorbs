<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>ZORBS — Map Editor (v0.8)</title>
<style>
  :root{ --bg:#0a0e1a; --panel:#121829; --panel2:#0e1322; --line:#23304d; --txt:#dfe8ff; --dim:#7f8cad; --accent:#39c8e0; --good:#2ec27e; --bad:#ff4d5e; --left:#2ec27e; --right:#ff7a45; --splitc:#ffcc00; }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;background:var(--bg);color:var(--txt);font-family:system-ui,Segoe UI,Roboto,sans-serif;overflow:hidden}
  button{font-family:inherit;cursor:pointer}
  #top{height:50px;display:flex;align-items:center;gap:10px;padding:0 14px;background:var(--panel);border-bottom:1px solid var(--line)}
  #top .logo{font-weight:800;letter-spacing:1px;color:var(--accent)}
  #top .ver{font-size:10px;color:var(--dim);margin-left:-4px}
  #top .sp{flex:1}
  #top input{background:var(--panel2);border:1px solid var(--line);color:var(--txt);border-radius:7px;padding:7px 10px;font-size:13px;width:200px}
  #top button{background:var(--panel2);border:1px solid var(--line);color:var(--txt);border-radius:7px;padding:8px 12px;font-size:12px}
  #top button.pri{background:var(--accent);color:#04141a;border:0;font-weight:700}
  #top button:disabled{opacity:.4;cursor:not-allowed}
  #main{display:flex;height:calc(100% - 50px)}
  #palette{width:214px;background:var(--panel);border-right:1px solid var(--line);padding:10px;overflow-y:auto}
  #pal-list,#pal-splits{display:grid;grid-template-columns:1fr 1fr;gap:5px}
  #pal-list .palItem,#pal-splits .palItem{margin-bottom:0;padding:6px}
  #pal-list .palItem .ds,#pal-splits .palItem .ds{display:none}
  #pal-list .palItem .nm,#pal-splits .palItem .nm{font-size:11px;line-height:1.15}
  #btn-gen{position:absolute;top:10px;left:50%;transform:translateX(-50%);z-index:8;
    background:linear-gradient(90deg,#2a6cff,#9b3cff);color:#fff;border:0;border-radius:9px;
    padding:9px 16px;font-family:inherit;font-size:13px;font-weight:700;letter-spacing:.5px;
    box-shadow:0 4px 18px rgba(60,120,255,.35);cursor:pointer}
  #btn-gen:hover{filter:brightness(1.12)}
  #stage{flex:1;position:relative;background:radial-gradient(circle at 50% 40%,#0d1326,#070a13)}
  #cv{width:100%;height:100%;display:block;touch-action:none}
  #side{width:296px;background:var(--panel);border-left:1px solid var(--line);padding:12px;overflow-y:auto}
  .sectitle{font-size:10px;letter-spacing:1px;color:var(--dim);margin:2px 0 8px}
  .palItem{display:flex;align-items:center;gap:8px;background:var(--panel2);border:1px solid var(--line);border-radius:8px;padding:7px;margin-bottom:5px;cursor:grab;user-select:none}
  .palItem:hover{border-color:var(--accent)}
  .palItem.split{border-style:dashed;border-color:var(--splitc)}
  .sw{width:17px;height:17px;border-radius:5px;flex:0 0 auto;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700}
  .palItem .nm{font-size:12px;font-weight:600}
  .palItem .ds{font-size:9px;color:var(--dim)}
  .field{margin-bottom:9px}
  .field label{display:block;font-size:10px;color:var(--dim);margin-bottom:3px}
  .field input,.field textarea,.field select{width:100%;background:var(--panel2);border:1px solid var(--line);color:var(--txt);border-radius:7px;padding:7px;font-size:12px}
  .field textarea{resize:vertical;min-height:40px}
  .seg{display:flex;gap:4px}
  .seg button{flex:1;background:var(--panel2);border:1px solid var(--line);color:var(--dim);border-radius:7px;padding:6px;font-size:11px}
  .seg button.on{background:var(--accent);color:#04141a;border-color:var(--accent);font-weight:700}
  .item{border:1px solid var(--line);border-radius:8px;margin-bottom:6px;overflow:hidden}
  .item.sel{border-color:var(--accent)} .item.split{border-color:var(--splitc)}
  .itemHd{display:flex;align-items:center;gap:7px;padding:7px 9px;cursor:pointer;background:var(--panel2)}
  .itemHd .nm{flex:1;font-size:12px} .itemHd .mini{font-size:10px;color:var(--dim)}
  .itemHd button{background:transparent;border:0;color:var(--dim);font-size:13px;padding:2px 5px}
  .itemHd button:hover{color:var(--txt)}
  .itemBody{padding:8px 10px;background:var(--panel2);border-top:1px solid var(--line)}
  .lane{border-left:2px solid var(--line);margin:6px 0 2px 6px;padding-left:8px}
  .lrow{display:flex;align-items:center;gap:6px;font-size:11px;padding:3px 0}
  .lrow .sw{width:12px;height:12px}
  .lrow button{background:transparent;border:0;color:var(--dim);font-size:12px;cursor:pointer}
  .rng{display:flex;align-items:center;gap:8px;margin-bottom:6px}
  .rng label{font-size:10px;color:var(--dim);width:62px}
  .rng input[type=range]{flex:1}
  .rng .v{font-size:11px;width:42px;text-align:right;color:var(--accent)}
  .hint{font-size:11px;color:var(--dim);line-height:1.5}
  .danger{background:#3a1622!important;border:1px solid #5a2030!important;color:#ff8a9c!important}
  .full{width:100%}
  #emptyHint{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;color:var(--dim);pointer-events:none;text-align:center}
  #emptyHint h2{margin:0;color:var(--txt);font-weight:800}
  #toast{position:absolute;bottom:18px;left:50%;transform:translateX(-50%);background:#10203a;border:1px solid var(--accent);color:var(--txt);padding:10px 16px;border-radius:10px;font-size:13px;opacity:0;transition:.2s;pointer-events:none;z-index:30}
  #toast.show{opacity:1}
  #draftModal{position:absolute;inset:0;background:rgba(7,10,19,.85);display:none;align-items:center;justify-content:center;z-index:25}
  #draftBox{background:var(--panel);border:1px solid var(--line);border-radius:14px;width:520px;max-width:92%;max-height:80%;overflow:auto;padding:18px}
  #draftBox h3{margin:0 0 12px}
  .draftItem{display:flex;gap:10px;align-items:center;background:var(--panel2);border:1px solid var(--line);border-radius:8px;padding:8px;margin-bottom:8px}
  .draftItem img{width:80px;height:50px;object-fit:cover;border-radius:6px;background:#0c0f1a;flex:0 0 auto}
  .draftItem .meta{flex:1;min-width:0}
  .draftItem .meta .t{font-weight:600;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .draftItem .meta .s{font-size:11px;color:var(--dim)}
  .draftItem button{border:0;border-radius:6px;padding:7px 11px;font-size:12px}
</style>
</head>
<body>
<div id="top">
  <span class="logo">ZORBS</span><span class="ver">editor v0.8</span>
  <input id="m-name" maxlength="40" placeholder="Track name" />
  <span class="sp"></span>
  <button id="btn-clear">↻ Clear</button>
  <button id="btn-load">📂 Load</button>
  <button id="btn-save">💾 Save</button>
  <button id="btn-test">▶ Test</button>
  <button class="pri" id="btn-submit">Submit</button>
</div>
<div id="main">
  <div id="palette">
    <div class="sectitle">TRACK PIECES</div>
    <div id="pal-list"></div>
    <div class="sectitle" style="margin-top:12px">SPLIT PIECES</div>
    <div id="pal-splits"></div>
  </div>
  <div id="stage">
    <button id="btn-gen">🎲 Generate Random Track</button>
    <canvas id="cv"></canvas>
    <div id="emptyHint"><h2>Build your track</h2><div>Drag a piece onto the track tip to extend it (RCT-style).<br>After a split, drag onto the <b style="color:#2ec27e">green</b> / <b style="color:#ff7a45">orange</b> lane ends to build each path.</div></div>
    <div id="toast"></div>
  </div>
  <div id="side">
    <div class="sectitle">YOUR TRACK — start → finish</div>
    <div id="trackArea"></div>
    <hr style="border:0;border-top:1px solid var(--line);margin:14px 0">
    <div class="sectitle">MAP DETAILS</div>
    <div class="field"><label>Description</label><textarea id="m-desc" maxlength="140" placeholder="What makes this track fun?"></textarea></div>
    <div class="field"><label>Difficulty</label>
      <div class="seg" id="m-diff"><button data-d="easy">Easy</button><button data-d="medium" class="on">Medium</button><button data-d="hard">Hard</button></div>
    </div>
    <div class="field"><label>Theme</label>
      <select id="m-theme"><option value="">Random</option><option value="cyberCity">Cyber City</option><option value="volcano">Volcano</option><option value="glacier">Glacier</option><option value="neonJungle">Neon Jungle</option><option value="deepSpace">Deep Space</option></select>
    </div>
  </div>
</div>

<div id="draftModal"><div id="draftBox"><h3>Your saved drafts</h3><div id="draftList"></div>
  <button class="full" style="background:var(--panel2);border:1px solid var(--line);color:var(--txt);border-radius:8px;padding:9px;margin-top:6px" onclick="closeDraftModal()">Close</button></div></div>

<script src="/beta/telemetry.js?v=b16"></script>
<script>
// ============================================================================
// ZORBS Map Editor v0.8 — RCT-style build-at-the-tip with drag & drop.
// The track is a main list of pieces. A SPLIT piece opens side LANES (green/left,
// orange/right) that are ALSO buildable: drag a piece near a lane's tip and it
// extends THAT lane. Turns are dedicated Left/Right pieces (no direction submenu).
// Export flattens to the engine's {sections, branches}: main list = sections,
// each split's lanes = branches peeling from the section before it (rejoin/finish),
// split2 carries noMiddle.
// ============================================================================
const STEP = 1.3, WIDTH = 7.0;
const PAL = [
  { id:'straight', kind:'straight', name:'Straight',    desc:'flat run',      color:'#5b7cff', def:{len:30} },
  { id:'turnL',    kind:'sweep',    name:'Turn Left',    desc:'banked curve',  color:'#39c8e0', def:{len:40,dir:-1,sharp:0.028} },
  { id:'turnR',    kind:'sweep',    name:'Turn Right',   desc:'banked curve',  color:'#39c8e0', def:{len:40,dir:1,sharp:0.028} },
  { id:'sharpL',   kind:'sweep',    name:'Sharp Turn Left',  desc:'tight banked turn', color:'#22b8d8', def:{len:26,dir:-1,sharp:0.075} },
  { id:'sharpR',   kind:'sweep',    name:'Sharp Turn Right', desc:'tight banked turn', color:'#22b8d8', def:{len:26,dir:1,sharp:0.075} },
  { id:'tturnL',   kind:'tunnelturn',name:'Tunnel Turn Left', desc:'enclosed turn', color:'#6f8cff', def:{len:34,dir:-1,sharp:0.055} },
  { id:'tturnR',   kind:'tunnelturn',name:'Tunnel Turn Right',desc:'enclosed turn', color:'#6f8cff', def:{len:34,dir:1,sharp:0.055} },
  { id:'tsharpL',  kind:'tunnelturn',name:'Tunnel Sharp Left', desc:'enclosed TIGHT turn', color:'#4f6cff', def:{len:24,dir:-1,sharp:0.10} },
  { id:'tsharpR',  kind:'tunnelturn',name:'Tunnel Sharp Right',desc:'enclosed TIGHT turn', color:'#4f6cff', def:{len:24,dir:1,sharp:0.10} },
  { id:'funnel',   kind:'funnel',   name:'Funnel',       desc:'wide → narrow', color:'#ffb020', def:{len:22,min:0.45} },
  { id:'narrower', kind:'narrower', name:'Narrower',     desc:'bottleneck',    color:'#ff7a45', def:{len:20,min:0.38} },
  { id:'moguls',   kind:'moguls',   name:'Moguls',       desc:'washboard',     color:'#b06bff', def:{len:28} },
  { id:'drop',     kind:'drop',     name:'Drop',         desc:'steep descent', color:'#2ec27e', def:{len:16,drop:1.2} },
  { id:'tunneldrop',kind:'tunneldrop',name:'Tunnel Drop', desc:'enclosed steep plunge — speed!', color:'#3aa0ff', def:{len:18,drop:2.6} },
  { id:'cascade',  kind:'cascade',  name:'Cascade',      desc:'stepped',       color:'#5ad1a0', def:{len:44,steps:4} },
  { id:'arena',    kind:'arena',    name:'Arena',        desc:'wide open',     color:'#f5c518', def:{len:40,w:14} },
  { id:'spiralL',  kind:'spiral',   name:'Spiral Left',  desc:'helix descent', color:'#ff5db0', def:{len:32,dir:-1} },
  { id:'spiralR',  kind:'spiral',   name:'Spiral Right', desc:'helix descent', color:'#ff5db0', def:{len:32,dir:1} },
  { id:'tunnelL',  kind:'tunnel',   name:'Tunnel Left',  desc:'enclosed run',  color:'#7f8cad', def:{len:20,dir:-1} },
  { id:'tunnelR',  kind:'tunnel',   name:'Tunnel Right', desc:'enclosed run',  color:'#7f8cad', def:{len:20,dir:1} },
];
const SPLITS = [
  { type:'split3',  name:'Split into 3', desc:'left · middle · right', sides:['left','right'], noMiddle:false, icon:'⅄' },
  { type:'split2',  name:'Split into 2', desc:'left · right (no mid)', sides:['left','right'], noMiddle:true,  icon:'Y' },
  { type:'splitML', name:'Middle + Left',  desc:'straight + left lane', sides:['left'],  noMiddle:false, icon:'⌐' },
  { type:'splitMR', name:'Middle + Right', desc:'straight + right lane', sides:['right'], noMiddle:false, icon:'¬' },
];
const byId = id => PAL.find(p=>p.id===id);
const bySplit = t => SPLITS.find(p=>p.type===t);
const KCOLOR = { straight:'#5b7cff', sweep:'#39c8e0', tunnelturn:'#6f8cff', funnel:'#ffb020', narrower:'#ff7a45', moguls:'#b06bff', drop:'#2ec27e', tunneldrop:'#3aa0ff', cascade:'#5ad1a0', arena:'#f5c518', spiral:'#ff5db0', tunnel:'#7f8cad' };
function pieceName(s){
  if(s.kind==='sweep')  return ((s.sharp||0)>=0.06?'Sharp Turn ':'Turn ')+(s.dir<0?'Left':'Right');
  if(s.kind==='tunnelturn') return 'Tunnel '+((s.sharp||0)>=0.08?'Sharp ':'')+'Turn '+(s.dir<0?'Left':'Right');
  if(s.kind==='spiral') return (s.dir<0?'Spiral Left':'Spiral Right');
  if(s.kind==='tunnel') return (s.dir<0?'Tunnel Left':'Tunnel Right');
  return {straight:'Straight',funnel:'Funnel',narrower:'Narrower',moguls:'Moguls',drop:'Drop',tunneldrop:'Tunnel Drop',cascade:'Cascade',arena:'Arena'}[s.kind]||s.kind;
}
const clone = o => JSON.parse(JSON.stringify(o));
const author = (() => { try { const s=JSON.parse(localStorage.getItem('zorbs_session')||'{}'); return (s.username||s.name||'').toLowerCase(); } catch(_){return '';} })();

// ---- MODEL ----  main list; split = {kind:'split',type,lanes:{left:[],right:[]},end:{left,right}}
let track = [];
let openItem = -1;
let _lopen = null;   // which split-lane piece is expanded, keyed "idx|side|pieceIndex"
let passObstacles = [];
let difficulty = 'medium';
let undoStack = [], redoStack = [];
let currentDraftId = null;

const cv = document.getElementById('cv'), ctx = cv.getContext('2d');
let view = { panx:0, pany:0, scale:6 };

function mkPiece(id){ const p=byId(id); return Object.assign({kind:p.kind},clone(p.def)); }
function mkSplit(type){ const sp=bySplit(type); const lanes={},end={}; sp.sides.forEach(s=>{lanes[s]=[];end[s]='rejoin';}); return {kind:'split',type,lanes,end}; }
function isSplit(it){ return it&&it.kind==='split'; }
function laneLen(arr){ return (arr||[]).reduce((a,s)=>a+(s.len|0),0); }
function splitMid(it){ const sp=bySplit(it.type); return Math.max(24, ...sp.sides.map(sd=>laneLen(it.lanes[sd]))); }

// ---- PALETTE ----
function buildPalette(){
  document.getElementById('pal-list').innerHTML = PAL.map(p=>`
    <div class="palItem" draggable="true" data-pal="${p.id}"><div class="sw" style="background:${p.color}"></div>
      <div><div class="nm">${p.name}</div><div class="ds">${p.desc}</div></div></div>`).join('');
  document.getElementById('pal-splits').innerHTML = SPLITS.map(p=>`
    <div class="palItem split" draggable="true" data-split="${p.type}"><div class="sw" style="background:#2a2410;color:#ffcc00;border:1px solid #ffcc00">${p.icon}</div>
      <div><div class="nm">${p.name}</div><div class="ds">${p.desc}</div></div></div>`).join('');
  document.querySelectorAll('#pal-list .palItem').forEach(el=>{
    el.onclick=()=>dropAdd({pal:el.dataset.pal},{type:'main'});
    el.ondragstart=e=>{ ghost={pal:el.dataset.pal}; e.dataTransfer.effectAllowed='copy'; try{e.dataTransfer.setData('text/plain',el.dataset.pal);}catch(_){} };
    el.ondragend=()=>{ ghost=null; dropTarget=null; draw(); };
  });
  document.querySelectorAll('#pal-splits .palItem').forEach(el=>{
    el.onclick=()=>dropAdd({split:el.dataset.split},{type:'main'});
    el.ondragstart=e=>{ ghost={split:el.dataset.split}; e.dataTransfer.effectAllowed='copy'; try{e.dataTransfer.setData('text/plain',el.dataset.split);}catch(_){} };
    el.ondragend=()=>{ ghost=null; dropTarget=null; draw(); };
  });
}
let ghost=null, dropTarget=null;
function ghostItem(){ if(!ghost) return null; return ghost.split?mkSplit(ghost.split):mkPiece(ghost.pal); }
// place a piece at a target: {type:'main'} appends to the main list; {type:'lane',idx,side} extends a split lane
function dropAdd(g, target){
  const item = g.split?mkSplit(g.split):mkPiece(g.pal);
  if(target.type==='lane'){
    const it=track[target.idx]; if(it&&isSplit(it)){ it.lanes[target.side].push(item); }
  } else {
    track.push(item); openItem=track.length-1;
  }
  pushUndo(); refresh(); fit();
}

// ---- 2D PREVIEW ----
function layPieces(pieces, x, z, ang, laneId){
  const pts=[]; let turn=0;
  for(const s of pieces){
    if(isSplit(s)) continue;
    const len=s.len|0; let target=0;
    if(s.kind==='sweep')  target=(s.dir||1)*(s.sharp||0.028);
    if(s.kind==='tunnelturn') target=(s.dir||1)*(s.sharp||0.05);
    if(s.kind==='spiral') target=(s.dir||1)*0.10;   // real coil so spirals READ as spirals in the map
    if(s.kind==='tunnel') target=(s.dir||1)*0.012;
    for(let i=0;i<len;i++){
      turn+=(target-turn)*0.12; ang+=turn;
      x+=Math.sin(ang)*STEP; z+=Math.cos(ang)*STEP;
      let w=WIDTH; const t=len>1?i/(len-1):0;
      if(s.kind==='funnel')   w=WIDTH*(1-Math.sin(t*Math.PI)*(1-(s.min||0.45)));
      if(s.kind==='narrower') w=WIDTH*(t<0.5?1-(1-(s.min||0.38))*(t*2):(s.min||0.38));
      if(s.kind==='tunnel')   w=WIDTH*0.8;
      if(s.kind==='arena'){ const r=Math.min(1,t/0.15,(1-t)/0.15); const e=r*r*(3-2*r); w=WIDTH*(1+((s.w||14)/WIDTH-1)*Math.max(0,e)); }
      pts.push({x,z,w,lane:laneId,kind:s.kind});
    }
  }
  return { pts, end:{x,z,ang} };
}
// Walk the track. Returns paths (per-lane point arrays), the main tip, and TIPS —
// the buildable ends (main + each split lane), used for drag targeting.
function buildPreview(){
  const paths=[]; const tips=[]; let x=0,z=0,ang=0; let spine=[];
  for(let idx=0; idx<track.length; idx++){
    const it=track[idx];
    if(!isSplit(it)){ const r=layPieces([it],x,z,ang,'main'); spine=spine.concat(r.pts); x=r.end.x;z=r.end.z;ang=r.end.ang; continue; }
    const sp=bySplit(it.type); const rx=Math.cos(ang), rz=-Math.sin(ang);
    sp.sides.forEach(side=>{
      const sgn=side==='left'?-1:1;
      const sx=x+rx*WIDTH*0.95*sgn, sz=z+rz*WIDTH*0.95*sgn;
      const r=layPieces(it.lanes[side], sx, sz, ang, side);
      paths.push({lane:side, pts:r.pts});
      const te = r.pts.length? r.end : {x:sx,z:sz,ang};
      tips.push({ x:te.x, z:te.z, side, target:{type:'lane',idx,side} });
    });
    const r=layPieces([{kind:'straight',len:splitMid(it)}],x,z,ang,'main'); spine=spine.concat(r.pts); x=r.end.x;z=r.end.z;ang=r.end.ang;
  }
  paths.unshift({lane:'main',pts:spine});
  tips.push({ x, z, side:'main', target:{type:'main'} });
  return { paths, tips, finishPt: spine[spine.length-1]||{x:0,z:0} };
}

// ---- EXPORT ----
function exportData(){
  const sections=[]; const branches=[]; let bid=1; let anyNoMid=false;
  for(const it of track){
    if(!isSplit(it)){ sections.push(clone(it)); continue; }
    if(!sections.length) sections.push({kind:'straight',len:20});
    const sp=bySplit(it.type); const fromSection=sections.length-1; const mid=splitMid(it);
    sp.sides.forEach(side=>{
      const lp = it.lanes[side].length? clone(it.lanes[side]) : [{kind:'straight',len:mid}];
      if(sp.noMiddle) anyNoMid=true;
      branches.push({ id:bid++, fromSection, side:side==='left'?-1:1, end:it.end[side]==='finish'?'finish':'rejoin', noMiddle:sp.noMiddle, sections:lp, obstacles:[] });
    });
    sections.push({kind:'straight',len:mid});
  }
  return { sections, branches, noMiddle:anyNoMid };
}

// ---- IMPORT ----
function importMap(d){
  const sections=Array.isArray(d.sections)?clone(d.sections):[];
  const branches=Array.isArray(d.branches)?clone(d.branches):[];
  passObstacles=Array.isArray(d.obstacles)?clone(d.obstacles):[];
  const byFrom=new Map();
  branches.filter(b=>b.side===-1||b.side===1).forEach(b=>{ const k=Math.max(0,b.fromSection|0); if(!byFrom.has(k))byFrom.set(k,[]); byFrom.get(k).push(b); });
  track=[];
  for(let i=0;i<sections.length;i++){
    if(byFrom.has(i)){
      track.push(sections[i]);
      const brs=byFrom.get(i); const left=brs.find(b=>b.side===-1), right=brs.find(b=>b.side===1);
      const noMiddle=brs.some(b=>b.noMiddle)||d.noMiddle===true;
      const type = noMiddle?'split2' : (left&&right?'split3' : left?'splitML':'splitMR');
      const lanes={}, end={}; bySplit(type).sides.forEach(sd=>{ const br=sd==='left'?left:right; lanes[sd]=br?clone(br.sections):[]; end[sd]=br&&br.end==='finish'?'finish':'rejoin'; });
      track.push({kind:'split',type,lanes,end});
      if(i+1<sections.length) i++;
      continue;
    }
    track.push(sections[i]);
  }
  document.getElementById('m-name').value = d.name && !/^untitled/i.test(d.name) ? d.name : '';
  document.getElementById('m-desc').value = d.description||'';
  difficulty=['easy','medium','hard'].includes(d.difficulty)?d.difficulty:'medium';
  document.getElementById('m-diff').querySelectorAll('button').forEach(b=>b.classList.toggle('on',b.dataset.d===difficulty));
  document.getElementById('m-theme').value=d.theme||'';
  openItem=-1; undoStack=[]; redoStack=[]; refresh(); fit();
}

// ---- CANVAS ----
function resize(){ const r=cv.getBoundingClientRect(); cv.width=r.width*devicePixelRatio; cv.height=r.height*devicePixelRatio; draw(); }
function W2S(wx,wz){ return { x:wx*view.scale+view.panx, y:cv.height-(wz*view.scale+view.pany) }; }
function S2W(cx,cy){ const r=cv.getBoundingClientRect(); const px=(cx-r.left)*devicePixelRatio, py=(cy-r.top)*devicePixelRatio; return { x:(px-view.panx)/view.scale, z:(cv.height-py-view.pany)/view.scale }; }
const laneColor={main:'#39c8e0',left:'#2ec27e',right:'#ff7a45'};
function fit(){
  const {paths}=buildPreview(); let pts=[]; paths.forEach(p=>pts=pts.concat(p.pts));
  if(!pts.length){ view={panx:cv.width/2,pany:cv.height/2,scale:6}; draw(); return; }
  let minx=1e9,maxx=-1e9,minz=1e9,maxz=-1e9;
  pts.forEach(p=>{minx=Math.min(minx,p.x);maxx=Math.max(maxx,p.x);minz=Math.min(minz,p.z);maxz=Math.max(maxz,p.z);});
  const pad=70*devicePixelRatio;
  view.scale=Math.min((cv.width-pad*2)/Math.max(8,maxx-minx),(cv.height-pad*2)/Math.max(8,maxz-minz),26*devicePixelRatio);
  view.panx=cv.width/2-((minx+maxx)/2)*view.scale; view.pany=cv.height/2-((minz+maxz)/2)*view.scale; draw();
}
function ribbon(pts,col,{fill=true,dash=false,alpha=1}={}){
  if(pts.length<2) return; const left=[],right=[];
  for(let i=0;i<pts.length;i++){ const a=pts[i],b=pts[Math.min(i+1,pts.length-1)];
    let dx=b.x-a.x,dz=b.z-a.z;const l=Math.hypot(dx,dz)||1;dx/=l;dz/=l; const nx=-dz,nz=dx;
    left.push(W2S(a.x+nx*a.w,a.z+nz*a.w)); right.push(W2S(a.x-nx*a.w,a.z-nz*a.w)); }
  ctx.save(); ctx.globalAlpha=alpha; if(dash) ctx.setLineDash([7,5]);
  if(fill){ ctx.beginPath(); left.forEach((p,i)=>i?ctx.lineTo(p.x,p.y):ctx.moveTo(p.x,p.y)); for(let i=right.length-1;i>=0;i--) ctx.lineTo(right[i].x,right[i].y); ctx.closePath(); ctx.fillStyle=col+'15'; ctx.fill(); }
  ctx.strokeStyle=col; ctx.lineWidth=2*devicePixelRatio;
  ctx.beginPath(); left.forEach((p,i)=>i?ctx.lineTo(p.x,p.y):ctx.moveTo(p.x,p.y)); ctx.stroke();
  ctx.beginPath(); right.forEach((p,i)=>i?ctx.lineTo(p.x,p.y):ctx.moveTo(p.x,p.y)); ctx.stroke();
  ctx.restore();
}
function draw(){
  ctx.clearRect(0,0,cv.width,cv.height);
  document.getElementById('emptyHint').style.display = track.length?'none':'flex';
  if(!track.length) return;
  const {paths,tips,finishPt}=buildPreview();
  paths.forEach(({lane,pts})=>ribbon(pts,laneColor[lane]||'#39c8e0'));
  // buildable tips: pulse a ring at each; green if it's the current drop target
  tips.forEach(tp=>{ const s=W2S(tp.x,tp.z); const isT=dropTarget&&sameTarget(dropTarget,tp.target);
    ctx.save(); ctx.strokeStyle=isT?'#7CFFb0':(laneColor[tp.side]||'#39c8e0'); ctx.globalAlpha=isT?0.95:0.5; ctx.lineWidth=2*devicePixelRatio; ctx.setLineDash(isT?[]:[3,3]);
    ctx.beginPath(); ctx.arc(s.x,s.y,(isT?10:6)*devicePixelRatio,0,7); ctx.stroke(); ctx.restore(); });
  // FEATURE TAGS: drops/moguls/cascades/tunneldrops are VERTICAL, so they don't bend the
  // top-down path — label them so the map shows its thrills instead of looking like a plain line.
  const FEAT={ drop:['⬇ DROP','#2ec27e'], tunneldrop:['⬇⬇ TUNNEL DROP','#37e0a8'], cascade:['⌵ CASCADE','#2ee0c2'], moguls:['∿ MOGULS','#c77dff'], spiral:['◉ SPIRAL','#ff5db0'] };
  paths.forEach(({pts})=>{ let i=0; while(i<pts.length){ const k=pts[i].kind;
    if(FEAT[k]){ let j=i; while(j<pts.length&&pts[j].kind===k) j++; const mid=pts[(i+j)>>1];
      const s=W2S(mid.x,mid.z); const[lab,col]=FEAT[k];
      ctx.fillStyle=col; ctx.font=`bold ${10*devicePixelRatio}px system-ui`; ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText(lab,s.x,s.y-10*devicePixelRatio);
      ctx.beginPath(); ctx.arc(s.x,s.y,3.5*devicePixelRatio,0,7); ctx.fillStyle=col; ctx.fill();
      i=j; } else i++; } });
  const main=paths[0].pts; if(main.length) marker(W2S(main[0].x,main[0].z),'#2ec27e','START');
  marker(W2S(finishPt.x,finishPt.z),'#ff8800','FINISH');
  // GHOST at the current drop target
  if(ghost && dropTarget){
    const tp=tips.find(t=>sameTarget(t.target,dropTarget)); if(tp){ const g=ghostItem();
      const ang=tipAngle(tp); const gp = isSplit(g)? ghostSplitPaths(g,tp.x,tp.z,ang) : [layPieces([g],tp.x,tp.z,ang,'g').pts];
      gp.forEach(pts=>ribbon(pts,'#ffffff',{fill:false,dash:true,alpha:0.85}));
    }
  }
}
function tipAngle(tp){ // heading at a tip = derived from the last two pts of its lane (fallback +z)
  const {paths}=buildPreview();
  const lane = tp.side==='main'?paths[0]:paths.find(p=>p.lane===tp.side);
  const pts=lane&&lane.pts; if(pts&&pts.length>=2){ const a=pts[pts.length-2],b=pts[pts.length-1]; return Math.atan2(b.x-a.x,b.z-a.z); } return 0;
}
function ghostSplitPaths(g,x,z,ang){ const sp=bySplit(g.type); const rx=Math.cos(ang),rz=-Math.sin(ang); const out=[]; const lane=[{kind:'straight',len:24}];
  if(sp.sides.includes('left')) out.push(layPieces(lane,x+rx*WIDTH*-0.95,z+rz*WIDTH*-0.95,ang,'g').pts);
  if(sp.sides.includes('right'))out.push(layPieces(lane,x+rx*WIDTH* 0.95,z+rz*WIDTH* 0.95,ang,'g').pts);
  out.push(layPieces(lane,x,z,ang,'g').pts); return out; }
function sameTarget(a,b){ if(!a||!b) return false; if(a.type!==b.type) return false; return a.type==='main' || (a.idx===b.idx&&a.side===b.side); }
function marker(s,col,label){ ctx.beginPath(); ctx.arc(s.x,s.y,5*devicePixelRatio,0,7); ctx.fillStyle=col; ctx.fill();
  ctx.fillStyle=col; ctx.font=`bold ${11*devicePixelRatio}px system-ui`; ctx.textAlign='left'; ctx.textBaseline='middle'; ctx.fillText(label,s.x+8*devicePixelRatio,s.y); }

// pan/zoom
let pdrag=null;
cv.addEventListener('pointerdown',e=>{ pdrag={x:e.clientX,y:e.clientY,px:view.panx,py:view.pany}; cv.setPointerCapture(e.pointerId); });
cv.addEventListener('pointermove',e=>{ if(!pdrag)return; view.panx=pdrag.px+(e.clientX-pdrag.x)*devicePixelRatio; view.pany=pdrag.py-(e.clientY-pdrag.y)*devicePixelRatio; draw(); });
cv.addEventListener('pointerup',()=>pdrag=null);
cv.addEventListener('wheel',e=>{ e.preventDefault(); const f=e.deltaY<0?1.1:0.9; const r=cv.getBoundingClientRect(); const mx=(e.clientX-r.left)*devicePixelRatio,my=(e.clientY-r.top)*devicePixelRatio; const wx=(mx-view.panx)/view.scale, wz=(cv.height-my-view.pany)/view.scale; view.scale*=f; view.panx=mx-wx*view.scale; view.pany=(cv.height-my)-wz*view.scale; draw(); },{passive:false});

// drag targeting: nearest buildable tip to the cursor
function nearestTarget(cx,cy){
  const w=S2W(cx,cy); const {tips}=buildPreview(); let best=null,bd=1e9;
  tips.forEach(tp=>{ const d=(tp.x-w.x)**2+(tp.z-w.z)**2; if(d<bd){bd=d;best=tp.target;} });
  return best;
}
const stage=document.getElementById('stage');
stage.addEventListener('dragover',e=>{ if(!ghost) return; e.preventDefault(); e.dataTransfer.dropEffect='copy'; dropTarget=nearestTarget(e.clientX,e.clientY); draw(); });
stage.addEventListener('drop',e=>{ e.preventDefault(); if(!ghost) return; const t=dropTarget||{type:'main'}; const g=ghost; ghost=null; dropTarget=null; dropAdd(g,t); });
stage.addEventListener('dragleave',e=>{ if(!stage.contains(e.relatedTarget)){ dropTarget=null; draw(); } });

// ---- RIGHT PANEL ----
function refresh(){ renderTrack(); draw(); validate(); }
function renderTrack(){
  const host=document.getElementById('trackArea');
  if(!track.length){ host.innerHTML='<div class="hint">Empty — drag a piece onto the canvas.</div>'; return; }
  host.innerHTML = track.map((it,idx)=>{
    const open=(openItem===idx);
    if(isSplit(it)){ const sp=bySplit(it.type);
      let lanes='';
      sp.sides.forEach(sd=>{
        const end=it.end[sd];
        lanes+=`<div class="lane"><div style="font-size:10px;color:${laneColor[sd]}">${sd==='left'?'◀ Left':'Right ▶'} lane</div>
          <div class="seg" style="margin:4px 0">
            <button data-end="${idx}|${sd}|rejoin" class="${end==='rejoin'?'on':''}">↩ Rejoin</button>
            <button data-end="${idx}|${sd}|finish" class="${end==='finish'?'on':''}">🏁 Finish</button></div>`;
        if(!it.lanes[sd].length) lanes+=`<div class="hint" style="font-size:10px">empty — drag onto its ${sd} tip on the canvas</div>`;
        else it.lanes[sd].forEach((s,si)=>{ const key=idx+'|'+sd+'|'+si; const lo=(_lopen===key);
          lanes+=`<div class="item" style="margin:4px 0">
            <div class="itemHd" data-lopen="${key}" style="padding:5px 7px">
              <div class="sw" style="width:13px;height:13px;background:${KCOLOR[s.kind]}"></div>
              <div class="nm" style="font-size:11px;color:${KCOLOR[s.kind]}">${pieceName(s)}</div>
              <div class="mini">${lo?'▼':'▶'} len ${s.len}</div>
              <button data-lup="${key}">▲</button><button data-ldown="${key}">▼</button><button data-ldel="${key}" style="color:var(--bad)">✕</button></div>
            ${lo?`<div class="itemBody" data-lbody="${key}">${propsHTML(s)}</div>`:''}</div>`; });
        lanes+=`</div>`;
      });
      return `<div class="item split"><div class="itemHd" data-open="${idx}"><div class="sw" style="width:16px;height:16px;background:#2a2410;color:#ffcc00;border:1px solid #ffcc00">${sp.icon}</div>
        <div class="nm" style="color:#ffcc00">${sp.name}</div>
        <button data-up="${idx}">▲</button><button data-down="${idx}">▼</button><button data-del="${idx}" style="color:var(--bad)">✕</button></div>
        <div class="itemBody">${lanes}</div></div>`;
    }
    const col=KCOLOR[it.kind];
    return `<div class="item ${open?'sel':''}"><div class="itemHd" data-open="${idx}"><div class="sw" style="width:16px;height:16px;background:${col}"></div>
      <div class="nm" style="color:${col}">${pieceName(it)}</div><div class="mini">${open?'▼':'▶'} len ${it.len}</div>
      <button data-up="${idx}">▲</button><button data-down="${idx}">▼</button><button data-del="${idx}" style="color:var(--bad)">✕</button></div>
      ${open?`<div class="itemBody">${propsHTML(it)}</div>`:''}</div>`;
  }).join('');
  wire(host);
}
function propsHTML(s){
  const rng=(k,label,min,max,step,val)=>`<div class="rng"><label>${label}</label><input type="range" data-k="${k}" min="${min}" max="${max}" step="${step}" value="${val}"><span class="v" id="v-${k}">${val}</span></div>`;
  let h=rng('len','Length',6,200,1,s.len);
  if(s.kind==='sweep'||s.kind==='tunnelturn'){ h+=rng('sharp','Sharpness',0.01,0.12,0.002,s.sharp); }
  if(s.kind==='funnel'||s.kind==='narrower'){ h+=rng('min','Throat',0.25,0.9,0.01,s.min); }
  if(s.kind==='drop'){ h+=rng('drop','Steepness',0.4,3,0.1,s.drop); }
  if(s.kind==='tunneldrop'){ h+=rng('drop','Steepness',1.2,4,0.1,s.drop); }
  if(s.kind==='cascade'){ h+=rng('steps','Steps',2,8,1,s.steps); }
  if(s.kind==='arena'){ h+=rng('w','Width',8,30,1,s.w); }
  return h;
}
function wire(host){
  host.querySelectorAll('.itemHd[data-open]').forEach(hd=>hd.onclick=e=>{ if(e.target.dataset.del!=null||e.target.dataset.up!=null||e.target.dataset.down!=null) return; const i=+hd.dataset.open; openItem=(openItem===i?-1:i); renderTrack(); });
  host.querySelectorAll('[data-del]').forEach(b=>b.onclick=e=>{ e.stopPropagation(); const i=+b.dataset.del; track.splice(i,1); if(openItem===i)openItem=-1; else if(openItem>i)openItem--; pushUndo(); refresh(); });
  host.querySelectorAll('[data-up]').forEach(b=>b.onclick=e=>{ e.stopPropagation(); const i=+b.dataset.up; if(i>0){ [track[i-1],track[i]]=[track[i],track[i-1]]; openItem=i-1; pushUndo(); refresh(); } });
  host.querySelectorAll('[data-down]').forEach(b=>b.onclick=e=>{ e.stopPropagation(); const i=+b.dataset.down; if(i<track.length-1){ [track[i+1],track[i]]=[track[i],track[i+1]]; openItem=i+1; pushUndo(); refresh(); } });
  host.querySelectorAll('[data-end]').forEach(b=>b.onclick=()=>{ const [i,l,v]=b.dataset.end.split('|'); track[+i].end[l]=v; pushUndo(); refresh(); });
  // split-lane pieces: open to edit, reorder, delete — treated like normal track pieces
  host.querySelectorAll('.itemHd[data-lopen]').forEach(hd=>hd.onclick=e=>{
    if(e.target.dataset.ldel!=null||e.target.dataset.lup!=null||e.target.dataset.ldown!=null) return;
    _lopen=(_lopen===hd.dataset.lopen?null:hd.dataset.lopen); renderTrack(); });
  host.querySelectorAll('[data-ldel]').forEach(b=>b.onclick=e=>{ e.stopPropagation(); const [i,l,si]=b.dataset.ldel.split('|'); track[+i].lanes[l].splice(+si,1); _lopen=null; pushUndo(); refresh(); });
  host.querySelectorAll('[data-lup]').forEach(b=>b.onclick=e=>{ e.stopPropagation(); const [i,l,si]=b.dataset.lup.split('|'); const a=track[+i].lanes[l]; const k=+si; if(k>0){ [a[k-1],a[k]]=[a[k],a[k-1]]; _lopen=i+'|'+l+'|'+(k-1); pushUndo(); refresh(); } });
  host.querySelectorAll('[data-ldown]').forEach(b=>b.onclick=e=>{ e.stopPropagation(); const [i,l,si]=b.dataset.ldown.split('|'); const a=track[+i].lanes[l]; const k=+si; if(k<a.length-1){ [a[k+1],a[k]]=[a[k],a[k+1]]; _lopen=i+'|'+l+'|'+(k+1); pushUndo(); refresh(); } });
  // main open piece props
  if(openItem>=0 && track[openItem] && !isSplit(track[openItem])){
    const s=track[openItem]; const body=host.querySelectorAll('.item')[openItem]?.querySelector('.itemBody');
    if(body) wireRanges(body, s);
  }
  // open lane piece props
  if(_lopen){ const [i,l,si]=_lopen.split('|'); const s=track[+i]&&track[+i].lanes[l]&&track[+i].lanes[l][+si];
    const body=host.querySelector('[data-lbody="'+_lopen.replace(/"/g,'')+'"]');
    if(s&&body) wireRanges(body, s); }
}
function wireRanges(body, s){
  body.querySelectorAll('input[type=range]').forEach(r=>{
    r.oninput=()=>{ const k=r.dataset.k; s[k]=(k==='len'||k==='steps'||k==='w')?(+r.value|0):+r.value; const v=body.querySelector('#v-'+k); if(v)v.textContent=s[k]; draw(); validate(); };
    r.onchange=pushUndo;
  });
}

// ---- UNDO ----
function snap(){ return JSON.stringify({track,difficulty}); }
function pushUndo(){ undoStack.push(snap()); if(undoStack.length>80)undoStack.shift(); redoStack=[]; }
function restore(s){ const d=JSON.parse(s); track=d.track; difficulty=d.difficulty; refresh(); }
window.addEventListener('keydown',e=>{
  if((e.ctrlKey||e.metaKey)&&e.key==='z'&&!e.shiftKey){ if(undoStack.length){ redoStack.push(snap()); restore(undoStack.pop()); } e.preventDefault(); }
  else if((e.ctrlKey||e.metaKey)&&(e.key==='y'||(e.key==='z'&&e.shiftKey))){ if(redoStack.length){ undoStack.push(snap()); restore(redoStack.pop()); } e.preventDefault(); }
});

// ---- VALIDATION / MAP DATA ----
function validate(){ const ok=exportData().sections.length>=2; document.getElementById('btn-test').disabled=!ok; document.getElementById('btn-submit').disabled=!ok; return ok; }
function currentMap(){ const {sections,branches,noMiddle}=exportData();
  return { name:document.getElementById('m-name').value.trim()||'Untitled Track', description:document.getElementById('m-desc').value.trim(), difficulty, theme:document.getElementById('m-theme').value, author:author||'anon', sections, branches, obstacles:passObstacles, noMiddle:!!noMiddle }; }
function makeThumb(){ try{ const {paths}=buildPreview(); let pts=[]; paths.forEach(p=>pts=pts.concat(p.pts)); if(!pts.length) return '';
  let minx=1e9,maxx=-1e9,minz=1e9,maxz=-1e9; pts.forEach(q=>{minx=Math.min(minx,q.x);maxx=Math.max(maxx,q.x);minz=Math.min(minz,q.z);maxz=Math.max(maxz,q.z);});
  const W=320,H=200,pad=16; const c=document.createElement('canvas'); c.width=W;c.height=H; const g=c.getContext('2d'); g.fillStyle='#0c0f1a'; g.fillRect(0,0,W,H);
  const sc=Math.min((W-pad*2)/Math.max(1,maxx-minx),(H-pad*2)/Math.max(1,maxz-minz)); const ox=pad+((W-pad*2)-(maxx-minx)*sc)/2, oz=pad+((H-pad*2)-(maxz-minz)*sc)/2;
  const X=q=>ox+(q.x-minx)*sc, Y=q=>H-(oz+(q.z-minz)*sc); g.lineCap='round'; g.lineJoin='round';
  paths.forEach(({lane,pts})=>{ if(pts.length<2)return; g.strokeStyle=laneColor[lane]||'#39c8e0'; g.lineWidth=Math.max(3,WIDTH*sc*1.2); g.beginPath(); pts.forEach((q,i)=>i?g.lineTo(X(q),Y(q)):g.moveTo(X(q),Y(q))); g.stroke(); });
  return c.toDataURL('image/png'); }catch(_){ return ''; } }

      return `<div class="draftItem">${img}<div class="meta"><div class="t">${nm}</div><div class="s">${d.sectionCount} pieces · ${d.difficulty||'medium'}</div><div class="s" style="font-size:10px;color:#6b7596">${when}</div></div><button style="background:#2a6cff;color:#fff" onclick="loadDraft('${d.id}')">Load</button><button class="danger" onclick="delDraft('${d.id}')">🗑</button></div>`; }).join('');
  }catch(_){ list.innerHTML='<div style="color:#ff8a9c;padding:20px;text-align:center">Couldn’t load drafts.</div>'; } }
async function loadDraft(id){ try{ const r=await fetch('/api/maps?draft='+encodeURIComponent(id)+'&author='+encodeURIComponent(author)); const j=await r.json().catch(()=>({})); if(j&&j.ok&&j.draft){ currentDraftId=id; importMap(j.draft); closeDraftModal(); toast('Loaded draft.'); } else toast('Could not load that draft.'); }catch(_){ toast('Network error.'); } }
async function delDraft(id){ if(!confirm('Delete this draft?')) return; try{ await fetch('/api/maps',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'draft-delete',id,author})}); openDraftModal(); }catch(_){} }
window.loadDraft=loadDraft; window.delDraft=delDraft; window.closeDraftModal=closeDraftModal;

// ---- RANDOM GENERATOR (course director) ----
// A NAIVE random pick spirals back over itself and tangles. This paces the track like the
// main game's director: turns ALTERNATE direction (so it snakes, never coils), every feature
// is followed by a recovery straight, heavy pieces never stack, and splits are spaced with
// straights around them. Two flavours: multi-finish, or one finish with more splits.
function generateRandom(){
  const pick = a => a[Math.floor(Math.random()*a.length)];
  const chance = p => Math.random() < p;
  let turnDir = chance(0.5) ? 1 : -1;                  // flips each turn so the track weaves
  const gentle = () => { const d = turnDir; turnDir = -turnDir; return d < 0 ? 'turnL' : 'turnR'; };
  const sharp  = () => { const d = turnDir; turnDir = -turnDir; return d < 0 ? 'sharpL' : 'sharpR'; };
  const tunnelT= () => { const d = turnDir; turnDir = -turnDir; return d < 0 ? 'tturnL' : 'tturnR'; };
  const spiral = () => { const d = turnDir; turnDir = -turnDir; return d < 0 ? 'spiralL' : 'spiralR'; };
  // a calm connector: a straight or a gentle alternating sweep
  const calm = () => mkPiece(chance(0.45) ? 'straight' : gentle());
  const shuffle = a => { a=a.slice(); for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} return a; };
  // EXCITEMENT DECK: every track is guaranteed a real spread of big features — spirals, drops,
  // sharp/tunnel turns, cascades, moguls — not just gentle weaving. We deal from a shuffled deck
  // (refilled when spent) so one track has spirals AND plunges AND big turns instead of the same
  // flat sweep. Directional pieces (spiral/sharp/tunnelturn) alternate side via their helpers.
  let _deck = [];
  const refillDeck = () => { _deck = shuffle(['spiral','spiral','drop','tunneldrop','cascade','moguls','sharp','tunnelturn','sharp','spiral']); };
  const feature = () => {
    if (!_deck.length) refillDeck();
    const kind = _deck.pop();
    const id = kind==='spiral' ? spiral() : kind==='sharp' ? sharp() : kind==='tunnelturn' ? tunnelT() : kind;
    return mkPiece(id);
  };
  // DISTINCT LANE COURSES: each themed lane has its own character and is biased TOWARD its own
  // side (side=-1 left / +1 right) so lanes diverge into their own space instead of crossing.
  // Used when the split gives every lane its OWN finish — one's a spiral, one's a plunge, etc.
  // Themed lanes use GENTLE turns only (sharp turns jam a lane the same way they jam the main
  // line). Bias each lane's turns toward its own side so lanes still diverge into their own space.
  // Each lane starts with ONE turn toward its own side (to peel away into its own space), then
  // WEAVES forward with alternating turns and ends on a straight pointing downtrack — so a lane
  // reads as a full alternate route to its finish, never a short stub that U-turns back on itself.
  const IN  = s => s<0?'turnL':'turnR';     // peel toward own side
  const OUT = s => s<0?'turnR':'turnL';     // weave back
  const TIN = s => s<0?'tturnL':'tturnR';
  const SPIN = s => s<0?'spiralL':'spiralR';
  const THEMES = [
    s => [IN(s),'straight', SPIN(s),'straight', SPIN(s),'straight','straight'],                  // spiral course
    s => [IN(s),'straight','tunneldrop','straight','drop','straight','tunneldrop','straight'],  // speed plunge
    s => [TIN(s),'straight', s<0?'tunnelL':'tunnelR','straight', TIN(s),'straight','straight'],  // tunnel course
    s => [IN(s),'straight','moguls','straight','cascade','straight','moguls','straight'],        // bumpy tumble
    s => [IN(s),'straight','drop','straight', OUT(s),'straight','drop','straight'],              // drop run
  ];
  const themedLane = (side, tIdx) => THEMES[tIdx](side).map(id=>mkPiece(id));
  // rejoin lanes stay parallel (straight) so they hug the main and merge back cleanly
  const rejoinLane = () => [ mkPiece('straight'), mkPiece('straight') ];

  track = [ mkPiece('straight') ];                        // short intro runway
  // ONE consistent split style per track: either every lane rejoins the single finish, or every
  // lane is its own distinct course to its own finish.
  const ownExits = chance(0.5);
  const beats = 8 + Math.floor(Math.random()*3);   // more turns / a fuller track (~900-1300 nodes)
  let splits = ownExits ? 1 : (1 + Math.floor(Math.random()*2));
  let placed = 0, sinceSplit = 9;

  const buildSplit = () => {
    const sp = mkSplit(pick(['split3','split2','splitML','splitMR']));
    const sides = bySplit(sp.type).sides;
    const themeOrder = shuffle([0,1,2,3,4]);              // distinct theme per lane
    sides.forEach((sd,k)=>{
      const side = sd==='left'?-1:1;
      if (ownExits){ sp.lanes[sd] = themedLane(side, themeOrder[k]); sp.end[sd]='finish'; }
      else { sp.lanes[sd] = rejoinLane(); sp.end[sd]='rejoin'; }
    });
    return sp;
  };

  refillDeck();
  for (let i=0; i<beats; i++){
    // a TURN every beat, ALTERNATING direction (so it weaves, never coils). Mostly gentle, but
    // every so often a BIG (sharp) turn so the track has real character — recovery straight after.
    if (chance(0.35)) { track.push(mkPiece(sharp()), mkPiece('straight')); }   // a big banked turn
    else track.push(mkPiece(gentle()), mkPiece('straight'));
    track.push(mkPiece(gentle()), mkPiece('straight'));   // a SECOND weaving turn each beat → more turns
    // a real FEATURE nearly every beat (spiral / drop / cascade / big turn), dealt from the deck
    // so the whole track gets a spread — then a recovery straight.
    if (chance(0.85)) { track.push(feature()); track.push(mkPiece('straight')); }
    if (splits>0 && sinceSplit>=3 && i>1 && i<beats-1 && chance(0.5)){
      track.push(mkPiece('straight'), buildSplit(), mkPiece('straight'), mkPiece('straight'));
      splits--; placed++; sinceSplit = 0;
    } else sinceSplit++;
  }
  if (placed === 0) track.splice(Math.min(3, track.length), 0, mkPiece('straight'), buildSplit(), mkPiece('straight'), mkPiece('straight'));
  track.push(mkPiece('straight'), mkPiece('straight'));  // outro to the finish
  openItem=-1; _lopen=null; currentDraftId=null; undoStack=[]; redoStack=[];
  refresh(); fit();
  toast(ownExits ? '🎲 Random track — split lanes each race to their own finish!' : '🎲 Random track — splits rejoin to one finish!');
}
document.getElementById('btn-gen').onclick = () => {
  if (track.length && !confirm('Generate a new random track? This replaces the current one.')) return;
  generateRandom();
};

// ---- INIT ----
buildPalette(); window.addEventListener('resize',resize); resize(); refresh();
</script>
