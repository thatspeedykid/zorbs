<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>ZORBS Diagnostics</title>
<style>
  body{font-family:monospace;background:#080d14;color:#c8d8f0;margin:0;padding:20px;font-size:13px}
  h1{color:#39c8e0;margin:0 0 4px}
  .sub{color:#7f8cad;margin-bottom:18px;font-size:11px}
  .summary{background:#0e1322;border:1px solid #1e2d4a;border-radius:8px;padding:12px 16px;margin-bottom:18px;display:flex;gap:24px;flex-wrap:wrap}
  .stat{display:flex;flex-direction:column;gap:2px}
  .stat .label{font-size:10px;color:#7f8cad;text-transform:uppercase;letter-spacing:1px}
  .stat .val{font-size:20px;font-weight:700;color:#39c8e0}
  .filters{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap}
  .filter{padding:4px 10px;border-radius:20px;border:1px solid #1e2d4a;background:#0e1322;color:#7f8cad;cursor:pointer;font:inherit;font-size:11px;transition:.12s}
  .filter:hover,.filter.on{border-color:#39c8e0;color:#39c8e0;background:#091c28}
  .actions{display:flex;gap:8px;margin-bottom:18px}
  button{font:inherit;background:#0e1322;border:1px solid #1e2d4a;color:#c8d8f0;border-radius:7px;padding:6px 14px;cursor:pointer;font-size:12px}
  button:hover{border-color:#39c8e0;color:#39c8e0}
  button.danger{border-color:#ff4d5e;color:#ff4d5e}
  button.danger:hover{background:#200f18}
  .events{display:flex;flex-direction:column;gap:6px}
  .ev{border-radius:7px;padding:10px 14px;border-left:3px solid #1e2d4a;background:#0a0f1c}
  .ev.js_error,.ev.promise_rejection{border-left-color:#ff4d5e}
  .ev.ball_stuck{border-left-color:#ff8800}
  .ev.webgl_context_lost{border-left-color:#cc77ff}
  .ev.track_build_error{border-left-color:#ffcc00}
  .ev.track_build_slow{border-left-color:#ff8800}
  .ev.manual{border-left-color:#39c8e0}
  .ev-head{display:flex;gap:10px;align-items:baseline;margin-bottom:4px}
  .ev-kind{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:#7f8cad}
  .ev.js_error .ev-kind,.ev.promise_rejection .ev-kind{color:#ff4d5e}
  .ev.ball_stuck .ev-kind,.ev.track_build_slow .ev-kind{color:#ff8800}
  .ev.webgl_context_lost .ev-kind{color:#cc77ff}
  .ev.track_build_error .ev-kind{color:#ffcc00}
  .ev.manual .ev-kind{color:#39c8e0}
  .ev-time{font-size:10px;color:#4a5a7a}
  .ev-msg{color:#dfe8ff;margin-bottom:4px;word-break:break-word}
  .ev-meta{font-size:10px;color:#4a5a7a;display:flex;gap:12px;flex-wrap:wrap}
  .ev-stack{font-size:10px;color:#6a7a9a;white-space:pre-wrap;margin-top:6px;padding-top:6px;border-top:1px solid #111d30;display:none}
  .ev-stack.show{display:block}
  .toggle-stack{font-size:10px;color:#39c8e0;cursor:pointer;text-decoration:underline;margin-top:4px;display:inline-block}
  .empty{color:#4a5a7a;text-align:center;padding:40px;font-size:14px}
  #raw-out{display:none;background:#050a12;border:1px solid #1e2d4a;border-radius:7px;padding:14px;font-size:11px;white-space:pre;overflow:auto;max-height:400px;margin-top:14px}
</style>
</head>
<body>
<h1>ZORBS Diagnostics</h1>
<div class="sub" id="sub">Loading events from localStorage…</div>

<div class="summary" id="summary"></div>

<div class="actions">
  <button onclick="refreshAll()">↻ Refresh</button>
  <button onclick="copyJSON()">⧉ Copy JSON</button>
  <button onclick="toggleRaw()">{ } Raw</button>
  <button class="danger" onclick="clearAll()">✕ Clear all</button>
</div>

<div class="filters" id="filters"></div>
<div class="events" id="events"></div>
<pre id="raw-out"></pre>

<script>
const LS_KEY = 'zorbs_telem_v2';
let _all = [], _filter = null;

function load() {
  try { _all = JSON.parse(localStorage.getItem(LS_KEY) || '[]'); } catch(_){ _all=[]; }
  // newest first
  _all = _all.slice().reverse();
}

function kindColor(k) {
  if(k==='js_error'||k==='promise_rejection') return '#ff4d5e';
  if(k==='ball_stuck'||k==='track_build_slow') return '#ff8800';
  if(k==='webgl_context_lost') return '#cc77ff';
  if(k==='track_build_error') return '#ffcc00';
  return '#39c8e0';
}

function fmt(iso) {
  try { const d=new Date(iso); return d.toLocaleTimeString()+' '+d.toLocaleDateString(); } catch(_){ return iso||''; }
}

function ago(iso) {
  try {
    const diff = Date.now() - new Date(iso).getTime();
    if(diff<60000) return Math.round(diff/1000)+'s ago';
    if(diff<3600000) return Math.round(diff/60000)+'m ago';
    return Math.round(diff/3600000)+'h ago';
  } catch(_){ return ''; }
}

function renderSummary() {
  const counts = {};
  for(const r of _all) counts[r.kind]=(counts[r.kind]||0)+1;
  const errors = (_all.filter(r=>r.kind==='js_error'||r.kind==='promise_rejection'||r.kind==='track_build_error')).length;
  const stuck = (_all.filter(r=>r.kind==='ball_stuck')).length;
  document.getElementById('summary').innerHTML =
    stat('Total events', _all.length) +
    stat('Errors', errors, errors>0?'#ff4d5e':'#39c8e0') +
    stat('Balls stuck', stuck, stuck>0?'#ff8800':'#39c8e0') +
    stat('Kinds', Object.keys(counts).length);
  document.getElementById('sub').textContent =
    _all.length ? `${_all.length} events · most recent ${ago(_all[0]&&_all[0].t)}` : 'No events recorded yet.';
}

function stat(label, val, color) {
  return `<div class="stat"><div class="label">${label}</div><div class="val" style="color:${color||'#39c8e0'}">${val}</div></div>`;
}

function renderFilters() {
  const counts = {};
  for(const r of _all) counts[r.kind]=(counts[r.kind]||0)+1;
  let h = `<button class="filter ${_filter===null?'on':''}" onclick="setFilter(null)">All (${_all.length})</button>`;
  for(const [k,n] of Object.entries(counts).sort((a,b)=>b[1]-a[1])) {
    h += `<button class="filter ${_filter===k?'on':''}" onclick="setFilter('${k}')" style="color:${kindColor(k)}">${k} (${n})</button>`;
  }
  document.getElementById('filters').innerHTML = h;
}

function renderEvents() {
  const list = _filter ? _all.filter(r=>r.kind===_filter) : _all;
  if(!list.length) {
    document.getElementById('events').innerHTML = '<div class="empty">No events' + (_filter?` of kind "${_filter}"`:'') + '.</div>';
    return;
  }
  document.getElementById('events').innerHTML = list.map((r,i)=>{
    const hasStack = r.stack && r.stack.trim().length > 0;
    const meta = [
      r.page && `page: ${r.page}`,
      r.raceId && `race: ${r.raceId}`,
      r.mapId && `map: ${r.mapId}`,
      r.phase && `phase: ${r.phase}`,
      r.ballId && `ball: ${r.ballId}`,
      r.hint!=null && `hint: ${r.hint}`,
      r.stuckMs && `stuck: ${Math.round(r.stuckMs/1000)}s`,
      r.seed && `seed: ${r.seed}`,
      r.ms && `build: ${r.ms}ms`,
      r.src && r.src !== r.url && `src: ${r.src.split('/').pop()}:${r.line||'?'}`,
    ].filter(Boolean);
    return `<div class="ev ${r.kind||''}">
      <div class="ev-head">
        <span class="ev-kind">${r.kind||'?'}</span>
        <span class="ev-time">${fmt(r.t)} · ${ago(r.t)}</span>
      </div>
      <div class="ev-msg">${escH(r.msg||'')}</div>
      ${meta.length?`<div class="ev-meta">${meta.map(m=>`<span>${escH(m)}</span>`).join('')}</div>`:''}
      ${hasStack?`<span class="toggle-stack" onclick="toggleStack(${i})">▶ stack trace</span>
        <div class="ev-stack" id="stack-${i}">${escH(r.stack)}</div>`:''}
    </div>`;
  }).join('');
}

function escH(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function toggleStack(i) {
  const el = document.getElementById('stack-'+i);
  if(!el) return;
  el.classList.toggle('show');
  el.previousElementSibling.textContent = el.classList.contains('show') ? '▼ stack trace' : '▶ stack trace';
}

function setFilter(k) { _filter=k; renderFilters(); renderEvents(); }

function refreshAll() { load(); renderSummary(); renderFilters(); renderEvents(); document.getElementById('raw-out').textContent=JSON.stringify(_all.slice().reverse(),null,2); }

function copyJSON() {
  try { navigator.clipboard.writeText(JSON.stringify(_all.slice().reverse(),null,2));
    const b=event.target; b.textContent='Copied!'; setTimeout(()=>b.textContent='⧉ Copy JSON',1500); }
  catch(_) { alert('Copy failed — use { } Raw button instead'); }
}

function toggleRaw() {
  const el=document.getElementById('raw-out');
  if(el.style.display==='none'||!el.style.display){ el.style.display='block'; el.textContent=JSON.stringify(_all.slice().reverse(),null,2); }
  else el.style.display='none';
}

function clearAll() {
  if(!confirm('Clear all telemetry events?')) return;
  try { localStorage.removeItem(LS_KEY); } catch(_){}
  _all=[]; _filter=null; renderSummary(); renderFilters(); renderEvents();
}

// Auto-refresh every 5s while page is open
refreshAll();
setInterval(refreshAll, 5000);
</script>
</body>
</html>
